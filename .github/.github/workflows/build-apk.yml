name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "APK Building..."
      - run: mkdir -p output
      - run: echo "Test APK" > output/app.apk
      - uses: actions/upload-artifact@v4
        with:
          name: my-apk
          path: output/
