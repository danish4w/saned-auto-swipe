name: Build RootAutoSwipe
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Project
        run: |
          mkdir -p app/src/main/java/com/rootautoswipe
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          echo "include ':app'" > settings.gradle

          mkdir -p app/src/main/res/mipmap-mdpi
          echo "" | base64 -d > app/src/main/res/mipmap-mdpi/ic_launcher.png
          mkdir -p app/src/main/res/mipmap-hdpi
          echo "" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          mkdir -p app/src/main/res/mipmap-xhdpi
          echo "" | base64 -d > app/src/main/res/mipmap-xhdpi/ic_launcher.png
          mkdir -p app/src/main/res/mipmap-xxhdpi
          echo "" | base64 -d > app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          echo "" | base64 -d > app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rootautoswipe'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.rootautoswipe'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              packagingOptions {
                  exclude 'META-INF/LICENSE.md'
                  exclude 'META-INF/LICENSE-notice.md'
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_LOGS"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <application android:label="@string/app_name" android:icon="@mipmap/ic_launcher"
                  android:theme="@style/Theme.AppCompat">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".LogActivity" android:label="Logs" android:exported="false"/>
                  <activity android:name=".PopupActivity" android:exported="false"
                      android:theme="@style/Theme.AppCompat.Dialog"
                      android:excludeFromRecents="true" android:launchMode="singleInstance"/>
                  <service android:name=".AutoSwipeService" android:exported="false"
                      android:foregroundServiceType="dataSync"/>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">RootAutoSwipe</string>
          </resources>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent">
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:orientation="vertical" android:padding="20dp" android:background="#121212">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="🟢 RootAutoSwipe" android:textSize="24sp"
                      android:textColor="#4CAF50" android:textStyle="bold"/>
                  <TextView android:id="@+id/tv_status" android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Stopped" android:textSize="14sp" android:textColor="#FF5555" android:layout_marginTop="16dp"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Target Package" android:textColor="#AAAAAA" android:layout_marginTop="16dp"/>
                  <EditText android:id="@+id/et_package" android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:text="net.jahez.fleets" android:textColor="#FFFFFF" android:background="#333333" android:padding="10dp"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Max Pickup (km)" android:textColor="#AAAAAA" android:layout_marginTop="10dp"/>
                  <EditText android:id="@+id/et_pickup_max" android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:inputType="numberDecimal" android:text="1.5" android:textColor="#FFFFFF" android:background="#333333" android:padding="10dp"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Max Drop (km)" android:textColor="#AAAAAA" android:layout_marginTop="10dp"/>
                  <EditText android:id="@+id/et_drop_max" android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:inputType="numberDecimal" android:text="3.5" android:textColor="#FFFFFF" android:background="#333333" android:padding="10dp"/>
                  <TextView android:id="@+id/tv_swipe_duration_label" android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Swipe Duration: 300ms" android:textColor="#4CAF50" android:layout_marginTop="16dp"/>
                  <SeekBar android:id="@+id/sb_swipe_duration" android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:max="900" android:progress="200" android:thumbTint="#4CAF50" android:progressTint="#4CAF50"/>
                  <Button android:id="@+id/btn_start" android:layout_width="match_parent" android:layout_height="50dp"
                      android:text="START" android:backgroundTint="#4CAF50" android:layout_marginTop="20dp"/>
                  <Button android:id="@+id/btn_stop" android:layout_width="match_parent" android:layout_height="50dp"
                      android:text="STOP" android:backgroundTint="#F44336" android:layout_marginTop="10dp"/>
                  <Button android:id="@+id/btn_logs" android:layout_width="match_parent" android:layout_height="50dp"
                      android:text="LOGS" android:backgroundTint="#2196F3" android:layout_marginTop="10dp"/>
              </LinearLayout>
          </ScrollView>
          EOF

          cat > app/src/main/res/layout/activity_log.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#000000" android:padding="10dp">
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:text="Logs" android:textSize="20sp" android:textColor="#4CAF50" android:gravity="center"/>
              <ScrollView android:id="@+id/log_scroll" android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1">
                  <TextView android:id="@+id/tv_logs" android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:textColor="#00FF00" android:fontFamily="monospace" android:textSize="10sp" android:text="Waiting..."/>
              </ScrollView>
              <Button android:id="@+id/btn_clear" android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:text="CLEAR" android:backgroundTint="#F44336"/>
          </LinearLayout>
          EOF

          cat > app/src/main/res/layout/activity_popup.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="300dp" android:layout_height="wrap_content"
              android:orientation="vertical" android:background="#1E1E1E" android:padding="24dp">
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:text="Order Accepted!" android:textSize="22sp" android:textColor="#4CAF50"
                  android:textStyle="bold" android:gravity="center"/>
              <TextView android:id="@+id/tv_pickup" android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:text="Pickup: -- km" android:textSize="16sp" android:textColor="#FFFFFF" android:layout_marginTop="16dp"/>
              <TextView android:id="@+id/tv_drop" android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:text="Drop: -- km" android:textSize="16sp" android:textColor="#FFFFFF" android:layout_marginTop="8dp"/>
              <Button android:id="@+id/btn_ok" android:layout_width="match_parent" android:layout_height="45dp"
                  android:text="OK" android:backgroundTint="#4CAF50" android:layout_marginTop="20dp"/>
          </LinearLayout>
          EOF

          cat > app/src/main/java/com/rootautoswipe/PopupActivity.java << 'EOF'
          package com.rootautoswipe;
          import android.os.Bundle;
          import android.os.Handler;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;
          public class PopupActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_popup);
                  float pk = getIntent().getFloatExtra("pickup", 0f);
                  float dr = getIntent().getFloatExtra("drop", 0f);
                  ((TextView) findViewById(R.id.tv_pickup)).setText("Pickup: " + pk + " km");
                  ((TextView) findViewById(R.id.tv_drop)).setText("Drop:   " + dr + " km");
                  findViewById(R.id.btn_ok).setOnClickListener(v -> finish());
                  new Handler().postDelayed(this::finish, 5000);
              }
          }
          EOF

          cat > app/src/main/java/com/rootautoswipe/MainActivity.java << 'EOF'
          package com.rootautoswipe;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.Bundle;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              private EditText etPkg, etPk, etDr;
              private SeekBar sbSw;
              private TextView tvSw, tvSt;
              private SharedPreferences pr;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  pr = getSharedPreferences("ras_prefs", MODE_PRIVATE);
                  etPkg = findViewById(R.id.et_package);
                  etPk  = findViewById(R.id.et_pickup_max);
                  etDr  = findViewById(R.id.et_drop_max);
                  sbSw  = findViewById(R.id.sb_swipe_duration);
                  tvSw  = findViewById(R.id.tv_swipe_duration_label);
                  tvSt  = findViewById(R.id.tv_status);
                  etPkg.setText(pr.getString("target_pkg", "net.jahez.fleets"));
                  etPk.setText(String.valueOf(pr.getFloat("pickup_max", 1.5f)));
                  etDr.setText(String.valueOf(pr.getFloat("drop_max", 3.5f)));
                  int sd = pr.getInt("swipe_duration", 300);
                  sbSw.setProgress(sd - 100);
                  tvSw.setText("Swipe Duration: " + sd + "ms");
                  sbSw.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override public void onProgressChanged(SeekBar s, int p, boolean u) {
                          tvSw.setText("Swipe Duration: " + (p + 100) + "ms");
                      }
                      @Override public void onStartTrackingTouch(SeekBar s) {}
                      @Override public void onStopTrackingTouch(SeekBar s) {}
                  });
                  findViewById(R.id.btn_start).setOnClickListener(v -> {
                      float pk, dr;
                      try { pk = Float.parseFloat(etPk.getText().toString()); } catch (Exception e) { pk = 1.5f; }
                      try { dr = Float.parseFloat(etDr.getText().toString()); } catch (Exception e) { dr = 3.5f; }
                      pr.edit()
                          .putString("target_pkg",  etPkg.getText().toString().trim())
                          .putFloat("pickup_max",   pk)
                          .putFloat("drop_max",     dr)
                          .putInt("swipe_duration", sbSw.getProgress() + 100)
                          .apply();
                      Intent svc = new Intent(this, AutoSwipeService.class);
                      if (Build.VERSION.SDK_INT >= 26) startForegroundService(svc);
                      else startService(svc);
                      tvSt.setText("Running");
                      tvSt.setTextColor(0xFF4CAF50);
                      Toast.makeText(this, "Started", Toast.LENGTH_SHORT).show();
                  });
                  findViewById(R.id.btn_stop).setOnClickListener(v -> {
                      stopService(new Intent(this, AutoSwipeService.class));
                      tvSt.setText("Stopped");
                      tvSt.setTextColor(0xFFFF5555);
                      Toast.makeText(this, "Stopped", Toast.LENGTH_SHORT).show();
                  });
                  findViewById(R.id.btn_logs).setOnClickListener(v ->
                      startActivity(new Intent(this, LogActivity.class))
                  );
              }
          }
          EOF

          cat > app/src/main/java/com/rootautoswipe/AutoSwipeService.java << 'EOF'
          package com.rootautoswipe;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.Service;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.IBinder;
          import android.os.VibrationEffect;
          import android.os.Vibrator;
          import android.util.Log;
          import java.io.BufferedReader;
          import java.io.InputStreamReader;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          public class AutoSwipeService extends Service {
              static final String TAG = "RAS";
              static final String CH  = "com.rootautoswipe_ch";
              static final String CHA = "com.rootautoswipe_alert";
              static final int NID = 2001;
              static final int AID = 2002;

              Thread th;
              boolean run = false;
              SharedPreferences pr;
              NotificationManager nm;

              String pkg   = "net.jahez.fleets";
              float pkMax  = 1.5f;
              float drMax  = 3.5f;
              int sw       = 300;

              void log(String m) {
                  Log.d(TAG, m);
                  Intent i = new Intent("RAS_LOG_ACTION");
                  i.setPackage("com.rootautoswipe");
                  i.putExtra("log_msg", m);
                  sendBroadcast(i);
              }

              String exec(String c) {
                  try {
                      Process p = Runtime.getRuntime().exec(new String[]{"su", "-c", c});
                      BufferedReader b = new BufferedReader(new InputStreamReader(p.getInputStream()));
                      StringBuilder sb = new StringBuilder();
                      String l;
                      while ((l = b.readLine()) != null) sb.append(l).append("\n");
                      p.waitFor();
                      return sb.toString().trim();
                  } catch (Exception e) {
                      log("ex:" + e.getMessage());
                      return "";
                  }
              }

              void startFgNotif() {
                  nm = getSystemService(NotificationManager.class);
                  if (Build.VERSION.SDK_INT >= 26) {
                      nm.createNotificationChannel(new NotificationChannel(CH, "RootAutoSwipe Svc", NotificationManager.IMPORTANCE_LOW));
                      NotificationChannel ac = new NotificationChannel(CHA, "Order Alert", NotificationManager.IMPORTANCE_HIGH);
                      ac.enableVibration(true);
                      nm.createNotificationChannel(ac);
                  }
                  Notification.Builder b = Build.VERSION.SDK_INT >= 26
                      ? new Notification.Builder(this, CH)
                      : new Notification.Builder(this);
                  startForeground(NID, b
                      .setContentTitle("RootAutoSwipe")
                      .setContentText("Monitoring orders...")
                      .setSmallIcon(android.R.drawable.ic_menu_compass)
                      .setOngoing(true)
                      .build());
                  log("Service started");
              }

              void alert(float pk, float dr) {
                  try {
                      Vibrator v = (Vibrator) getSystemService(VIBRATOR_SERVICE);
                      if (v != null && v.hasVibrator()) {
                          if (Build.VERSION.SDK_INT >= 26)
                              v.vibrate(VibrationEffect.createWaveform(new long[]{0, 300, 150, 300}, -1));
                          else
                              v.vibrate(new long[]{0, 300, 150, 300}, -1);
                      }
                  } catch (Exception e) {}
                  try {
                      Notification.Builder b = Build.VERSION.SDK_INT >= 26
                          ? new Notification.Builder(this, CHA)
                          : new Notification.Builder(this);
                      nm.notify(AID, b
                          .setContentTitle("Order Accepted!")
                          .setContentText("Pickup:" + pk + "km | Drop:" + dr + "km")
                          .setSmallIcon(android.R.drawable.ic_dialog_info)
                          .setAutoCancel(true)
                          .build());
                  } catch (Exception e) {}
                  try {
                      Intent i = new Intent(this, PopupActivity.class);
                      i.putExtra("pickup", pk);
                      i.putExtra("drop", dr);
                      i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_CLEAR_TOP);
                      startActivity(i);
                  } catch (Exception e) {}
              }

              @Override
              public void onCreate() {
                  super.onCreate();
                  pr = getSharedPreferences("ras_prefs", MODE_PRIVATE);
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  startFgNotif();
                  pkg   = pr.getString("target_pkg", "net.jahez.fleets");
                  pkMax = pr.getFloat("pickup_max", 1.5f);
                  drMax = pr.getFloat("drop_max", 3.5f);
                  sw    = pr.getInt("swipe_duration", 300);
                  log("Pkg:" + pkg + " P:" + pkMax + " D:" + drMax + " Sw:" + sw);

                  if (th != null && th.isAlive()) return START_STICKY;

                  run = true;
                  th = new Thread(new Runnable() {
                      @Override
                      public void run() {
                          log("Monitor [FILE DUMP] FAST MODE");
                          while (run) {
                              try {
                                  // 1. App foreground check
                                  String top = Build.VERSION.SDK_INT >= 29
                                      ? exec("dumpsys activity top | grep ACTIVITY | tail -1")
                                      : exec("dumpsys activity top | grep ACTIVITY | head -1");
                                  if (!top.contains(pkg)) { Thread.sleep(800); continue; }

                                  // 2. Ek dump lo
                          // File dump — single operation
                          String dump = exec("uiautomator dump /data/local/tmp/ras.xml 2>/dev/null && cat /data/local/tmp/ras.xml");

                                  if (dump.isEmpty()) { Thread.sleep(300); continue; }

                                  // 3. New Order check
                                  if (!dump.contains("New Order")) { Thread.sleep(500); continue; }

                                  log("New Order! Parsing same dump...");

                                  // 4. Usi dump se distances nikalo — NO EXTRA WAIT
                                  float[] d = dist(dump);
                                  log("P:" + d[0] + " D:" + d[1]);

                                  if (d[0] < 0 || d[1] < 0) {
                                      log("Parse fail, retry");
                                      Thread.sleep(300);
                                      continue;
                                  }

                                  // 5. Decision
                                  if (d[0] <= pkMax && d[1] <= drMax) {
                                      log("ACCEPT P:" + d[0] + " D:" + d[1]);
                                      int[] c = acc(dump);
                                      if (c != null) {
                                          exec("input swipe " + (c[0]+c[2]/5) + " " + (c[1]+c[3]/2)
                                              + " " + (c[0]+c[2]*4/5) + " " + (c[1]+c[3]/2) + " " + sw);
                                      } else {
                                          String sz = exec("wm size");
                                          int W = 1080, H = 1920;
                                          Matcher m = Pattern.compile("(\\d+)x(\\d+)").matcher(sz);
                                          if (m.find()) {
                                              W = Integer.parseInt(m.group(1));
                                              H = Integer.parseInt(m.group(2));
                                          }
                                          exec("input swipe " + (int)(W*.15) + " " + (int)(H*.85)
                                              + " " + (int)(W*.85) + " " + (int)(H*.85) + " " + sw);
                                          log("Fallback swipe");
                                      }
                                      alert(d[0], d[1]);
                                      Thread.sleep(3000);
                                  } else {
                                      log("REJECT P:" + d[0] + "/" + pkMax + " D:" + d[1] + "/" + drMax);
                                  }
                                  Thread.sleep(500);

                              } catch (InterruptedException e) {
                                  break;
                              } catch (Exception e) {
                                  log("E:" + e.getMessage());
                              }
                          }
                          log("Monitor stopped");
                      }
                  });
                  th.start();
                  return START_STICKY;
              }

              float[] dist(String x) {
                  float[] r = {-1, -1};
                  Matcher m = Pattern.compile("(\\d+\\.?\\d*)\\s*[Kk]m\\s+From\\s+You", Pattern.CASE_INSENSITIVE).matcher(x);
                  if (m.find()) r[0] = Float.parseFloat(m.group(1));
                  m = Pattern.compile("(\\d+\\.?\\d*)\\s*[Kk]m\\s+From\\s+Pickup", Pattern.CASE_INSENSITIVE).matcher(x);
                  if (m.find()) r[1] = Float.parseFloat(m.group(1));
                  if (r[0] < 0 || r[1] < 0) {
                      String[] ln = x.split("node ");
                      Pattern kp = Pattern.compile("text=\"(\\d+\\.?\\d*)\\s*[Kk]m\"");
                      for (int i = 0; i < ln.length - 1; i++) {
                          Matcher km = kp.matcher(ln[i]);
                          if (km.find()) {
                              float v = Float.parseFloat(km.group(1));
                              StringBuilder nx = new StringBuilder();
                              for (int j = i+1; j < Math.min(i+4, ln.length); j++) nx.append(ln[j]);
                              String s = nx.toString().toLowerCase();
                              if (s.contains("from you") && r[0] < 0) r[0] = v;
                              else if (s.contains("from pickup") && r[1] < 0) r[1] = v;
                          }
                      }
                  }
                  if (r[0] < 0 || r[1] < 0) {
                      Matcher ma = Pattern.compile("text=\"(\\d+\\.?\\d*)\\s*[Kk]m[^\"]*\"", Pattern.CASE_INSENSITIVE).matcher(x);
                      List<Float> vs = new ArrayList<>();
                      while (ma.find()) { float v = Float.parseFloat(ma.group(1)); if (v > 0 && v < 100) vs.add(v); }
                      log("km vals:" + vs);
                      if (vs.size() >= 2) { if (r[0] < 0) r[0] = vs.get(0); if (r[1] < 0) r[1] = vs.get(1); }
                  }
                  return r;
              }

              int[] acc(String x) {
                  Matcher m = Pattern.compile(
                      "bounds=\"\\[(\\d+),(\\d+)\\]\\[(\\d+),(\\d+)\\]\"[^/]*?text=\"(?:Accept|ACCEPT|قبول)\"|" +
                      "text=\"(?:Accept|ACCEPT|قبول)\"[^/]*?bounds=\"\\[(\\d+),(\\d+)\\]\\[(\\d+),(\\d+)\\]\"",
                      Pattern.CASE_INSENSITIVE | Pattern.DOTALL).matcher(x);
                  if (m.find()) {
                      int l, t, ri, b;
                      if (m.group(1) != null) {
                          l=Integer.parseInt(m.group(1)); t=Integer.parseInt(m.group(2));
                          ri=Integer.parseInt(m.group(3)); b=Integer.parseInt(m.group(4));
                      } else {
                          l=Integer.parseInt(m.group(5)); t=Integer.parseInt(m.group(6));
                          ri=Integer.parseInt(m.group(7)); b=Integer.parseInt(m.group(8));
                      }
                      log("Accept:[" + l + "," + t + "][" + ri + "," + b + "]");
                      return new int[]{l, t, ri-l, b-t};
                  }
                  log("Accept btn not found");
                  return null;
              }

              @Override
              public void onDestroy() {
                  run = false;
                  if (th != null) th.interrupt();
                  stopForeground(true);
                  super.onDestroy();
              }

              @Override
              public IBinder onBind(Intent intent) { return null; }
          }
          EOF

          cat > app/src/main/java/com/rootautoswipe/LogActivity.java << 'EOF'
          package com.rootautoswipe;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.os.Build;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;
          public class LogActivity extends AppCompatActivity {
              private TextView tv;
              private ScrollView sv;
              private final BroadcastReceiver rc = new BroadcastReceiver() {
                  @Override
                  public void onReceive(Context c, Intent i) {
                      String m = i.getStringExtra("log_msg");
                      if (m == null || tv == null) return;
                      tv.append("\n" + m);
                      if (sv != null) sv.post(() -> sv.fullScroll(ScrollView.FOCUS_DOWN));
                  }
              };
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_log);
                  tv = findViewById(R.id.tv_logs);
                  sv = findViewById(R.id.log_scroll);
                  ((Button) findViewById(R.id.btn_clear)).setOnClickListener(v -> tv.setText("Cleared"));
                  IntentFilter f = new IntentFilter("RAS_LOG_ACTION");
                  if (Build.VERSION.SDK_INT >= 33)
                      registerReceiver(rc, f, Context.RECEIVER_NOT_EXPORTED);
                  else if (Build.VERSION.SDK_INT >= 26)
                      registerReceiver(rc, f, Context.RECEIVER_EXPORTED);
                  else
                      registerReceiver(rc, f);
              }
              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  unregisterReceiver(rc);
              }
          }
          EOF

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RootAutoSwipe
          path: app/build/outputs/apk/debug/*.apk
