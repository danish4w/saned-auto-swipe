name: Build JahezAutoAccept

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          cat > gradle/wrapper/gradle-wrapper.properties << 'WEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/zips
          WEOF

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/danish/jahez
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/assets

      - name: Write Gradle Files
        run: |
          cat > settings.gradle << 'SEOF'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositories {
              google(); mavenCentral()
              maven { url 'https://api.xposed.info/' }
            }
          }
          rootProject.name = "JahezAutoAccept"
          include ':app'
          SEOF

          cat > build.gradle << 'BEOF'
          plugins { id 'com.android.application' version '8.5.2' apply false }
          BEOF

          cat > gradle.properties << 'GEOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          GEOF

          cat > app/build.gradle << 'ABEOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.danish.jahez'
            compileSdk 34
            defaultConfig {
              applicationId 'com.danish.jahez'
              minSdk 26
              targetSdk 34
              versionCode 1
              versionName '1.0'
            }
            buildTypes {
              release { minifyEnabled false }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.google.android.material:material:1.12.0'
            compileOnly 'de.robv.android.xposed:api:82'
          }
          ABEOF

      - name: Write Icon
        run: |
          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'BGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp"
            android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#1B5E20"
              android:pathData="M0,0 L108,0 L108,108 L0,108 Z"/>
          </vector>
          BGEOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'FGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp"
            android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#FFFFFF"
              android:pathData="M25,54 L35,44 L47,60 L73,30 L83,40 L47,82 Z"/>
          </vector>
          FGEOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'ICEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          ICEOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'RNDEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          RNDEOF

      - name: Write Xposed Files
        run: |
          echo "com.danish.jahez.SanedHook" > app/src/main/assets/xposed_init

      - name: Write Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
            <application
              android:label="Jahez Auto"
              android:icon="@mipmap/ic_launcher"
              android:roundIcon="@mipmap/ic_launcher_round"
              android:theme="@style/AppTheme"
              android:allowBackup="false">
              <meta-data android:name="xposedmodule" android:value="true"/>
              <meta-data android:name="xposeddescription" android:value="Jahez order hook"/>
              <meta-data android:name="xposedminversion" android:value="82"/>
              <activity android:name=".MainActivity" android:exported="true"
                android:windowSoftInputMode="stateHidden|adjustPan">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
              <activity android:name=".LogActivity" android:exported="false"/>
              <service
                android:name=".AutoService"
                android:label="Jahez Auto Accept"
                android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                android:exported="true">
                <intent-filter>
                  <action android:name="android.accessibilityservice.AccessibilityService"/>
                </intent-filter>
                <meta-data
                  android:name="android.accessibilityservice"
                  android:resource="@xml/acc_config"/>
              </service>
            </application>
          </manifest>
          MEOF

      - name: Write Accessibility Config
        run: |
          cat > app/src/main/res/xml/acc_config.xml << 'XEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
            android:accessibilityEventTypes="typeWindowStateChanged|typeWindowContentChanged"
            android:accessibilityFeedbackType="feedbackGeneric"
            android:accessibilityFlags="flagReportViewIds|flagRetrieveInteractiveWindows"
            android:canRetrieveWindowContent="true"
            android:canPerformGestures="true"
            android:description="@string/acc_desc"
            android:notificationTimeout="50"
            android:packageNames="net.jahez.fleets"/>
          XEOF

      - name: Write MainActivity
        run: |
          cat > app/src/main/java/com/danish/jahez/MainActivity.java << 'JEOF'
          package com.danish.jahez;
          import android.app.Activity;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.*;
          import android.widget.SeekBar;
          public class MainActivity extends Activity {
            SharedPreferences prefs;
            Switch swEnable;
            TextView tvStatus, tvAcc;
            final BroadcastReceiver offReceiver = new BroadcastReceiver() {
              @Override public void onReceive(Context ctx, Intent intent) {
                String action = intent.getAction();
                if (swEnable != null) {
                  swEnable.setChecked("JAHEZ_AUTO_ON".equals(action));
                }
                refreshStatus(tvStatus, tvAcc);
              }
            };
            @Override protected void onCreate(Bundle saved) {
              super.onCreate(saved);
              setContentView(R.layout.activity_main);
              prefs = getSharedPreferences("cfg", MODE_PRIVATE);
              EditText etPickup = findViewById(R.id.et_pickup);
              EditText etDrop   = findViewById(R.id.et_drop);
              SeekBar sbDelay   = findViewById(R.id.sb_delay);
              TextView tvDelay  = findViewById(R.id.tv_delay);
              swEnable = findViewById(R.id.sw_enable);
              tvStatus = findViewById(R.id.tv_status);
              tvAcc    = findViewById(R.id.tv_acc);
              Button btnSave = findViewById(R.id.btn_save);
              Button btnAcc  = findViewById(R.id.btn_acc);
              etPickup.setText(String.valueOf(prefs.getFloat("max_pickup", 2.0f)));
              etDrop.setText(String.valueOf(prefs.getFloat("max_drop", 5.0f)));
              int savedDelay = prefs.getInt("scan_delay", 200);
              sbDelay.setProgress(savedDelay - 50);
              tvDelay.setText(savedDelay + "ms");
              sbDelay.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                public void onProgressChanged(SeekBar sb, int progress, boolean user) {
                  int ms = progress + 50;
                  tvDelay.setText(ms + "ms");
                }
                public void onStartTrackingTouch(SeekBar sb) {}
                public void onStopTrackingTouch(SeekBar sb) {
                  prefs.edit().putInt("scan_delay", sb.getProgress() + 50).apply();
                }
              });
              swEnable.setChecked(prefs.getBoolean("enabled", false));
              // Android 13+ notification permission
              if (Build.VERSION.SDK_INT >= 33)
                requestPermissions(new String[]{"android.permission.POST_NOTIFICATIONS"}, 0);
              IntentFilter filter = new IntentFilter();
              filter.addAction("JAHEZ_AUTO_OFF");
              filter.addAction("JAHEZ_AUTO_ON");
              if (Build.VERSION.SDK_INT >= 33)
                registerReceiver(offReceiver, filter, Context.RECEIVER_NOT_EXPORTED);
              else
                registerReceiver(offReceiver, filter);
              swEnable.setOnCheckedChangeListener((btn, checked) -> {
                prefs.edit().putBoolean("enabled", checked).apply();
                sendBroadcast(new Intent("JAHEZ_STATE_CHANGED"));
                refreshStatus(tvStatus, tvAcc);
              });
              btnSave.setOnClickListener(v -> {
                float pk = parseFloat(etPickup.getText().toString(), 2.0f);
                float dk = parseFloat(etDrop.getText().toString(), 5.0f);
                prefs.edit().putFloat("max_pickup", pk).putFloat("max_drop", dk).apply();
                Toast.makeText(this, "Saved! Pickup<=" + pk + "km Drop<=" + dk + "km", Toast.LENGTH_LONG).show();
                InputMethodManager imm = (InputMethodManager) getSystemService(INPUT_METHOD_SERVICE);
                if (imm != null)
                  imm.hideSoftInputFromWindow(getWindow().getDecorView().getWindowToken(), 0);
                etPickup.clearFocus();
                etDrop.clearFocus();
              });
              btnAcc.setOnClickListener(v ->
                startActivity(new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS))
              );
              findViewById(R.id.btn_logs).setOnClickListener(v ->
                startActivity(new Intent(this, LogActivity.class))
              );
            }
            @Override protected void onResume() {
              super.onResume();
              refreshStatus(tvStatus, tvAcc);
            }
            @Override protected void onDestroy() {
              super.onDestroy();
              unregisterReceiver(offReceiver);
            }
            void refreshStatus(TextView tvs, TextView tva) {
              if (tvs == null || tva == null) return;
              boolean acc = isAccEnabled();
              boolean en  = prefs.getBoolean("enabled", false);
              tva.setText(acc ? "Accessibility: ON" : "Accessibility: OFF - tap below");
              tva.setTextColor(acc ? 0xFF4CAF50 : 0xFFFF9800);
              tvs.setText(acc && en ? "AUTO ACCEPT: ON" : "AUTO ACCEPT: OFF");
              tvs.setTextColor(acc && en ? 0xFF4CAF50 : 0xFFFF5555);
              // Smart button: accessibility OFF → show orange button, ON → show switch
              if (swEnable != null && findViewById(R.id.btn_acc) != null) {
                swEnable.setVisibility(acc ? android.view.View.VISIBLE : android.view.View.GONE);
                findViewById(R.id.btn_acc).setVisibility(acc ? android.view.View.GONE : android.view.View.VISIBLE);
              }
            }
            boolean isAccEnabled() {
              try {
                String s = Settings.Secure.getString(getContentResolver(), Settings.Secure.ENABLED_ACCESSIBILITY_SERVICES);
                return s != null && s.contains(getPackageName());
              } catch (Exception e) { return false; }
            }
            float parseFloat(String s, float def) {
              try { return Float.parseFloat(s.trim()); } catch (Exception e) { return def; }
            }
          }
          JEOF

      - name: Write SanedHook
        run: |
          cat > app/src/main/java/com/danish/jahez/SanedHook.java << 'HEOF'
          package com.danish.jahez;
          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;
          import android.content.Intent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.TextView;
          public class SanedHook implements IXposedHookLoadPackage {
            static final String TARGET  = "net.jahez.fleets";
            static final String OUR_PKG = "com.danish.jahez";
            static final String ORDER_ACTIVITY = "net.jahez.fleets.dispatch.accept.IncomingDispatchActivity";
            long lastBcast = 0;
            @Override public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lp) {
              if (!TARGET.equals(lp.packageName)) return;
              // Hook IncomingDispatchActivity.onResume() — fires when order screen fully visible
              try {
                XposedHelpers.findAndHookMethod(
                  ORDER_ACTIVITY, lp.classLoader, "onResume",
                  new XC_MethodHook() {
                    @Override protected void afterHookedMethod(MethodHookParam p) {
                      try {
                        long now = System.currentTimeMillis();
                        if (now - lastBcast < 2000) return;
                        android.app.Activity act = (android.app.Activity) p.thisObject;
                        // Read delay from our prefs
                        int delay = 200;
                        try {
                          android.content.Context ctx = act.createPackageContext(OUR_PKG, android.content.Context.CONTEXT_IGNORE_SECURITY);
                          delay = ctx.getSharedPreferences("cfg", android.content.Context.MODE_PRIVATE).getInt("scan_delay", 200);
                        } catch (Exception ignored) {}
                        final int finalDelay = delay;
                        final android.app.Activity finalAct = act;
                        new android.os.Handler(android.os.Looper.getMainLooper()).postDelayed(() -> {
                          try {
                            View root = finalAct.getWindow().getDecorView();
                            String screen = extractText(root);
                            if (screen.isEmpty()) return;
                            lastBcast = System.currentTimeMillis();
                            Intent intent = new Intent("JAHEZ_ORDER_DATA");
                            intent.setPackage(OUR_PKG);
                            intent.putExtra("screen", screen);
                            finalAct.sendBroadcast(intent);
                          } catch (Exception ignored) {}
                        }, finalDelay);
                      } catch (Exception ignored) {}
                    }
                  }
                );
              } catch (Exception e) {
                // Fallback: TextView hook
                hookTextView(lp);
              }
            }
            // Read all TextView text recursively from view hierarchy
            String extractText(View view) {
              if (view == null) return "";
              StringBuilder sb = new StringBuilder();
              if (view instanceof TextView) {
                CharSequence t = ((TextView) view).getText();
                if (t != null && t.length() > 0) sb.append(t).append(" ");
              }
              if (view instanceof ViewGroup) {
                ViewGroup vg = (ViewGroup) view;
                for (int i = 0; i < vg.getChildCount(); i++)
                  sb.append(extractText(vg.getChildAt(i)));
              }
              return sb.toString();
            }
            // Fallback: hook all TextViews
            void hookTextView(XC_LoadPackage.LoadPackageParam lp) {
              final StringBuilder buf = new StringBuilder();
              final long[] lastText = {0};
              XposedHelpers.findAndHookMethod(
                "android.widget.TextView", lp.classLoader,
                "setText", CharSequence.class,
                new XC_MethodHook() {
                  @Override protected void afterHookedMethod(MethodHookParam p) {
                    if (p.args[0] == null) return;
                    String t = p.args[0].toString().trim();
                    if (t.isEmpty()) return;
                    long now = System.currentTimeMillis();
                    if (now - lastText[0] > 2000) buf.setLength(0);
                    lastText[0] = now;
                    buf.append(t).append(" ");
                    String s = buf.toString().toLowerCase();
                    if (s.contains("new order") || s.contains("طلب جديد")) {
                      if (now - lastBcast < 2000) return;
                      lastBcast = now;
                      Intent intent = new Intent("JAHEZ_ORDER_DATA");
                      intent.setPackage(OUR_PKG);
                      intent.putExtra("screen", buf.toString());
                      try {
                        View v = (View) p.thisObject;
                        v.getContext().sendBroadcast(intent);
                      } catch (Exception ignored) {}
                      buf.setLength(0);
                    }
                  }
                }
              );
            }
          }
          HEOF

      - name: Write AutoService
        run: |
          cat > app/src/main/java/com/danish/jahez/AutoService.java << 'SEOF'
          package com.danish.jahez;
          import android.accessibilityservice.AccessibilityService;
          import android.accessibilityservice.GestureDescription;
          import android.content.SharedPreferences;
          import android.graphics.Path;
          import android.util.Log;
          import android.view.accessibility.AccessibilityEvent;
          import android.view.accessibility.AccessibilityNodeInfo;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.os.Build;
          import android.os.Handler;
          import android.os.Looper;
          import java.util.LinkedList;
          import java.util.Queue;
          import java.util.Random;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;
          public class AutoService extends AccessibilityService {
            static final String TAG = "JahezAuto";
            static final String PKG = "net.jahez.fleets";
            SharedPreferences prefs;
            long lastEvent = 0;
            long lastScan  = 0;
            final Random rng = new Random();
            final BroadcastReceiver orderReceiver = new BroadcastReceiver() {
              @Override public void onReceive(Context ctx, Intent intent) {
                String screen = intent.getStringExtra("screen");
                if (screen != null && !screen.isEmpty()) {
                  saveLog("🪝 Hook: " + screen.substring(0, Math.min(80, screen.length())));
                  processOrder(screen);
                }
              }
            };
            final BroadcastReceiver toggleReceiver = new BroadcastReceiver() {
              @Override public void onReceive(Context ctx, Intent intent) {
                if (prefs == null) prefs = getSharedPreferences("cfg", MODE_PRIVATE);
                String action = intent.getAction();
                if ("JAHEZ_TOGGLE".equals(action)) {
                  boolean current = prefs.getBoolean("enabled", false);
                  prefs.edit().putBoolean("enabled", !current).apply();
                  sendBroadcast(new Intent(!current ? "JAHEZ_AUTO_ON" : "JAHEZ_AUTO_OFF"));
                  log("Toggle: " + (!current ? "ON" : "OFF"));
                }
                showServiceNotification();
              }
            };
            @Override public void onServiceConnected() {
              prefs = getSharedPreferences("cfg", MODE_PRIVATE);
              IntentFilter f = new IntentFilter("JAHEZ_TOGGLE");
              f.addAction("JAHEZ_STATE_CHANGED");
              if (Build.VERSION.SDK_INT >= 33)
                registerReceiver(toggleReceiver, f, Context.RECEIVER_NOT_EXPORTED);
              else
                registerReceiver(toggleReceiver, f);
              log("Service connected");
              showServiceNotification();
              // Register Xposed hook receiver (EXPORTED — Saned process se aata hai)
              IntentFilter of = new IntentFilter("JAHEZ_ORDER_DATA");
              if (Build.VERSION.SDK_INT >= 33)
                registerReceiver(orderReceiver, of, Context.RECEIVER_EXPORTED);
              else
                registerReceiver(orderReceiver, of);
            }
            void showServiceNotification() {
              boolean enabled = prefs != null && prefs.getBoolean("enabled", false);
              NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
              NotificationChannel ch = new NotificationChannel("jahez_svc", "Jahez Auto Service", NotificationManager.IMPORTANCE_LOW);
              ch.setDescription("Service chalu hai");
              nm.createNotificationChannel(ch);
              Intent toggleIntent = new Intent("JAHEZ_TOGGLE").setPackage(getPackageName());
              PendingIntent togglePending = PendingIntent.getBroadcast(this, 0, toggleIntent,
                PendingIntent.FLAG_IMMUTABLE | PendingIntent.FLAG_UPDATE_CURRENT);
              Notification.Action action = new Notification.Action.Builder(
                enabled ? android.R.drawable.ic_media_pause : android.R.drawable.ic_media_play,
                enabled ? "✅ ON  —  tap to OFF" : "⏸ OFF  —  tap to ON",
                togglePending).build();
              Notification notif = new Notification.Builder(this, "jahez_svc")
                .setContentTitle("Jahez Auto")
                .setContentText(enabled ? "Auto Accept: ON" : "Auto Accept: OFF")
                .setSmallIcon(android.R.drawable.ic_media_play)
                .setOngoing(true)
                .addAction(action)
                .build();
              nm.notify(1, notif);
            }
            @Override public void onAccessibilityEvent(AccessibilityEvent event) {
              if (prefs == null) prefs = getSharedPreferences("cfg", MODE_PRIVATE);
              if (!prefs.getBoolean("enabled", false)) return;
              String pkg = event.getPackageName() != null ? event.getPackageName().toString() : "";
              if (!PKG.equals(pkg)) return;
              // Sirf new window/dialog events — map updates ignore karo
              if (event.getEventType() != AccessibilityEvent.TYPE_WINDOW_STATE_CHANGED) return;
              long now = System.currentTimeMillis();
              if (now - lastScan < 1500) return;
              lastScan = now;
              String cls = event.getClassName() != null ? event.getClassName().toString() : "";
              saveLog("📡 Window: " + cls);
              scanScreen();
            }

            void scanScreen() {
              if (prefs == null || !prefs.getBoolean("enabled", false)) return;
              String screen = "";
              AccessibilityNodeInfo root = getRootInActiveWindow();
              if (root != null) { screen = flattenTree(root); root.recycle(); }
              saveLog("📡 [" + screen.length() + "] " + screen.substring(0, Math.min(80, screen.length())));
              if (screen.isEmpty()) { saveLog("⚠️ screen empty"); return; }
              processOrder(screen);
            }

            void processOrder(String screen) {
              if (prefs == null || !prefs.getBoolean("enabled", false)) return;
              long now = System.currentTimeMillis();
              if (now - lastEvent < 1500) return;
              if (!isOrderScreen(screen)) { saveLog("ℹ️ not order"); return; }
              lastEvent = now;
              toast("🔍 Order detected!");
              float[] dist = parseDistances(screen);
              float maxPickup = prefs.getFloat("max_pickup", 2.0f);
              float maxDrop   = prefs.getFloat("max_drop",   5.0f);
              log(String.format("Order: pickup=%.1f drop=%.1f | limit: pickup<=%.1f drop<=%.1f", dist[0], dist[1], maxPickup, maxDrop));
              boolean pickupOk = dist[0] < 0 || dist[0] <= maxPickup;
              boolean dropOk   = dist[1] < 0 || dist[1] <= maxDrop;
              if (pickupOk && dropOk) {
                log("ACCEPTING - swiping");
                swipeAccept();
                prefs.edit().putBoolean("enabled", false).apply();
                sendBroadcast(new android.content.Intent("JAHEZ_AUTO_OFF"));
                showServiceNotification();
                log("Auto-accept OFF");
                String msg = "✅ ACCEPTED — Pickup " + fmt(dist[0]) + "km | Drop " + fmt(dist[1]) + "km";
                toast(msg); saveLog(msg);
              } else {
                String reason = "";
                if (!pickupOk) reason += "Pickup " + fmt(dist[0]) + "km > max " + fmt(maxPickup) + "km";
                if (!dropOk)   reason += (!reason.isEmpty() ? " | " : "") + "Drop " + fmt(dist[1]) + "km > max " + fmt(maxDrop) + "km";
                log("REJECTED - " + reason);
                String msg = "❌ SKIP — " + reason;
                toast(msg); saveLog(msg);
              }
            }
            boolean isOrderScreen(String screen) {
              String s = screen.toLowerCase();
              boolean hasOrder = s.contains("new order") || s.contains("طلب جديد") || s.contains("reject") || s.contains("رفض");
              boolean hasAccept = s.contains("accept") || s.contains("قبول");
              return hasOrder && hasAccept;
            }
            float[] parseDistances(String txt) {
              float[] r = {-1f, -1f};
              Matcher m = Pattern.compile("([\\d.]+)\\s*[Kk][Mm]\\s+[Ff]rom\\s+[Yy]ou").matcher(txt);
              if (m.find()) r[0] = safeFloat(m.group(1));
              m = Pattern.compile("([\\d.]+)\\s*[Kk][Mm]\\s+[Ff]rom\\s+[Pp]ickup").matcher(txt);
              if (m.find()) r[1] = safeFloat(m.group(1));
              if (r[0] < 0) {
                m = Pattern.compile("([\\d.]+)\\s*\u0643\u0645\\s+\u0645\u0646\u0643").matcher(txt);
                if (m.find()) r[0] = safeFloat(m.group(1));
              }
              if (r[1] < 0) {
                m = Pattern.compile("([\\d.]+)\\s*\u0643\u0645\\s+\u0645\u0646\\s+\u0646\u0642\u0637\u0629").matcher(txt);
                if (m.find()) r[1] = safeFloat(m.group(1));
              }
              if (r[0] < 0 || r[1] < 0) {
                Matcher km = Pattern.compile("([\\d.]+)\\s*[Kk][Mm]").matcher(txt);
                if (km.find() && r[0] < 0) r[0] = safeFloat(km.group(1));
                if (km.find() && r[1] < 0) r[1] = safeFloat(km.group(1));
              }
              return r;
            }
            void swipeAccept() {
              try {
                int W = getResources().getDisplayMetrics().widthPixels;
                int H = getResources().getDisplayMetrics().heightPixels;
                int duration = 100 + rng.nextInt(151);
                Path path = new Path();
                path.moveTo(W * 0.15f, H * 0.87f);
                path.lineTo(W * 0.85f, H * 0.87f);
                GestureDescription.Builder b = new GestureDescription.Builder();
                b.addStroke(new GestureDescription.StrokeDescription(path, 0, duration));
                dispatchGesture(b.build(), null, null);
                log("Swipe done - duration: " + duration + "ms");
              } catch (Exception e) { log("Swipe error: " + e.getMessage()); }
            }
            String flattenTree(AccessibilityNodeInfo node) {
              if (node == null) return "";
              StringBuilder sb = new StringBuilder();
              Queue<AccessibilityNodeInfo> q = new LinkedList<>();
              q.add(node);
              while (!q.isEmpty()) {
                AccessibilityNodeInfo n = q.poll();
                if (n == null) continue;
                if (n.getText() != null) sb.append(n.getText()).append(" ");
                if (n.getContentDescription() != null) sb.append(n.getContentDescription()).append(" ");
                for (int i = 0; i < n.getChildCount(); i++) {
                  AccessibilityNodeInfo c = n.getChild(i);
                  if (c != null) q.add(c);
                }
              }
              return sb.toString();
            }
            float safeFloat(String s) {
              try { return Float.parseFloat(s.trim()); } catch (Exception e) { return -1f; }
            }
            void saveLog(String msg) {
              java.text.SimpleDateFormat sdf = new java.text.SimpleDateFormat("HH:mm:ss.SSS", java.util.Locale.getDefault());
              String entry = "[" + sdf.format(new java.util.Date()) + "]  " + msg;
              String existing = prefs.getString("logs", "");
              String[] lines = existing.isEmpty() ? new String[0] : existing.split("\n");
              StringBuilder sb = new StringBuilder(entry);
              int max = 100; // max 100 entries
              for (int i = 0; i < lines.length && i < max - 1; i++)
                sb.append("\n").append(lines[i]);
              prefs.edit().putString("logs", sb.toString()).apply();
            }
            void toast(final String msg) {
              new Handler(Looper.getMainLooper()).post(() ->
                android.widget.Toast.makeText(getApplicationContext(), msg, android.widget.Toast.LENGTH_LONG).show()
              );
            }
            String fmt(float v) {
              return v < 0 ? "?" : String.format("%.1f", v);
            }
            void log(String msg) { Log.d(TAG, msg); }
            @Override public void onInterrupt() {}
            @Override public void onDestroy() {
              super.onDestroy();
              try { unregisterReceiver(toggleReceiver); } catch (Exception ignored) {}
              try { unregisterReceiver(orderReceiver); } catch (Exception ignored) {}
              NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
              if (nm != null) nm.cancel(1);
            }
            @Override public boolean onUnbind(Intent intent) {
              try { unregisterReceiver(toggleReceiver); } catch (Exception ignored) {}
              try { unregisterReceiver(orderReceiver); } catch (Exception ignored) {}
              NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
              if (nm != null) nm.cancel(1);
              return super.onUnbind(intent);
            }
          }
          SEOF

      - name: Write LogActivity
