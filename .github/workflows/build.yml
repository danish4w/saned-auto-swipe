name: Build JahezDiagnostic

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          cat > gradle/wrapper/gradle-wrapper.properties << 'WEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/zips
          WEOF

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/danish/diag
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/assets

      - name: Write Gradle Files
        run: |
          cat > settings.gradle << 'SEOF'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositories {
              google(); mavenCentral()
              maven { url 'https://api.xposed.info/' }
            }
          }
          rootProject.name = "JahezDiagnostic"
          include ':app'
          SEOF

          cat > build.gradle << 'BEOF'
          plugins { id 'com.android.application' version '8.5.2' apply false }
          BEOF

          cat > gradle.properties << 'GEOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          GEOF

          cat > app/build.gradle << 'ABEOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.danish.diag'
            compileSdk 34
            defaultConfig {
              applicationId 'com.danish.diag'
              minSdk 26
              targetSdk 34
              versionCode 1
              versionName '1.0'
            }
            buildTypes {
              release { minifyEnabled false }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            compileOnly 'de.robv.android.xposed:api:82'
          }
          ABEOF

      - name: Write Icon
        run: |
          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'BGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp"
            android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#1565C0"
              android:pathData="M0,0 L108,0 L108,108 L0,108 Z"/>
          </vector>
          BGEOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'FGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp"
            android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#FFFFFF"
              android:pathData="M30,54 L50,30 L70,54 L58,54 L58,78 L42,78 L42,54 Z"/>
          </vector>
          FGEOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'ICEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          ICEOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'RNDEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          RNDEOF

      - name: Write Xposed Files
        run: |
          echo "com.danish.diag.DiagHook" > app/src/main/assets/xposed_init

      - name: Write Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC"/>
            <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
            <application
              android:label="Jahez Diag"
              android:icon="@mipmap/ic_launcher"
              android:roundIcon="@mipmap/ic_launcher_round"
              android:theme="@style/AppTheme"
              android:allowBackup="false">
              <meta-data android:name="xposedmodule" android:value="true"/>
              <meta-data android:name="xposeddescription" android:value="Jahez diagnostic hook"/>
              <meta-data android:name="xposedminversion" android:value="82"/>
              <activity android:name=".MainActivity" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
              <activity android:name=".LogActivity" android:exported="false"/>
              <service android:name=".DiagService" android:exported="false"
                android:foregroundServiceType="dataSync"/>
              <service android:name=".DiagAccessibility" android:exported="true"
                android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE">
                <intent-filter>
                  <action android:name="android.accessibilityservice.AccessibilityService"/>
                </intent-filter>
                <meta-data android:name="android.accessibilityservice"
                  android:resource="@xml/accessibility_config"/>
              </service>
              <receiver android:name=".BootReceiver" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.BOOT_COMPLETED"/>
                </intent-filter>
              </receiver>
            </application>
          </manifest>
          MEOF

      - name: Write DiagHook (Fixed – No AndroidAppHelper, Multi‑network hooks)
        run: |
          cat > app/src/main/java/com/danish/diag/DiagHook.java << 'HEOF'
          package com.danish.diag;
          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Bundle;
          import android.util.Log;
          import android.view.MotionEvent;
          import java.net.HttpURLConnection;

          public class DiagHook implements IXposedHookLoadPackage {
              static final String TARGET = "net.jahez.fleets";
              static final String TAG = "JahezDiag";

              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lp) {
                  if (!TARGET.equals(lp.packageName)) return;
                  log("✅ Hook loaded for: " + lp.packageName);

                  // 1. BroadcastReceiver – captures order data (EXTRA_DISTANCE, lat/lon, requestId)
                  try {
                      XposedHelpers.findAndHookMethod(BroadcastReceiver.class, "onReceive",
                          Context.class, Intent.class, new XC_MethodHook() {
                              @Override
                              protected void beforeHookedMethod(MethodHookParam param) {
                                  Intent intent = (Intent) param.args[1];
                                  if (intent == null) return;
                                  Bundle extras = intent.getExtras();
                                  if (extras != null && extras.containsKey("EXTRA_DISPATCH_TYPE")) {
                                      StringBuilder sb = new StringBuilder("📡 ORDER BROADCAST:");
                                      for (String key : extras.keySet()) {
                                          Object val = extras.get(key);
                                          sb.append("\n    ").append(key).append(" = ").append(val);
                                      }
                                      String msg = sb.toString();
                                      log(msg);
                                      // send to service using the context from the receiver
                                      Context ctx = (Context) param.args[0];
                                      sendBroadcast(ctx, msg);
                                  }
                              }
                          });
                      log("✅ BroadcastReceiver hook installed");
                  } catch (Throwable t) { log("❌ Broadcast hook failed: " + t); }

                  // 2. HttpURLConnection – reliable, never obfuscated
                  try {
                      XposedHelpers.findAndHookMethod(HttpURLConnection.class, "connect", new XC_MethodHook() {
                          @Override
                          protected void beforeHookedMethod(MethodHookParam param) {
                              HttpURLConnection conn = (HttpURLConnection) param.thisObject;
                              try {
                                  String url = conn.getURL().toString();
                                  String method = conn.getRequestMethod();
                                  String msg = "🌐 [HttpURL] " + method + " " + url;
                                  log(msg);
                                  // we don't have a context here, so only Xposed log
                              } catch (Exception e) {}
                          }
                      });
                      log("✅ HttpURLConnection hook installed");
                  } catch (Throwable t) { log("⚠️ HttpURLConnection hook failed: " + t); }

                  // 3. OkHttp – try multiple possible class names (obfuscation‑resilient)
                  String[] okhttpNames = {
                      "okhttp3.RealCall",
                      "okhttp3.internal.connection.RealCall",
                      "okhttp3.Call"
                  };
                  boolean hooked = false;
                  for (String name : okhttpNames) {
                      try {
                          Class<?> callClass = XposedHelpers.findClass(name, lp.classLoader);
                          // synchronous call
                          XposedHelpers.findAndHookMethod(callClass, "execute", new XC_MethodHook() {
                              @Override
                              protected void afterHookedMethod(MethodHookParam param) {
                                  try {
                                      Object response = param.getResult();
                                      Object request = XposedHelpers.callMethod(response, "request");
                                      String method = (String) XposedHelpers.callMethod(request, "method");
                                      String url = XposedHelpers.callMethod(request, "url").toString();
                                      String msg = "🌐 [OkHttp] " + method + " " + url;
                                      log(msg);
                                      // No context here, only Xposed log
                                  } catch (Exception e) {}
                              }
                          });
                          // asynchronous call
                          XposedHelpers.findAndHookMethod(callClass, "enqueue", Object.class, new XC_MethodHook() {
                              @Override
                              protected void beforeHookedMethod(MethodHookParam param) {
                                  try {
                                      Object request = XposedHelpers.callMethod(param.thisObject, "request");
                                      String method = (String) XposedHelpers.callMethod(request, "method");
                                      String url = XposedHelpers.callMethod(request, "url").toString();
                                      String msg = "🌐 [OkHttp Async] " + method + " " + url;
                                      log(msg);
                                  } catch (Exception e) {}
                              }
                          });
                          log("✅ OkHttp hook installed via: " + name);
                          hooked = true;
                          break;
                      } catch (Throwable t) { /* try next name */ }
                  }
                  if (!hooked) log("⚠️ OkHttp hook failed (all class names tried)");

                  // 4. Activity onResume – log activity name and intent extras
                  try {
                      XposedHelpers.findAndHookMethod("android.app.Activity", lp.classLoader, "onResume",
                          new XC_MethodHook() {
                              @Override
                              protected void afterHookedMethod(MethodHookParam param) {
                                  android.app.Activity act = (android.app.Activity) param.thisObject;
                                  String className = act.getClass().getName();
                                  String msg = "📱 Activity: " + className;
                                  log(msg);
                                  sendBroadcast(act, msg);
                                  // Log intent extras if any
                                  Intent intent = act.getIntent();
                                  if (intent != null && intent.getExtras() != null && !intent.getExtras().isEmpty()) {
                                      Bundle extras = intent.getExtras();
                                      StringBuilder sb = new StringBuilder("📦 Intent Extras:");
                                      for (String key : extras.keySet()) {
                                          sb.append("\n    ").append(key).append(" = ").append(extras.get(key));
                                      }
                                      String extraMsg = sb.toString();
                                      log(extraMsg);
                                      sendBroadcast(act, extraMsg);
                                  }
                              }
                          });
                      log("✅ Activity hook installed");
                  } catch (Throwable t) { log("❌ Activity hook failed: " + t); }

                  // 5. Touch events on Activity
                  try {
                      XposedHelpers.findAndHookMethod("android.app.Activity", lp.classLoader, "dispatchTouchEvent",
                          MotionEvent.class, new XC_MethodHook() {
                              @Override
                              protected void beforeHookedMethod(MethodHookParam param) {
                                  MotionEvent ev = (MotionEvent) param.args[0];
                                  if (ev == null) return;
                                  int action = ev.getActionMasked();
                                  if (action != MotionEvent.ACTION_DOWN && action != MotionEvent.ACTION_UP) return;
                                  android.app.Activity act = (android.app.Activity) param.thisObject;
                                  android.util.DisplayMetrics dm = new android.util.DisplayMetrics();
                                  act.getWindowManager().getDefaultDisplay().getMetrics(dm);
                                  int W = dm.widthPixels, H = dm.heightPixels;
                                  String actName = act.getClass().getSimpleName();
                                  String actionName = (action == MotionEvent.ACTION_DOWN) ? "DOWN" : "UP";
                                  String msg = String.format("👆 TOUCH %s x=%.1f y=%.1f (%.2f,%.2f) screen=%dx%d act=%s",
                                      actionName, ev.getRawX(), ev.getRawY(),
                                      ev.getRawX()/W, ev.getRawY()/H, W, H, actName);
                                  log(msg);
                                  sendBroadcast(act, msg);
                              }
                          });
                      log("✅ Touch hook installed");
                  } catch (Throwable t) { log("❌ Touch hook failed: " + t); }
              }

              private void log(String msg) {
                  Log.d(TAG, msg);
                  XposedBridge.log("[JahezDiag] " + msg);
              }

              private void sendBroadcast(Context ctx, String msg) {
                  try {
                      Intent intent = new Intent("JAHEZ_DIAG_LOG");
                      intent.putExtra("msg", msg);
                      intent.setPackage("com.danish.diag");
                      ctx.sendBroadcast(intent);
                  } catch (Exception e) {
                      Log.e(TAG, "Broadcast failed: " + e.getMessage());
                  }
              }
          }
          HEOF

      - name: Write DiagService
        run: |
          cat > app/src/main/java/com/danish/diag/DiagService.java << 'SEOF'
          package com.danish.diag;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.Service;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.IBinder;
          import android.util.Log;
          public class DiagService extends Service {
              static final String TAG   = "JahezDiag";
              static final String CH_ID = "diag_svc";
              SharedPreferences prefs;
              final BroadcastReceiver diagReceiver = new BroadcastReceiver() {
                  @Override public void onReceive(Context ctx, Intent intent) {
                      String msg = intent.getStringExtra("msg");
                      if (msg != null) saveLog(msg);
                  }
              };
              @Override public void onCreate() {
                  super.onCreate();
                  prefs = getSharedPreferences("diag_cfg", MODE_PRIVATE);
                  IntentFilter f = new IntentFilter("JAHEZ_DIAG_LOG");
                  if (Build.VERSION.SDK_INT >= 33)
                      registerReceiver(diagReceiver, f, Context.RECEIVER_NOT_EXPORTED);
                  else
                      registerReceiver(diagReceiver, f);
                  showNotification();
                  Log.d(TAG, "DiagService started");
              }
              @Override public int onStartCommand(Intent intent, int flags, int startId) { return START_STICKY; }
              @Override public IBinder onBind(Intent intent) { return null; }
              void showNotification() {
                  NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(CH_ID, "Jahez Diagnostic", NotificationManager.IMPORTANCE_LOW);
                      nm.createNotificationChannel(channel);
                  }
                  Notification notif = new Notification.Builder(this, CH_ID)
                      .setContentTitle("Jahez Diagnostic")
                      .setContentText("Logging events...")
                      .setSmallIcon(android.R.drawable.ic_menu_info_details)
                      .setOngoing(true)
                      .build();
                  startForeground(1, notif);
              }
              void saveLog(String msg) {
                  java.text.SimpleDateFormat sdf = new java.text.SimpleDateFormat("HH:mm:ss.SSS", java.util.Locale.getDefault());
                  String entry = "[" + sdf.format(new java.util.Date()) + "] " + msg;
                  String existing = prefs.getString("logs", "");
                  String[] lines = existing.isEmpty() ? new String[0] : existing.split("\n");
                  StringBuilder sb = new StringBuilder(entry);
                  for (int i = 0; i < lines.length && i < 199; i++) sb.append("\n").append(lines[i]);
                  prefs.edit().putString("logs", sb.toString()).apply();
              }
              @Override public void onDestroy() {
                  super.onDestroy();
                  try { unregisterReceiver(diagReceiver); } catch (Exception ignored) {}
              }
          }
          SEOF

      - name: Write DiagAccessibility
        run: |
          cat > app/src/main/res/xml/accessibility_config.xml << 'ACEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
            android:accessibilityEventTypes="typeWindowStateChanged|typeWindowContentChanged|typeViewClicked"
            android:accessibilityFeedbackType="feedbackGeneric"
            android:accessibilityFlags="flagDefault|flagReportViewIds"
            android:canRetrieveWindowContent="true"
            android:notificationTimeout="100"
            android:packageNames="net.jahez.fleets"/>
          ACEOF

          cat > app/src/main/java/com/danish/diag/DiagAccessibility.java << 'JAEOF'
          package com.danish.diag;
          import android.accessibilityservice.AccessibilityService;
          import android.content.SharedPreferences;
          import android.view.accessibility.AccessibilityEvent;
          import android.view.accessibility.AccessibilityNodeInfo;
          import android.util.Log;
          public class DiagAccessibility extends AccessibilityService {
              private SharedPreferences prefs;
              @Override public void onServiceConnected() {
                  super.onServiceConnected();
                  prefs = getSharedPreferences("diag_cfg", MODE_PRIVATE);
                  saveLog("♿ Accessibility Service connected");
              }
              @Override public void onAccessibilityEvent(AccessibilityEvent event) {
                  if (!"net.jahez.fleets".equals(event.getPackageName())) return;
                  int type = event.getEventType();
                  String className = event.getClassName() != null ? event.getClassName().toString() : "";
                  if (type == AccessibilityEvent.TYPE_WINDOW_STATE_CHANGED) {
                      saveLog("🖥 Screen: " + className);
                      dumpUI();
                  } else if (type == AccessibilityEvent.TYPE_VIEW_CLICKED) {
                      String text = !event.getText().isEmpty() ? event.getText().get(0).toString() : "";
                      saveLog("🖱 Click: " + text);
                  }
              }
              private void dumpUI() {
                  AccessibilityNodeInfo root = getRootInActiveWindow();
                  if (root == null) return;
                  StringBuilder dump = new StringBuilder("📱 UI Dump:");
                  dumpNode(root, dump, 0);
                  if (dump.length() > 2000) dump.setLength(2000);
                  saveLog(dump.toString());
                  root.recycle();
              }
              private void dumpNode(AccessibilityNodeInfo node, StringBuilder sb, int depth) {
                  if (node == null || depth > 4) return;
                  String text = node.getText() != null ? node.getText().toString() : "";
                  String id = node.getViewIdResourceName() != null ? node.getViewIdResourceName() : "";
                  if (!text.isEmpty() || !id.isEmpty()) {
                      for (int i = 0; i < depth; i++) sb.append("  ");
                      sb.append("• ");
                      if (!id.isEmpty()) sb.append("[").append(id).append("] ");
                      if (!text.isEmpty()) sb.append("\"").append(text.substring(0, Math.min(text.length(), 60))).append("\"");
                      if (node.isClickable()) sb.append(" (clickable)");
                      sb.append("\n");
                  }
                  for (int i = 0; i < node.getChildCount(); i++) {
                      AccessibilityNodeInfo child = node.getChild(i);
                      if (child != null) {
                          dumpNode(child, sb, depth + 1);
                          child.recycle();
                      }
                  }
              }
              private void saveLog(String msg) {
                  if (prefs == null) return;
                  java.text.SimpleDateFormat sdf = new java.text.SimpleDateFormat("HH:mm:ss.SSS", java.util.Locale.getDefault());
                  String entry = "[" + sdf.format(new java.util.Date()) + "] " + msg;
                  String existing = prefs.getString("logs", "");
                  String[] lines = existing.isEmpty() ? new String[0] : existing.split("\n");
                  StringBuilder sb = new StringBuilder(entry);
                  for (int i = 0; i < lines.length && i < 199; i++) sb.append("\n").append(lines[i]);
                  prefs.edit().putString("logs", sb.toString()).apply();
              }
              @Override public void onInterrupt() {}
          }
          JAEOF

      - name: Write MainActivity
        run: |
          cat > app/src/main/java/com/danish/diag/MainActivity.java << 'JEOF'
          package com.danish.diag;
          import android.app.Activity;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.*;
          public class MainActivity extends Activity {
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  Intent svc = new Intent(this, DiagService.class);
                  if (Build.VERSION.SDK_INT >= 26) startForegroundService(svc);
                  else startService(svc);
                  if (Build.VERSION.SDK_INT >= 33)
                      requestPermissions(new String[]{"android.permission.POST_NOTIFICATIONS"}, 0);
                  requestPermissions(new String[]{
                      "android.permission.ACCESS_FINE_LOCATION",
                      "android.permission.ACCESS_COARSE_LOCATION"}, 1);
                  if (!Settings.canDrawOverlays(this)) {
                      startActivity(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                          Uri.parse("package:" + getPackageName())));
                  }
                  if (!isA11yEnabled()) {
                      Toast.makeText(this, "Enable Accessibility for Jahez Diag", Toast.LENGTH_LONG).show();
                      startActivity(new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS));
                  }
                  findViewById(R.id.btn_logs).setOnClickListener(v -> startActivity(new Intent(this, LogActivity.class)));
                  findViewById(R.id.btn_clear).setOnClickListener(v -> {
                      getSharedPreferences("diag_cfg", MODE_PRIVATE).edit().remove("logs").apply();
                      Toast.makeText(this, "Logs cleared", Toast.LENGTH_SHORT).show();
                  });
                  updateStatus();
              }
              private boolean isA11yEnabled() {
                  String svc = getPackageName() + "/" + DiagAccessibility.class.getName();
                  String enabled = Settings.Secure.getString(getContentResolver(), Settings.Secure.ENABLED_ACCESSIBILITY_SERVICES);
                  return enabled != null && enabled.contains(svc);
              }
              private void updateStatus() {
                  TextView tv = findViewById(R.id.tv_status);
                  tv.setText("LSPosed: scope net.jahez.fleets\n" +
                      "Accessibility: " + (isA11yEnabled() ? "✅ ON" : "❌ OFF") + "\n" +
                      "Open Saned → order accept karo\n" +
                      "Phir logs yahan dekho");
              }
              @Override protected void onResume() { super.onResume(); updateStatus(); }
          }
          JEOF

      - name: Write LogActivity
        run: |
          cat > app/src/main/java/com/danish/diag/LogActivity.java << 'LEOF'
          package com.danish.diag;
          import android.app.Activity;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.widget.*;
          public class LogActivity extends Activity {
              @Override protected void onCreate(Bundle saved) {
                  super.onCreate(saved);
                  setContentView(R.layout.activity_log);
                  SharedPreferences prefs = getSharedPreferences("diag_cfg", MODE_PRIVATE);
                  TextView tvLog = findViewById(R.id.tv_log);
                  Button btnClear = findViewById(R.id.btn_clear);
                  Button btnBack = findViewById(R.id.btn_back);
                  String logs = prefs.getString("logs", "");
                  tvLog.setText(logs.isEmpty() ? "No logs yet.\nOpen Saned and accept an order." : logs);
                  btnClear.setOnClickListener(v -> {
                      prefs.edit().remove("logs").apply();
                      tvLog.setText("Cleared.");
                  });
                  btnBack.setOnClickListener(v -> finish());
              }
          }
          LEOF

      - name: Write BootReceiver
        run: |
          cat > app/src/main/java/com/danish/diag/BootReceiver.java << 'BEOF'
          package com.danish.diag;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          public class BootReceiver extends BroadcastReceiver {
              @Override public void onReceive(Context ctx, Intent intent) {
                  if (Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction())) {
                      ctx.startService(new Intent(ctx, DiagService.class));
                  }
              }
          }
          BEOF

      - name: Write Layouts
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'LEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:orientation="vertical" android:padding="20dp" android:background="#0A0A0A">
            <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
              android:text="Jahez Diagnostic" android:textSize="26sp" android:textColor="#2196F3"
              android:textStyle="bold" android:gravity="center" android:layout_marginBottom="8dp"/>
            <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
              android:text="Logs all API calls, touches, screen changes" android:textSize="12sp"
              android:textColor="#666" android:gravity="center" android:layout_marginBottom="20dp"/>
            <TextView android:id="@+id/tv_status" android:layout_width="match_parent"
              android:layout_height="wrap_content" android:text="Checking..." android:textSize="13sp"
              android:textColor="#FF9800" android:background="#1A1A1A" android:padding="16dp"
              android:layout_marginBottom="20dp" android:fontFamily="monospace" android:lineSpacingExtra="4dp"/>
            <Button android:id="@+id/btn_logs" android:layout_width="match_parent"
              android:layout_height="56dp" android:text="View Logs" android:backgroundTint="#2196F3"
              android:textColor="#FFF" android:textStyle="bold" android:layout_marginBottom="12dp"/>
            <Button android:id="@+id/btn_clear" android:layout_width="match_parent"
              android:layout_height="48dp" android:text="Clear Logs" android:backgroundTint="#B71C1C"
              android:textColor="#FFF"/>
          </LinearLayout>
          LEOF

          cat > app/src/main/res/layout/activity_log.xml << 'LOGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:orientation="vertical" android:background="#0A0A0A" android:padding="12dp">
            <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
              android:text="Diagnostic Log" android:textSize="20sp" android:textColor="#2196F3"
              android:textStyle="bold" android:layout_marginBottom="10dp"/>
            <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
              android:orientation="horizontal" android:layout_marginBottom="10dp">
              <Button android:id="@+id/btn_back" android:layout_width="0dp" android:layout_height="44dp"
                android:layout_weight="1" android:text="Back" android:backgroundTint="#333"
                android:textColor="#FFF" android:layout_marginEnd="8dp"/>
              <Button android:id="@+id/btn_clear" android:layout_width="0dp" android:layout_height="44dp"
                android:layout_weight="1" android:text="Clear" android:backgroundTint="#B71C1C"
                android:textColor="#FFF"/>
            </LinearLayout>
            <ScrollView android:layout_width="match_parent" android:layout_height="match_parent">
              <TextView android:id="@+id/tv_log" android:layout_width="match_parent"
                android:layout_height="wrap_content" android:text="Loading..." android:textColor="#CCC"
                android:textSize="11sp" android:fontFamily="monospace" android:lineSpacingExtra="4dp"
                android:padding="8dp" android:background="#111"/>
            </ScrollView>
          </LinearLayout>
          LOGEOF

      - name: Write Resources
        run: |
          cat > app/src/main/res/values/strings.xml << 'REOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">Jahez Diagnostic</string>
          </resources>
          REOF

          cat > app/src/main/res/values/themes.xml << 'TEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.DayNight.NoActionBar">
              <item name="colorPrimary">#2196F3</item>
              <item name="colorPrimaryDark">#1565C0</item>
              <item name="colorAccent">#FF9800</item>
            </style>
          </resources>
          TEOF

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon 2>&1

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore /tmp/key.keystore -alias diag \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Danish,O=JahezDiag,C=SA" \
            -storepass danish123 -keypass danish123 2>/dev/null
          APK=$(find app/build -name "*release-unsigned*.apk" | head -1)
          if [ -z "$APK" ]; then APK=$(find app/build -name "*release*.apk" | head -1); fi
          echo "Signing: $APK"
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" -type f | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then echo "apksigner not found!"; exit 1; fi
          $APKSIGNER sign --ks /tmp/key.keystore --ks-key-alias diag \
            --ks-pass pass:danish123 --key-pass pass:danish123 \
            --out app/build/JahezDiagnostic.apk "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JahezDiagnostic
          path: |
            app/build/JahezDiagnostic.apk
            app/build/outputs/apk/**/*.apk
