name: Build Danish Auto QBZ
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Modified QBZ
        run: |
          if [ ! -f qbz.apk ]; then
            echo "ERROR: qbz.apk not found!"
            exit 1
          fi

          mkdir -p /tmp/qbz_work /tmp/act_src/net/jahez/lsposed /tmp/act_out /tmp/dex_out

          cd /tmp/qbz_work && unzip -q $GITHUB_WORKSPACE/qbz.apk && cd -
          echo "QBZ extracted!"

          echo "" | base64 -d > /tmp/act_src/net/jahez/lsposed/DanishActivit.java
          grep -i "mmkv\|tencent" /tmp/act_src/net/jahez/lsposed/DanishActivit.java || echo "No MMKV CLEAN"

          ANDROID_JAR=$(find $ANDROID_SDK_ROOT -name "android.jar" | grep "platforms/android-" | sort | tail -1)
          echo "SDK: $ANDROID_JAR"

          javac -source 8 -target 8 -cp "$ANDROID_JAR" \
            /tmp/act_src/net/jahez/lsposed/DanishActivit.java \
            -d /tmp/act_out 2>&1
          echo "Compile: $?"
          find /tmp/act_out -name "*.class"

          D8=$(find $ANDROID_SDK_ROOT -name "d8" | head -1)
          $D8 --output /tmp/dex_out --min-api 26 \
            $(find /tmp/act_out -name "*.class" | tr '\n' ' ') 2>&1

          [ -f /tmp/dex_out/classes.dex ] && cp /tmp/dex_out/classes.dex /tmp/qbz_work/classes2.dex && echo "DEX added!"

          echo "" | base64 -d > /tmp/mpatch.py && python3 /tmp/mpatch.py
          echo "" | base64 -d > /tmp/dpatch.py && python3 /tmp/dpatch.py

          rm -rf /tmp/qbz_work/META-INF/

          cd /tmp/qbz_work
          zip -q -Z store /tmp/danish_unaligned.apk resources.arsc
          find lib -name "*.so" -exec zip -q -Z store /tmp/danish_unaligned.apk {} \;
          find . -type f \
            ! -name "resources.arsc" \
            ! -path "./lib/*.so" \
            ! -path "./META-INF/*" \
            | zip -q /tmp/danish_unaligned.apk -@
          cd -
          echo "Packed!"

          ZIPALIGN=$(find $ANDROID_SDK_ROOT -name "zipalign" | head -1)
          $ZIPALIGN -p -f 4 /tmp/danish_unaligned.apk /tmp/danish_aligned.apk
          echo "Aligned!"

          APKSIGNER=$(find $ANDROID_SDK_ROOT -name "apksigner" | grep -v ".jar" | head -1)
          keytool -genkey -v -keystore /tmp/ks.jks -alias danish \
            -keyalg RSA -keysize 2048 -validity 3650 \
            -storepass danish123 -keypass danish123 \
            -dname "CN=Danish,OU=Auto,O=Danish,L=SA,S=SA,C=SA" 2>/dev/null

          $APKSIGNER sign \
            --ks /tmp/ks.jks --ks-pass pass:danish123 --key-pass pass:danish123 \
            --out /tmp/danish_final.apk /tmp/danish_aligned.apk

          ls -lh /tmp/danish_final.apk
          echo "BUILD COMPLETE!"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Danish-Auto-QBZ
          path: /tmp/danish_final.apk
