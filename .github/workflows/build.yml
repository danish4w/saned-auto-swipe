name: Build RootAutoSwipe
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Project
        run: |
          mkdir -p app/src/main/java/com/rootautoswipe
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          echo "include ':app'" > settings.gradle

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rootautoswipe'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.rootautoswipe'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              packagingOptions {
                  exclude 'META-INF/LICENSE.md'
                  exclude 'META-INF/LICENSE-notice.md'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_LOGS"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <application
                  android:label="RootAutoSwipe"
                  android:theme="@style/Theme.AppCompat">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity
                      android:name=".LogActivity"
                      android:label="Logs"
                      android:exported="false"/>
                  <service
                      android:name=".AutoSwipeService"
                      android:exported="false"
                      android:foregroundServiceType="dataSync"/>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">RootAutoSwipe</string>
          </resources>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:padding="20dp"
                  android:background="#121212">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="RootAutoSwipe" android:textSize="24sp" android:textColor="#FFFFFF"
                      android:textStyle="bold"/>
                  <TextView android:id="@+id/tv_status" android:layout_width="wrap_content"
                      android:layout_height="wrap_content" android:text="Service Stopped"
                      android:textSize="14sp" android:textColor="#FF5555" android:layout_marginTop="20dp"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Target App Package" android:textColor="#AAAAAA" android:layout_marginTop="20dp"/>
                  <EditText android:id="@+id/et_package" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:text="net.jahez.fleets"
                      android:textColor="#FFFFFF" android:background="#333333" android:padding="10dp"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Max Pickup (km)" android:textColor="#AAAAAA" android:layout_marginTop="10dp"/>
                  <EditText android:id="@+id/et_pickup_max" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:inputType="numberDecimal"
                      android:text="1.5" android:textColor="#FFFFFF" android:background="#333333" android:padding="10dp"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Max Drop (km)" android:textColor="#AAAAAA" android:layout_marginTop="10dp"/>
                  <EditText android:id="@+id/et_drop_max" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:inputType="numberDecimal"
                      android:text="3.5" android:textColor="#FFFFFF" android:background="#333333" android:padding="10dp"/>
                  <TextView android:id="@+id/tv_detect_delay_label" android:layout_width="wrap_content"
                      android:layout_height="wrap_content" android:text="Screen Detection Delay: 800ms"
                      android:textColor="#FF9800" android:layout_marginTop="20dp"/>
                  <SeekBar android:id="@+id/sb_detect_delay" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:max="1100" android:progress="400"
                      android:thumbTint="#FF9800" android:progressTint="#FF9800"/>
                  <TextView android:id="@+id/tv_swipe_duration_label" android:layout_width="wrap_content"
                      android:layout_height="wrap_content" android:text="Swipe Duration: 300ms"
                      android:textColor="#FF9800" android:layout_marginTop="10dp"/>
                  <SeekBar android:id="@+id/sb_swipe_duration" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:max="900" android:progress="200"
                      android:thumbTint="#FF9800" android:progressTint="#FF9800"/>
                  <Button android:id="@+id/btn_start" android:layout_width="match_parent"
                      android:layout_height="50dp" android:text="START SERVICE"
                      android:backgroundTint="#4CAF50" android:layout_marginTop="20dp"/>
                  <Button android:id="@+id/btn_stop" android:layout_width="match_parent"
                      android:layout_height="50dp" android:text="STOP SERVICE"
                      android:backgroundTint="#F44336" android:layout_marginTop="10dp"/>
                  <Button android:id="@+id/btn_logs" android:layout_width="match_parent"
                      android:layout_height="50dp" android:text="VIEW LOGS"
                      android:backgroundTint="#2196F3" android:layout_marginTop="10dp"/>
              </LinearLayout>
          </ScrollView>
          EOF

          cat > app/src/main/res/layout/activity_log.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#000000" android:padding="10dp">
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:text="Logs" android:textSize="20sp" android:textColor="#4CAF50" android:gravity="center"/>
              <ScrollView android:id="@+id/log_scroll" android:layout_width="match_parent"
                  android:layout_height="0dp" android:layout_weight="1">
                  <TextView android:id="@+id/tv_logs" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:textColor="#00FF00"
                      android:fontFamily="monospace" android:textSize="10sp" android:text="Waiting..."/>
              </ScrollView>
              <Button android:id="@+id/btn_clear" android:layout_width="match_parent"
                  android:layout_height="wrap_content" android:text="CLEAR" android:backgroundTint="#F44336"/>
          </LinearLayout>
          EOF

          cat > app/src/main/java/com/rootautoswipe/MainActivity.java << 'EOF'
          package com.rootautoswipe;

          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.SeekBar;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private EditText etPackage, etPickupMax, etDropMax;
              private SeekBar sbDetectDelay, sbSwipeDuration;
              private TextView tvDetectDelay, tvSwipeDuration, tvStatus;
              private Button btnStart, btnStop, btnLogs;
              private SharedPreferences prefs;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  prefs = getSharedPreferences("ras_prefs", MODE_PRIVATE);

                  etPackage       = findViewById(R.id.et_package);
                  etPickupMax     = findViewById(R.id.et_pickup_max);
                  etDropMax       = findViewById(R.id.et_drop_max);
                  sbDetectDelay   = findViewById(R.id.sb_detect_delay);
                  sbSwipeDuration = findViewById(R.id.sb_swipe_duration);
                  tvDetectDelay   = findViewById(R.id.tv_detect_delay_label);
                  tvSwipeDuration = findViewById(R.id.tv_swipe_duration_label);
                  tvStatus        = findViewById(R.id.tv_status);
                  btnStart        = findViewById(R.id.btn_start);
                  btnStop         = findViewById(R.id.btn_stop);
                  btnLogs         = findViewById(R.id.btn_logs);

                  etPackage.setText(prefs.getString("target_pkg", "net.jahez.fleets"));
                  etPickupMax.setText(String.valueOf(prefs.getFloat("pickup_max", 1.5f)));
                  etDropMax.setText(String.valueOf(prefs.getFloat("drop_max", 3.5f)));

                  int detectDelay   = prefs.getInt("detect_delay", 800);
                  int swipeDuration = prefs.getInt("swipe_duration", 300);
                  sbDetectDelay.setProgress(detectDelay - 400);
                  sbSwipeDuration.setProgress(swipeDuration - 100);
                  tvDetectDelay.setText("Screen Detection Delay: " + detectDelay + "ms");
                  tvSwipeDuration.setText("Swipe Duration: " + swipeDuration + "ms");

                  sbDetectDelay.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override public void onProgressChanged(SeekBar s, int p, boolean u) {
                          tvDetectDelay.setText("Screen Detection Delay: " + (p + 400) + "ms");
                      }
                      @Override public void onStartTrackingTouch(SeekBar s) {}
                      @Override public void onStopTrackingTouch(SeekBar s) {}
                  });
                  sbSwipeDuration.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override public void onProgressChanged(SeekBar s, int p, boolean u) {
                          tvSwipeDuration.setText("Swipe Duration: " + (p + 100) + "ms");
                      }
                      @Override public void onStartTrackingTouch(SeekBar s) {}
                      @Override public void onStopTrackingTouch(SeekBar s) {}
                  });

                  btnStart.setOnClickListener(v -> {
                      float pickup, drop;
                      try { pickup = Float.parseFloat(etPickupMax.getText().toString()); } catch (Exception e) { pickup = 1.5f; }
                      try { drop   = Float.parseFloat(etDropMax.getText().toString());   } catch (Exception e) { drop   = 3.5f; }

                      prefs.edit()
                          .putString("target_pkg",     etPackage.getText().toString().trim())
                          .putFloat("pickup_max",      pickup)
                          .putFloat("drop_max",        drop)
                          .putInt("detect_delay",      sbDetectDelay.getProgress()   + 400)
                          .putInt("swipe_duration",    sbSwipeDuration.getProgress() + 100)
                          .apply();

                      Intent svc = new Intent(this, AutoSwipeService.class);
                      // FIX: Android 8+ ke liye startForegroundService use karo
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          startForegroundService(svc);
                      } else {
                          startService(svc);
                      }
                      tvStatus.setText("Service Running");
                      tvStatus.setTextColor(0xFF4CAF50);
                      Toast.makeText(this, "Service started", Toast.LENGTH_SHORT).show();
                  });

                  btnStop.setOnClickListener(v -> {
                      stopService(new Intent(this, AutoSwipeService.class));
                      tvStatus.setText("Service Stopped");
                      tvStatus.setTextColor(0xFFFF5555);
                      Toast.makeText(this, "Service stopped", Toast.LENGTH_SHORT).show();
                  });

                  btnLogs.setOnClickListener(v ->
                      startActivity(new Intent(this, LogActivity.class))
                  );
              }
          }
          EOF

          cat > app/src/main/java/com/rootautoswipe/AutoSwipeService.java << 'EOF'
          package com.rootautoswipe;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.Service;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.IBinder;
          import android.util.Log;
          import java.io.BufferedReader;
          import java.io.InputStreamReader;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          public class AutoSwipeService extends Service {

              private static final String TAG         = "RootAutoSwipe";
              private static final String CHANNEL_ID  = "ras_channel";
              private static final int    NOTIF_ID    = 2001;

              private Thread  monitorThread;
              private boolean running = false;
              private SharedPreferences prefs;

              private String targetPackage = "net.jahez.fleets";
              private float  pickupMax     = 1.5f;
              private float  dropMax       = 3.5f;
              private int    detectDelay   = 800;
              private int    swipeDuration = 300;

              // ── Logging ───────────────────────────────────────────────
              private void log(String msg) {
                  Log.d(TAG, msg);
                  Intent i = new Intent("RAS_LOG_ACTION");
                  i.setPackage("com.rootautoswipe");
                  i.putExtra("log_msg", msg);
                  sendBroadcast(i);
              }

              // ── Root command execute ──────────────────────────────────
              private String exec(String cmd) {
                  try {
                      Process p = Runtime.getRuntime().exec(new String[]{"su", "-c", cmd});
                      BufferedReader br = new BufferedReader(new InputStreamReader(p.getInputStream()));
                      StringBuilder sb = new StringBuilder();
                      String line;
                      while ((line = br.readLine()) != null) sb.append(line).append("\n");
                      p.waitFor();
                      return sb.toString().trim();
                  } catch (Exception e) {
                      log("exec error: " + e.getMessage());
                      return "";
                  }
              }

              // ── Foreground notification ───────────────────────────────
              private void startForeground() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel ch = new NotificationChannel(
                          CHANNEL_ID, "RootAutoSwipe", NotificationManager.IMPORTANCE_LOW);
                      NotificationManager nm = getSystemService(NotificationManager.class);
                      if (nm != null) nm.createNotificationChannel(ch);
                  }
                  Notification.Builder builder;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      builder = new Notification.Builder(this, CHANNEL_ID);
                  } else {
                      builder = new Notification.Builder(this);
                  }
                  Notification notif = builder
                      .setContentTitle("RootAutoSwipe")
                      .setContentText("Monitoring orders...")
                      .setSmallIcon(android.R.drawable.ic_menu_compass)
                      .build();
                  startForeground(NOTIF_ID, notif);
              }

              @Override
              public void onCreate() {
                  super.onCreate();
                  prefs = getSharedPreferences("ras_prefs", MODE_PRIVATE);
                  log("Service created");
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  // FIX: Foreground service start karo — Android 8+ crash na ho
                  startForeground();

                  // Settings reload karo har baar service start ho
                  targetPackage = prefs.getString("target_pkg", "net.jahez.fleets");
                  pickupMax     = prefs.getFloat("pickup_max", 1.5f);
                  dropMax       = prefs.getFloat("drop_max", 3.5f);
                  detectDelay   = prefs.getInt("detect_delay", 800);
                  swipeDuration = prefs.getInt("swipe_duration", 300);
                  log("Settings → Pkg:" + targetPackage + " P:" + pickupMax + " D:" + dropMax
                      + " Delay:" + detectDelay + " Swipe:" + swipeDuration);

                  if (monitorThread != null && monitorThread.isAlive()) return START_STICKY;

                  running = true;
                  monitorThread = new Thread(() -> {
                      log("Monitor thread started");
                      while (running) {
                          try {
                              // ── 1. Foreground app check ───────────────────────
                              // FIX: Android version ke hisaab se sahi command use karo
                              String topApp;
                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                                  // Android 10+ ke liye
                                  topApp = exec("dumpsys activity top | grep 'ACTIVITY' | tail -1");
                              } else {
                                  topApp = exec("dumpsys activity top | grep ACTIVITY | head -1");
                              }

                              if (!topApp.contains(targetPackage)) {
                                  Thread.sleep(1000);
                                  continue;
                              }

                              // ── 2. UI dump lo ────────────────────────────────
                              // FIX: /sdcard ke bajaye /data/local/tmp use karo (permissions issue)
                              exec("uiautomator dump /data/local/tmp/window_dump.xml");
                              String dump = exec("cat /data/local/tmp/window_dump.xml");

                              if (dump.isEmpty()) {
                                  log("UI dump empty, retry...");
                                  Thread.sleep(500);
                                  continue;
                              }

                              if (!dump.contains("New Order")) {
                                  Thread.sleep(1000);
                                  continue;
                              }

                              log("✅ New Order detected! Waiting " + detectDelay + "ms...");
                              Thread.sleep(detectDelay);

                              // ── 3. Distances extract karo ────────────────────
                              // Dump ke baad fresh dump lo (screen ab fully loaded hogi)
                              exec("uiautomator dump /data/local/tmp/window_dump.xml");
                              dump = exec("cat /data/local/tmp/window_dump.xml");

                              float[] dist = extractDistances(dump);
                              log("Distances → Pickup:" + dist[0] + "km | Drop:" + dist[1] + "km");

                              if (dist[0] < 0 || dist[1] < 0) {
                                  log("⚠️ Distance parse fail, skip");
                                  Thread.sleep(1500);
                                  continue;
                              }

                              // ── 4. Decision ──────────────────────────────────
                              if (dist[0] <= pickupMax && dist[1] <= dropMax) {
                                  log("✅ ACCEPT → P:" + dist[0] + "<=" + pickupMax
                                      + " | D:" + dist[1] + "<=" + dropMax);

                                  int[] coord = findAcceptButtonCoords(dump);
                                  if (coord != null) {
                                      // coord = {left, top, width, height}
                                      int startX = coord[0] + (coord[2] / 5);
                                      int endX   = coord[0] + (coord[2] * 4 / 5);
                                      int y      = coord[1] + (coord[3] / 2);
                                      exec("input swipe " + startX + " " + y + " "
                                          + endX + " " + y + " " + swipeDuration);
                                      log("Swipe: (" + startX + "," + y + ") → ("
                                          + endX + "," + y + ") " + swipeDuration + "ms");
                                  } else {
                                      // FIX: Fallback swipe — screen height dynamically nikalte hain
                                      String screenSize = exec("wm size");
                                      int screenH = 1920; // default
                                      int screenW = 1080;
                                      Pattern szP = Pattern.compile("(\\d+)x(\\d+)");
                                      Matcher szM = szP.matcher(screenSize);
                                      if (szM.find()) {
                                          screenW = Integer.parseInt(szM.group(1));
                                          screenH = Integer.parseInt(szM.group(2));
                                      }
                                      int sx = (int)(screenW * 0.15);
                                      int ex = (int)(screenW * 0.85);
                                      int sy = (int)(screenH * 0.85);
                                      exec("input swipe " + sx + " " + sy + " "
                                          + ex + " " + sy + " " + swipeDuration);
                                      log("Fallback swipe: (" + sx + "," + sy + ") → ("
                                          + ex + "," + sy + ")");
                                  }

                                  // ── 5. Order accept ke baad thoda wait karo ──
                                  Thread.sleep(3000);

                              } else {
                                  log("❌ REJECT → P:" + dist[0] + "/" + pickupMax
                                      + " | D:" + dist[1] + "/" + dropMax);
                              }

                              Thread.sleep(1500);

                          } catch (InterruptedException e) {
                              log("Thread interrupted");
                              break;
                          } catch (Exception e) {
                              log("Error: " + e.getMessage());
                          }
                      }
                      log("Monitor thread stopped");
                  });
                  monitorThread.start();
                  return START_STICKY;
              }

              // ── Distance extraction ───────────────────────────────────
              // FIX: XML dump mein text attribute mein hota hai, alag pattern chahiye
              // XML mein format: text="1.5 Km From You" ya alag nodes mein split
              private float[] extractDistances(String xml) {
                  float[] result = {-1, -1};

                  // Method A: Ek hi text attribute mein "x.x Km From You"
                  Pattern pPickup = Pattern.compile(
                      "(\\d+\\.?\\d*)\\s*[Kk]m\\s+From\\s+You",
                      Pattern.CASE_INSENSITIVE);
                  Matcher m = pPickup.matcher(xml);
                  if (m.find()) {
                      result[0] = Float.parseFloat(m.group(1));
                      log("Pickup (A): " + result[0]);
                  }

                  Pattern pDrop = Pattern.compile(
                      "(\\d+\\.?\\d*)\\s*[Kk]m\\s+From\\s+Pickup",
                      Pattern.CASE_INSENSITIVE);
                  m = pDrop.matcher(xml);
                  if (m.find()) {
                      result[1] = Float.parseFloat(m.group(1));
                      log("Drop (A): " + result[1]);
                  }

                  // Method B: "From You" aur km alag attributes mein hain
                  // text="1.5 Km" aur agle node mein text="From You"
                  if (result[0] < 0 || result[1] < 0) {
                      // XML ko line-by-line parse karo
                      String[] lines = xml.split("node ");
                      Pattern kmPat = Pattern.compile("text=\"(\\d+\\.?\\d*)\\s*[Kk]m\"");
                      for (int i = 0; i < lines.length - 1; i++) {
                          Matcher km = kmPat.matcher(lines[i]);
                          if (km.find()) {
                              float val = Float.parseFloat(km.group(1));
                              // Next few lines mein "From You" ya "From Pickup" dhundo
                              String next = "";
                              for (int j = i + 1; j < Math.min(i + 4, lines.length); j++) {
                                  next += lines[j];
                              }
                              if (next.toLowerCase().contains("from you") && result[0] < 0) {
                                  result[0] = val;
                                  log("Pickup (B): " + result[0]);
                              } else if (next.toLowerCase().contains("from pickup") && result[1] < 0) {
                                  result[1] = val;
                                  log("Drop (B): " + result[1]);
                              }
                          }
                      }
                  }

                  // Method C: Positional fallback — sirf km wali values lo
                  if (result[0] < 0 || result[1] < 0) {
                      log("Fallback distance parse...");
                      // Sirf "Km" wale text attributes se values nikalo (price filter)
                      Pattern kmAll = Pattern.compile(
                          "text=\"(\\d+\\.?\\d*)\\s*[Kk]m[^\"]*\"",
                          Pattern.CASE_INSENSITIVE);
                      Matcher ma = kmAll.matcher(xml);
                      java.util.List<Float> vals = new java.util.ArrayList<>();
                      while (ma.find()) {
                          float v = Float.parseFloat(ma.group(1));
                          if (v > 0 && v < 100) vals.add(v);
                      }
                      log("All km vals: " + vals.toString());
                      if (vals.size() >= 2) {
                          if (result[0] < 0) result[0] = vals.get(0);
                          if (result[1] < 0) result[1] = vals.get(1);
                      }
                  }

                  return result;
              }

              // ── Accept button coordinates ─────────────────────────────
              // FIX: XML mein bounds attribute pehle aata hai, text baad mein
              // Correct regex: text pehle dhundo phir bounds
              private int[] findAcceptButtonCoords(String xml) {
                  // Format: bounds="[left,top][right,bottom]" ... text="Accept"
                  // Ya: text="Accept" ... bounds="[left,top][right,bottom]"
                  // Dono cases handle karo

                  // Pehle Accept wala node dhundo
                  Pattern nodeP = Pattern.compile(
                      "bounds=\"\\[(\\d+),(\\d+)\\]\\[(\\d+),(\\d+)\\]\"[^/]*?text=\"(?:Accept|ACCEPT|قبول)\"" +
                      "|text=\"(?:Accept|ACCEPT|قبول)\"[^/]*?bounds=\"\\[(\\d+),(\\d+)\\]\\[(\\d+),(\\d+)\\]\"",
                      Pattern.CASE_INSENSITIVE | Pattern.DOTALL);

                  Matcher m = nodeP.matcher(xml);
                  if (m.find()) {
                      int left, top, right, bottom;
                      if (m.group(1) != null) {
                          // First format: bounds before text
                          left   = Integer.parseInt(m.group(1));
                          top    = Integer.parseInt(m.group(2));
                          right  = Integer.parseInt(m.group(3));
                          bottom = Integer.parseInt(m.group(4));
                      } else {
                          // Second format: text before bounds
                          left   = Integer.parseInt(m.group(5));
                          top    = Integer.parseInt(m.group(6));
                          right  = Integer.parseInt(m.group(7));
                          bottom = Integer.parseInt(m.group(8));
                      }
                      log("Accept bounds: [" + left + "," + top + "][" + right + "," + bottom + "]");
                      return new int[]{left, top, right - left, bottom - top};
                  }

                  log("Accept button not found in dump");
                  return null;
              }

              @Override
              public void onDestroy() {
                  running = false;
                  if (monitorThread != null) monitorThread.interrupt();
                  stopForeground(true);
                  log("Service stopped");
                  super.onDestroy();
              }

              @Override
              public IBinder onBind(Intent intent) { return null; }
          }
          EOF

          cat > app/src/main/java/com/rootautoswipe/LogActivity.java << 'EOF'
          package com.rootautoswipe;

          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.os.Build;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;

          public class LogActivity extends AppCompatActivity {
              private TextView tvLogs;
              private ScrollView scrollView;

              private final BroadcastReceiver receiver = new BroadcastReceiver() {
                  @Override
                  public void onReceive(Context context, Intent intent) {
                      String msg = intent.getStringExtra("log_msg");
                      if (msg == null) return;
                      if (tvLogs != null) {
                          tvLogs.append("\n" + msg);
                          // FIX: Auto-scroll to bottom
                          if (scrollView != null) {
                              scrollView.post(() -> scrollView.fullScroll(ScrollView.FOCUS_DOWN));
                          }
                      }
                  }
              };

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_log);

                  tvLogs    = findViewById(R.id.tv_logs);
                  scrollView = findViewById(R.id.log_scroll);
                  Button btnClear = findViewById(R.id.btn_clear);
                  btnClear.setOnClickListener(v -> tvLogs.setText("--- Cleared ---"));

                  IntentFilter filter = new IntentFilter("RAS_LOG_ACTION");
                  // FIX: Android 13+ ke liye RECEIVER_NOT_EXPORTED (internal broadcast)
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      registerReceiver(receiver, filter, Context.RECEIVER_NOT_EXPORTED);
                  } else if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      registerReceiver(receiver, filter, Context.RECEIVER_EXPORTED);
                  } else {
                      registerReceiver(receiver, filter);
                  }
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  unregisterReceiver(receiver);
              }
          }
          EOF

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

