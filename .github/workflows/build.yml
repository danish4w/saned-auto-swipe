name: Build Danish Auto Silent
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Xposed API jar (from GitHub raw)
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/api-82.jar https://github.com/rovo89/XposedBridge/raw/master/api/api-82.jar
          # Verify file size (should be > 10KB)
          SIZE=$(stat -c%s app/libs/api-82.jar)
          if [ $SIZE -lt 10000 ]; then
            echo "Download failed, size $SIZE bytes"
            exit 1
          fi
          echo "JAR downloaded successfully, size $SIZE bytes"

      - name: Build LSPosed Module
        run: |
          mkdir -p app/src/main/java/com/danish/auto
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          echo "include ':app'" > settings.gradle

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.danish.auto'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.danish.auto'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              compileOnly files('libs/api-82.jar')
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Danish Auto"
                  android:theme="@android:style/Theme.DeviceDefault">
                  <meta-data
                      android:name="xposedmodule"
                      android:value="true" />
                  <meta-data
                      android:name="xposeddescription"
                      android:value="Silent Auto Accept (Notification-based)" />
                  <meta-data
                      android:name="xposedminversion"
                      android:value="82" />
                  <activity
                      android:name=".SettingsActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <activity
                      android:name=".PopupActivity"
                      android:theme="@android:style/Theme.DeviceDefault.Dialog"
                      android:excludeFromRecents="true"
                      android:exported="false" />
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Danish Auto</string>
          </resources>
          EOF

          cat > app/src/main/res/layout/activity_settings.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="20dp"
              android:background="#121212">
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Danish Auto"
                  android:textSize="26sp"
                  android:textColor="#1DB954"
                  android:textStyle="bold"
                  android:layout_gravity="center"
                  android:layout_marginBottom="20dp"/>
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Pickup Max (km)"
                  android:textColor="#AAAAAA"/>
              <EditText
                  android:id="@+id/et_pickup"
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:inputType="numberDecimal"
                  android:text="1.5"
                  android:textColor="#FFFFFF"
                  android:background="#333333"
                  android:padding="10dp"
                  android:layout_marginBottom="15dp"/>
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Drop Max (km)"
                  android:textColor="#AAAAAA"/>
              <EditText
                  android:id="@+id/et_drop"
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:inputType="numberDecimal"
                  android:text="3.5"
                  android:textColor="#FFFFFF"
                  android:background="#333333"
                  android:padding="10dp"
                  android:layout_marginBottom="15dp"/>
              <Switch
                  android:id="@+id/switch_enabled"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Auto Accept"
                  android:textColor="#FFFFFF"
                  android:layout_marginBottom="20dp"/>
              <Button
                  android:id="@+id/btn_save"
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:text="SAVE"
                  android:backgroundTint="#1DB954"/>
          </LinearLayout>
          EOF

          cat > app/src/main/res/layout/activity_popup.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="wrap_content"
              android:orientation="vertical"
              android:padding="20dp"
              android:background="#1E1E1E">
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="✅ Order Accepted"
                  android:textSize="22sp"
                  android:textColor="#4CAF50"
                  android:textStyle="bold"
                  android:layout_gravity="center"
                  android:layout_marginBottom="15dp"/>
              <TextView
                  android:id="@+id/tv_pickup"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Pickup: -- km"
                  android:textSize="16sp"
                  android:textColor="#FFFFFF"/>
              <TextView
                  android:id="@+id/tv_drop"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Drop: -- km"
                  android:textSize="16sp"
                  android:textColor="#FFFFFF"
                  android:layout_marginBottom="20dp"/>
              <Button
                  android:id="@+id/btn_ok"
                  android:layout_width="match_parent"
                  android:layout_height="45dp"
                  android:text="OK"
                  android:backgroundTint="#4CAF50"/>
          </LinearLayout>
          EOF

          cat > app/src/main/java/com/danish/auto/SettingsActivity.java << 'EOF'
          package com.danish.auto;

          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.Switch;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class SettingsActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_settings);
                  SharedPreferences prefs = getSharedPreferences("danish_prefs", MODE_PRIVATE);

                  EditText etPickup = findViewById(R.id.et_pickup);
                  EditText etDrop = findViewById(R.id.et_drop);
                  Switch sw = findViewById(R.id.switch_enabled);
                  Button btnSave = findViewById(R.id.btn_save);

                  etPickup.setText(String.valueOf(prefs.getFloat("pickup_max", 1.5f)));
                  etDrop.setText(String.valueOf(prefs.getFloat("drop_max", 3.5f)));
                  sw.setChecked(prefs.getBoolean("enabled", false));

                  btnSave.setOnClickListener(v -> {
                      prefs.edit()
                          .putFloat("pickup_max", Float.parseFloat(etPickup.getText().toString()))
                          .putFloat("drop_max", Float.parseFloat(etDrop.getText().toString()))
                          .putBoolean("enabled", sw.isChecked())
                          .apply();
                      Toast.makeText(this, "Saved", Toast.LENGTH_SHORT).show();
                  });
              }
          }
          EOF

          cat > app/src/main/java/com/danish/auto/PopupActivity.java << 'EOF'
          package com.danish.auto;

          import android.os.Bundle;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;

          public class PopupActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_popup);
                  float pickup = getIntent().getFloatExtra("pickup", 0);
                  float drop = getIntent().getFloatExtra("drop", 0);
                  ((TextView) findViewById(R.id.tv_pickup)).setText("Pickup: " + pickup + " km");
                  ((TextView) findViewById(R.id.tv_drop)).setText("Drop: " + drop + " km");
                  findViewById(R.id.btn_ok).setOnClickListener(v -> finish());
              }
          }
          EOF

          cat > app/src/main/assets/xposed_init << 'EOF'
          com.danish.auto.MainHook
          EOF

          cat > app/src/main/java/com/danish/auto/MainHook.java << 'EOF'
          package com.danish.auto;

          import android.app.Activity;
          import android.app.Notification;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.TextView;

          import java.lang.reflect.Method;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;

          public class MainHook implements de.robv.android.xposed.IXposedHookLoadPackage {
              private static final String TAG = "DanishAuto";
              private static SharedPreferences prefs;
              private static float pendingPickup = -1;
              private static float pendingDrop = -1;

              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable {
                  if (!lpparam.packageName.equals("net.jahez.fleets")) return;
                  XposedBridge.log(TAG + " Hooked into Jahez");

                  // Hook notification receiver
                  try {
                      Class<?> receiverClass = XposedHelpers.findClass("net.saned.notification.dispatch.DispatchStatusChangesReceiver", lpparam.classLoader);
                      XposedHelpers.findAndHookMethod(receiverClass, "onReceive", Context.class, Intent.class, new XC_MethodHook() {
                          @Override
                          protected void beforeHookedMethod(MethodHookParam param) throws Throwable {
                              Context ctx = (Context) param.args[0];
                              prefs = ctx.getSharedPreferences("danish_prefs", Context.MODE_PRIVATE);
                              Intent intent = (Intent) param.args[1];
                              if (intent != null && intent.getExtras() != null) {
                                  Bundle extras = intent.getExtras();
                                  float pickup = -1, drop = -1;
                                  if (extras.containsKey("pickup_distance")) {
                                      pickup = (float) extras.getDouble("pickup_distance", -1);
                                  } else if (extras.containsKey("pickup")) {
                                      pickup = extras.getFloat("pickup", -1);
                                  }
                                  if (extras.containsKey("drop_distance")) {
                                      drop = (float) extras.getDouble("drop_distance", -1);
                                  } else if (extras.containsKey("drop")) {
                                      drop = extras.getFloat("drop", -1);
                                  }
                                  if (pickup > 0 && drop > 0) {
                                      pendingPickup = pickup;
                                      pendingDrop = drop;
                                      XposedBridge.log(TAG + " 📡 Captured distances: P=" + pickup + " D=" + drop);
                                  }
                              }
                          }
                      });
                  } catch (Exception e) {
                      XposedBridge.log(TAG + " Failed to hook receiver: " + e.getMessage());
                  }

                  // Hook order activity
                  try {
                      Class<?> orderActivity = XposedHelpers.findClass("net.jahez.fleets.dispatch.accept.IncomingDispatchActivity", lpparam.classLoader);
                      XposedHelpers.findAndHookMethod(orderActivity, "onCreate", Bundle.class, new XC_MethodHook() {
                          @Override
                          protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                              Activity act = (Activity) param.thisObject;
                              if (prefs == null) prefs = act.getSharedPreferences("danish_prefs", Context.MODE_PRIVATE);
                              if (!prefs.getBoolean("enabled", false)) return;

                              float pickup = pendingPickup;
                              float drop = pendingDrop;
                              if (pickup < 0 || drop < 0) {
                                  float[] ui = extractDistancesFromUI(act);
                                  pickup = ui[0];
                                  drop = ui[1];
                              }
                              pendingPickup = -1;

                              float pickupMax = prefs.getFloat("pickup_max", 1.5f);
                              float dropMax = prefs.getFloat("drop_max", 3.5f);
                              XposedBridge.log(TAG + " 📊 P=" + pickup + " D=" + drop + " Limits: " + pickupMax + "/" + dropMax);

                              if (pickup > 0 && drop > 0 && pickup <= pickupMax && drop <= dropMax) {
                                  XposedBridge.log(TAG + " ✅ Accepting order silently...");
                                  boolean accepted = callAcceptMethod(act);
                                  if (!accepted) simulateAcceptClick(act);
                                  showPopupAndNotification(act, pickup, drop);
                              } else {
                                  XposedBridge.log(TAG + " ❌ Rejected");
                              }
                          }
                      });
                  } catch (Exception e) {
                      XposedBridge.log(TAG + " Failed to hook activity: " + e.getMessage());
                  }
              }

              private boolean callAcceptMethod(Activity act) {
                  for (Method m : act.getClass().getDeclaredMethods()) {
                      String name = m.getName().toLowerCase();
                      if (name.contains("accept") && !name.contains("reject")) {
                          try {
                              m.setAccessible(true);
                              m.invoke(act);
                              XposedBridge.log(TAG + " Called method: " + m.getName());
                              return true;
                          } catch (Exception e) {}
                      }
                  }
                  return false;
              }

              private void simulateAcceptClick(Activity act) {
                  View root = act.getWindow().getDecorView();
                  View btn = findAcceptButton(root);
                  if (btn != null) btn.performClick();
              }

              private View findAcceptButton(View v) {
                  if (v instanceof TextView) {
                      String t = ((TextView) v).getText().toString();
                      if (t.equalsIgnoreCase("Accept") || t.equals("قبول")) return v;
                  }
                  if (v instanceof ViewGroup) {
                      for (int i = 0; i < ((ViewGroup) v).getChildCount(); i++) {
                          View found = findAcceptButton(((ViewGroup) v).getChildAt(i));
                          if (found != null) return found;
                      }
                  }
                  return null;
              }

              private float[] extractDistancesFromUI(Activity act) {
                  List<Float> list = new ArrayList<>();
                  collectKmNumbers(act.getWindow().getDecorView(), list);
                  if (list.size() >= 2) return new float[]{list.get(0), list.get(1)};
                  return new float[]{-1, -1};
              }

              private void collectKmNumbers(View v, List<Float> out) {
                  if (v instanceof TextView) {
                      String text = ((TextView) v).getText().toString();
                      Matcher m = Pattern.compile("(\\d+\\.?\\d*)\\s*[Kk][Mm]").matcher(text);
                      if (m.find()) {
                          try { float val = Float.parseFloat(m.group(1)); if (val>0 && val<100 && !out.contains(val)) out.add(val); } catch(Exception e){}
                      }
                  } else if (v instanceof ViewGroup) {
                      for (int i = 0; i < ((ViewGroup) v).getChildCount(); i++) collectKmNumbers(((ViewGroup) v).getChildAt(i), out);
                  }
              }

              private void showPopupAndNotification(Context ctx, float p, float d) {
                  try {
                      Intent popup = new Intent(ctx, PopupActivity.class);
                      popup.putExtra("pickup", p);
                      popup.putExtra("drop", d);
                      popup.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      ctx.startActivity(popup);
                  } catch (Exception e) {}

                  try {
                      NotificationManager nm = (NotificationManager) ctx.getSystemService(Context.NOTIFICATION_SERVICE);
                      if (android.os.Build.VERSION.SDK_INT >= 26) {
                          nm.createNotificationChannel(new android.app.NotificationChannel("danish_channel", "Danish Auto", NotificationManager.IMPORTANCE_HIGH));
                      }
                      Intent main = new Intent(ctx, SettingsActivity.class);
                      PendingIntent pi = PendingIntent.getActivity(ctx, 0, main, PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                      android.app.Notification.Builder builder = android.os.Build.VERSION.SDK_INT >= 26
                              ? new android.app.Notification.Builder(ctx, "danish_channel")
                              : new android.app.Notification.Builder(ctx);
                      builder.setContentTitle("✅ Order Accepted")
                             .setContentText("Pickup: " + p + "km | Drop: " + d + "km")
                             .setSmallIcon(android.R.drawable.ic_dialog_info)
                             .setContentIntent(pi)
                             .setAutoCancel(true);
                      nm.notify(1001, builder.build());
                  } catch (Exception e) {}
              }
          }
          EOF

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Danish-Auto-Silent
          path: app/build/outputs/apk/debug/*.apk
