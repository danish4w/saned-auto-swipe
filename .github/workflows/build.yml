name: Build JahezAutoAccept

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          cat > gradle/wrapper/gradle-wrapper.properties << 'WEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/zips
          WEOF

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/danish/jahez
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/assets

      - name: Write Gradle Files
        run: |
          cat > settings.gradle << 'SEOF'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositories {
              google(); mavenCentral()
              maven { url 'https://api.xposed.info/' }
            }
          }
          rootProject.name = "JahezAutoAccept"
          include ':app'
          SEOF

          cat > build.gradle << 'BEOF'
          plugins { id 'com.android.application' version '8.5.2' apply false }
          BEOF

          cat > gradle.properties << 'GEOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          GEOF

          cat > app/build.gradle << 'ABEOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.danish.jahez'
            compileSdk 34
            defaultConfig {
              applicationId 'com.danish.jahez'
              minSdk 26
              targetSdk 34
              versionCode 3
              versionName '3.0'
            }
            buildTypes {
              release { minifyEnabled false }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.google.android.material:material:1.12.0'
            compileOnly 'de.robv.android.xposed:api:82'
          }
          ABEOF

      - name: Write Icon
        run: |
          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'BGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp"
            android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#1B5E20"
              android:pathData="M0,0 L108,0 L108,108 L0,108 Z"/>
          </vector>
          BGEOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'FGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp"
            android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#FFFFFF"
              android:pathData="M25,54 L35,44 L47,60 L73,30 L83,40 L47,82 Z"/>
          </vector>
          FGEOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'ICEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          ICEOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'RNDEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          RNDEOF

      - name: Write Xposed Init
        run: |
          echo "com.danish.jahez.SanedHook" > app/src/main/assets/xposed_init

      - name: Write Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC"/>
            <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
            <application
              android:label="Jahez Auto"
              android:icon="@mipmap/ic_launcher"
              android:roundIcon="@mipmap/ic_launcher_round"
              android:theme="@style/AppTheme"
              android:allowBackup="false">
              <meta-data android:name="xposedmodule" android:value="true"/>
              <meta-data android:name="xposeddescription" android:value="Jahez order hook with 3-stage logging"/>
              <meta-data android:name="xposedminversion" android:value="82"/>
              <activity android:name=".MainActivity" android:exported="true"
                android:windowSoftInputMode="stateHidden|adjustPan">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
              <activity android:name=".LogActivity" android:exported="false"/>
              <service android:name=".AutoService" android:exported="false"
                android:foregroundServiceType="dataSync"/>
              <receiver android:name=".BootReceiver" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.BOOT_COMPLETED"/>
                </intent-filter>
              </receiver>
            </application>
          </manifest>
          MEOF

      - name: Write MainActivity
        run: |
          cat > app/src/main/java/com/danish/jahez/MainActivity.java << 'JEOF'
          package com.danish.jahez;
          import android.app.Activity;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.Bundle;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.*;
          import android.widget.SeekBar;
          public class MainActivity extends Activity {
            SharedPreferences prefs;
            Switch swEnable;
            TextView tvStatus;
            final BroadcastReceiver offReceiver = new BroadcastReceiver() {
              @Override public void onReceive(Context ctx, Intent intent) {
                if (swEnable != null)
                  swEnable.setChecked("JAHEZ_AUTO_ON".equals(intent.getAction()));
                refreshStatus();
              }
            };
            @Override protected void onCreate(Bundle saved) {
              super.onCreate(saved);
              setContentView(R.layout.activity_main);
              prefs = getSharedPreferences("cfg", MODE_PRIVATE);
              EditText etPickup = findViewById(R.id.et_pickup);
              EditText etDrop   = findViewById(R.id.et_drop);
              SeekBar sbDelay   = findViewById(R.id.sb_delay);
              TextView tvDelay  = findViewById(R.id.tv_delay);
              swEnable = findViewById(R.id.sw_enable);
              tvStatus = findViewById(R.id.tv_status);
              Button btnSave = findViewById(R.id.btn_save);
              etPickup.setText(String.valueOf(prefs.getFloat("max_pickup", 2.0f)));
              etDrop.setText(String.valueOf(prefs.getFloat("max_drop", 5.0f)));
              int savedDelay = prefs.getInt("scan_delay", 1000);
              sbDelay.setProgress(savedDelay - 50);
              tvDelay.setText(savedDelay + "ms");
              sbDelay.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                public void onProgressChanged(SeekBar sb, int p, boolean u) { tvDelay.setText((p + 50) + "ms"); }
                public void onStartTrackingTouch(SeekBar sb) {}
                public void onStopTrackingTouch(SeekBar sb) {
                  prefs.edit().putInt("scan_delay", sb.getProgress() + 50).apply();
                }
              });
              swEnable.setChecked(prefs.getBoolean("enabled", false));
              if (Build.VERSION.SDK_INT >= 33)
                requestPermissions(new String[]{"android.permission.POST_NOTIFICATIONS"}, 0);
              requestPermissions(new String[]{
                "android.permission.ACCESS_FINE_LOCATION",
                "android.permission.ACCESS_COARSE_LOCATION"}, 1);
              IntentFilter filter = new IntentFilter();
              filter.addAction("JAHEZ_AUTO_OFF");
              filter.addAction("JAHEZ_AUTO_ON");
              if (Build.VERSION.SDK_INT >= 33)
                registerReceiver(offReceiver, filter, Context.RECEIVER_NOT_EXPORTED);
              else
                registerReceiver(offReceiver, filter);
              swEnable.setOnCheckedChangeListener((btn, checked) -> {
                prefs.edit().putBoolean("enabled", checked).apply();
                sendBroadcast(new Intent("JAHEZ_STATE_CHANGED"));
                refreshStatus();
              });
              btnSave.setOnClickListener(v -> {
                float pk = parseFloat(etPickup.getText().toString(), 2.0f);
                float dk = parseFloat(etDrop.getText().toString(), 5.0f);
                prefs.edit().putFloat("max_pickup", pk).putFloat("max_drop", dk).apply();
                Toast.makeText(this, "Saved! Pickup<=" + pk + "km Drop<=" + dk + "km", Toast.LENGTH_LONG).show();
                InputMethodManager imm = (InputMethodManager) getSystemService(INPUT_METHOD_SERVICE);
                if (imm != null) imm.hideSoftInputFromWindow(getWindow().getDecorView().getWindowToken(), 0);
                etPickup.clearFocus(); etDrop.clearFocus();
              });
              findViewById(R.id.btn_logs).setOnClickListener(v ->
                startActivity(new Intent(this, LogActivity.class))
              );
              Intent svc = new Intent(this, AutoService.class);
              if (Build.VERSION.SDK_INT >= 26) startForegroundService(svc);
              else startService(svc);
            }
            @Override protected void onResume() {
              super.onResume();
              refreshStatus();
            }
            @Override protected void onDestroy() {
              super.onDestroy();
              unregisterReceiver(offReceiver);
            }
            void refreshStatus() {
              if (tvStatus == null) return;
              boolean en = prefs.getBoolean("enabled", false);
              tvStatus.setText(en ? "AUTO ACCEPT: ON" : "AUTO ACCEPT: OFF");
              tvStatus.setTextColor(en ? 0xFF4CAF50 : 0xFFFF5555);
              if (swEnable != null) swEnable.setVisibility(android.view.View.VISIBLE);
            }
            float parseFloat(String s, float def) {
              try { return Float.parseFloat(s.trim()); } catch (Exception e) { return def; }
            }
          }
          JEOF

      - name: Write SanedHook (3-Stage Logging)
        run: |
          cat > app/src/main/java/com/danish/jahez/SanedHook.java << 'HEOF'
          package com.danish.jahez;
          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.os.SystemClock;
          import android.util.DisplayMetrics;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.view.WindowManager;
          import android.widget.Button;
          import android.widget.TextView;
          public class SanedHook implements IXposedHookLoadPackage {
            static final String TARGET  = "net.jahez.fleets";
            static final String OUR_PKG = "com.danish.jahez";
            static final String ORDER_ACTIVITY = "net.jahez.fleets.dispatch.accept.IncomingDispatchActivity";
            private long lastBcast = 0;
            private volatile android.app.Activity currentActivity = null;
            @Override public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lp) {
              if (!TARGET.equals(lp.packageName)) return;
              XposedHelpers.findAndHookMethod(
                "android.app.Activity", lp.classLoader, "onResume",
                new XC_MethodHook() {
                  @Override protected void afterHookedMethod(MethodHookParam param) {
                    if (!ORDER_ACTIVITY.equals(param.thisObject.getClass().getName())) return;
                    long now = System.currentTimeMillis();
                    if (now - lastBcast < 2000) return;
                    lastBcast = now;
                    android.app.Activity act = (android.app.Activity) param.thisObject;
                    currentActivity = act;
                    try {
                      IntentFilter filter = new IntentFilter("JAHEZ_DO_ACCEPT");
                      act.registerReceiver(new BroadcastReceiver() {
                        @Override public void onReceive(Context ctx, Intent intent) {
                          int delay = intent.getIntExtra("scan_delay", 1000);
                          sendLog("📡 Stage1: Received JAHEZ_DO_ACCEPT, delay=" + delay + "ms");
                          new Handler(Looper.getMainLooper()).postDelayed(() -> doSwipe(), delay);
                        }
                      }, filter);
                    } catch (Exception e) {
                      sendLog("❌ Stage1 FAIL: Could not register receiver - " + e.getMessage());
                    }
                    try {
                      android.content.Intent actIntent = act.getIntent();
                      Bundle extras = actIntent != null ? actIntent.getExtras() : null;
                      if (extras != null) {
                        double pickupLat = getDouble(extras, "EXTRA_DISPATCH_PICKUP_LATITUDE");
                        double pickupLon = getDouble(extras, "EXTRA_DISPATCH_PICKUP_LONGITUDE");
                        double dropDist  = getDouble(extras, "EXTRA_DISTANCE");
                        double price     = getDouble(extras, "EXTRA_DELIVERY_PRICE");
                        double bonus     = getDouble(extras, "EXTRA_BONUS_AMOUNT");
                        Intent intent = new Intent("JAHEZ_ORDER_DATA");
                        intent.setPackage(OUR_PKG);
                        intent.putExtra("pickup_lat", pickupLat);
                        intent.putExtra("pickup_lon", pickupLon);
                        intent.putExtra("drop_dist",  dropDist);
                        intent.putExtra("price",      price);
                        intent.putExtra("bonus",      bonus);
                        intent.putExtra("is_order",   true);
                        act.sendBroadcast(intent);
                      }
                    } catch (Exception e) {
                      sendLog("⚠️ Order data send error: " + e.getMessage());
                    }
                  }
                }
              );
            }
            private void doSwipe() {
              android.app.Activity act = currentActivity;
              if (act == null || act.isFinishing()) {
                sendLog("❌ Stage2 FAIL: Activity null/finishing");
                return;
              }
              new Handler(Looper.getMainLooper()).post(() -> {
                try {
                  View root = act.getWindow().getDecorView();
                  Thread.sleep(100);
                  sendLog("🔍 Stage2: Searching for swipe button...");
                  View swipeView = findViewWithText(root, new String[]{"ACCEPT","SWIPE","SLIDE","ACCEPTAR","ACEPTAR","CONFIRM","OK","ACCEPT ORDER","SWIPE TO ACCEPT"});
                  float startX, endX, y;
                  if (swipeView != null && swipeView.isShown()) {
                    int[] loc = new int[2];
                    swipeView.getLocationOnScreen(loc);
                    startX = loc[0] + 30;
                    endX   = loc[0] + swipeView.getWidth() - 30;
                    y      = loc[1] + swipeView.getHeight() / 2f;
                    sendLog(String.format("✅ Stage2 SUCCESS: Button found at (%d,%d) → (%d,%d)", (int)startX, (int)y, (int)endX, (int)y));
                  } else {
                    DisplayMetrics dm = new DisplayMetrics();
                    act.getWindowManager().getDefaultDisplay().getMetrics(dm);
                    startX = dm.widthPixels * 0.2f;
                    endX   = dm.widthPixels * 0.8f;
                    y      = dm.heightPixels * 0.85f;
                    sendLog(String.format("⚠️ Stage2 FALLBACK: Button NOT found, using screen coordinates (%d,%d) → (%d,%d)", (int)startX, (int)y, (int)endX, (int)y));
                  }
                  sendLog("🖱️ Stage3: Injecting MotionEvent swipe...");
                  boolean success = performSwipe(root, startX, endX, y);
                  if (success) sendLog("✅ Stage3 SUCCESS: MotionEvent swipe completed");
                  else sendLog("❌ Stage3 FAIL: MotionEvent injection failed");
                } catch (Exception e) {
                  sendLog("❌ Stage2/3 EXCEPTION: " + e.getMessage());
                }
              });
            }
            private boolean performSwipe(View root, float startX, float endX, float y) {
              try {
                long downTime = SystemClock.uptimeMillis();
                MotionEvent down = MotionEvent.obtain(downTime, downTime, MotionEvent.ACTION_DOWN, startX, y, 0);
                root.dispatchTouchEvent(down);
                down.recycle();
                int steps = 20;
                for (int i = 1; i <= steps; i++) {
                  float stepX = startX + (endX - startX) * i / steps;
                  long eventTime = downTime + i * 8;
                  MotionEvent move = MotionEvent.obtain(downTime, eventTime, MotionEvent.ACTION_MOVE, stepX, y, 0);
                  root.dispatchTouchEvent(move);
                  move.recycle();
                }
                MotionEvent up = MotionEvent.obtain(downTime, downTime + steps * 8 + 20, MotionEvent.ACTION_UP, endX, y, 0);
                root.dispatchTouchEvent(up);
                up.recycle();
                return true;
              } catch (Exception e) {
                sendLog("❌ Stage3 EXCEPTION during injection: " + e.getMessage());
                return false;
              }
            }
            private View findViewWithText(View root, String[] texts) {
              if (root == null) return null;
              if (root instanceof ViewGroup) {
                ViewGroup group = (ViewGroup) root;
                for (int i = 0; i < group.getChildCount(); i++) {
                  View found = findViewWithText(group.getChildAt(i), texts);
                  if (found != null) return found;
                }
              }
              if (root instanceof TextView) {
                String txt = ((TextView) root).getText().toString().toUpperCase();
                for (String s : texts) if (txt.contains(s)) return root;
              } else if (root instanceof Button) {
                String txt = ((Button) root).getText().toString().toUpperCase();
                for (String s : texts) if (txt.contains(s)) return root;
              }
              return null;
            }
            private void sendLog(String msg) {
              try {
                Intent intent = new Intent("JAHEZ_SWIPE_LOG");
                intent.setPackage(OUR_PKG);
                intent.putExtra("log", msg);
                android.app.Activity act = currentActivity;
                if (act != null) act.sendBroadcast(intent);
              } catch (Exception ignored) {}
            }
            private double getDouble(Bundle b, String key) {
              try {
                Object v = b.get(key);
                if (v instanceof Double) return (Double) v;
                if (v instanceof Float)  return (Float) v;
                if (v instanceof String) return Double.parseDouble((String) v);
              } catch (Exception ignored) {}
              return -1;
            }
          }
          HEOF

      - name: Write AutoService (with swipe log receiver)
        run: |
          cat > app/src/main/java/com/danish/jahez/AutoService.java << 'SEOF'
          package com.danish.jahez;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.Handler;
          import android.os.IBinder;
          import android.os.Looper;
          import android.util.Log;
          public class AutoService extends Service {
            static final String TAG = "JahezAuto";
            SharedPreferences prefs;
            long lastEvent = 0;
            private final BroadcastReceiver swipeLogReceiver = new BroadcastReceiver() {
              @Override public void onReceive(Context ctx, Intent intent) {
                String logMsg = intent.getStringExtra("log");
                if (logMsg != null) saveLog(logMsg);
              }
            };
            final BroadcastReceiver orderReceiver = new BroadcastReceiver() {
              @Override public void onReceive(Context ctx, Intent intent) {
                boolean isOrder = intent.getBooleanExtra("is_order", false);
                if (!isOrder) return;
                double pickupLat = intent.getDoubleExtra("pickup_lat", -1);
                double pickupLon = intent.getDoubleExtra("pickup_lon", -1);
                double dropDist  = intent.getDoubleExtra("drop_dist",  -1);
                double price     = intent.getDoubleExtra("price",       0);
                double bonus     = intent.getDoubleExtra("bonus",       0);
                saveLog("🪝 Order! drop=" + String.format("%.2f", dropDist) + "km price=" + price + " bonus=" + bonus);
                processOrderGps(pickupLat, pickupLon, dropDist);
              }
            };
            final BroadcastReceiver toggleReceiver = new BroadcastReceiver() {
              @Override public void onReceive(Context ctx, Intent intent) {
                if (prefs == null) prefs = getSharedPreferences("cfg", MODE_PRIVATE);
                if ("JAHEZ_TOGGLE".equals(intent.getAction())) {
                  boolean current = prefs.getBoolean("enabled", false);
                  prefs.edit().putBoolean("enabled", !current).apply();
                  sendBroadcast(new Intent(!current ? "JAHEZ_AUTO_ON" : "JAHEZ_AUTO_OFF"));
                  log("Toggle: " + (!current ? "ON" : "OFF"));
                }
                showServiceNotification();
              }
            };
            @Override public void onCreate() {
              super.onCreate();
              prefs = getSharedPreferences("cfg", MODE_PRIVATE);
              IntentFilter f = new IntentFilter("JAHEZ_TOGGLE");
              f.addAction("JAHEZ_STATE_CHANGED");
              if (Build.VERSION.SDK_INT >= 33)
                registerReceiver(toggleReceiver, f, Context.RECEIVER_NOT_EXPORTED);
              else
                registerReceiver(toggleReceiver, f);
              IntentFilter of = new IntentFilter("JAHEZ_ORDER_DATA");
              if (Build.VERSION.SDK_INT >= 33)
                registerReceiver(orderReceiver, of, Context.RECEIVER_EXPORTED);
              else
                registerReceiver(orderReceiver, of);
              IntentFilter lf = new IntentFilter("JAHEZ_SWIPE_LOG");
              if (Build.VERSION.SDK_INT >= 33)
                registerReceiver(swipeLogReceiver, lf, Context.RECEIVER_NOT_EXPORTED);
              else
                registerReceiver(swipeLogReceiver, lf);
              showServiceNotification();
              log("Service started");
            }
            @Override public int onStartCommand(Intent intent, int flags, int startId) {
              return START_STICKY;
            }
            @Override public IBinder onBind(Intent intent) { return null; }
            void showServiceNotification() {
              boolean enabled = prefs != null && prefs.getBoolean("enabled", false);
              NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
              if (Build.VERSION.SDK_INT >= 26) {
                NotificationChannel ch = new NotificationChannel("jahez_svc", "Jahez Auto Service", NotificationManager.IMPORTANCE_LOW);
                nm.createNotificationChannel(ch);
              }
              Intent toggleIntent = new Intent("JAHEZ_TOGGLE").setPackage(getPackageName());
              PendingIntent togglePending = PendingIntent.getBroadcast(this, 0, toggleIntent,
                PendingIntent.FLAG_IMMUTABLE | PendingIntent.FLAG_UPDATE_CURRENT);
              Notification.Action action = new Notification.Action.Builder(
                enabled ? android.R.drawable.ic_media_pause : android.R.drawable.ic_media_play,
                enabled ? "✅ ON  —  tap to OFF" : "⏸ OFF  —  tap to ON",
                togglePending).build();
              Notification.Builder builder = new Notification.Builder(this, "jahez_svc")
                .setContentTitle("Jahez Auto")
                .setContentText(enabled ? "Auto Accept: ON" : "Auto Accept: OFF")
                .setSmallIcon(android.R.drawable.ic_media_play)
                .setOngoing(true);
              if (Build.VERSION.SDK_INT >= 23) builder.addAction(action);
              startForeground(1, builder.build());
            }
            void processOrderGps(double pickupLat, double pickupLon, double dropDist) {
              if (prefs == null || !prefs.getBoolean("enabled", false)) return;
              long now = System.currentTimeMillis();
              if (now - lastEvent < 1500) return;
              lastEvent = now;
              float pickupDistKm = -1;
              try {
                android.location.LocationManager lm = (android.location.LocationManager) getSystemService(LOCATION_SERVICE);
                android.location.Location loc = null;
                try { loc = lm.getLastKnownLocation(android.location.LocationManager.GPS_PROVIDER); } catch (Exception ignored) {}
                if (loc == null) { try { loc = lm.getLastKnownLocation(android.location.LocationManager.NETWORK_PROVIDER); } catch (Exception ignored) {} }
                if (loc != null && pickupLat > 0 && pickupLon > 0) {
                  float[] res = new float[1];
                  android.location.Location.distanceBetween(loc.getLatitude(), loc.getLongitude(), pickupLat, pickupLon, res);
                  pickupDistKm = res[0] / 1000f;
                }
              } catch (Exception e) { saveLog("GPS error: " + e.getMessage()); }
              float maxPickup = prefs.getFloat("max_pickup", 2.0f);
              float maxDrop   = prefs.getFloat("max_drop",   5.0f);
              float dropKm    = (float) dropDist;
              saveLog(String.format("Pickup=%.2fkm(max%.1f) Drop=%.2fkm(max%.1f)", pickupDistKm, maxPickup, dropKm, maxDrop));
              boolean pickupOk = pickupDistKm < 0 || pickupDistKm <= maxPickup;
              boolean dropOk   = dropKm < 0      || dropKm      <= maxDrop;
              if (pickupOk && dropOk) {
                Intent acceptIntent = new Intent("JAHEZ_DO_ACCEPT");
                acceptIntent.setPackage("net.jahez.fleets");
                int delay = prefs.getInt("scan_delay", 1000);
                acceptIntent.putExtra("scan_delay", delay);
                sendBroadcast(acceptIntent);
                String msg = "✅ ACCEPTED — Pickup " + fmt(pickupDistKm) + "km | Drop " + fmt(dropKm) + "km";
                toast(msg); saveLog(msg);
                showServiceNotification();
              } else {
                String reason = "";
                if (!pickupOk) reason += "Pickup " + fmt(pickupDistKm) + "km > max " + fmt(maxPickup) + "km";
                if (!dropOk)   reason += (!reason.isEmpty() ? " | " : "") + "Drop " + fmt(dropKm) + "km > max " + fmt(maxDrop) + "km";
                String msg = "❌ SKIP — " + reason;
                toast(msg); saveLog(msg);
              }
            }
            void saveLog(String msg) {
              java.text.SimpleDateFormat sdf = new java.text.SimpleDateFormat("HH:mm:ss.SSS", java.util.Locale.getDefault());
              String entry = "[" + sdf.format(new java.util.Date()) + "]  " + msg;
              String existing = prefs.getString("logs", "");
              String[] lines = existing.isEmpty() ? new String[0] : existing.split("\n");
              StringBuilder sb = new StringBuilder(entry);
              for (int i = 0; i < lines.length && i < 99; i++) sb.append("\n").append(lines[i]);
              prefs.edit().putString("logs", sb.toString()).apply();
            }
            void toast(final String msg) {
              new Handler(Looper.getMainLooper()).post(() ->
                android.widget.Toast.makeText(getApplicationContext(), msg, android.widget.Toast.LENGTH_LONG).show()
              );
            }
            String fmt(float v) { return v < 0 ? "?" : String.format("%.1f", v); }
            void log(String msg) { Log.d(TAG, msg); }
            @Override public void onDestroy() {
              super.onDestroy();
              try { unregisterReceiver(toggleReceiver); } catch (Exception ignored) {}
              try { unregisterReceiver(orderReceiver); } catch (Exception ignored) {}
              try { unregisterReceiver(swipeLogReceiver); } catch (Exception ignored) {}
            }
          }
          SEOF

      - name: Write BootReceiver
        run: |
          cat > app/src/main/java/com/danish/jahez/BootReceiver.java << 'BEOF'
          package com.danish.jahez;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          public class BootReceiver extends BroadcastReceiver {
            @Override public void onReceive(Context ctx, Intent intent) {
              if (Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction())) {
                Intent svc = new Intent(ctx, AutoService.class);
                if (android.os.Build.VERSION.SDK_INT >= 26)
                  ctx.startForegroundService(svc);
                else
                  ctx.startService(svc);
              }
            }
          }
          BEOF

      - name: Write LogActivity
