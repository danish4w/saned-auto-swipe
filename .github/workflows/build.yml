name: Build Gufran Pro Slider Fixed
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Project Structure
        run: |
          mkdir -p app/src/main/java/com/danish/lsposed
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets

      - name: Create Build Files (FIXED)
        run: |
          echo "include ':app'" > settings.gradle
          
          # YEH HAI FIX: AndroidX ko enable karna zaroori hai
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { 
                  google(); mavenCentral()
                  maven { url 'https://api.xposed.info/' }
              }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.danish.lsposed'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.danish.lsposed'
                  minSdk 26
                  targetSdk 34
                  versionCode 4
                  versionName '3.1'
              }
          }
          dependencies {
              compileOnly 'de.robv.android.xposed:api:82'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: Create Slider UI & Logic
        run: |
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="jahez_red">#FF4B3A</color>
              <color name="dark_bg">#121212</color>
              <color name="text_white">#FFFFFF</color>
          </resources>
          EOF

          cat > app/src/main/res/layout/activity_settings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:padding="24dp" android:background="@color/dark_bg"
              android:focusable="true" android:focusableInTouchMode="true">
              
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" 
                  android:text="Gufran Click Slider" android:textColor="@color/jahez_red" 
                  android:textSize="26sp" android:textStyle="bold" android:layout_gravity="center"/>

              <View android:layout_width="match_parent" android:layout_height="1dp" 
                  android:background="#22FFFFFF" android:layout_marginVertical="20dp"/>

              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" 
                  android:text="Pickup Max (KM)" android:textColor="@color/text_white"/>
              <EditText android:id="@+id/et_pickup_max" android:layout_width="match_parent" 
                  android:layout_height="50dp" android:backgroundTint="@color/jahez_red" 
                  android:textColor="@color/text_white" android:inputType="numberDecimal" android:hint="5.0"/>

              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" 
                  android:text="Drop Max (KM)" android:textColor="@color/text_white" android:layout_marginTop="10dp"/>
              <EditText android:id="@+id/et_drop_max" android:layout_width="match_parent" 
                  android:layout_height="50dp" android:backgroundTint="@color/jahez_red" 
                  android:textColor="@color/text_white" android:inputType="numberDecimal" android:hint="10.0"/>

              <TextView android:id="@+id/tv_delay_label" android:layout_width="wrap_content" 
                  android:layout_height="wrap_content" android:text="System Delay: 800ms" 
                  android:textColor="@color/jahez_red" android:layout_marginTop="20dp" android:textStyle="bold"/>
              
              <SeekBar android:id="@+id/sb_delay" android:layout_width="match_parent" 
                  android:layout_height="wrap_content" android:layout_marginTop="10dp"
                  android:max="1100" android:progress="400"
                  android:thumbTint="@color/jahez_red" android:progressTint="@color/jahez_red"/>

              <Switch android:id="@+id/switch_enabled" android:layout_width="match_parent" 
                  android:layout_height="wrap_content" android:text="Auto Swipe Enable" 
                  android:textColor="@color/text_white" android:layout_marginTop="20dp"
                  android:thumbTint="@color/jahez_red"/>

              <Button android:id="@+id/btn_save" android:layout_width="match_parent" 
                  android:layout_height="60dp" android:text="SAVE SETTINGS" 
                  android:backgroundTint="@color/jahez_red" android:textColor="@color/text_white"
                  android:layout_marginTop="30dp" android:textStyle="bold"/>
          </LinearLayout>
          EOF

          cat > app/src/main/java/com/danish/lsposed/SettingsActivity.java << 'EOF'
          package com.danish.lsposed;
          import android.content.Context;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.SeekBar;
          import android.widget.Switch;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import java.io.File;

          public class SettingsActivity extends AppCompatActivity {
              private int currentDelay = 800;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_settings);
                  SharedPreferences p = getSharedPreferences("danish_prefs", Context.MODE_PRIVATE);
                  
                  EditText etP = findViewById(R.id.et_pickup_max);
                  EditText etD = findViewById(R.id.et_drop_max);
                  TextView tvDelay = findViewById(R.id.tv_delay_label);
                  SeekBar sbDelay = findViewById(R.id.sb_delay);
                  Switch s = findViewById(R.id.switch_enabled);
                  Button btn = findViewById(R.id.btn_save);

                  etP.setText(String.valueOf(p.getFloat("pickup_max", 5.0f)));
                  etD.setText(String.valueOf(p.getFloat("drop_max", 10.0f)));
                  currentDelay = p.getInt("system_delay", 800);
                  s.setChecked(p.getBoolean("enabled", false));
                  
                  sbDelay.setProgress(currentDelay - 400);
                  tvDelay.setText("System Delay: " + currentDelay + "ms");

                  sbDelay.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override public void onProgressChanged(SeekBar seekBar, int progress, boolean fromUser) {
                          currentDelay = progress + 400;
                          tvDelay.setText("System Delay: " + currentDelay + "ms");
                      }
                      @Override public void onStartTrackingTouch(SeekBar seekBar) {}
                      @Override public void onStopTrackingTouch(SeekBar seekBar) {}
                  });

                  btn.setOnClickListener(v -> {
                      p.edit().putFloat("pickup_max", Float.parseFloat(etP.getText().toString()))
                             .putFloat("drop_max", Float.parseFloat(etD.getText().toString()))
                             .putInt("system_delay", currentDelay)
                             .putBoolean("enabled", s.isChecked()).apply();
                      
                      File pf = new File(getFilesDir().getParent(), "shared_prefs/danish_prefs.xml");
                      if (pf.exists()) pf.setReadable(true, false);

                      etP.clearFocus(); etD.clearFocus();
                      InputMethodManager imm = (InputMethodManager)getSystemService(Context.INPUT_METHOD_SERVICE);
                      imm.hideSoftInputFromWindow(v.getWindowToken(), 0);
                      Toast.makeText(this, "Saved Successfully!", Toast.LENGTH_SHORT).show();
                  });
              }
          }
          EOF

          cat > app/src/main/java/com/danish/lsposed/MainHook.java << 'EOF'
          package com.danish.lsposed;
          import android.app.Activity;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.os.SystemClock;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.TextView;
          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XSharedPreferences;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          public class MainHook implements IXposedHookLoadPackage {
              private static XSharedPreferences xPrefs;
              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable {
                  if (!lpparam.packageName.equals("net.jahez.fleets")) return;
                  xPrefs = new XSharedPreferences("com.danish.lsposed", "danish_prefs");

                  XposedHelpers.findAndHookMethod("com.jahez.fleets.ui.order.OrderActivity", lpparam.classLoader, 
                      "onCreate", Bundle.class, new XC_MethodHook() {
                      @Override
                      protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                          xPrefs.reload();
                          if (!xPrefs.getBoolean("enabled", false)) return;
                          final Activity act = (Activity) param.thisObject;
                          int userDelay = xPrefs.getInt("system_delay", 800);
                          new Handler(Looper.getMainLooper()).postDelayed(() -> { processOrder(act); }, userDelay);
                      }
                  });
              }

              private void processOrder(Activity act) {
                  List<Float> kms = new ArrayList<>();
                  scanKm(act.getWindow().getDecorView(), kms);
                  if (kms.size() >= 2) {
                      float p = kms.get(0);
                      float d = kms.get(1);
                      if (p <= xPrefs.getFloat("pickup_max", 5.0f) && d <= xPrefs.getFloat("drop_max", 10.0f)) {
                          findAndSwipe(act.getWindow().getDecorView());
                      }
                  }
              }

              private void scanKm(View v, List<Float> found) {
                  if (v instanceof ViewGroup) {
                      for (int i = 0; i < ((ViewGroup) v).getChildCount(); i++) scanKm(((ViewGroup) v).getChildAt(i), found);
                  } else if (v instanceof TextView) {
                      String t = ((TextView) v).getText().toString();
                      Matcher m = Pattern.compile("(\\d+\\.?\\d*)").matcher(t);
                      if (t.contains("km") && m.find()) found.add(Float.parseFloat(m.group(1)));
                  }
              }

              private void findAndSwipe(View v) {
                  if (v instanceof ViewGroup) {
                      for (int i = 0; i < ((ViewGroup) v).getChildCount(); i++) {
                          View c = ((ViewGroup) v).getChildAt(i);
                          if (c instanceof TextView && ((TextView) c).getText().toString().equalsIgnoreCase("Accept")) {
                              doSwipe(c);
                              return;
                          }
                          findAndSwipe(c);
                      }
                  }
              }

              private void doSwipe(View v) {
                  int[] pos = new int[2];
                  v.getLocationOnScreen(pos);
                  float startX = pos[0] + (v.getWidth() * 0.15f);
                  float endX = pos[0] + (v.getWidth() * 0.85f);
                  float y = pos[1] + (v.getHeight() / 2f);
                  long time = SystemClock.uptimeMillis();
                  v.dispatchTouchEvent(MotionEvent.obtain(time, time, MotionEvent.ACTION_DOWN, startX, y, 0));
                  for (int i = 1; i <= 10; i++) {
                      v.dispatchTouchEvent(MotionEvent.obtain(time, SystemClock.uptimeMillis(), MotionEvent.ACTION_MOVE, startX + (endX - startX) * i / 10f, y, 0));
                  }
                  v.dispatchTouchEvent(MotionEvent.obtain(time, SystemClock.uptimeMillis(), MotionEvent.ACTION_UP, endX, y, 0));
              }
          }
          EOF

      - name: Create Manifest & Assets
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Gufran Slider Fixed" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <meta-data android:name="xposedmodule" android:value="true" />
                  <meta-data android:name="xposeddescription" android:value="Jahez Fixed AndroidX" />
                  <meta-data android:name="xposedminversion" android:value="82" />
                  <activity android:name=".SettingsActivity" android:exported="true" android:windowSoftInputMode="stateHidden">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          echo "com.danish.lsposed.MainHook" > app/src/main/assets/xposed_init

      - name: Build & Upload
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      - run: gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Gufran-Slider-Fixed-APK
          path: app/build/outputs/apk/debug/*.apk
