name: Build Gufran Slider V8 Final
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Xposed API jar
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/api-82.jar https://repo1.maven.org/maven2/de/robv/android/xposed/api/82/api-82.jar

      - name: Prepare project structure
        run: |
          mkdir -p app/src/main/java/com/danish/lsposed
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

      - name: Create Gradle wrapper
        run: |
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

      - name: Create build files
        run: |
          echo "include ':app'" > settings.gradle
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.danish.lsposed'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.danish.lsposed'
                  minSdk 26
                  targetSdk 34
                  versionCode 9
                  versionName '8.0'
              }
          }
          dependencies {
              compileOnly files('libs/api-82.jar')
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Create styles and colors
        run: |
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="jahez_red">#FF4B3A</color>
              <color name="dark_bg">#121212</color>
              <color name="text_white">#FFFFFF</color>
          </resources>
          EOF
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat.NoActionBar" parent="android:Theme.DeviceDefault">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowBackground">@color/dark_bg</item>
              </style>
          </resources>
          EOF

      - name: Create layout (default values 1.5 and 3.5)
        run: |
          cat > app/src/main/res/layout/activity_settings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="24dp"
              android:background="@color/dark_bg">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="Gufran Click V8" android:textColor="@color/jahez_red"
                  android:textSize="26sp" android:textStyle="bold" android:layout_gravity="center"/>
              <View android:layout_width="match_parent" android:layout_height="1dp"
                  android:background="#22FFFFFF" android:layout_marginVertical="20dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="Pickup Max (KM)" android:textColor="@color/text_white"/>
              <EditText android:id="@+id/et_pickup_max" android:layout_width="match_parent"
                  android:layout_height="50dp" android:backgroundTint="@color/jahez_red"
                  android:textColor="@color/text_white" android:inputType="numberDecimal" android:text="1.5"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="Drop Max (KM)" android:textColor="@color/text_white" android:layout_marginTop="10dp"/>
              <EditText android:id="@+id/et_drop_max" android:layout_width="match_parent"
                  android:layout_height="50dp" android:backgroundTint="@color/jahez_red"
                  android:textColor="@color/text_white" android:inputType="numberDecimal" android:text="3.5"/>
              <TextView android:id="@+id/tv_delay_label" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="Delay: 800ms"
                  android:textColor="@color/jahez_red" android:layout_marginTop="20dp" android:textStyle="bold"/>
              <SeekBar android:id="@+id/sb_delay" android:layout_width="match_parent"
                  android:layout_height="wrap_content" android:layout_marginTop="10dp"
                  android:max="1100" android:progress="400"/>
              <Switch android:id="@+id/switch_enabled" android:layout_width="match_parent"
                  android:layout_height="wrap_content" android:text="Module Enable"
                  android:textColor="@color/text_white" android:layout_marginTop="20dp"/>
              <Button android:id="@+id/btn_save" android:layout_width="match_parent"
                  android:layout_height="60dp" android:text="SAVE AND APPLY"
                  android:backgroundTint="@color/jahez_red" android:textColor="@color/text_white"
                  android:layout_marginTop="30dp" android:textStyle="bold"/>
          </LinearLayout>
          EOF

      - name: Create SettingsActivity (defaults 1.5, 3.5)
        run: |
          cat > app/src/main/java/com/danish/lsposed/SettingsActivity.java << 'EOF'
          package com.danish.lsposed;
          import android.content.Context;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.SeekBar;
          import android.widget.Switch;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class SettingsActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_settings);
                  SharedPreferences p = getSharedPreferences("danish_prefs", Context.MODE_PRIVATE);
                  EditText etP = findViewById(R.id.et_pickup_max);
                  EditText etD = findViewById(R.id.et_drop_max);
                  TextView tvDelay = findViewById(R.id.tv_delay_label);
                  SeekBar sb = findViewById(R.id.sb_delay);
                  Switch sw = findViewById(R.id.switch_enabled);
                  Button btn = findViewById(R.id.btn_save);

                  // Default 1.5 and 3.5
                  etP.setText(String.valueOf(p.getFloat("pickup_max", 1.5f)));
                  etD.setText(String.valueOf(p.getFloat("drop_max", 3.5f)));
                  int d = p.getInt("system_delay", 800);
                  sb.setProgress(d - 400);
                  tvDelay.setText("Delay: " + d + "ms");
                  sw.setChecked(p.getBoolean("enabled", false));

                  sb.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override public void onProgressChanged(SeekBar seekBar, int progress, boolean fromUser) {
                          tvDelay.setText("Delay: " + (progress + 400) + "ms");
                      }
                      @Override public void onStartTrackingTouch(SeekBar seekBar) {}
                      @Override public void onStopTrackingTouch(SeekBar seekBar) {}
                  });

                  btn.setOnClickListener(v -> {
                      float pickup, drop;
                      try { pickup = Float.parseFloat(etP.getText().toString()); } catch(Exception e) { pickup = 1.5f; }
                      try { drop = Float.parseFloat(etD.getText().toString()); } catch(Exception e) { drop = 3.5f; }
                      p.edit()
                          .putFloat("pickup_max", pickup)
                          .putFloat("drop_max", drop)
                          .putInt("system_delay", sb.getProgress() + 400)
                          .putBoolean("enabled", sw.isChecked())
                          .apply();
                      InputMethodManager imm = (InputMethodManager) getSystemService(Context.INPUT_METHOD_SERVICE);
                      imm.hideSoftInputFromWindow(v.getWindowToken(), 0);
                      Toast.makeText(this, "Saved!", Toast.LENGTH_SHORT).show();
                  });
              }
          }
          EOF

      - name: Create Manifest and xposed_init
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Gufran Slider V8"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <meta-data android:name="xposedmodule" android:value="true" />
                  <meta-data android:name="xposeddescription" android:value="Gufran Auto Click V8 - Default 1.5/3.5" />
                  <meta-data android:name="xposedminversion" android:value="82" />
                  <activity android:name=".SettingsActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          echo "com.danish.lsposed.MainHook" > app/src/main/assets/xposed_init

      - name: Create MainHook (with default 1.5, 3.5 for safety)
        run: |
          cat > app/src/main/java/com/danish/lsposed/MainHook.java << 'EOF'
          package com.danish.lsposed;

          import android.app.Activity;
          import android.content.Context;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.os.SystemClock;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.TextView;

          import java.lang.reflect.Method;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;

          public class MainHook implements de.robv.android.xposed.IXposedHookLoadPackage {
              private static final String TAG = "GufranV8";
              private static SharedPreferences prefs;

              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable {
                  if (!lpparam.packageName.equals("net.jahez.fleets")) return;
                  XposedBridge.log(TAG + " ===== HOOKED INTO JAHEZ DRIVER =====");

                  Class<?> orderActivity = XposedHelpers.findClass("com.jahez.fleets.ui.order.OrderActivity", lpparam.classLoader);
                  XposedHelpers.findAndHookMethod(orderActivity, "onCreate", Bundle.class, new XC_MethodHook() {
                      @Override
                      protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                          Activity act = (Activity) param.thisObject;
                          prefs = act.getSharedPreferences("danish_prefs", Context.MODE_PRIVATE);
                          if (!prefs.getBoolean("enabled", false)) {
                              XposedBridge.log(TAG + " Module is disabled in settings");
                              return;
                          }
                          int delay = prefs.getInt("system_delay", 800);
                          XposedBridge.log(TAG + " Order screen detected! Will process in " + delay + "ms");
                          new Handler(Looper.getMainLooper()).postDelayed(() -> {
                              XposedBridge.log(TAG + " Starting order processing...");
                              processOrder(act);
                          }, delay);
                      }
                  });
              }

              private void processOrder(Activity act) {
                  try {
                      XposedBridge.log(TAG + " Scanning screen for distances...");
                      List<Float> distances = new ArrayList<>();
                      scanKm(act.getWindow().getDecorView(), distances);
                      XposedBridge.log(TAG + " Distances found: " + distances.toString());

                      if (distances.size() < 2) {
                          XposedBridge.log(TAG + " Not enough distances (need at least 2)");
                          return;
                      }
                      float pickup = distances.get(0);
                      float drop = distances.get(1);
                      float pickupMax = prefs.getFloat("pickup_max", 1.5f);
                      float dropMax = prefs.getFloat("drop_max", 3.5f);
                      XposedBridge.log(TAG + " Pickup: " + pickup + " km, Drop: " + drop + " km");
                      XposedBridge.log(TAG + " Limits: Pickup ≤ " + pickupMax + " AND Drop ≤ " + dropMax);

                      if (pickup <= pickupMax && drop <= dropMax) {
                          XposedBridge.log(TAG + " ✅ Order within limits! Attempting to accept...");
                          performSwipeOnAccept(act.getWindow().getDecorView());
                      } else {
                          XposedBridge.log(TAG + " ❌ Order rejected: distances out of range");
                      }
                  } catch (Exception e) {
                      XposedBridge.log(TAG + " Error in processOrder: " + e.getMessage());
                  }
              }

              private void scanKm(View v, List<Float> out) {
                  if (v == null) return;
                  if (v instanceof TextView) {
                      String text = ((TextView) v).getText().toString().toLowerCase();
                      if (text.contains("km")) {
                          Matcher m = Pattern.compile("(\\d+\\.?\\d*)").matcher(text);
                          if (m.find()) {
                              try {
                                  float val = Float.parseFloat(m.group(1));
                                  if (val > 0 && val < 100 && !out.contains(val)) {
                                      out.add(val);
                                      XposedBridge.log(TAG + " Found distance: " + val + " in text: " + text);
                                  }
                              } catch (Exception e) {}
                          }
                      }
                  } else if (v instanceof ViewGroup) {
                      ViewGroup g = (ViewGroup) v;
                      for (int i = 0; i < g.getChildCount(); i++) {
                          scanKm(g.getChildAt(i), out);
                      }
                  }
              }

              private void performSwipeOnAccept(View root) {
                  View acceptBtn = findAcceptButton(root);
                  if (acceptBtn == null) {
                      XposedBridge.log(TAG + " ❌ Accept button not found");
                      return;
                  }
                  XposedBridge.log(TAG + " ✅ Accept button found!");
                  int[] loc = new int[2];
                  acceptBtn.getLocationOnScreen(loc);
                  int startX = loc[0] + acceptBtn.getWidth() / 5;
                  int endX = loc[0] + acceptBtn.getWidth() * 4 / 5;
                  int y = loc[1] + acceptBtn.getHeight() / 2;
                  XposedBridge.log(TAG + " Swipe coordinates: start(" + startX + "," + y + ") -> end(" + endX + "," + y + ")");
                  injectSwipe(startX, y, endX, y, 300);
              }

              private View findAcceptButton(View v) {
                  if (v instanceof TextView) {
                      String text = ((TextView) v).getText().toString();
                      if (text.equalsIgnoreCase("Accept") || text.equals("قبول")) {
                          XposedBridge.log(TAG + " Found accept button text: " + text);
                          return v;
                      }
                  }
                  if (v instanceof ViewGroup) {
                      ViewGroup g = (ViewGroup) v;
                      for (int i = 0; i < g.getChildCount(); i++) {
                          View found = findAcceptButton(g.getChildAt(i));
                          if (found != null) return found;
                      }
                  }
                  return null;
              }

              private void injectSwipe(int x1, int y1, int x2, int y2, int duration) {
                  try {
                      Class<?> inputManagerClass = Class.forName("android.hardware.input.InputManager");
                      Method getInstance = inputManagerClass.getMethod("getInstance");
                      Object inputManager = getInstance.invoke(null);
                      Method injectInputEvent = inputManagerClass.getMethod("injectInputEvent", MotionEvent.class, int.class);

                      long downTime = SystemClock.uptimeMillis();
                      MotionEvent down = MotionEvent.obtain(downTime, downTime, MotionEvent.ACTION_DOWN, x1, y1, 0);
                      injectInputEvent.invoke(inputManager, down, 0);
                      down.recycle();

                      long moveTime = downTime + duration / 2;
                      MotionEvent move = MotionEvent.obtain(downTime, moveTime, MotionEvent.ACTION_MOVE, x2, y2, 0);
                      injectInputEvent.invoke(inputManager, move, 0);
                      move.recycle();

                      long upTime = downTime + duration;
                      MotionEvent up = MotionEvent.obtain(downTime, upTime, MotionEvent.ACTION_UP, x2, y2, 0);
                      injectInputEvent.invoke(inputManager, up, 0);
                      up.recycle();

                      XposedBridge.log(TAG + " ✅ Swipe event injected successfully");
                  } catch (Exception e) {
                      XposedBridge.log(TAG + " ❌ Swipe injection failed: " + e.getMessage());
                  }
              }
          }
          EOF

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gufran-Slider-V8-Final
          path: app/build/outputs/apk/debug/*.apk
