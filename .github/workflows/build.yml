          cat > app/src/main/java/com/auto/driver/MainActivity.java << 'EOF'
          package com.auto.driver;
          import android.app.Activity; import android.content.BroadcastReceiver; import android.content.Context;
          import android.content.Intent; import android.content.IntentFilter; import android.content.SharedPreferences;
          import android.os.Build; import android.os.Bundle; import android.view.inputmethod.InputMethodManager; import android.widget.*;
          public class MainActivity extends Activity {
            SharedPreferences prefs; Switch swEnable; TextView tvStatus;
            final BroadcastReceiver sr = new BroadcastReceiver() {
              @Override public void onReceive(Context ctx, Intent intent) {
                if (swEnable != null) swEnable.setChecked("JAHEZ_AUTO_ON".equals(intent.getAction())); refreshStatus();
              }
            };
            @Override protected void onCreate(Bundle saved) {
              super.onCreate(saved); setContentView(R.layout.activity_main);
              prefs = getSharedPreferences("cfg", MODE_PRIVATE);
              EditText etPickup = findViewById(R.id.et_pickup); EditText etDrop = findViewById(R.id.et_drop);
              SeekBar sbDelay = findViewById(R.id.sb_delay); TextView tvDelay = findViewById(R.id.tv_delay);
              swEnable = findViewById(R.id.sw_enable); tvStatus = findViewById(R.id.tv_status);
              etPickup.setText(String.valueOf(prefs.getFloat("max_pickup", 2.0f)));
              etDrop.setText(String.valueOf(prefs.getFloat("max_drop", 5.0f)));
              int sd = prefs.getInt("scan_delay", 500); sbDelay.setProgress(sd-50); tvDelay.setText(sd+"ms");
              sbDelay.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                public void onProgressChanged(SeekBar sb, int p, boolean u) { tvDelay.setText((p+50)+"ms"); }
                public void onStartTrackingTouch(SeekBar sb) {}
                public void onStopTrackingTouch(SeekBar sb) { prefs.edit().putInt("scan_delay", sb.getProgress()+50).apply(); }
              });
              swEnable.setChecked(prefs.getBoolean("enabled", false));
              if (Build.VERSION.SDK_INT >= 33) requestPermissions(new String[]{"android.permission.POST_NOTIFICATIONS"}, 0);
              requestPermissions(new String[]{"android.permission.ACCESS_FINE_LOCATION","android.permission.ACCESS_COARSE_LOCATION"}, 1);
              IntentFilter f = new IntentFilter("JAHEZ_AUTO_OFF"); f.addAction("JAHEZ_AUTO_ON");
              if (Build.VERSION.SDK_INT >= 33) registerReceiver(sr, f, Context.RECEIVER_NOT_EXPORTED); else registerReceiver(sr, f);
              swEnable.setOnCheckedChangeListener((btn, checked) -> { prefs.edit().putBoolean("enabled", checked).apply(); sendBroadcast(new Intent("JAHEZ_STATE_CHANGED")); refreshStatus(); });
              ((Button)findViewById(R.id.btn_save)).setOnClickListener(v -> {
                float pk = parseF(etPickup.getText().toString(), 2f); float dk = parseF(etDrop.getText().toString(), 5f);
                prefs.edit().putFloat("max_pickup", pk).putFloat("max_drop", dk).apply();
                Toast.makeText(this, "Saved Settings!", Toast.LENGTH_LONG).show();
                InputMethodManager imm = (InputMethodManager) getSystemService(INPUT_METHOD_SERVICE);
                if (imm != null) imm.hideSoftInputFromWindow(getWindow().getDecorView().getWindowToken(), 0);
              });
              ((Button)findViewById(R.id.btn_logs)).setOnClickListener(v -> startActivity(new Intent(this, LogActivity.class)));
              
              // Explicitly call su once at main app launch to prompt user for root grant popup
              new Thread(() -> {
                  try { Runtime.getRuntime().exec(new String[]{"su", "-c", "echo 'Root Initialized'"}); } catch(Exception ignored){}
              }).start();

              Intent svc = new Intent(this, AutoService.class);
              if (Build.VERSION.SDK_INT >= 26) startForegroundService(svc); else startService(svc);
            }
            @Override protected void onResume()  { super.onResume();  refreshStatus(); }
            @Override protected void onDestroy() { super.onDestroy(); try { unregisterReceiver(sr); } catch (Exception ignored) {} }
            void refreshStatus() {
              if (tvStatus == null) return;
              boolean en = prefs.getBoolean("enabled", false);
              tvStatus.setText(en ? "AUTO ACCEPT: ON" : "AUTO ACCEPT: OFF");
              tvStatus.setTextColor(en ? 0xFF4CAF50 : 0xFFFF5555);
            }
            float parseF(String s, float def) { try { return Float.parseFloat(s.trim()); } catch (Exception e) { return def; } }
          }
          EOF

