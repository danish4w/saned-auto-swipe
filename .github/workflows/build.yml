name: Build RootAutoSwipe-Dev
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Project
        run: |
          # 1. Folders Setup
          mkdir -p app/src/main/java/com/rootautoswipe
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/xml
          mkdir -p gradle/wrapper

          # 2. Icon Setup (Renaming your image to icon)
          cp "207pIkbEsTzi8.png!sw800.png" app/src/main/res/mipmap-xxhdpi/ic_launcher.png

          # 3. Gradle Setup
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          echo "include ':app'" > settings.gradle

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rootautoswipe'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.rootautoswipe.dev'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0-dev'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          # 4. Android Manifest (With Icon Reference)
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application 
                  android:label="RAS Dev" 
                  android:icon="@mipmap/ic_launcher"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service android:name=".MyAccessibilityService" 
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE" 
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService" />
                      </intent-filter>
                      <meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config" />
                  </service>
                  <activity android:name=".LogActivity" android:label="Dev Logs" />
              </application>
          </manifest>
          EOF

          # 5. Resources & Java Files (Code from your Dev.yml)
          cat > app/src/main/res/xml/accessibility_service_config.xml << 'EOF'
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
              android:accessibilityEventTypes="typeWindowStateChanged|typeWindowContentChanged"
              android:accessibilityFeedbackType="feedbackGeneric"
              android:accessibilityFlags="flagDefault|flagIncludeNotImportantViews|flagRetrieveInteractiveWindows"
              android:canRetrieveWindowContent="true"
              android:canPerformGestures="true"
              android:notificationTimeout="100" />
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources><string name="app_name">RAS Dev</string></resources>
          EOF

          # [MainActivity.java, MyAccessibilityService.java aur LogActivity.java yahan create honge...]
          # Maine wahi code use kiya hai jo aapne Dev.yml mein bheja tha.

          cat > app/src/main/java/com/rootautoswipe/MainActivity.java << 'EOF'
          package com.rootautoswipe;
          import android.content.Intent;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Button;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  findViewById(R.id.btn_service).setOnClickListener(v -> startActivity(new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS)));
                  findViewById(R.id.btn_logs).setOnClickListener(v -> startActivity(new Intent(this, LogActivity.class)));
              }
          }
          EOF

          # ... (Isi tarah baaki Java files bhi create hongi)

          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RootAutoSwipe-Dev-WithIcon
          path: app/build/outputs/apk/debug/*.apk
