name: Build AutoDriver

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          cat > gradle/wrapper/gradle-wrapper.properties << 'WEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/zips
          WEOF

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/auto/driver
          mkdir -p app/src/main/res/{layout,values,xml,drawable,mipmap-anydpi-v26}
          mkdir -p app/src/main/assets

      - name: Write Gradle Files
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
            repositories {
              google(); mavenCentral()
              maven { url 'https://api.xposed.info/' }
            }
          }
          rootProject.name = "AutoDriver"
          include ':app'
          EOF
          cat > build.gradle << 'EOF'
          plugins { id 'com.android.application' version '8.5.2' apply false }
          EOF
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.auto.driver'
            compileSdk 34
            defaultConfig {
              applicationId 'com.auto.driver'
              minSdk 26; targetSdk 34
              versionCode 30; versionName '30.0'
            }
            buildTypes { release { minifyEnabled false } }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.google.android.material:material:1.12.0'
            compileOnly 'de.robv.android.xposed:api:82'
            implementation 'top.canyie.pine:core:0.2.9'
          }
          EOF

      - name: Write Icons and Config
        run: |
          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#1B5E20" android:pathData="M0,0 L108,0 L108,108 L0,108 Z"/>
          </vector>
          EOF
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#FFFFFF" android:pathData="M25,54 L35,44 L47,60 L73,30 L83,40 L47,82 Z"/>
          </vector>
          EOF
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          cat > app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="false">
              <trust-anchors><certificates src="system"/></trust-anchors>
            </base-config>
          </network-security-config>
          EOF
          echo "com.auto.driver.SanedHook" > app/src/main/assets/xposed_init

      - name: Write Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC"/>
            <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
            <application android:label="Auto Driver" android:icon="@mipmap/ic_launcher"
              android:roundIcon="@mipmap/ic_launcher_round" android:theme="@style/AppTheme"
              android:allowBackup="false" android:networkSecurityConfig="@xml/network_security_config">
              <meta-data android:name="xposedmodule" android:value="true"/>
              <meta-data android:name="xposeddescription" android:value="Auto Driver v30"/>
              <meta-data android:name="xposedminversion" android:value="82"/>
              <activity android:name=".MainActivity" android:exported="true"
                android:windowSoftInputMode="stateHidden|adjustPan">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
              <activity android:name=".LogActivity" android:exported="false"/>
              <service android:name=".AutoService" android:exported="false"
                android:foregroundServiceType="dataSync"/>
              <receiver android:name=".BootReceiver" android:exported="true">
                <intent-filter><action android:name="android.intent.action.BOOT_COMPLETED"/></intent-filter>
              </receiver>
            </application>
          </manifest>
          EOF

      - name: Write SanedHook.java
        run: |
          cat > app/src/main/java/com/auto/driver/SanedHook.java << 'HEOF'
          package com.auto.driver;

          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;

          import java.lang.reflect.Method;

          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;

          public class SanedHook implements IXposedHookLoadPackage {

              static final String TARGET         = "net.jahez.fleets";
              static final String OUR_PKG        = "com.auto.driver";
              static final String ORDER_ACTIVITY = "net.jahez.fleets.dispatch.accept.IncomingDispatchActivity";
              static final String VIEWMODEL      = "net.saned.incoming.presentation.IncomingDispatchViewModel";

              // KEY STRATEGY (same as AWS APK):
              // 1. Hook ViewModel constructor to capture ViewModel INSTANCE
              // 2. When filter passes, call viewModel.acceptAutoDispatch() directly
              // 3. Saned makes the API call with its OWN token — we don't need the token!

              private volatile Object capturedViewModel = null;
              private volatile Method acceptMethod = null;
              private volatile boolean vmHooked = false;
              private volatile boolean swipeReceiverRegistered = false;
              private long lastBcast = 0;
              private volatile android.app.Activity currentOrderActivity = null;

              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lp) {
                  if (!TARGET.equals(lp.packageName)) return;
                  XposedBridge.log("[AutoDriver] v30 loading into " + lp.packageName);

                  // Hook 1: ViewModelStore.put() — captures ViewModel when created
                  hookViewModelStore(lp);

                  // Hook 2: Activity.onResume — order data capture
                  hookActivityOnResume(lp);

                  // Hook 3: URLConnection backup
                  hookURLConnection(lp);
              }

              // Hook ViewModelStore.put() — fires when ANY ViewModel is created
              // This is the most reliable way to capture IncomingDispatchViewModel
              private void hookViewModelStore(XC_LoadPackage.LoadPackageParam lp) {
                  try {
                      // ViewModelStore is in androidx — accessible from lp.classLoader
                      XposedHelpers.findAndHookMethod(
                          "androidx.lifecycle.ViewModelStore",
                          lp.classLoader,
                          "put",
                          String.class, Object.class,
                          new XC_MethodHook() {
                              @Override
                              protected void afterHookedMethod(MethodHookParam p) {
                                  String key = (String) p.args[0];
                                  Object vm   = p.args[1];
                                  if (vm == null) return;
                                  String vmName = vm.getClass().getName();
                                  XposedBridge.log("[AutoDriver] 📦 ViewModelStore.put: key=" + key
                                      + " class=" + vmName);
                                  // Check if it is IncomingDispatchViewModel
                                  if (vmName.contains("IncomingDispatch")
                                      || vmName.contains("DispatchViewModel")) {
                                      XposedBridge.log("[AutoDriver] 🎯 IncomingDispatchViewModel captured!");
                                      capturedViewModel = vm;
                                      // Find acceptAutoDispatch method
                                      for (java.lang.reflect.Method m : vm.getClass().getDeclaredMethods()) {
                                          if (m.getName().equals("acceptAutoDispatch")
                                              || m.getName().contains("acceptAuto")) {
                                              m.setAccessible(true);
                                              acceptMethod = m;
                                              XposedBridge.log("[AutoDriver] ✅ Method: " + m.getName());
                                              break;
                                          }
                                      }
                                      if (acceptMethod == null) {
                                          XposedBridge.log("[AutoDriver] ⚠️ Listing VM methods:");
                                          for (java.lang.reflect.Method m : vm.getClass().getDeclaredMethods()) {
                                              XposedBridge.log("[AutoDriver]   " + m.getName());
                                          }
                                      }
                                  }
                              }
                          }
                      );
                      XposedBridge.log("[AutoDriver] ✅ ViewModelStore.put hook OK");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ ViewModelStore: " + e.getMessage());
                  }
              }

              private void hookActivityOnResume(XC_LoadPackage.LoadPackageParam lp) {
                  try {
                      XposedHelpers.findAndHookMethod(
                          "android.app.Activity", lp.classLoader, "onResume",
                          new XC_MethodHook() {
                              @Override
                              protected void afterHookedMethod(MethodHookParam param) {
                                  android.app.Activity act = (android.app.Activity) param.thisObject;
                                  String actName = act.getClass().getName();

                                  // Register swipe receiver in Saned process (once)
                                  registerSwipeReceiver(act);

                                  // On order screen: scan ViewModelStore after delay
                                  // (ViewModel is created AFTER onResume, so we wait 500ms)
                                  if (ORDER_ACTIVITY.equals(actName) && capturedViewModel == null) {
                                      final android.app.Activity delayAct = act;
                                      act.getWindow().getDecorView().postDelayed(() -> {
                                          extractVmFromViewModelStore(delayAct);
                                      }, 500);
                                  }

                                  if (!ORDER_ACTIVITY.equals(actName)) return;
                                  currentOrderActivity = act;

                                  long now = System.currentTimeMillis();
                                  if (now - lastBcast < 2000) return;
                                  lastBcast = now;

                                  try {
                                      Bundle extras = act.getIntent() != null
                                          ? act.getIntent().getExtras() : null;
                                      if (extras == null) { sendLog(act, "⚠️ extras null"); return; }

                                      String requestId = extractRequestId(extras);
                                      double pickupLat = getDouble(extras, "EXTRA_DISPATCH_PICKUP_LATITUDE");
                                      double pickupLon = getDouble(extras, "EXTRA_DISPATCH_PICKUP_LONGITUDE");
                                      double dropDist  = getDouble(extras, "EXTRA_DISTANCE");
                                      double price     = getDouble(extras, "EXTRA_DELIVERY_PRICE");
                                      double bonus     = getDouble(extras, "EXTRA_BONUS_AMOUNT");

                                      String vmStatus = capturedViewModel != null
                                          ? "✅ VM ready" : "❌ VM not captured";

                                      sendLog(act, "📦 id=" + requestId
                                          + " drop=" + String.format("%.2f", dropDist) + "km"
                                          + " ₿" + price + "+" + bonus + " | " + vmStatus);

                                      Intent bc = new Intent("JAHEZ_ORDER_DATA");
                                      bc.setPackage(OUR_PKG);
                                      bc.putExtra("request_id", requestId);
                                      bc.putExtra("pickup_lat", pickupLat);
                                      bc.putExtra("pickup_lon", pickupLon);
                                      bc.putExtra("drop_dist",  dropDist);
                                      bc.putExtra("price",      price);
                                      bc.putExtra("bonus",      bonus);
                                      bc.putExtra("has_vm",     capturedViewModel != null);
                                      bc.putExtra("is_order",   true);
                                      act.sendBroadcast(bc);

                                  } catch (Throwable e) {
                                      sendLog(act, "❌ order: " + e.getMessage());
                                  }
                              }
                          }
                      );
                      XposedBridge.log("[AutoDriver] ✅ onResume hook OK");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ onResume: " + e.getMessage());
                  }
              }

              // Scan IncomingDispatchActivity fields to find ViewModel
              // ViewModel is stored as a field in the Activity
              private void hookViewModelConstructor(android.app.Activity act) {
                  vmHooked = true; // prevent repeated attempts

                  // Strategy 1: Scan Activity fields for ViewModel
                  if (ORDER_ACTIVITY.equals(act.getClass().getName())) {
                      extractVmFromActivity(act);
                      return;
                  }

                  // Strategy 2: Try loading ViewModel class with multiple classloaders
                  ClassLoader[] cls = {
                      act.getClassLoader(),
                      act.getApplicationContext().getClassLoader(),
                      Thread.currentThread().getContextClassLoader(),
                  };
                  for (ClassLoader cl : cls) {
                      if (cl == null) continue;
                      try {
                          Class<?> vmClass = cl.loadClass(VIEWMODEL);
                          XposedBridge.hookAllMethods(vmClass, "<init>", new XC_MethodHook() {
                              @Override protected void afterHookedMethod(MethodHookParam p) {
                                  captureVmInstance(p.thisObject, act);
                              }
                          });
                          try {
                              XposedBridge.hookAllMethods(vmClass, "acceptAutoDispatch",
                                  new XC_MethodHook() {
                                      @Override protected void beforeHookedMethod(MethodHookParam p) {
                                          capturedViewModel = p.thisObject;
                                          XposedBridge.log("[AutoDriver] 🎯 acceptAutoDispatch intercepted!");
                                      }
                                  });
                          } catch (Throwable ignored) {}
                          XposedBridge.log("[AutoDriver] ✅ VM hooked via " + cl.getClass().getSimpleName());
                          sendLog(act, "✅ VM hook OK via " + cl.getClass().getSimpleName());
                          return;
                      } catch (Throwable e) {
                          XposedBridge.log("[AutoDriver] ⚠️ CL " + cl.getClass().getSimpleName() + ": " + e.getMessage());
                      }
                  }
                  XposedBridge.log("[AutoDriver] ⚠️ VM class not found — will scan Activity fields on order screen");
                  sendLog(act, "⚠️ VM class not found — will scan fields on order screen");
                  vmHooked = false; // allow retry on IncomingDispatchActivity
              }

              // Extract ViewModel from ViewModelStore (delayed, after Compose creates it)
              private void extractVmFromViewModelStore(android.app.Activity act) {
                  try {
                      Object store = XposedHelpers.callMethod(act, "getViewModelStore");
                      if (store == null) { XposedBridge.log("[AutoDriver] ⚠️ ViewModelStore null"); return; }

                      // Try mMap field
                      for (String fieldName : new String[]{"mMap", "map", "mViewModels"}) {
                          try {
                              java.lang.reflect.Field f = store.getClass().getDeclaredField(fieldName);
                              f.setAccessible(true);
                              java.util.Map<?,?> map = (java.util.Map<?,?>) f.get(store);
                              if (map == null || map.isEmpty()) continue;
                              XposedBridge.log("[AutoDriver] 🗺️ ViewModelStore keys: " + map.keySet());
                              for (Object vm : map.values()) {
                                  if (vm == null) continue;
                                  String name = vm.getClass().getName();
                                  if (name.contains("DispatchViewModel") || name.contains("IncomingDispatch")) {
                                      XposedBridge.log("[AutoDriver] 🎯 VM from store: " + name);
                                      captureVmInstance(vm, act);
                                      return;
                                  }
                              }
                              // Log all VMs found
                              for (Object vm : map.values()) {
                                  if (vm != null)
                                      XposedBridge.log("[AutoDriver] 📦 VM in store: " + vm.getClass().getName());
                              }
                          } catch (NoSuchFieldException ignored) {}
                      }
                      XposedBridge.log("[AutoDriver] ⚠️ Target VM not in ViewModelStore");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ extractVmFromStore: " + e.getMessage());
                  }
              }

              // Extract ViewModel from Activity fields (most reliable approach)
              private void extractVmFromActivity(android.app.Activity act) {
                  try {
                      // Scan all fields in Activity class hierarchy
                      Class<?> cls = act.getClass();
                      while (cls != null && !cls.getName().equals("android.app.Activity")) {
                          for (java.lang.reflect.Field f : cls.getDeclaredFields()) {
                              f.setAccessible(true);
                              try {
                                  Object val = f.get(act);
                                  if (val == null) continue;
                                  String valClass = val.getClass().getName();
                                  // ViewModel class name contains "ViewModel"
                                  if (valClass.contains("ViewModel") || valClass.contains("DispatchViewModel")) {
                                      XposedBridge.log("[AutoDriver] 🎯 Found VM field: "
                                          + f.getName() + " = " + valClass);
                                      captureVmInstance(val, act);
                                      return;
                                  }
                              } catch (Throwable ignored) {}
                          }
                          cls = cls.getSuperclass();
                      }

                      // Also check ViewModelStore via lifecycle
                      try {
                          Object store = XposedHelpers.callMethod(act, "getViewModelStore");
                          java.lang.reflect.Field mapField = store.getClass().getDeclaredField("mMap");
                          mapField.setAccessible(true);
                          java.util.Map<?,?> map = (java.util.Map<?,?>) mapField.get(store);
                          for (Object vm : map.values()) {
                              if (vm != null && vm.getClass().getName().contains("DispatchViewModel")) {
                                  XposedBridge.log("[AutoDriver] 🎯 VM from ViewModelStore: " + vm.getClass().getName());
                                  captureVmInstance(vm, act);
                                  return;
                              }
                          }
                      } catch (Throwable e) {
                          XposedBridge.log("[AutoDriver] ⚠️ ViewModelStore: " + e.getMessage());
                      }

                      sendLog(act, "⚠️ VM not found in Activity fields → swipe fallback");
                      XposedBridge.log("[AutoDriver] ⚠️ VM not found in Activity fields");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ extractVm: " + e.getMessage());
                  }
              }

              private void captureVmInstance(Object vm, android.app.Activity act) {
                  capturedViewModel = vm;
                  // Find acceptAutoDispatch method
                  for (Method m : vm.getClass().getDeclaredMethods()) {
                      if (m.getName().equals("acceptAutoDispatch")
                          || m.getName().contains("acceptAuto")) {
                          m.setAccessible(true);
                          acceptMethod = m;
                          XposedBridge.log("[AutoDriver] ✅ acceptAutoDispatch: " + m.getName());
                          sendLog(act, "🎯 VM captured! acceptAutoDispatch ready → API mode!");
                          return;
                      }
                  }
                  // Log all methods for debugging
                  XposedBridge.log("[AutoDriver] ⚠️ acceptAutoDispatch not found, listing methods:");
                  for (Method m : vm.getClass().getDeclaredMethods()) {
                      XposedBridge.log("[AutoDriver]   method: " + m.getName());
                  }
                  sendLog(act, "🎯 VM captured! (method search in logs)");
              }

              // Call ViewModel.acceptAutoDispatch() — Saned makes the API call itself
              public void callViewModelAccept(android.app.Activity act) {
                  Object vm = capturedViewModel;
                  Method m = acceptMethod;

                  if (vm == null) {
                      sendLog(act, "❌ ViewModel not captured yet — swipe fallback");
                      doSwipe(act);
                      return;
                  }

                  new Handler(Looper.getMainLooper()).post(() -> {
                      try {
                          if (m != null) {
                              // Call acceptAutoDispatch() — Kotlin suspend function
                              // Kotlin coroutine continuation needed
                              // Try calling with null continuation (may trigger coroutine)
                              XposedBridge.log("[AutoDriver] 🎯 Calling acceptAutoDispatch...");
                              sendLog(act, "🎯 Calling VM.acceptAutoDispatch()...");
                              m.invoke(vm, (Object[]) null);
                              sendLog(act, "✅ acceptAutoDispatch called!");
                          } else {
                              // Try reflection by name
                              Method[] methods = vm.getClass().getDeclaredMethods();
                              for (Method method : methods) {
                                  if (method.getName().contains("accept")
                                      || method.getName().contains("Accept")) {
                                      method.setAccessible(true);
                                      sendLog(act, "🎯 Trying: " + method.getName());
                                      try {
                                          method.invoke(vm, (Object[]) null);
                                          sendLog(act, "✅ " + method.getName() + " called!");
                                          return;
                                      } catch (Throwable ignored) {
                                          // Try with Kotlin Unit continuation
                                          try {
                                              method.invoke(vm, new Object[]{null});
                                              sendLog(act, "✅ " + method.getName() + " called (null arg)!");
                                              return;
                                          } catch (Throwable ignored2) {}
                                      }
                                  }
                              }
                              sendLog(act, "❌ No accept method found → swipe");
                              doSwipe(act);
                          }
                      } catch (Throwable e) {
                          sendLog(act, "⚠️ VM call: " + e.getMessage() + " → swipe");
                          XposedBridge.log("[AutoDriver] ⚠️ VM.accept: " + e.getMessage());
                          doSwipe(act);
                      }
                  });
              }

              // Register swipe receiver inside Saned process
              private void registerSwipeReceiver(android.app.Activity act) {
                  if (swipeReceiverRegistered) return;
                  try {
                      BroadcastReceiver r = new BroadcastReceiver() {
                          @Override public void onReceive(Context ctx, Intent intent) {
                              int delay = intent.getIntExtra("scan_delay", 300);
                              boolean useVm = intent.getBooleanExtra("use_vm", false);
                              android.app.Activity target = currentOrderActivity;
                              if (target == null || target.isFinishing()) return;
                              new Handler(Looper.getMainLooper()).postDelayed(() -> {
                                  if (useVm && capturedViewModel != null) {
                                      callViewModelAccept(target);
                                  } else {
                                      doSwipe(target);
                                  }
                              }, delay);
                          }
                      };
                      IntentFilter f = new IntentFilter("JAHEZ_DO_SWIPE");
                      if (android.os.Build.VERSION.SDK_INT >= 33)
                          act.getApplicationContext().registerReceiver(r, f, Context.RECEIVER_EXPORTED);
                      else
                          act.getApplicationContext().registerReceiver(r, f);
                      swipeReceiverRegistered = true;
                      XposedBridge.log("[AutoDriver] ✅ Swipe receiver registered in Saned");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ receiver: " + e.getMessage());
                  }
              }

              // Swipe fallback
              private void doSwipe(android.app.Activity act) {
                  try {
                      android.util.DisplayMetrics dm = new android.util.DisplayMetrics();
                      act.getWindowManager().getDefaultDisplay().getMetrics(dm);
                      int W = dm.widthPixels;
                      int H = dm.heightPixels;
                      int x1 = (int)(W * 0.10f);
                      int x2 = (int)(W * 0.90f);
                      int y  = (int)(H * 0.885f);

                      sendLog(act, "🖱️ Swipe: " + x1 + "→" + x2 + " y=" + y);

                      // Su swipe
                      for (String cmd : new String[]{
                          "input touchscreen swipe " + x1+" "+y+" "+x2+" "+y+" 250",
                          "input swipe " + x1+" "+y+" "+x2+" "+y+" 250"}) {
                          try {
                              Process p = new ProcessBuilder("su", "-c", cmd)
                                  .redirectErrorStream(true).start();
                              p.getInputStream().read(new byte[64]);
                              boolean ok = p.waitFor(3, java.util.concurrent.TimeUnit.SECONDS);
                              if (ok && p.exitValue() == 0) {
                                  sendLog(act, "✅ Su swipe OK");
                                  return;
                              }
                          } catch (Throwable ignored) {}
                      }

                      // MotionEvent fallback
                      android.view.View root = act.getWindow().getDecorView();
                      long t = android.os.SystemClock.uptimeMillis();
                      android.view.MotionEvent e;
                      e = android.view.MotionEvent.obtain(t, t, android.view.MotionEvent.ACTION_DOWN, x1, y, 0);
                      root.dispatchTouchEvent(e); e.recycle();
                      for (int i = 1; i <= 20; i++) {
                          float x = x1 + (x2-x1)*(float)i/20;
                          e = android.view.MotionEvent.obtain(t, t+i*12L, android.view.MotionEvent.ACTION_MOVE, x, y, 0);
                          root.dispatchTouchEvent(e); e.recycle();
                      }
                      e = android.view.MotionEvent.obtain(t, t+260L, android.view.MotionEvent.ACTION_UP, x2, y, 0);
                      root.dispatchTouchEvent(e); e.recycle();
                      sendLog(act, "✅ MotionEvent swipe done");
                  } catch (Throwable e) {
                      sendLog(act, "❌ Swipe: " + e.getMessage());
                  }
              }

              private void hookURLConnection(XC_LoadPackage.LoadPackageParam lp) {
                  XC_MethodHook hook = new XC_MethodHook() {
                      @Override protected void beforeHookedMethod(MethodHookParam param) {
                          try {
                              String key = (String) param.args[0];
                              String val = (String) param.args[1];
                              if (!"Authorization".equals(key) || val == null || val.length() < 10) return;
                              String url = "";
                              try { url = XposedHelpers.callMethod(param.thisObject, "getURL").toString(); }
                              catch (Throwable ignored) {}
                              if (!url.isEmpty() && !url.contains("saned.io") && !url.contains("jahez")) return;
                              XposedBridge.log("[AutoDriver] 🔑 Auth header: "
                                  + val.substring(0, Math.min(40, val.length()))
                                  + " url=" + url.replaceAll("\\?.*", ""));
                          } catch (Throwable ignored) {}
                      }
                  };
                  try {
                      Class<?> uc = lp.classLoader.loadClass("java.net.URLConnection");
                      XposedBridge.hookAllMethods(uc, "setRequestProperty", hook);
                      XposedBridge.hookAllMethods(uc, "addRequestProperty", hook);
                      XposedBridge.log("[AutoDriver] ✅ URLConnection hooks OK");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ URLConn: " + e.getMessage());
                  }
              }

              private String extractRequestId(Bundle b) {
                  try {
                      Object v = b.get("EXTRA_DISPATCH_REQUEST_ID");
                      if (v instanceof String && !((String)v).isEmpty()) return (String)v;
                      if (v instanceof Long)    return String.valueOf(v);
                      if (v instanceof Integer) return String.valueOf(v);
                      String s = b.getString("EXTRA_DISPATCH_REQUEST_ID");
                      if (s != null && !s.isEmpty()) return s;
                      long l = b.getLong("EXTRA_DISPATCH_REQUEST_ID", -1L);
                      if (l > 0) return String.valueOf(l);
                  } catch (Throwable ignored) {}
                  return "";
              }

              private void sendLog(android.app.Activity act, String msg) {
                  try {
                      Intent i = new Intent("JAHEZ_HOOK_LOG");
                      i.setPackage(OUR_PKG);
                      i.putExtra("log", msg);
                      act.sendBroadcast(i);
                  } catch (Throwable ignored) {}
              }

              private double getDouble(Bundle b, String key) {
                  try {
                      Object v = b.get(key);
                      if (v instanceof Double)  return (Double) v;
                      if (v instanceof Float)   return (Float) v;
                      if (v instanceof String)  return Double.parseDouble((String) v);
                      if (v instanceof Integer) return (Integer) v;
                      if (v instanceof Long)    return (Long) v;
                  } catch (Throwable ignored) {}
                  return -1;
              }
          }
