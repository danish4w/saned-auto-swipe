name: Build Saned Exact Simulator
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Project
        run: |
          mkdir -p app/src/main/java/com/sanedsimulator
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          echo "include ':app'" > settings.gradle

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.sanedsimulator'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.sanedsimulator'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Saned Simulator"
                  android:theme="@style/Theme.AppCompat">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Saned Simulator</string>
          </resources>
          EOF

          cat > app/src/main/res/layout/popup_layout.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="wrap_content"
              android:orientation="vertical"
              android:background="#FFFFFF"
              android:padding="20dp"
              android:elevation="10dp">

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="🆕 New Order"
                  android:textSize="18sp"
                  android:textColor="#FF5722"
                  android:textStyle="bold"
                  android:layout_gravity="center"
                  android:layout_marginBottom="15dp"/>

              <TextView
                  android:id="@+id/popup_pickup"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Pick-up: 0.0 km from you"
                  android:textSize="14sp"
                  android:textColor="#333333"
                  android:layout_marginBottom="8dp"/>

              <TextView
                  android:id="@+id/popup_drop"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Drop: 0.0 km from pickup"
                  android:textSize="14sp"
                  android:textColor="#333333"
                  android:layout_marginBottom="15dp"/>

              <TextView
                  android:id="@+id/popup_timer"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Next order in: 5"
                  android:textSize="16sp"
                  android:textColor="#FF5722"
                  android:textStyle="bold"
                  android:layout_gravity="center"
                  android:layout_marginBottom="15dp"/>

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal">

                  <Button
                      android:id="@+id/popup_accept"
                      android:layout_width="0dp"
                      android:layout_height="45dp"
                      android:layout_weight="1"
                      android:text="Accept"
                      android:textSize="14sp"
                      android:backgroundTint="#4CAF50"
                      android:layout_marginEnd="8dp"/>

                  <Button
                      android:id="@+id/popup_reject"
                      android:layout_width="0dp"
                      android:layout_height="45dp"
                      android:layout_weight="1"
                      android:text="Reject"
                      android:textSize="14sp"
                      android:backgroundTint="#F44336"/>

              </LinearLayout>

          </LinearLayout>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="#F5F5F5"
              android:padding="16dp">

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Saned Auto Swipe"
                  android:textSize="22sp"
                  android:textColor="#FF5722"
                  android:textStyle="bold"
                  android:layout_gravity="center"
                  android:layout_marginTop="20dp"
                  android:layout_marginBottom="10dp"/>

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Training Mode"
                  android:textSize="14sp"
                  android:textColor="#666666"
                  android:layout_gravity="center"
                  android:layout_marginBottom="30dp"/>

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:background="#FFFFFF"
                  android:elevation="4dp"
                  android:padding="16dp"
                  android:layout_marginBottom="20dp">

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="🆕 New Order"
                      android:textSize="16sp"
                      android:textColor="#FF5722"
                      android:textStyle="bold"
                      android:layout_marginBottom="15dp"/>

                  <TextView
                      android:id="@+id/tv_saned"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Saned"
                      android:textSize="18sp"
                      android:textColor="#4CAF50"
                      android:textStyle="bold"
                      android:layout_marginBottom="5dp"/>

                  <TextView
                      android:id="@+id/tv_price"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="SAR 10.0"
                      android:textSize="16sp"
                      android:textColor="#333333"
                      android:layout_marginBottom="15dp"/>

                  <TextView
                      android:id="@+id/tv_pickup"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Pick-up from Al Thumamah Rd."
                      android:textSize="14sp"
                      android:textColor="#333333"
                      android:layout_marginBottom="5dp"/>

                  <TextView
                      android:id="@+id/tv_pickup_dist"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="0.0 Km From You"
                      android:textSize="14sp"
                      android:textColor="#FF9800"
                      android:layout_marginBottom="15dp"/>

                  <TextView
                      android:id="@+id/tv_drop"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Drop off at Al Aqiq"
                      android:textSize="14sp"
                      android:textColor="#333333"
                      android:layout_marginBottom="5dp"/>

                  <TextView
                      android:id="@+id/tv_drop_dist"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="0.0 Km From Pickup"
                      android:textSize="14sp"
                      android:textColor="#FF9800"
                      android:layout_marginBottom="20dp"/>

              </LinearLayout>

              <TextView
                  android:id="@+id/tv_status"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="⏳ No active order"
                  android:textSize="14sp"
                  android:textColor="#FF9800"
                  android:gravity="center"
                  android:layout_marginBottom="20dp"/>

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:layout_marginBottom="20dp">

                  <Button
                      android:id="@+id/btn_start_test"
                      android:layout_width="0dp"
                      android:layout_height="50dp"
                      android:layout_weight="1"
                      android:text="Start Test"
                      android:textSize="14sp"
                      android:layout_marginEnd="10dp"/>

                  <Button
                      android:id="@+id/btn_reset"
                      android:layout_width="0dp"
                      android:layout_height="50dp"
                      android:layout_weight="1"
                      android:text="Reset"
                      android:textSize="14sp"/>

              </LinearLayout>

              <TextView
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="💡 How to Test:\n1. Click Start Test\n2. Popup show hoga with order details\n3. 5 seconds countdown chalega\n4. Agar accept nahi kiya to next order aayega\n5. Accept click karo ya apne auto swipe app se accept karo"
                  android:textSize="11sp"
                  android:textColor="#999999"
                  android:lineSpacingExtra="3dp"/>

          </LinearLayout>
          EOF

          cat > app/src/main/java/com/sanedsimulator/MainActivity.java << 'EOF'
          package com.sanedsimulator;

          import android.app.Dialog;
          import android.os.Bundle;
          import android.os.CountDownTimer;
          import android.os.Handler;
          android.view.Window;
          import android.view.WindowManager;
          import android.widget.Button;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import java.util.Random;

          public class MainActivity extends AppCompatActivity {

              private TextView tvPickup, tvPickupDist, tvDrop, tvDropDist, tvPrice, tvStatus;
              private Button btnStartTest, btnReset;
              private Dialog popupDialog;
              private CountDownTimer nextOrderTimer;
              private boolean isOrderActive = false;
              private boolean isTestRunning = false;
              private float currentPickup = 0, currentDrop = 0;
              private Random random = new Random();

              private String[] pickupAddresses = {
                  "Pick-up from Al Thumamah Rd., Ar Rabi District",
                  "Pick-up from QJJP+64P, Ibrahim bin neghaimish",
                  "Pick-up from RRAA7381, 7381 Al",
                  "Pick-up from 6655 Al Bahr Al Moutaousset",
                  "Pick-up from RRAC6717, 6717 Al Bahr"
              };

              private String[] dropAddresses = {
                  "Drop off at QJ7R+Q88, Al Aqiq, Riyadh 13519",
                  "Drop off at RRMA6837, 4034",
                  "Drop off at RASB7966, 7966 Al Nafl",
                  "Drop off at 7131 Al Ulaya, 2763",
                  "Drop off at RALA7654, 7654 Al Hasna"
              };

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  tvPickup = findViewById(R.id.tv_pickup);
                  tvPickupDist = findViewById(R.id.tv_pickup_dist);
                  tvDrop = findViewById(R.id.tv_drop);
                  tvDropDist = findViewById(R.id.tv_drop_dist);
                  tvPrice = findViewById(R.id.tv_price);
                  tvStatus = findViewById(R.id.tv_status);
                  btnStartTest = findViewById(R.id.btn_start_test);
                  btnReset = findViewById(R.id.btn_reset);

                  btnStartTest.setOnClickListener(v -> {
                      if (!isTestRunning) {
                          isTestRunning = true;
                          generateOrder();
                          Toast.makeText(this, "Test Started!", Toast.LENGTH_SHORT).show();
                      }
                  });

                  btnReset.setOnClickListener(v -> {
                      if (nextOrderTimer != null) nextOrderTimer.cancel();
                      if (popupDialog != null && popupDialog.isShowing()) popupDialog.dismiss();
                      isOrderActive = false;
                      isTestRunning = false;
                      tvStatus.setText("⏳ Test Stopped");
                      Toast.makeText(this, "Reset Done!", Toast.LENGTH_SHORT).show();
                  });
              }

              private void generateOrder() {
                  if (!isTestRunning) return;
                  
                  currentPickup = Math.round((0.1f + random.nextFloat() * 1.9f) * 10) / 10.0f;
                  currentDrop = Math.round((0.1f + random.nextFloat() * 4.9f) * 10) / 10.0f;
                  float price = Math.round((8 + random.nextFloat() * 12) * 10) / 10.0f;
                  
                  int pIndex = random.nextInt(pickupAddresses.length);
                  int dIndex = random.nextInt(dropAddresses.length);
                  
                  tvPickup.setText(pickupAddresses[pIndex]);
                  tvPickupDist.setText(currentPickup + " Km From You");
                  tvDrop.setText(dropAddresses[dIndex]);
                  tvDropDist.setText(currentDrop + " Km From Pickup");
                  tvPrice.setText("SAR " + price);
                  
                  isOrderActive = true;
                  tvStatus.setText("🆕 ORDER ARRIVED!");
                  showPopup();
              }

              private void showPopup() {
                  popupDialog = new Dialog(this);
                  popupDialog.requestWindowFeature(Window.FEATURE_NO_TITLE);
                  popupDialog.setContentView(R.layout.popup_layout);
                  popupDialog.setCancelable(false);
                  
                  Window window = popupDialog.getWindow();
                  if (window != null) {
                      window.setLayout(WindowManager.LayoutParams.MATCH_PARENT, WindowManager.LayoutParams.WRAP_CONTENT);
                      window.setBackgroundDrawableResource(android.R.color.transparent);
                  }
                  
                  TextView popupPickup = popupDialog.findViewById(R.id.popup_pickup);
                  TextView popupDrop = popupDialog.findViewById(R.id.popup_drop);
                  TextView popupTimer = popupDialog.findViewById(R.id.popup_timer);
                  Button btnAccept = popupDialog.findViewById(R.id.popup_accept);
                  Button btnReject = popupDialog.findViewById(R.id.popup_reject);
                  
                  popupPickup.setText("🚗 Pickup: " + currentPickup + " km from you");
                  popupDrop.setText("📍 Drop: " + currentDrop + " km from pickup");
                  
                  nextOrderTimer = new CountDownTimer(5000, 1000) {
                      public void onTick(long millis) { popupTimer.setText("Next order in: " + (millis/1000)); }
                      public void onFinish() {
                          if (popupDialog != null && popupDialog.isShowing()) popupDialog.dismiss();
                          isOrderActive = false;
                          new Handler().postDelayed(() -> { if (isTestRunning && !isOrderActive) generateOrder(); }, 300);
                      }
                  }.start();
                  
                  btnAccept.setOnClickListener(v -> {
                      if (nextOrderTimer != null) nextOrderTimer.cancel();
                      popupDialog.dismiss();
                      isOrderActive = false;
                      isTestRunning = false;
                      tvStatus.setText("✅ ACCEPTED! Pickup: " + currentPickup + "km, Drop: " + currentDrop + "km");
                      Toast.makeText(MainActivity.this, "Order Accepted!", Toast.LENGTH_LONG).show();
                  });
                  
                  btnReject.setOnClickListener(v -> {
                      if (nextOrderTimer != null) nextOrderTimer.cancel();
                      popupDialog.dismiss();
                      isOrderActive = false;
                      Toast.makeText(MainActivity.this, "Skipped! Next order in 5 sec", Toast.LENGTH_SHORT).show();
                      new Handler().postDelayed(() -> { if (isTestRunning && !isOrderActive) generateOrder(); }, 300);
                  });
                  
                  popupDialog.show();
              }
          }
          EOF

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Saned-Simulator-Final
          path: app/build/outputs/apk/debug/*.apk
