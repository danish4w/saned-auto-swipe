name: Build Saned Auto Swipe
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project and Build
        run: |
          # 1. Structure banana
          mkdir -p app/src/main/java/com/saned/autoswipe
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml

          # 2. Build Scripts
          echo 'buildscript { repositories { google(); mavenCentral() }; dependencies { classpath "com.android.tools.build:gradle:8.1.0"; classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0" } }' > build.gradle
          echo 'allprojects { repositories { google(); mavenCentral() } }' >> build.gradle
          echo 'include ":app"' > settings.gradle

          echo 'plugins { id "com.android.application"; id "org.jetbrains.kotlin.android" }
          android {
              namespace "com.saned.autoswipe"
              compileSdk 34
              defaultConfig { applicationId "com.saned.autoswipe"; minSdk 26; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          dependencies {
              implementation "androidx.appcompat:appcompat:1.6.1"
              implementation "com.google.android.material:material:1.11.0"
          }' > app/build.gradle

          # 3. Manifest & XML
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/><application android:label="Saned Auto" android:theme="@style/Theme.AppCompat.Light.NoActionBar"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity><service android:name=".AutoSwipeService" android:exported="true" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"><intent-filter><action android:name="android.accessibilityservice.AccessibilityService"/></intent-filter><meta-data android:name="android.accessibilityservice" android:resource="@xml/acc_config"/></service></application></manifest>' > app/src/main/AndroidManifest.xml
          echo '<?xml version="1.0" encoding="utf-8"?><accessibility-service xmlns:android="http://schemas.android.com/apk/res/android" android:accessibilityEventTypes="typeWindowStateChanged|typeWindowContentChanged" android:accessibilityFeedbackType="feedbackGeneric" android:canPerformGestures="true" android:canRetrieveWindowContent="true" />' > app/src/main/res/xml/acc_config.xml
          echo '<?xml version="1.0" encoding="utf-8"?><LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:gravity="center"><Button android:id="@+id/btn" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Enable Service"/></LinearLayout>' > app/src/main/res/layout/activity_main.xml

          # 4. Kotlin Files
          echo 'package com.saned.autoswipe
          import android.content.Intent
          import android.os.Bundle
          import android.provider.Settings
          import android.widget.Button
          import androidx.appcompat.app.AppCompatActivity
          class MainActivity : AppCompatActivity() {
              override fun onCreate(s: Bundle?) { super.onCreate(s); setContentView(R.layout.activity_main); findViewById<Button>(R.id.btn).setOnClickListener { startActivity(Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS)) } }
          }' > app/src/main/java/com/saned/autoswipe/MainActivity.kt

          echo 'package com.saned.autoswipe
          import android.accessibilityservice.AccessibilityService
          import android.view.accessibility.AccessibilityEvent
          class AutoSwipeService : AccessibilityService() {
              override fun onAccessibilityEvent(e: AccessibilityEvent?) { /* Logic here */ }
              override fun onInterrupt() {}
          }' > app/src/main/java/com/saned/autoswipe/AutoSwipeService.kt

          # 5. ACTUAL BUILD - Using installed gradle to avoid wrapper issues
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Saned-Auto-Final
          path: app/build/outputs/apk/debug/*.apk
