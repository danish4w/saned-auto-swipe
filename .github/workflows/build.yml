name: Build JahezAutoAccept

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          cat > gradle/wrapper/gradle-wrapper.properties << 'WEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/zips
          WEOF

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/danish/jahez
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/assets

      - name: Write Gradle Files
        run: |
          cat > settings.gradle << 'SEOF'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositories {
              google(); mavenCentral()
              maven { url 'https://api.xposed.info/' }
            }
          }
          rootProject.name = "JahezAutoAccept"
          include ':app'
          SEOF

          cat > build.gradle << 'BEOF'
          plugins { id 'com.android.application' version '8.5.2' apply false }
          BEOF

          cat > gradle.properties << 'GEOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          GEOF

          cat > app/build.gradle << 'ABEOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.danish.jahez'
            compileSdk 34
            defaultConfig {
              applicationId 'com.danish.jahez'
              minSdk 26
              targetSdk 34
              versionCode 1
              versionName '1.0'
            }
            buildTypes {
              release { minifyEnabled false }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.google.android.material:material:1.12.0'
            compileOnly 'de.robv.android.xposed:api:82'
          }
          ABEOF

      - name: Write Icon
        run: |
          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'BGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp"
            android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#1B5E20"
              android:pathData="M0,0 L108,0 L108,108 L0,108 Z"/>
          </vector>
          BGEOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'FGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp"
            android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#FFFFFF"
              android:pathData="M25,54 L35,44 L47,60 L73,30 L83,40 L47,82 Z"/>
          </vector>
          FGEOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'ICEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          ICEOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'RNDEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          RNDEOF

      - name: Write Xposed Files
        run: |
          echo "com.danish.jahez.SanedHook" > app/src/main/assets/xposed_init

      - name: Write Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC"/>
            <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
            <application
              android:label="Jahez Auto"
              android:icon="@mipmap/ic_launcher"
              android:roundIcon="@mipmap/ic_launcher_round"
              android:theme="@style/AppTheme"
              android:allowBackup="false">
              <meta-data android:name="xposedmodule" android:value="true"/>
              <meta-data android:name="xposeddescription" android:value="Jahez order hook"/>
              <meta-data android:name="xposedminversion" android:value="82"/>
              <activity android:name=".MainActivity" android:exported="true"
                android:windowSoftInputMode="stateHidden|adjustPan">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
              <activity android:name=".LogActivity" android:exported="false"/>
              <service android:name=".AutoService" android:exported="false"
                android:foregroundServiceType="dataSync"/>
              <service android:name=".SwipeOverlayService" android:exported="false"/>
              <receiver android:name=".BootReceiver" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.BOOT_COMPLETED"/>
                </intent-filter>
              </receiver>
            </application>
          </manifest>
          MEOF

      - name: Write MainActivity
        run: |
          cat > app/src/main/java/com/danish/jahez/MainActivity.java << 'JEOF'
          package com.danish.jahez;
          import android.app.Activity;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.SharedPreferences;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.*;
          public class MainActivity extends Activity {
            SharedPreferences prefs;
            Switch swEnable;
            TextView tvStatus, tvPointA, tvPointB;
            static final int REQ_OVERLAY = 100;
            final BroadcastReceiver uiReceiver = new BroadcastReceiver() {
              @Override public void onReceive(Context ctx, Intent intent) {
                String action = intent.getAction();
                if ("JAHEZ_AUTO_ON".equals(action) || "JAHEZ_AUTO_OFF".equals(action)) {
                  if (swEnable != null) swEnable.setChecked("JAHEZ_AUTO_ON".equals(action));
                  refreshStatus();
                } else if ("JAHEZ_SWIPE_SAVED".equals(action)) {
                  refreshSwipeLabels();
                  Toast.makeText(MainActivity.this, "Swipe points save ho gaye!", Toast.LENGTH_SHORT).show();
                }
              }
            };
            @Override protected void onCreate(Bundle saved) {
              super.onCreate(saved);
              setContentView(R.layout.activity_main);
              prefs = getSharedPreferences("cfg", MODE_PRIVATE);
              EditText etPickup   = findViewById(R.id.et_pickup);
              EditText etDrop     = findViewById(R.id.et_drop);
              SeekBar sbSwipeDur  = findViewById(R.id.sb_swipe_dur);
              TextView tvSwipeDur = findViewById(R.id.tv_swipe_dur);
              swEnable = findViewById(R.id.sw_enable);
              tvStatus = findViewById(R.id.tv_status);
              tvPointA = findViewById(R.id.tv_point_a);
              tvPointB = findViewById(R.id.tv_point_b);
              Button btnSave     = findViewById(R.id.btn_save);
              Button btnSetSwipe = findViewById(R.id.btn_set_swipe);
              etPickup.setText(String.valueOf(prefs.getFloat("max_pickup", 2.0f)));
              etDrop.setText(String.valueOf(prefs.getFloat("max_drop", 5.0f)));
              int savedSwipeDur = prefs.getInt("swipe_dur", 200);
              sbSwipeDur.setProgress(savedSwipeDur);
              tvSwipeDur.setText(savedSwipeDur + "ms");
              sbSwipeDur.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                public void onProgressChanged(SeekBar sb, int p, boolean u) { tvSwipeDur.setText(p + "ms"); }
                public void onStartTrackingTouch(SeekBar sb) {}
                public void onStopTrackingTouch(SeekBar sb) {
                  prefs.edit().putInt("swipe_dur", sb.getProgress()).apply();
                }
              });
              swEnable.setChecked(prefs.getBoolean("enabled", false));
              if (Build.VERSION.SDK_INT >= 33)
                requestPermissions(new String[]{"android.permission.POST_NOTIFICATIONS"}, 0);
              requestPermissions(new String[]{
                "android.permission.ACCESS_FINE_LOCATION",
                "android.permission.ACCESS_COARSE_LOCATION"}, 1);
              IntentFilter filter = new IntentFilter();
              filter.addAction("JAHEZ_AUTO_OFF");
              filter.addAction("JAHEZ_AUTO_ON");
              filter.addAction("JAHEZ_SWIPE_SAVED");
              if (Build.VERSION.SDK_INT >= 33)
                registerReceiver(uiReceiver, filter, Context.RECEIVER_NOT_EXPORTED);
              else
                registerReceiver(uiReceiver, filter);
              swEnable.setOnCheckedChangeListener((btn, checked) -> {
                prefs.edit().putBoolean("enabled", checked).apply();
                sendBroadcast(new Intent("JAHEZ_STATE_CHANGED"));
                refreshStatus();
              });
              btnSave.setOnClickListener(v -> {
                float pk = parseFloat(etPickup.getText().toString(), 2.0f);
                float dk = parseFloat(etDrop.getText().toString(), 5.0f);
                prefs.edit().putFloat("max_pickup", pk).putFloat("max_drop", dk).apply();
                Toast.makeText(this, "Saved!", Toast.LENGTH_SHORT).show();
                InputMethodManager imm = (InputMethodManager) getSystemService(INPUT_METHOD_SERVICE);
                if (imm != null) imm.hideSoftInputFromWindow(getWindow().getDecorView().getWindowToken(), 0);
                etPickup.clearFocus(); etDrop.clearFocus();
              });
              btnSetSwipe.setOnClickListener(v -> launchOverlay());
              refreshSwipeLabels();
              Intent svc = new Intent(this, AutoService.class);
              if (Build.VERSION.SDK_INT >= 26) startForegroundService(svc);
              else startService(svc);
            }
            void launchOverlay() {
              if (!Settings.canDrawOverlays(this)) {
                Toast.makeText(this, "Pehle 'Display over other apps' permission do", Toast.LENGTH_LONG).show();
                startActivityForResult(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                  Uri.parse("package:" + getPackageName())), REQ_OVERLAY);
              } else {
                startService(new Intent(this, SwipeOverlayService.class));
                Toast.makeText(this, "A(orange) B(blue) drag karo — phir ✅ dabao", Toast.LENGTH_LONG).show();
                moveTaskToBack(true);
              }
            }
            @Override protected void onActivityResult(int req, int res, Intent data) {
              if (req == REQ_OVERLAY) {
                if (Settings.canDrawOverlays(this)) {
                  startService(new Intent(this, SwipeOverlayService.class));
                  moveTaskToBack(true);
                } else Toast.makeText(this, "Permission nahi mili", Toast.LENGTH_SHORT).show();
              }
            }
            void refreshSwipeLabels() {
              float x1 = prefs.getFloat("swipe_x1", -1);
              float y1 = prefs.getFloat("swipe_y1", -1);
              float x2 = prefs.getFloat("swipe_x2", -1);
              float y2 = prefs.getFloat("swipe_y2", -1);
              if (tvPointA != null) tvPointA.setText(x1 < 0 ? "A: default" : "A: x=" + fp(x1) + " y=" + fp(y1));
              if (tvPointB != null) tvPointB.setText(x2 < 0 ? "B: default" : "B: x=" + fp(x2) + " y=" + fp(y2));
            }
            @Override protected void onResume() { super.onResume(); refreshStatus(); refreshSwipeLabels(); }
            @Override protected void onDestroy() {
              super.onDestroy();
              try { unregisterReceiver(uiReceiver); } catch (Exception ignored) {}
            }
            void refreshStatus() {
              if (tvStatus == null) return;
              boolean en = prefs.getBoolean("enabled", false);
              tvStatus.setText(en ? "AUTO ACCEPT: ON" : "AUTO ACCEPT: OFF");
              tvStatus.setTextColor(en ? 0xFF4CAF50 : 0xFFFF5555);
            }
            float parseFloat(String s, float def) {
              try { return Float.parseFloat(s.trim()); } catch (Exception e) { return def; }
            }
            String fp(float v) { return String.format("%.2f", v); }
          }
          JEOF

      - name: Write SwipeOverlayService
        run: |
          cat > app/src/main/java/com/danish/jahez/SwipeOverlayService.java << 'OEOF'
          package com.danish.jahez;
          import android.app.Service;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.Paint;
          import android.graphics.PixelFormat;
          import android.os.Handler;
          import android.os.IBinder;
          import android.os.Looper;
          import android.util.DisplayMetrics;
          import android.view.Gravity;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.WindowManager;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          public class SwipeOverlayService extends Service {
            WindowManager wm;
            View viewA, viewB, lineView, barView;
            int screenW, screenH;
            float ax, ay, bx, by;
            // Circle size in pixels
            static final int CS = 130;
            // Bar size
            static final int BAR_W = 260;
            static final int BAR_H = 110;

            @Override public void onCreate() {
              super.onCreate();
              wm = (WindowManager) getSystemService(WINDOW_SERVICE);
              DisplayMetrics dm = new DisplayMetrics();
              wm.getDefaultDisplay().getMetrics(dm);
              screenW = dm.widthPixels;
              screenH = dm.heightPixels;
              SharedPreferences p = getSharedPreferences("cfg", MODE_PRIVATE);
              float sx1 = p.getFloat("swipe_x1", -1);
              float sy1 = p.getFloat("swipe_y1", -1);
              float sx2 = p.getFloat("swipe_x2", -1);
              float sy2 = p.getFloat("swipe_y2", -1);
              ax = sx1 < 0 ? screenW * 0.15f : screenW * sx1;
              ay = sy1 < 0 ? screenH * 0.75f : screenH * sy1;
              bx = sx2 < 0 ? screenW * 0.85f : screenW * sx2;
              by = sy2 < 0 ? screenH * 0.75f : screenH * sy2;
              addLineView();
              addCircle(true);
              addCircle(false);
              addBar();
            }

            // ── Full-screen transparent layer just for drawing the arrow line ──
            void addLineView() {
              lineView = new View(this) {
                @Override protected void onDraw(Canvas c) {
                  Paint p = new Paint(Paint.ANTI_ALIAS_FLAG);
                  p.setColor(0xBBFFFFFF);
                  p.setStrokeWidth(6);
                  c.drawLine(ax, ay, bx, by, p);
                  double ang = Math.atan2(by - ay, bx - ax);
                  float al = 40, aa = (float) Math.toRadians(28);
                  c.drawLine(bx, by, bx-(float)(al*Math.cos(ang-aa)), by-(float)(al*Math.sin(ang-aa)), p);
                  c.drawLine(bx, by, bx-(float)(al*Math.cos(ang+aa)), by-(float)(al*Math.sin(ang+aa)), p);
                }
              };
              WindowManager.LayoutParams lp = overlayParams(screenW, screenH,
                WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE |
                WindowManager.LayoutParams.FLAG_NOT_TOUCHABLE |
                WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN);
              lp.gravity = Gravity.TOP | Gravity.START;
              lp.x = 0; lp.y = 0;
              wm.addView(lineView, lp);
            }

            // ── Draggable circle for A or B ──
            void addCircle(boolean isA) {
              // Each circle tracks its own raw screen position via WindowManager lp.x / lp.y
              // We use getRawX/getRawY to get absolute position and compute delta ourselves
              final float[] lastRaw = {0f, 0f};
              View circle = new View(this) {
                @Override protected void onDraw(Canvas c) {
                  int r = CS / 2;
                  Paint fill = new Paint(Paint.ANTI_ALIAS_FLAG);
                  fill.setColor(isA ? 0xEEFF6D00 : 0xEE1565C0);
                  c.drawCircle(r, r, r - 5, fill);
                  Paint stroke = new Paint(Paint.ANTI_ALIAS_FLAG);
                  stroke.setColor(Color.WHITE);
                  stroke.setStyle(Paint.Style.STROKE);
                  stroke.setStrokeWidth(5);
                  c.drawCircle(r, r, r - 5, stroke);
                  Paint txt = new Paint(Paint.ANTI_ALIAS_FLAG);
                  txt.setColor(Color.WHITE);
                  txt.setTextSize(52);
                  txt.setTextAlign(Paint.Align.CENTER);
                  txt.setFakeBoldText(true);
                  c.drawText(isA ? "A" : "B", r, r + 19, txt);
                }
                @Override public boolean onTouchEvent(MotionEvent e) {
                  WindowManager.LayoutParams lp = (WindowManager.LayoutParams) getLayoutParams();
                  switch (e.getAction()) {
                    case MotionEvent.ACTION_DOWN:
                      lastRaw[0] = e.getRawX();
                      lastRaw[1] = e.getRawY();
                      break;
                    case MotionEvent.ACTION_MOVE:
                      float dx = e.getRawX() - lastRaw[0];
                      float dy = e.getRawY() - lastRaw[1];
                      lastRaw[0] = e.getRawX();
                      lastRaw[1] = e.getRawY();
                      lp.x = Math.max(0, Math.min(screenW - CS, lp.x + (int) dx));
                      lp.y = Math.max(0, Math.min(screenH - CS, lp.y + (int) dy));
                      wm.updateViewLayout(this, lp);
                      if (isA) { ax = lp.x + CS / 2f; ay = lp.y + CS / 2f; }
                      else     { bx = lp.x + CS / 2f; by = lp.y + CS / 2f; }
                      lineView.invalidate();
                      break;
                  }
                  return true;
                }
              };
              WindowManager.LayoutParams lp = overlayParams(CS, CS,
                WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE |
                WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN);
              lp.gravity = Gravity.TOP | Gravity.START;
              lp.x = (int)((isA ? ax : bx) - CS / 2f);
              lp.y = (int)((isA ? ay : by) - CS / 2f);
              wm.addView(circle, lp);
              if (isA) viewA = circle; else viewB = circle;
            }

            // ── Draggable bar with ✅ and ❌ ──
            void addBar() {
              final float[] lastRaw = {0f, 0f};
              final boolean[] wasDrag = {false};

              LinearLayout bar = new LinearLayout(this);
              bar.setOrientation(LinearLayout.HORIZONTAL);
              bar.setBackgroundColor(0xEE111111);
              bar.setPadding(18, 14, 18, 14);

              // Cancel button — small
              TextView btnCancel = new TextView(this);
              btnCancel.setText("❌");
              btnCancel.setTextSize(26);
              btnCancel.setGravity(Gravity.CENTER);
              btnCancel.setBackgroundColor(0xFF6D0000);
              btnCancel.setPadding(18, 10, 18, 10);
              LinearLayout.LayoutParams lpC = new LinearLayout.LayoutParams(
                LinearLayout.LayoutParams.WRAP_CONTENT,
                LinearLayout.LayoutParams.WRAP_CONTENT);
              lpC.setMargins(0, 0, 16, 0);
              btnCancel.setLayoutParams(lpC);

              // Save button — small
              TextView btnSave = new TextView(this);
              btnSave.setText("✅");
              btnSave.setTextSize(26);
              btnSave.setGravity(Gravity.CENTER);
              btnSave.setBackgroundColor(0xFF0A3D0A);
              btnSave.setPadding(18, 10, 18, 10);
              btnSave.setLayoutParams(new LinearLayout.LayoutParams(
                LinearLayout.LayoutParams.WRAP_CONTENT,
                LinearLayout.LayoutParams.WRAP_CONTENT));

              bar.addView(btnCancel);
              bar.addView(btnSave);
              barView = bar;

              // Bar drag — using getRawX/Y delta, same as circles
              bar.setOnTouchListener((v, e) -> {
                WindowManager.LayoutParams lp = (WindowManager.LayoutParams) barView.getLayoutParams();
                switch (e.getAction()) {
                  case MotionEvent.ACTION_DOWN:
                    lastRaw[0] = e.getRawX();
                    lastRaw[1] = e.getRawY();
                    wasDrag[0] = false;
                    break;
                  case MotionEvent.ACTION_MOVE:
                    float dx = e.getRawX() - lastRaw[0];
                    float dy = e.getRawY() - lastRaw[1];
                    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) wasDrag[0] = true;
                    lastRaw[0] = e.getRawX();
                    lastRaw[1] = e.getRawY();
                    lp.x = Math.max(0, Math.min(screenW - BAR_W, lp.x + (int) dx));
                    lp.y = Math.max(0, Math.min(screenH - BAR_H, lp.y + (int) dy));
                    wm.updateViewLayout(barView, lp);
                    break;
                }
                return wasDrag[0]; // if dragged, consume; else let children handle click
              });

              // Button clicks
              btnCancel.setOnClickListener(v -> removeAllViews());
              btnSave.setOnClickListener(v -> {
                SharedPreferences prefs = getSharedPreferences("cfg", MODE_PRIVATE);
                prefs.edit()
                  .putFloat("swipe_x1", ax / screenW)
                  .putFloat("swipe_y1", ay / screenH)
                  .putFloat("swipe_x2", bx / screenW)
                  .putFloat("swipe_y2", by / screenH)
                  .apply();
                sendBroadcast(new Intent("JAHEZ_SWIPE_SAVED"));
                removeAllViews();
              });

              WindowManager.LayoutParams lp = overlayParams(
                WindowManager.LayoutParams.WRAP_CONTENT, BAR_H,
                WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE |
                WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN);
              lp.gravity = Gravity.TOP | Gravity.START;
              // Start bar at top-center
              lp.x = screenW / 2 - BAR_W / 2;
              lp.y = 60;
              wm.addView(barView, lp);
            }

            void removeAllViews() {
              new Handler(Looper.getMainLooper()).post(() -> {
                try { if (lineView != null) { wm.removeView(lineView); lineView = null; } } catch (Exception ignored) {}
                try { if (viewA   != null) { wm.removeView(viewA);    viewA   = null; } } catch (Exception ignored) {}
                try { if (viewB   != null) { wm.removeView(viewB);    viewB   = null; } } catch (Exception ignored) {}
                try { if (barView != null) { wm.removeView(barView);  barView = null; } } catch (Exception ignored) {}
                stopSelf();
              });
            }

            WindowManager.LayoutParams overlayParams(int w, int h, int flags) {
              return new WindowManager.LayoutParams(w, h,
                android.os.Build.VERSION.SDK_INT >= 26
                  ? WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY
                  : WindowManager.LayoutParams.TYPE_PHONE,
                flags, PixelFormat.TRANSLUCENT);
            }

            @Override public void onDestroy() {
              super.onDestroy();
              try { if (lineView != null) wm.removeView(lineView); } catch (Exception ignored) {}
              try { if (viewA   != null) wm.removeView(viewA);    } catch (Exception ignored) {}
              try { if (viewB   != null) wm.removeView(viewB);    } catch (Exception ignored) {}
              try { if (barView != null) wm.removeView(barView);  } catch (Exception ignored) {}
            }
            @Override public IBinder onBind(Intent intent) { return null; }
          }
          OEOF

      - name: Write SanedHook
        run: |
          cat > app/src/main/java/com/danish/jahez/SanedHook.java << 'HEOF'
          package com.danish.jahez;
          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.os.SystemClock;
          import android.util.DisplayMetrics;
          import android.view.MotionEvent;
          import android.view.View;
          public class SanedHook implements IXposedHookLoadPackage {
            static final String TARGET  = "net.jahez.fleets";
            static final String OUR_PKG = "com.danish.jahez";
            static final String ORDER_ACTIVITY = "net.jahez.fleets.dispatch.accept.IncomingDispatchActivity";
            long lastBcast = 0;
            volatile android.app.Activity currentActivity = null;
            boolean receiverRegistered = false;
            @Override public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lp) {
              if (!TARGET.equals(lp.packageName)) return;
              XposedHelpers.findAndHookMethod(
                "android.app.Activity", lp.classLoader, "onResume",
                new XC_MethodHook() {
                  @Override protected void afterHookedMethod(MethodHookParam p) {
                    if (!ORDER_ACTIVITY.equals(p.thisObject.getClass().getName())) return;
                    long now = System.currentTimeMillis();
                    if (now - lastBcast < 2000) return;
                    lastBcast = now;
                    android.app.Activity act = (android.app.Activity) p.thisObject;
                    currentActivity = act;
                    // Register accept receiver only once
                    if (!receiverRegistered) {
                      receiverRegistered = true;
                      try {
                        act.registerReceiver(new BroadcastReceiver() {
                          @Override public void onReceive(Context ctx, Intent intent) { doSwipe(); }
                        }, new IntentFilter("JAHEZ_DO_ACCEPT"));
                      } catch (Exception ignored) {}
                    }
                    try {
                      Bundle extras = act.getIntent() != null ? act.getIntent().getExtras() : null;
                      if (extras == null) return;
                      Intent intent = new Intent("JAHEZ_ORDER_DATA");
                      intent.setPackage(OUR_PKG);
                      intent.putExtra("pickup_lat", getDouble(extras, "EXTRA_DISPATCH_PICKUP_LATITUDE"));
                      intent.putExtra("pickup_lon", getDouble(extras, "EXTRA_DISPATCH_PICKUP_LONGITUDE"));
                      intent.putExtra("drop_dist",  getDouble(extras, "EXTRA_DISTANCE"));
                      intent.putExtra("price",      getDouble(extras, "EXTRA_DELIVERY_PRICE"));
                      intent.putExtra("bonus",      getDouble(extras, "EXTRA_BONUS_AMOUNT"));
                      intent.putExtra("is_order",   true);
                      act.sendBroadcast(intent);
                    } catch (Exception e) {
                      android.util.Log.e("JahezHook", "Error: " + e.getMessage());
                    }
                  }
                }
              );
            }
            void doSwipe() {
              android.app.Activity act = currentActivity;
              if (act == null || act.isFinishing()) return;
              new android.os.Handler(android.os.Looper.getMainLooper()).post(() -> {
                try {
                  SharedPreferences prefs = null;
                  try {
                    prefs = act.createPackageContext(OUR_PKG,
                      Context.CONTEXT_IGNORE_SECURITY | Context.CONTEXT_INCLUDE_CODE)
                      .getSharedPreferences("cfg", Context.MODE_PRIVATE);
                  } catch (Exception e) {
                    android.util.Log.e("JahezHook", "Prefs error: " + e.getMessage());
                  }
                  float rx1 = 0.15f, ry1 = 0.87f, rx2 = 0.85f, ry2 = 0.87f;
                  int dur = 200;
                  if (prefs != null) {
                    rx1 = prefs.getFloat("swipe_x1", 0.15f);
                    ry1 = prefs.getFloat("swipe_y1", 0.87f);
                    rx2 = prefs.getFloat("swipe_x2", 0.85f);
                    ry2 = prefs.getFloat("swipe_y2", 0.87f);
                    dur = prefs.getInt("swipe_dur", 200);
                  }
                  View root = act.getWindow().getDecorView();
                  DisplayMetrics dm = new DisplayMetrics();
                  act.getWindowManager().getDefaultDisplay().getMetrics(dm);
                  float x1 = dm.widthPixels * rx1,  y1 = dm.heightPixels * ry1;
                  float x2 = dm.widthPixels * rx2,  y2 = dm.heightPixels * ry2;
                  long t = SystemClock.uptimeMillis();
                  root.dispatchTouchEvent(MotionEvent.obtain(t, t, MotionEvent.ACTION_DOWN, x1, y1, 0));
                  for (int i = 1; i <= 10; i++) {
                    root.dispatchTouchEvent(MotionEvent.obtain(t,
                      t + (long)(dur * i / 10f), MotionEvent.ACTION_MOVE,
                      x1 + (x2 - x1) * i / 10f,
                      y1 + (y2 - y1) * i / 10f, 0));
                  }
                  root.dispatchTouchEvent(MotionEvent.obtain(t, t + dur, MotionEvent.ACTION_UP, x2, y2, 0));
                  android.util.Log.d("JahezHook", "Swipe done dur=" + dur + "ms");
                } catch (Exception e) {
                  android.util.Log.e("JahezHook", "Swipe error: " + e.getMessage());
                }
              });
            }
            double getDouble(Bundle b, String key) {
              try {
                Object v = b.get(key);
                if (v instanceof Double) return (Double) v;
                if (v instanceof Float)  return ((Float) v).doubleValue();
                if (v instanceof String) return Double.parseDouble((String) v);
              } catch (Exception ignored) {}
              return -1;
            }
          }
          HEOF

      - name: Write AutoService
        run: |
          cat > app/src/main/java/com/danish/jahez/AutoService.java << 'SEOF'
          package com.danish.jahez;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.Handler;
          import android.os.IBinder;
          import android.os.Looper;
          import android.util.Log;
          public class AutoService extends Service {
            static final String TAG = "JahezAuto";
            SharedPreferences prefs;
            long lastEvent = 0;
            final BroadcastReceiver orderReceiver = new BroadcastReceiver() {
              @Override public void onReceive(Context ctx, Intent intent) {
                boolean isOrder = intent.getBooleanExtra("is_order", false);
                if (!isOrder) return;
                double pickupLat = intent.getDoubleExtra("pickup_lat", -1);
                double pickupLon = intent.getDoubleExtra("pickup_lon", -1);
                double dropDist  = intent.getDoubleExtra("drop_dist",  -1);
                double price     = intent.getDoubleExtra("price",       0);
                double bonus     = intent.getDoubleExtra("bonus",       0);
                saveLog("🪝 Order! drop=" + String.format("%.2f", dropDist) + "km price=" + price + " bonus=" + bonus);
                processOrderGps(pickupLat, pickupLon, dropDist);
              }
            };
            final BroadcastReceiver toggleReceiver = new BroadcastReceiver() {
              @Override public void onReceive(Context ctx, Intent intent) {
                if (prefs == null) prefs = getSharedPreferences("cfg", MODE_PRIVATE);
                if ("JAHEZ_TOGGLE".equals(intent.getAction())) {
                  boolean cur = prefs.getBoolean("enabled", false);
                  prefs.edit().putBoolean("enabled", !cur).apply();
                  sendBroadcast(new Intent(!cur ? "JAHEZ_AUTO_ON" : "JAHEZ_AUTO_OFF"));
                }
                showServiceNotification();
              }
            };
            @Override public void onCreate() {
              super.onCreate();
              prefs = getSharedPreferences("cfg", MODE_PRIVATE);
              IntentFilter f = new IntentFilter("JAHEZ_TOGGLE");
              f.addAction("JAHEZ_STATE_CHANGED");
              if (Build.VERSION.SDK_INT >= 33)
                registerReceiver(toggleReceiver, f, Context.RECEIVER_NOT_EXPORTED);
              else registerReceiver(toggleReceiver, f);
              IntentFilter of = new IntentFilter("JAHEZ_ORDER_DATA");
              if (Build.VERSION.SDK_INT >= 33)
                registerReceiver(orderReceiver, of, Context.RECEIVER_EXPORTED);
              else registerReceiver(orderReceiver, of);
              showServiceNotification();
            }
            @Override public int onStartCommand(Intent intent, int flags, int startId) { return START_STICKY; }
            @Override public IBinder onBind(Intent intent) { return null; }
            void showServiceNotification() {
              boolean en = prefs != null && prefs.getBoolean("enabled", false);
              NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
              nm.createNotificationChannel(new NotificationChannel(
                "jahez_svc", "Jahez Auto Service", NotificationManager.IMPORTANCE_LOW));
              PendingIntent pi = PendingIntent.getBroadcast(this, 0,
                new Intent("JAHEZ_TOGGLE").setPackage(getPackageName()),
                PendingIntent.FLAG_IMMUTABLE | PendingIntent.FLAG_UPDATE_CURRENT);
              Notification notif = new Notification.Builder(this, "jahez_svc")
                .setContentTitle("Jahez Auto")
                .setContentText(en ? "Auto Accept: ON" : "Auto Accept: OFF")
                .setSmallIcon(android.R.drawable.ic_media_play)
                .setOngoing(true)
                .addAction(new Notification.Action.Builder(
                  en ? android.R.drawable.ic_media_pause : android.R.drawable.ic_media_play,
                  en ? "✅ ON — tap to OFF" : "⏸ OFF — tap to ON", pi).build())
                .build();
              startForeground(1, notif);
              nm.notify(1, notif);
            }
            void processOrderGps(double pickupLat, double pickupLon, double dropDist) {
              if (prefs == null || !prefs.getBoolean("enabled", false)) return;
              long now = System.currentTimeMillis();
              if (now - lastEvent < 1500) return;
              lastEvent = now;
              float pickupDistKm = -1;
              try {
                android.location.LocationManager lm =
                  (android.location.LocationManager) getSystemService(LOCATION_SERVICE);
                android.location.Location loc = null;
                try { loc = lm.getLastKnownLocation(android.location.LocationManager.GPS_PROVIDER); } catch (Exception ignored) {}
                if (loc == null) try { loc = lm.getLastKnownLocation(android.location.LocationManager.NETWORK_PROVIDER); } catch (Exception ignored) {}
                if (loc != null && pickupLat > 0 && pickupLon > 0) {
                  float[] res = new float[1];
                  android.location.Location.distanceBetween(
                    loc.getLatitude(), loc.getLongitude(), pickupLat, pickupLon, res);
                  pickupDistKm = res[0] / 1000f;
                }
              } catch (Exception e) { saveLog("GPS error: " + e.getMessage()); }
              float maxPickup = prefs.getFloat("max_pickup", 2.0f);
              float maxDrop   = prefs.getFloat("max_drop",   5.0f);
              float dropKm    = (float) dropDist;
              saveLog(String.format("Pickup=%.2fkm(max%.1f) Drop=%.2fkm(max%.1f)",
                pickupDistKm, maxPickup, dropKm, maxDrop));
              boolean pickupOk = pickupDistKm < 0 || pickupDistKm <= maxPickup;
              boolean dropOk   = dropKm < 0      || dropKm <= maxDrop;
              if (pickupOk && dropOk) {
                sendBroadcast(new Intent("JAHEZ_DO_ACCEPT").setPackage("net.jahez.fleets"));
                prefs.edit().putBoolean("enabled", false).apply();
                sendBroadcast(new Intent("JAHEZ_AUTO_OFF"));
                showServiceNotification();
                String msg = "✅ ACCEPTED — Pickup " + fmt(pickupDistKm) + "km | Drop " + fmt(dropKm) + "km";
                toast(msg); saveLog(msg);
              } else {
                String r = "";
                if (!pickupOk) r += "Pickup " + fmt(pickupDistKm) + "km > max " + fmt(maxPickup) + "km";
                if (!dropOk)   r += (r.isEmpty() ? "" : " | ") + "Drop " + fmt(dropKm) + "km > max " + fmt(maxDrop) + "km";
                toast("❌ SKIP — " + r); saveLog("❌ SKIP — " + r);
              }
            }
            void saveLog(String msg) {
              java.text.SimpleDateFormat sdf = new java.text.SimpleDateFormat("HH:mm:ss.SSS", java.util.Locale.getDefault());
              String entry = "[" + sdf.format(new java.util.Date()) + "]  " + msg;
              String existing = prefs.getString("logs", "");
              String[] lines = existing.isEmpty() ? new String[0] : existing.split("\n");
              StringBuilder sb = new StringBuilder(entry);
              for (int i = 0; i < lines.length && i < 99; i++) sb.append("\n").append(lines[i]);
              prefs.edit().putString("logs", sb.toString()).apply();
            }
            void toast(String msg) {
              new Handler(Looper.getMainLooper()).post(() ->
                android.widget.Toast.makeText(getApplicationContext(), msg, android.widget.Toast.LENGTH_LONG).show());
            }
            String fmt(float v) { return v < 0 ? "?" : String.format("%.1f", v); }
            @Override public void onDestroy() {
              super.onDestroy();
              try { unregisterReceiver(toggleReceiver); } catch (Exception ignored) {}
              try { unregisterReceiver(orderReceiver);  } catch (Exception ignored) {}
            }
          }
          SEOF

