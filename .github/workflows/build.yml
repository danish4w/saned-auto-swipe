name: Build AutoDriver v22 Dual Xposed+Pine

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          cat > gradle/wrapper/gradle-wrapper.properties << 'WEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/zips
          WEOF

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/auto/driver
          mkdir -p app/src/main/res/{layout,values,xml,drawable,mipmap-anydpi-v26}
          mkdir -p app/src/main/assets

      - name: Write Gradle Files
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositories {
              google()
              mavenCentral()
              maven { url 'https://api.xposed.info/' }
            }
          }
          rootProject.name = "AutoDriver"
          include ':app'
          EOF
          cat > build.gradle << 'EOF'
          plugins {
            id 'com.android.application' version '8.5.2' apply false
          }
          EOF
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF
          cat > app/build.gradle << 'EOF'
          plugins {
            id 'com.android.application'
          }
          android {
            namespace 'com.auto.driver'
            compileSdk 34
            defaultConfig {
              applicationId 'com.auto.driver'
              minSdk 26
              targetSdk 34
              versionCode 22
              versionName '22.0'
            }
            buildTypes {
              release {
                minifyEnabled false
              }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.google.android.material:material:1.12.0'
            compileOnly 'de.robv.android.xposed:api:82'
            // Pine core (includes Xposed compatibility)
            implementation 'top.canyie.pine:core:0.2.9'
          }
          EOF

      - name: Write Icons and Config
        run: |
          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#1B5E20" android:pathData="M0,0 L108,0 L108,108 L0,108 Z"/>
          </vector>
          EOF
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#FFFFFF" android:pathData="M25,54 L35,44 L47,60 L73,30 L83,40 L47,82 Z"/>
          </vector>
          EOF
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          cat > app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="false">
              <trust-anchors><certificates src="system"/></trust-anchors>
            </base-config>
          </network-security-config>
          EOF
          echo "com.auto.driver.SanedHook" > app/src/main/assets/xposed_init

      - name: Write Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC"/>
            <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
            <application android:label="Auto Driver" android:icon="@mipmap/ic_launcher"
              android:roundIcon="@mipmap/ic_launcher_round" android:theme="@style/AppTheme"
              android:allowBackup="false" android:networkSecurityConfig="@xml/network_security_config">
              <meta-data android:name="xposedmodule" android:value="true"/>
              <meta-data android:name="xposeddescription" android:value="Auto Driver v22 - Dual Xposed+Pine Fallback"/>
              <meta-data android:name="xposedminversion" android:value="82"/>
              <activity android:name=".MainActivity" android:exported="true"
                android:windowSoftInputMode="stateHidden|adjustPan">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
              <activity android:name=".LogActivity" android:exported="false"/>
              <service android:name=".AutoService" android:exported="false"
                android:foregroundServiceType="dataSync"/>
              <receiver android:name=".BootReceiver" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.BOOT_COMPLETED"/>
                </intent-filter>
              </receiver>
            </application>
          </manifest>
          EOF

      - name: Write SanedHook.java (Dual Fixed)
        run: |
          cat > app/src/main/java/com/auto/driver/SanedHook.java << 'HEOF'
          package com.auto.driver;

          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.os.SystemClock;
          import android.util.DisplayMetrics;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.TextView;

          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;

          import java.net.URLConnection;
          import java.lang.reflect.Method;

          // Pine imports - fixed package names
          import top.canyie.pine.Pine;
          import top.canyie.pine.PineConfig;
          import top.canyie.pine.callback.MethodHook;

          public class SanedHook implements IXposedHookLoadPackage {

              static final String TARGET         = "net.jahez.fleets";
              static final String OUR_PKG        = "com.auto.driver";
              static final String ORDER_ACTIVITY = "net.jahez.fleets.dispatch.accept.IncomingDispatchActivity";

              private volatile String capturedToken = "";
              private volatile int tokenCount = 0;
              private volatile android.app.Activity currentOrderActivity = null;
              private long lastBcast = 0;
              private boolean swipeReceiverRegistered = false;
              private boolean pineInitialized = false;
              private boolean pineFallbackActive = false;
              private static boolean xposedOkHttpSuccess = false;

              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lp) {
                  if (!TARGET.equals(lp.packageName)) return;
                  XposedBridge.log("[AutoDriver] v22 dual (Xposed+Pine) loading into " + lp.packageName);

                  hookActivityOnResume(lp);
                  hookURLConnection();
                  hookAuthDto(lp);
                  boolean xposedOkHttpOK = hookOkHttpXposed(lp);
                  
                  if (!xposedOkHttpOK) {
                      XposedBridge.log("[AutoDriver] Xposed OkHttp hook failed - Pine fallback will be activated");
                  } else {
                      xposedOkHttpSuccess = true;
                  }
              }

              private void hookActivityOnResume(XC_LoadPackage.LoadPackageParam lp) {
                  try {
                      XposedHelpers.findAndHookMethod(
                          "android.app.Activity", lp.classLoader, "onResume",
                          new XC_MethodHook() {
                              @Override
                              protected void afterHookedMethod(MethodHookParam param) {
                                  android.app.Activity act = (android.app.Activity) param.thisObject;
                                  String actName = act.getClass().getName();

                                  if (!xposedOkHttpSuccess && !pineInitialized && (actName.startsWith("net.jahez") || actName.startsWith("net.saned"))) {
                                      initPineAndHookOkHttp(act);
                                  }

                                  if (!swipeReceiverRegistered && (actName.startsWith("net.jahez") || actName.startsWith("net.saned"))) {
                                      registerSwipeReceiver(act);
                                      swipeReceiverRegistered = true;
                                  }

                                  if (!ORDER_ACTIVITY.equals(actName)) return;
                                  currentOrderActivity = act;

                                  long now = System.currentTimeMillis();
                                  if (now - lastBcast < 2000) return;
                                  lastBcast = now;

                                  try {
                                      Bundle extras = act.getIntent() != null ? act.getIntent().getExtras() : null;
                                      if (extras == null) {
                                          sendLog(act, "⚠️ extras null");
                                          return;
                                      }

                                      String requestId = extractRequestId(extras);
                                      double pickupLat = getDouble(extras, "EXTRA_DISPATCH_PICKUP_LATITUDE");
                                      double pickupLon = getDouble(extras, "EXTRA_DISPATCH_PICKUP_LONGITUDE");
                                      double dropDist  = getDouble(extras, "EXTRA_DISTANCE");
                                      double price     = getDouble(extras, "EXTRA_DELIVERY_PRICE");
                                      double bonus     = getDouble(extras, "EXTRA_BONUS_AMOUNT");

                                      String mode = pineFallbackActive ? "🌲 Pine Mode" : "🔧 Xposed Mode";
                                      String tkStatus = capturedToken.isEmpty() ? "❌ NO TOKEN (swipe)" : "✅ #" + tokenCount;

                                      sendLog(act, "📦 id=" + requestId + " drop=" + String.format("%.2f", dropDist) + "km"
                                          + " ₿" + price + "+" + bonus + " | " + tkStatus + " | " + mode);

                                      Intent bc = new Intent("JAHEZ_ORDER_DATA");
                                      bc.setPackage(OUR_PKG);
                                      bc.putExtra("request_id", requestId);
                                      bc.putExtra("pickup_lat", pickupLat);
                                      bc.putExtra("pickup_lon", pickupLon);
                                      bc.putExtra("drop_dist", dropDist);
                                      bc.putExtra("price", price);
                                      bc.putExtra("bonus", bonus);
                                      bc.putExtra("auth_token", capturedToken);
                                      bc.putExtra("has_token", !capturedToken.isEmpty());
                                      bc.putExtra("is_order", true);
                                      act.sendBroadcast(bc);
                                  } catch (Throwable e) {
                                      sendLog(act, "❌ order: " + e.getMessage());
                                  }
                              }
                          });
                      XposedBridge.log("[AutoDriver] ✅ onResume hook OK");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ onResume hook: " + e.getMessage());
                  }
              }

              private void registerSwipeReceiver(android.app.Activity act) {
                  try {
                      android.content.BroadcastReceiver swipeReceiver = new android.content.BroadcastReceiver() {
                          @Override
                          public void onReceive(Context ctx, Intent intent) {
                              if ("JAHEZ_DO_SWIPE".equals(intent.getAction())) {
                                  int delay = intent.getIntExtra("scan_delay", 500);
                                  new Handler(Looper.getMainLooper()).postDelayed(() -> {
                                      if (currentOrderActivity != null && !currentOrderActivity.isFinishing()) {
                                          doSwipe(currentOrderActivity);
                                      }
                                  }, delay);
                              }
                          }
                      };
                      IntentFilter filter = new IntentFilter("JAHEZ_DO_SWIPE");
                      if (android.os.Build.VERSION.SDK_INT >= 34) {
                          act.registerReceiver(swipeReceiver, filter, Context.RECEIVER_NOT_EXPORTED);
                      } else {
                          act.registerReceiver(swipeReceiver, filter);
                      }
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ registerSwipeReceiver: " + e.getMessage());
                  }
              }

              public void doSwipe(android.app.Activity act) {
                  new Handler(Looper.getMainLooper()).post(() -> {
                      try {
                          View root = act.getWindow().getDecorView();
                          View target = findAcceptView(root);
                          float startX, endX, y;
                          if (target != null && target.isShown() && target.getWidth() > 0) {
                              int[] loc = new int[2];
                              target.getLocationOnScreen(loc);
                              startX = loc[0] + 40;
                              endX = loc[0] + target.getWidth() - 40;
                              y = loc[1] + target.getHeight() / 2f;
                              sendLog(act, "🖱️ Swipe on: " + target.getClass().getSimpleName());
                          } else {
                              DisplayMetrics dm = new DisplayMetrics();
                              act.getWindowManager().getDefaultDisplay().getMetrics(dm);
                              startX = dm.widthPixels * 0.1f;
                              endX = dm.widthPixels * 0.9f;
                              y = dm.heightPixels * 0.85f;
                              sendLog(act, "🖱️ Swipe fallback coords");
                          }
                          performSwipe(root, startX, endX, y);
                          sendLog(act, "✅ Swipe done");
                      } catch (Throwable e) {
                          sendLog(act, "❌ Swipe error: " + e.getMessage());
                      }
                  });
              }

              private View findAcceptView(View root) {
                  if (root == null) return null;
                  if (root instanceof TextView) {
                      String txt = ((TextView) root).getText().toString().toUpperCase().trim();
                      for (String kw : new String[]{"ACCEPT","SWIPE","SLIDE","CONFIRM","قبول","موافق","اقبل"}) {
                          if (txt.contains(kw)) return root;
                      }
                  }
                  CharSequence cd = root.getContentDescription();
                  if (cd != null) {
                      String cdStr = cd.toString().toUpperCase();
                      for (String kw : new String[]{"ACCEPT","SWIPE","SLIDE"}) {
                          if (cdStr.contains(kw)) return root;
                      }
                  }
                  if (root instanceof ViewGroup) {
                      ViewGroup vg = (ViewGroup) root;
                      for (int i = 0; i < vg.getChildCount(); i++) {
                          View found = findAcceptView(vg.getChildAt(i));
                          if (found != null) return found;
                      }
                  }
                  return null;
              }

              private void performSwipe(View root, float startX, float endX, float y) {
                  long down = SystemClock.uptimeMillis();
                  MotionEvent downEvent = MotionEvent.obtain(down, down, MotionEvent.ACTION_DOWN, startX, y, 0);
                  root.dispatchTouchEvent(downEvent);
                  downEvent.recycle();
                  int steps = 20;
                  for (int i = 1; i <= steps; i++) {
                      float x = startX + (endX - startX) * i / steps;
                      long eventTime = down + (i * 8);
                      MotionEvent moveEvent = MotionEvent.obtain(down, eventTime, MotionEvent.ACTION_MOVE, x, y, 0);
                      root.dispatchTouchEvent(moveEvent);
                      moveEvent.recycle();
                      try { Thread.sleep(5); } catch (InterruptedException ignored) {}
                  }
                  long upTime = down + (steps * 8) + 20;
                  MotionEvent upEvent = MotionEvent.obtain(down, upTime, MotionEvent.ACTION_UP, endX, y, 0);
                  root.dispatchTouchEvent(upEvent);
                  upEvent.recycle();
              }

              private void hookURLConnection() {
                  XC_MethodHook hook = new XC_MethodHook() {
                      @Override
                      protected void beforeHookedMethod(MethodHookParam param) {
                          try {
                              String key = (String) param.args[0];
                              if (!"Authorization".equals(key)) return;
                              String value = (String) param.args[1];
                              if (value == null || value.length() < 10) return;
                              try {
                                  String url = XposedHelpers.callMethod(param.thisObject, "getURL").toString();
                                  if (!url.contains("saned.io") && !url.contains("jahez")) return;
                              } catch (Throwable ignored) {}
                              if (!value.equals(capturedToken)) {
                                  capturedToken = value;
                                  tokenCount++;
                                  XposedBridge.log("[AutoDriver] 🔑 Token #" + tokenCount + " [URLConn]");
                              }
                          } catch (Throwable ignored) {}
                      }
                  };
                  try {
                      XposedBridge.hookAllMethods(URLConnection.class, "setRequestProperty", hook);
                      XposedBridge.hookAllMethods(URLConnection.class, "addRequestProperty", hook);
                      XposedBridge.log("[AutoDriver] ✅ URLConnection hooks OK");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ URLConnection: " + e.getMessage());
                  }
              }

              private void hookAuthDto(XC_LoadPackage.LoadPackageParam lp) {
                  try {
                      Class<?> dtoClass = lp.classLoader.loadClass("net.saned.login.remote.model.dto.AuthAccessTokenDto");
                      XposedBridge.hookAllMethods(dtoClass, "<init>", new XC_MethodHook() {
                          @Override
                          protected void afterHookedMethod(MethodHookParam param) {
                              captureTokenFromDto(param.thisObject);
                          }
                      });
                      XposedBridge.log("[AutoDriver] ✅ AuthAccessTokenDto hook OK");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ⚠️ AuthAccessTokenDto not found: " + e.getMessage());
                  }
              }

              private void captureTokenFromDto(Object dto) {
                  try {
                      String token = null;
                      for (String fn : new String[]{"accessToken", "access_token", "token"}) {
                          try { token = (String) XposedHelpers.getObjectField(dto, fn); if (token != null && !token.isEmpty()) break; } catch (Throwable ignored) {}
                      }
                      if (token == null || token.isEmpty()) {
                          for (String mn : new String[]{"getAccessToken", "getToken", "component1"}) {
                              try { Object r = XposedHelpers.callMethod(dto, mn); if (r instanceof String) { token = (String) r; if (!token.isEmpty()) break; } } catch (Throwable ignored) {}
                          }
                      }
                      if (token != null && token.length() > 10) {
                          String bearer = token.startsWith("Bearer ") ? token : "Bearer " + token;
                          if (!bearer.equals(capturedToken)) {
                              capturedToken = bearer;
                              tokenCount++;
                              XposedBridge.log("[AutoDriver] 🔑 Token #" + tokenCount + " [AuthDto]");
                          }
                      }
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ⚠️ captureTokenFromDto: " + e.getMessage());
                  }
              }

              private boolean hookOkHttpXposed(XC_LoadPackage.LoadPackageParam lp) {
                  try {
                      Class<?> chainClass = lp.classLoader.loadClass("okhttp3.internal.http.RealInterceptorChain");
                      Method proceed = chainClass.getDeclaredMethod("proceed", Class.forName("okhttp3.Request"));
                      XposedBridge.hookMethod(proceed, new XC_MethodHook() {
                          @Override
                          protected void beforeHookedMethod(MethodHookParam param) {
                              extractTokenFromRequest(param.args[0], "Xposed-OkHttp");
                          }
                      });
                      XposedBridge.log("[AutoDriver] ✅ Xposed OkHttp hook OK");
                      return true;
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] Xposed OkHttp hook failed: " + e.getMessage());
                      return false;
                  }
              }

              private void initPineAndHookOkHttp(android.app.Activity act) {
                  try {
                      XposedBridge.log("[AutoDriver] Initializing Pine fallback...");
                      Context ctx = act.getApplicationContext();
                      PineConfig.debug = true;
                      Pine.init(ctx);
                      
                      ClassLoader cl = act.getClassLoader();
                      Class<?> chainClass = cl.loadClass("okhttp3.internal.http.RealInterceptorChain");
                      Method proceed = chainClass.getDeclaredMethod("proceed", Class.forName("okhttp3.Request"));
                      
                      Pine.hook(proceed, new MethodHook() {
                          @Override
                          public void beforeCall(Pine.CallFrame callFrame) {
                              extractTokenFromRequest(callFrame.args[0], "Pine-OkHttp");
                          }
                      });
                      pineInitialized = true;
                      pineFallbackActive = true;
                      XposedBridge.log("[AutoDriver] ✅ Pine OkHttp hook successful (fallback active)");
                      sendLog(act, "🌲 Pine fallback active – token capture via Pine");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ Pine fallback failed: " + e.getMessage());
                      sendLog(act, "❌ Pine fallback failed: " + e.getMessage());
                  }
              }

              private void extractTokenFromRequest(Object request, String source) {
                  if (request == null) return;
                  try {
                      Object headers = XposedHelpers.callMethod(request, "headers");
                      String auth = (String) XposedHelpers.callMethod(headers, "get", "Authorization");
                      if (auth == null || auth.length() < 10) return;
                      if (!auth.equals(capturedToken)) {
                          capturedToken = auth;
                          tokenCount++;
                          XposedBridge.log("[AutoDriver] 🔑 Token #" + tokenCount + " [" + source + "]");
                      }
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] extractToken error: " + e.getMessage());
                  }
              }

              private String extractRequestId(Bundle b) {
                  try {
                      Object v = b.get("EXTRA_DISPATCH_REQUEST_ID");
                      if (v instanceof String && !((String) v).isEmpty()) return (String) v;
                      if (v instanceof Long) return String.valueOf(v);
                      if (v instanceof Integer) return String.valueOf(v);
                      String s = b.getString("EXTRA_DISPATCH_REQUEST_ID");
                      if (s != null && !s.isEmpty()) return s;
                      long l = b.getLong("EXTRA_DISPATCH_REQUEST_ID", -1L);
                      if (l > 0) return String.valueOf(l);
                  } catch (Throwable ignored) {}
                  return "";
              }

              private void sendLog(android.app.Activity act, String msg) {
                  try {
                      Intent i = new Intent("JAHEZ_HOOK_LOG");
                      i.setPackage(OUR_PKG);
                      i.putExtra("log", msg);
                      act.sendBroadcast(i);
                  } catch (Throwable ignored) {}
              }

              private double getDouble(Bundle b, String key) {
                  try {
                      Object v = b.get(key);
                      if (v instanceof Double) return (Double) v;
                      if (v instanceof Float) return (Float) v;
                      if (v instanceof String) return Double.parseDouble((String) v);
                      if (v instanceof Integer) return (Integer) v;
                      if (v instanceof Long) return (Long) v;
                  } catch (Throwable ignored) {}
                  return -1;
              }
          }
          HEOF

      - name: Write AutoService.java (Location 1min)
        run: |
          cat > app/src/main/java/com/auto/driver/AutoService.java << 'SEOF'
          package com.auto.driver;

          import android.app.Notification; import android.app.NotificationChannel;
          import android.app.NotificationManager; import android.app.PendingIntent;
          import android.app.Service; import android.content.BroadcastReceiver;
          import android.content.Context; import android.content.Intent;
          import android.content.IntentFilter; import android.content.SharedPreferences;
          import android.location.Location; import android.location.LocationListener;
          import android.location.LocationManager; import android.os.Build;
          import android.os.Bundle; import android.os.Handler;
          import android.os.IBinder; import android.os.Looper;
          import java.io.InputStream; import java.net.HttpURLConnection;
          import java.net.URL; import java.text.SimpleDateFormat;
          import java.util.Date; import java.util.Locale;

          public class AutoService extends Service {
              static final String ACCEPT_URL = "https://gateway.saned.io/api/v1/dispatch/accept-dispatch/";
              static final String BASIC_AUTH = "Basic ZHJpdmVyczpjMjNmM2E4Ny1hYWYzLTRhNDQtYTgyZS1mYjZjYWM4MWJkMjA=";
              static final String TARGET = "net.jahez.fleets";

              SharedPreferences prefs;
              long lastEvent = 0;
              private volatile Location lastLocation = null;
              private LocationManager locationManager;
              private LocationListener locationListener;
              private boolean locationActive = false;

              private final BroadcastReceiver hookLogReceiver = new BroadcastReceiver() {
                  @Override public void onReceive(Context ctx, Intent intent) {
                      String msg = intent.getStringExtra("log");
                      if (msg != null) saveLog(msg);
                  }
              };
              private final BroadcastReceiver orderReceiver = new BroadcastReceiver() {
                  @Override public void onReceive(Context ctx, Intent intent) {
                      if (!intent.getBooleanExtra("is_order", false)) return;
                      String requestId = intent.getStringExtra("request_id");
                      String authToken = intent.getStringExtra("auth_token");
                      boolean hasToken = intent.getBooleanExtra("has_token", false);
                      double pickupLat = intent.getDoubleExtra("pickup_lat", -1);
                      double pickupLon = intent.getDoubleExtra("pickup_lon", -1);
                      double dropDist  = intent.getDoubleExtra("drop_dist",  -1);
                      double price     = intent.getDoubleExtra("price",       0);
                      double bonus     = intent.getDoubleExtra("bonus",       0);
                      saveLog("🪝 id=" + requestId + " drop=" + fmt2(dropDist) + "km ₿" + price + "+" + bonus);
                      processOrder(requestId, authToken, hasToken, pickupLat, pickupLon, dropDist);
                  }
              };
              private final BroadcastReceiver toggleReceiver = new BroadcastReceiver() {
                  @Override public void onReceive(Context ctx, Intent intent) {
                      if (prefs == null) prefs = getSharedPreferences("cfg", MODE_PRIVATE);
                      if ("JAHEZ_TOGGLE".equals(intent.getAction())) {
                          boolean cur = prefs.getBoolean("enabled", false);
                          prefs.edit().putBoolean("enabled", !cur).apply();
                          sendBroadcast(new Intent(!cur ? "JAHEZ_AUTO_ON" : "JAHEZ_AUTO_OFF"));
                          saveLog(!cur ? "▶️ Enabled" : "⏸ Disabled");
                      }
                      showNotification();
                  }
              };

              @Override public void onCreate() {
                  super.onCreate();
                  prefs = getSharedPreferences("cfg", MODE_PRIVATE);
                  IntentFilter tf = new IntentFilter("JAHEZ_TOGGLE");
                  tf.addAction("JAHEZ_STATE_CHANGED");
                  reg(toggleReceiver, tf, false);
                  reg(orderReceiver,   new IntentFilter("JAHEZ_ORDER_DATA"), true);
                  reg(hookLogReceiver, new IntentFilter("JAHEZ_HOOK_LOG"),   true);
                  showNotification();
                  startLocationUpdates();
                  saveLog("✅ AutoService v22 started (location 1min)");
              }

              void startLocationUpdates() {
                  if (locationActive) return;
                  locationManager = (LocationManager) getSystemService(LOCATION_SERVICE);
                  locationListener = new LocationListener() {
                      @Override public void onLocationChanged(Location loc) {
                          if (loc != null) {
                              lastLocation = loc;
                              saveLog("📍 Loc: " + loc.getLatitude() + "," + loc.getLongitude() + " acc:" + loc.getAccuracy());
                          }
                      }
                      @Override public void onStatusChanged(String p, int s, Bundle e) {}
                      @Override public void onProviderEnabled(String p) {}
                      @Override public void onProviderDisabled(String p) {}
                  };
                  try {
                      locationManager.requestLocationUpdates(LocationManager.GPS_PROVIDER, 60000, 10, locationListener);
                      locationActive = true;
                      saveLog("✅ GPS updates requested (60s)");
                      Location last = locationManager.getLastKnownLocation(LocationManager.GPS_PROVIDER);
                      if (last != null) { lastLocation = last; saveLog("📍 initial GPS: " + last.getLatitude() + "," + last.getLongitude()); }
                      else saveLog("⚠️ waiting for GPS fix...");
                  } catch (SecurityException e) {
                      saveLog("❌ Location permission missing");
                  } catch (Exception e) {
                      saveLog("❌ Location error: " + e.getMessage());
                  }
              }

              void reg(BroadcastReceiver r, IntentFilter f, boolean exported) {
                  if (Build.VERSION.SDK_INT >= 33) {
                      registerReceiver(r, f, exported ? Context.RECEIVER_EXPORTED : Context.RECEIVER_NOT_EXPORTED);
                  } else {
                      registerReceiver(r, f);
                  }
              }

              @Override public int onStartCommand(Intent i, int flags, int id) { return START_STICKY; }
              @Override public IBinder onBind(Intent i) { return null; }

              void processOrder(String requestId, String authToken, boolean hasToken,
                                double pickupLat, double pickupLon, double dropDist) {
                  if (!prefs.getBoolean("enabled", false)) { saveLog("⏸ Disabled"); return; }
                  long now = System.currentTimeMillis();
                  if (now - lastEvent < 2000) { saveLog("⚡ Debounce"); return; }
                  lastEvent = now;
                  if (requestId == null || requestId.isEmpty()) { saveLog("❌ requestId empty"); return; }

                  float pickupKm = calcPickupDist(pickupLat, pickupLon);
                  float maxPickup = prefs.getFloat("max_pickup", 2.0f);
                  float maxDrop   = prefs.getFloat("max_drop", 5.0f);
                  float dropKm    = dropDist > 0 ? (float) dropDist : -1f;
                  String locInfo = lastLocation != null ? ((System.currentTimeMillis()-lastLocation.getTime())/1000)+"s" : "N/A";
                  saveLog(String.format("📏 Pickup=%s/%skm Drop=%s/%skm loc:%s",
                      fmt1(pickupKm), fmt1(maxPickup), fmt1(dropKm), fmt1(maxDrop), locInfo));

                  boolean pickupOk = pickupKm < 0 || pickupKm <= maxPickup;
                  boolean dropOk   = dropKm < 0 || dropKm <= maxDrop;
                  if (!pickupOk || !dropOk) {
                      StringBuilder r = new StringBuilder();
                      if (!pickupOk) r.append("Pickup ").append(fmt1(pickupKm)).append(">").append(fmt1(maxPickup)).append("km");
                      if (!dropOk) { if (r.length()>0) r.append("  "); r.append("Drop ").append(fmt1(dropKm)).append(">").append(fmt1(maxDrop)).append("km"); }
                      String msg = "❌ SKIP — " + r;
                      toast(msg); saveLog(msg); return;
                  }

                  int delay = prefs.getInt("scan_delay", 500);
                  if (hasToken && authToken != null && authToken.length() > 20) {
                      saveLog("✅ Filter pass! API in " + delay + "ms");
                      final String fa = authToken;
                      new Handler(Looper.getMainLooper()).postDelayed(() -> callAcceptApi(requestId, fa, pickupKm, dropKm), delay);
                  } else {
                      saveLog("✅ Filter pass! Swipe in " + delay + "ms (no token)");
                      new Handler(Looper.getMainLooper()).postDelayed(() -> {
                          Intent swipeIntent = new Intent("JAHEZ_DO_SWIPE");
                          swipeIntent.setPackage(TARGET);
                          swipeIntent.putExtra("scan_delay", delay);
                          sendBroadcast(swipeIntent);
                      }, delay);
                  }
              }

              void callAcceptApi(String requestId, String authHeader, float pickupKm, float dropKm) {
                  new Thread(() -> {
                      String urlStr = ACCEPT_URL + requestId;
                      saveLog("🌐 PUT " + urlStr);
                      HttpURLConnection conn = null;
                      try {
                          conn = (HttpURLConnection) new URL(urlStr).openConnection();
                          conn.setRequestMethod("PUT");
                          conn.setRequestProperty("Authorization", authHeader);
                          conn.setRequestProperty("Content-Type", "application/json");
                          conn.setRequestProperty("Accept", "application/json");
                          conn.setConnectTimeout(5000); conn.setReadTimeout(5000);
                          conn.setDoOutput(false);
                          int code = conn.getResponseCode();
                          if (code == 200 || code == 201 || code == 204) {
                              String msg = "🎉 ACCEPTED! HTTP " + code + " P=" + fmt1(pickupKm) + "km D=" + fmt1(dropKm) + "km";
                              toast(msg); saveLog(msg);
                          } else {
                              String body = readStream(conn.getErrorStream(), 400);
                              String msg = "❌ HTTP " + code + " — " + body;
                              if (code == 401) msg += " → Token expire";
                              if (code == 409) msg += " → Already accepted";
                              if (code == 404) msg += " → Order expire";
                              toast(msg); saveLog(msg);
                          }
                          showNotification();
                      } catch (Exception e) { saveLog("❌ Network: " + e.getMessage()); }
                      finally { if (conn != null) conn.disconnect(); }
                  }, "accept-thread").start();
              }

              float calcPickupDist(double lat, double lon) {
                  if (lat <= 0 || lon <= 0) return -1;
                  if (lastLocation == null) { saveLog("⚠️ No location yet"); return -1; }
                  try {
                      float[] res = new float[1];
                      Location.distanceBetween(lastLocation.getLatitude(), lastLocation.getLongitude(), lat, lon, res);
                      return res[0] / 1000f;
                  } catch (Exception e) { return -1; }
              }

              void showNotification() {
                  boolean on = prefs != null && prefs.getBoolean("enabled", false);
                  NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                  if (Build.VERSION.SDK_INT >= 26) {
                      nm.createNotificationChannel(new NotificationChannel("auto_svc", "Auto Driver", NotificationManager.IMPORTANCE_LOW));
                  }
                  Intent ti = new Intent("JAHEZ_TOGGLE").setPackage(getPackageName());
                  PendingIntent tp = PendingIntent.getBroadcast(this, 0, ti, PendingIntent.FLAG_IMMUTABLE|PendingIntent.FLAG_UPDATE_CURRENT);
                  Notification.Builder b = new Notification.Builder(this, "auto_svc")
                      .setContentTitle("Auto Driver").setContentText(on ? "Auto Accept: ON" : "Auto Accept: OFF")
                      .setSmallIcon(android.R.drawable.ic_media_play).setOngoing(true);
                  if (Build.VERSION.SDK_INT >= 23) {
                      b.addAction(new Notification.Action.Builder(
                          on ? android.R.drawable.ic_media_pause : android.R.drawable.ic_media_play,
                          on ? "✅ ON — tap OFF" : "⏸ OFF — tap ON", tp).build());
                  }
                  startForeground(1, b.build());
              }

              void saveLog(String msg) {
                  String entry = "[" + new SimpleDateFormat("HH:mm:ss.SSS", Locale.getDefault()).format(new Date()) + "]  " + msg;
                  String existing = prefs.getString("logs", "");
                  String[] lines = existing.isEmpty() ? new String[0] : existing.split("\n");
                  StringBuilder sb = new StringBuilder(entry);
                  for (int i = 0; i < lines.length && i < 150; i++) sb.append("\n").append(lines[i]);
                  prefs.edit().putString("logs", sb.toString()).apply();
              }

              void toast(String msg) {
                  new Handler(Looper.getMainLooper()).post(() ->
                      android.widget.Toast.makeText(getApplicationContext(), msg, android.widget.Toast.LENGTH_LONG).show());
              }

              String fmt1(float v)  { return v < 0 ? "?" : String.format("%.1f", v); }
              String fmt2(double v) { return v < 0 ? "?" : String.format("%.2f", v); }
              String readStream(InputStream is, int max) {
                  if (is == null) return "";
                  try { byte[] b = new byte[max]; int n = is.read(b); return n > 0 ? new String(b,0,n).trim() : ""; }
                  catch (Exception e) { return ""; }
              }

              @Override public void onDestroy() {
                  super.onDestroy();
                  if (locationManager != null && locationListener != null) {
                      try { locationManager.removeUpdates(locationListener); } catch (SecurityException ignored) {}
                  }
                  try { unregisterReceiver(toggleReceiver); } catch (Exception ignored) {}
                  try { unregisterReceiver(orderReceiver);  } catch (Exception ignored) {}
                  try { unregisterReceiver(hookLogReceiver); } catch (Exception ignored) {}
              }
          }
          SEOF

