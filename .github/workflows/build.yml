name: Build FastTap - Auto Accept App
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build FastTap APK
        run: |
          mkdir -p app/src/main/java/com/fasttap
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          echo "include ':app'" > settings.gradle

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.fasttap'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.fasttap'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_LOGS"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <application
                  android:label="FastTap"
                  android:theme="@style/Theme.AppCompat">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".FastTapService"
                      android:exported="false"
                      android:foregroundServiceType="dataSync"/>
                  <activity android:name=".LogActivity" android:label="Live Logs"/>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">FastTap</string>
          </resources>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="20dp"
              android:background="#121212">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="FastTap - Auto Accept" android:textSize="24sp"
                  android:textColor="#1DB954" android:textStyle="bold" android:layout_gravity="center"/>
              <TextView android:id="@+id/tv_status" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="Service Stopped"
                  android:textSize="16sp" android:textColor="#FF5555" android:layout_marginTop="20dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="Accept Button Coordinates" android:textColor="#AAAAAA" android:layout_marginTop="20dp"/>
              <EditText android:id="@+id/et_x" android:layout_width="match_parent"
                  android:layout_height="wrap_content" android:hint="X" android:inputType="number"
                  android:text="540" android:textColor="#FFFFFF" android:background="#333333" android:padding="10dp"/>
              <EditText android:id="@+id/et_y" android:layout_width="match_parent"
                  android:layout_height="wrap_content" android:hint="Y" android:inputType="number"
                  android:text="1800" android:textColor="#FFFFFF" android:background="#333333" android:padding="10dp"/>
              <Button android:id="@+id/btn_start" android:layout_width="match_parent"
                  android:layout_height="55dp" android:text="START SERVICE" android:backgroundTint="#4CAF50"
                  android:layout_marginTop="20dp"/>
              <Button android:id="@+id/btn_stop" android:layout_width="match_parent"
                  android:layout_height="55dp" android:text="STOP SERVICE" android:backgroundTint="#F44336"
                  android:layout_marginTop="10dp"/>
              <Button android:id="@+id/btn_logs" android:layout_width="match_parent"
                  android:layout_height="55dp" android:text="LIVE LOGS" android:backgroundTint="#2196F3"
                  android:layout_marginTop="10dp"/>
          </LinearLayout>
          EOF

          cat > app/src/main/res/layout/activity_log.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#000000" android:padding="10dp">
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:text="Live Logs" android:textSize="20sp" android:textColor="#4CAF50" android:gravity="center"/>
              <ScrollView android:id="@+id/log_scroll" android:layout_width="match_parent"
                  android:layout_height="0dp" android:layout_weight="1">
                  <TextView android:id="@+id/tv_logs" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:textColor="#00FF00"
                      android:fontFamily="monospace" android:textSize="10sp" android:text="Waiting for orders..."/>
              </ScrollView>
              <Button android:id="@+id/btn_clear" android:layout_width="match_parent"
                  android:layout_height="wrap_content" android:text="CLEAR" android:backgroundTint="#F44336"/>
          </LinearLayout>
          EOF

          cat > app/src/main/java/com/fasttap/MainActivity.java << 'EOF'
          package com.fasttap;

          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private EditText etX, etY;
              private TextView tvStatus;
              private Button btnStart, btnStop, btnLogs;
              private SharedPreferences prefs;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  prefs = getSharedPreferences("fasttap_prefs", MODE_PRIVATE);

                  etX = findViewById(R.id.et_x);
                  etY = findViewById(R.id.et_y);
                  tvStatus = findViewById(R.id.tv_status);
                  btnStart = findViewById(R.id.btn_start);
                  btnStop = findViewById(R.id.btn_stop);
                  btnLogs = findViewById(R.id.btn_logs);

                  etX.setText(String.valueOf(prefs.getInt("x", 540)));
                  etY.setText(String.valueOf(prefs.getInt("y", 1800)));

                  btnStart.setOnClickListener(v -> {
                      int x = Integer.parseInt(etX.getText().toString());
                      int y = Integer.parseInt(etY.getText().toString());
                      prefs.edit().putInt("x", x).putInt("y", y).apply();
                      Intent svc = new Intent(this, FastTapService.class);
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          startForegroundService(svc);
                      } else {
                          startService(svc);
                      }
                      tvStatus.setText("Service Running");
                      tvStatus.setTextColor(0xFF4CAF50);
                      Toast.makeText(this, "Service started", Toast.LENGTH_SHORT).show();
                  });

                  btnStop.setOnClickListener(v -> {
                      stopService(new Intent(this, FastTapService.class));
                      tvStatus.setText("Service Stopped");
                      tvStatus.setTextColor(0xFFFF5555);
                      Toast.makeText(this, "Service stopped", Toast.LENGTH_SHORT).show();
                  });

                  btnLogs.setOnClickListener(v -> startActivity(new Intent(this, LogActivity.class)));
              }
          }
          EOF

          cat > app/src/main/java/com/fasttap/FastTapService.java << 'EOF'
          package com.fasttap;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.Service;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.IBinder;
          import android.util.Log;
          import java.io.BufferedReader;
          import java.io.InputStreamReader;

          public class FastTapService extends Service {
              private static final String TAG = "FastTap";
              private static final String CHANNEL_ID = "fasttap_ch";
              private static final int NOTIF_ID = 3001;

              private Thread monitorThread;
              private boolean running = false;
              private int tapX = 540, tapY = 1800;

              private void log(String msg) {
                  Log.d(TAG, msg);
                  Intent i = new Intent("FASTTAP_LOG_ACTION");
                  i.setPackage("com.fasttap");
                  i.putExtra("log_msg", msg);
                  sendBroadcast(i);
              }

              private String exec(String cmd) {
                  try {
                      Process p = Runtime.getRuntime().exec(new String[]{"su", "-c", cmd});
                      BufferedReader br = new BufferedReader(new InputStreamReader(p.getInputStream()));
                      StringBuilder sb = new StringBuilder();
                      String line;
                      while ((line = br.readLine()) != null) sb.append(line).append("\n");
                      p.waitFor();
                      return sb.toString().trim();
                  } catch (Exception e) {
                      log("exec error: " + e.getMessage());
                      return "";
                  }
              }

              private void startForegroundService() {
                  NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(CHANNEL_ID, "FastTap", NotificationManager.IMPORTANCE_LOW);
                      nm.createNotificationChannel(channel);
                  }
                  Notification.Builder builder = Build.VERSION.SDK_INT >= Build.VERSION_CODES.O
                          ? new Notification.Builder(this, CHANNEL_ID)
                          : new Notification.Builder(this);
                  builder.setContentTitle("FastTap")
                         .setContentText("Monitoring orders (fast mode)")
                         .setSmallIcon(android.R.drawable.ic_menu_compass)
                         .setOngoing(true);
                  startForeground(NOTIF_ID, builder.build());
                  log("Foreground service started");
              }

              @Override
              public void onCreate() {
                  super.onCreate();
                  SharedPreferences prefs = getSharedPreferences("fasttap_prefs", MODE_PRIVATE);
                  tapX = prefs.getInt("x", 540);
                  tapY = prefs.getInt("y", 1800);
                  log("Service created. Tap coordinates: " + tapX + "," + tapY);
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  startForegroundService();
                  if (monitorThread != null && monitorThread.isAlive()) return START_STICKY;
                  running = true;
                  monitorThread = new Thread(() -> {
                      log("Monitor thread started (logcat streaming)");
                      Process logcat = null;
                      try {
                          // Clear previous logs
                          exec("logcat -c");
                          // Start logcat streaming with grep for "IncomingDispatchActivity"
                          logcat = Runtime.getRuntime().exec(new String[]{"su", "-c", "logcat"});
                          BufferedReader reader = new BufferedReader(new InputStreamReader(logcat.getInputStream()));
                          String line;
                          while (running && (line = reader.readLine()) != null) {
                              if (line.contains("IncomingDispatchActivity")) {
                                  log("✅ Order screen detected! Tapping in 100ms...");
                                  // Small delay for UI to settle
                                  Thread.sleep(100);
                                  exec("input tap " + tapX + " " + tapY);
                                  log("✅ Tap executed at " + tapX + "," + tapY);
                                  // Send notification
                                  exec("cmd notification post -S bigtext -t 'Order Accepted' 'Tag' 'Auto accepted by FastTap'");
                                  // Clear logs to avoid duplicate triggers
                                  exec("logcat -c");
                                  // Cooldown 5 seconds
                                  Thread.sleep(5000);
                              }
                          }
                      } catch (Exception e) {
                          log("Monitor error: " + e.getMessage());
                      } finally {
                          if (logcat != null) try { logcat.destroy(); } catch (Exception e) {}
                      }
                      log("Monitor thread stopped");
                  });
                  monitorThread.start();
                  return START_STICKY;
              }

              @Override
              public void onDestroy() {
                  running = false;
                  if (monitorThread != null) monitorThread.interrupt();
                  stopForeground(true);
                  log("Service destroyed");
                  super.onDestroy();
              }

              @Override
              public IBinder onBind(Intent intent) { return null; }
          }
          EOF

          cat > app/src/main/java/com/fasttap/LogActivity.java << 'EOF'
          package com.fasttap;

          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.os.Build;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;

          public class LogActivity extends AppCompatActivity {
              private TextView tvLogs;
              private ScrollView scrollView;
              private final BroadcastReceiver receiver = new BroadcastReceiver() {
                  @Override
                  public void onReceive(Context context, Intent intent) {
                      String msg = intent.getStringExtra("log_msg");
                      if (msg != null && tvLogs != null) {
                          tvLogs.append("\n" + msg);
                          if (scrollView != null) {
                              scrollView.post(() -> scrollView.fullScroll(ScrollView.FOCUS_DOWN));
                          }
                      }
                  }
              };

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_log);
                  tvLogs = findViewById(R.id.tv_logs);
                  scrollView = findViewById(R.id.log_scroll);
                  Button btnClear = findViewById(R.id.btn_clear);
                  btnClear.setOnClickListener(v -> tvLogs.setText("--- Cleared ---"));

                  IntentFilter filter = new IntentFilter("FASTTAP_LOG_ACTION");
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      registerReceiver(receiver, filter, Context.RECEIVER_NOT_EXPORTED);
                  } else if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      registerReceiver(receiver, filter, Context.RECEIVER_EXPORTED);
                  } else {
                      registerReceiver(receiver, filter);
                  }
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  unregisterReceiver(receiver);
              }
          }
          EOF

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FastTap
          path: app/build/outputs/apk/debug/*.apk
