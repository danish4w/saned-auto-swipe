name: Build LogCat Master
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Project
        run: |
          mkdir -p app/src/main/java/com/logcat/master
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          echo "include ':app'" > settings.gradle

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.logcat.master'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.logcat.master'
                  minSdk 26
                  targetSdk 34
                  versionCode 2
                  versionName '2.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_LOGS"/>
              <application
                  android:label="LogCat Master"
                  android:theme="@style/Theme.AppCompat">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">LogCat Master</string>
          </resources>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="#121212"
              android:padding="16dp">

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="📋 LogCat Master"
                  android:textSize="20sp"
                  android:textColor="#FFFFFF"
                  android:textStyle="bold"
                  android:layout_gravity="center"
                  android:layout_marginBottom="5dp"/>

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Custom Log Viewer"
                  android:textSize="12sp"
                  android:textColor="#AAAAAA"
                  android:layout_gravity="center"
                  android:layout_marginBottom="20dp"/>

              <!-- Custom Filter Input -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:layout_marginBottom="10dp">

                  <EditText
                      android:id="@+id/et_custom_filter"
                      android:layout_width="0dp"
                      android:layout_height="45dp"
                      android:layout_weight="1"
                      android:hint="Enter app name (e.g., jahez, saned)"
                      android:textColor="#FFFFFF"
                      android:textColorHint="#888888"
                      android:background="#333333"
                      android:padding="10dp"
                      android:layout_marginEnd="5dp"/>

                  <Button
                      android:id="@+id/btn_custom"
                      android:layout_width="wrap_content"
                      android:layout_height="45dp"
                      android:text="Filter"
                      android:textSize="12sp"
                      android:backgroundTint="#2196F3"/>

              </LinearLayout>

              <!-- Quick Filter Buttons -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:layout_marginBottom="10dp">

                  <Button
                      android:id="@+id/btn_all"
                      android:layout_width="0dp"
                      android:layout_height="40dp"
                      android:layout_weight="1"
                      android:text="All"
                      android:textSize="12sp"
                      android:layout_marginEnd="5dp"/>

                  <Button
                      android:id="@+id/btn_saned_auto"
                      android:layout_width="0dp"
                      android:layout_height="40dp"
                      android:layout_weight="1"
                      android:text="Saned Auto"
                      android:textSize="10sp"
                      android:layout_marginEnd="5dp"/>

                  <Button
                      android:id="@+id/btn_saned_driver"
                      android:layout_width="0dp"
                      android:layout_height="40dp"
                      android:layout_weight="1"
                      android:text="Saned Driver"
                      android:textSize="10sp"
                      android:layout_marginEnd="5dp"/>

                  <Button
                      android:id="@+id/btn_error"
                      android:layout_width="0dp"
                      android:layout_height="40dp"
                      android:layout_weight="1"
                      android:text="Errors"
                      android:textSize="11sp"/>

              </LinearLayout>

              <!-- Control Buttons -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:layout_marginBottom="10dp">

                  <Button
                      android:id="@+id/btn_start"
                      android:layout_width="0dp"
                      android:layout_height="40dp"
                      android:layout_weight="1"
                      android:text="▶ Start"
                      android:textSize="12sp"
                      android:backgroundTint="#4CAF50"
                      android:layout_marginEnd="5dp"/>

                  <Button
                      android:id="@+id/btn_stop"
                      android:layout_width="0dp"
                      android:layout_height="40dp"
                      android:layout_weight="1"
                      android:text="⏹ Stop"
                      android:textSize="12sp"
                      android:backgroundTint="#F44336"
                      android:layout_marginEnd="5dp"/>

                  <Button
                      android:id="@+id/btn_clear"
                      android:layout_width="0dp"
                      android:layout_height="40dp"
                      android:layout_weight="1"
                      android:text="🗑 Clear"
                      android:textSize="12sp"
                      android:backgroundTint="#FF9800"/>

              </LinearLayout>

              <!-- Log Display -->
              <TextView
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="--- Logs ---"
                  android:textSize="12sp"
                  android:textColor="#888888"
                  android:layout_marginBottom="5dp"/>

              <ScrollView
                  android:id="@+id/log_scroll"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1"
                  android:background="#1E1E1E"
                  android:padding="10dp">

                  <TextView
                      android:id="@+id/tv_logs"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Waiting for logs...\n\nMake sure:\n1. Root access granted\n2. Start button pressed\n3. Custom filter: type app name"
                      android:textSize="11sp"
                      android:textColor="#AAAAAA"
                      android:fontFamily="monospace"
                      android:lineSpacingExtra="2dp"/>

              </ScrollView>

              <TextView
                  android:id="@+id/tv_status"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Status: Stopped"
                  android:textSize="11sp"
                  android:textColor="#FF9800"
                  android:gravity="center"
                  android:layout_marginTop="8dp"/>

              <TextView
                  android:id="@+id/tv_current_filter"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Filter: all"
                  android:textSize="10sp"
                  android:textColor="#666666"
                  android:gravity="center"/>

          </LinearLayout>
          EOF

          cat > app/src/main/java/com/logcat/master/MainActivity.java << 'EOF'
          package com.logcat.master;

          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import java.io.BufferedReader;
          import java.io.InputStreamReader;
          import java.util.concurrent.ExecutorService;
          import java.util.concurrent.Executors;

          public class MainActivity extends AppCompatActivity {

              private TextView tvLogs, tvStatus, tvCurrentFilter;
              private ScrollView scrollView;
              private EditText etCustomFilter;
              private Button btnStart, btnStop, btnClear, btnAll, btnSanedAuto, btnSanedDriver, btnError, btnCustom;
              private ExecutorService executor;
              private Handler uiHandler;
              private boolean isRunning = false;
              private Process logProcess;
              private String currentFilter = "all";
              private String customFilterText = "";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  tvLogs = findViewById(R.id.tv_logs);
                  tvStatus = findViewById(R.id.tv_status);
                  tvCurrentFilter = findViewById(R.id.tv_current_filter);
                  scrollView = findViewById(R.id.log_scroll);
                  etCustomFilter = findViewById(R.id.et_custom_filter);
                  btnStart = findViewById(R.id.btn_start);
                  btnStop = findViewById(R.id.btn_stop);
                  btnClear = findViewById(R.id.btn_clear);
                  btnAll = findViewById(R.id.btn_all);
                  btnSanedAuto = findViewById(R.id.btn_saned_auto);
                  btnSanedDriver = findViewById(R.id.btn_saned_driver);
                  btnError = findViewById(R.id.btn_error);
                  btnCustom = findViewById(R.id.btn_custom);

                  executor = Executors.newSingleThreadExecutor();
                  uiHandler = new Handler(Looper.getMainLooper());

                  btnStart.setOnClickListener(v -> startLogging());
                  btnStop.setOnClickListener(v -> stopLogging());
                  btnClear.setOnClickListener(v -> clearLogs());

                  btnAll.setOnClickListener(v -> { 
                      currentFilter = "all"; 
                      customFilterText = "";
                      tvCurrentFilter.setText("Filter: all");
                      addLog("--- Filter: ALL ---");
                  });
                  
                  btnSanedAuto.setOnClickListener(v -> { 
                      currentFilter = "custom"; 
                      customFilterText = "sanedauto|autoswipe";
                      tvCurrentFilter.setText("Filter: Saned Auto (sanedauto|autoswipe)");
                      addLog("--- Filter: SANED AUTO ONLY ---");
                  });
                  
                  btnSanedDriver.setOnClickListener(v -> { 
                      currentFilter = "custom"; 
                      customFilterText = "jahez|net.jahez|saned";
                      tvCurrentFilter.setText("Filter: Saned Driver (jahez|net.jahez|saned)");
                      addLog("--- Filter: SANED DRIVER ONLY ---");
                  });
                  
                  btnError.setOnClickListener(v -> { 
                      currentFilter = "error"; 
                      customFilterText = "";
                      tvCurrentFilter.setText("Filter: errors only");
                      addLog("--- Filter: ERRORS ONLY ---");
                  });
                  
                  btnCustom.setOnClickListener(v -> {
                      String input = etCustomFilter.getText().toString().trim();
                      if (!input.isEmpty()) {
                          currentFilter = "custom";
                          customFilterText = input.toLowerCase();
                          tvCurrentFilter.setText("Filter: " + customFilterText);
                          addLog("--- Custom Filter: " + customFilterText + " ---");
                      } else {
                          Toast.makeText(this, "Enter filter text", Toast.LENGTH_SHORT).show();
                      }
                  });
              }

              private void startLogging() {
                  if (isRunning) return;
                  isRunning = true;
                  tvStatus.setText("Status: Running...");
                  Toast.makeText(this, "Logging started", Toast.LENGTH_SHORT).show();
                  executor.execute(this::readLogs);
              }

              private void stopLogging() {
                  isRunning = false;
                  if (logProcess != null) {
                      logProcess.destroy();
                  }
                  tvStatus.setText("Status: Stopped");
                  Toast.makeText(this, "Logging stopped", Toast.LENGTH_SHORT).show();
              }

              private void clearLogs() {
                  uiHandler.post(() -> {
                      tvLogs.setText("");
                      addLog("--- Logs cleared ---");
                  });
              }

              private void readLogs() {
                  try {
                      ProcessBuilder pb = new ProcessBuilder("logcat", "-v", "brief");
                      pb.redirectErrorStream(true);
                      logProcess = pb.start();

                      BufferedReader reader = new BufferedReader(new InputStreamReader(logProcess.getInputStream()));
                      String line;
                      while (isRunning && (line = reader.readLine()) != null) {
                          if (shouldShowLine(line)) {
                              final String finalLine = line;
                              uiHandler.post(() -> addLog(finalLine));
                          }
                      }
                      reader.close();
                  } catch (Exception e) {
                      uiHandler.post(() -> {
                          tvLogs.setText("Error reading logs!\n\nMake sure you have root access.\n\n" + e.getMessage());
                          tvStatus.setText("Status: Error - Need root");
                      });
                  }
              }

              private boolean shouldShowLine(String line) {
                  String lowerLine = line.toLowerCase();
                  
                  // Skip own app logs
                  if (lowerLine.contains("logcat.master") || lowerLine.contains("logcatmaster")) {
                      return false;
                  }
                  
                  switch (currentFilter) {
                      case "error":
                          return lowerLine.contains("error") || lowerLine.contains("exception") || lowerLine.contains("fail");
                      case "custom":
                          if (customFilterText.isEmpty()) return true;
                          String[] keywords = customFilterText.split("\\|");
                          for (String kw : keywords) {
                              if (lowerLine.contains(kw)) return true;
                          }
                          return false;
                      default:
                          return true;
                  }
              }

              private void addLog(String log) {
                  String current = tvLogs.getText().toString();
                  String[] lines = current.split("\n");
                  StringBuilder newLog = new StringBuilder();
                  
                  // Keep last 500 lines
                  int start = Math.max(0, lines.length - 500);
                  for (int i = start; i < lines.length; i++) {
                      newLog.append(lines[i]).append("\n");
                  }
                  newLog.append(log).append("\n");
                  
                  tvLogs.setText(newLog.toString());
                  scrollView.post(() -> scrollView.fullScroll(ScrollView.FOCUS_DOWN));
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  stopLogging();
              }
          }
          EOF

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LogCat-Master
          path: app/build/outputs/apk/debug/*.apk
