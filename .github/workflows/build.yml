name: Build AutoDriver

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          cat > gradle/wrapper/gradle-wrapper.properties << 'WEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/zips
          WEOF

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/auto/driver
          mkdir -p app/src/main/res/{layout,values,xml,drawable,mipmap-anydpi-v26}
          mkdir -p app/src/main/assets

      - name: Write Gradle Files
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
            repositories {
              google(); mavenCentral()
              maven { url 'https://api.xposed.info/' }
              maven { url 'https://jitpack.io' }
            }
          }
          rootProject.name = "AutoDriver"
          include ':app'
          EOF
          
          cat > build.gradle << 'EOF'
          plugins { id 'com.android.application' version '8.5.2' apply false }
          EOF
          
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF
          
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.auto.driver'
            compileSdk 34
            defaultConfig {
              applicationId 'com.auto.driver'
              minSdk 26; targetSdk 34
              versionCode 30; versionName '30.0'
            }
            buildTypes { release { minifyEnabled false } }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          
          // Add dependency for pine
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.google.android.material:material:1.12.0'
            compileOnly 'de.robv.android.xposed:api:82'
            implementation 'top.canyie.pine:core:0.2.9'  # Make sure this matches your usage
          }
          EOF

      - name: Write Icons and Config
        run: |
          # (unchanged, omitted for brevity, keep your existing resource files)
          # ...
          
      - name: Write Manifest
        run: |
          # (unchanged, omitted for brevity, keep your existing manifest)
          # ...
          
      - name: Write SanedHook.java
        run: |
          cat > app/src/main/java/com/auto/driver/SanedHook.java << 'HEOF'
          package com.auto.driver;

          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.os.Bundle;

          // Import the pine callback class
          import top.canyie.pine.callback.MethodHook;
          // Import CallFrame explicitly
          import top.canyie.pine.callback.MethodHook.CallFrame;

          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;

          public class SanedHook implements IXposedHookLoadPackage {

              static final String TARGET         = "net.jahez.fleets";
              static final String OUR_PKG        = "com.auto.driver";
              static final String ORDER_ACTIVITY = "net.jahez.fleets.dispatch.accept.IncomingDispatchActivity";

              // AWS APK jaisa: IncomingDispatchViewModel.acceptAutoDispatch hook karo
              static final String VIEWMODEL      = "net.saned.incoming.presentation.IncomingDispatchViewModel";

              private volatile String capturedToken = "";
              private volatile int tokenCount = 0;
              private volatile boolean vmHooked = false;
              private volatile boolean swipeReceiverRegistered = false;
              private long lastBcast = 0;

              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lp) {
                  if (!TARGET.equals(lp.packageName)) return;
                  XposedBridge.log("[AutoDriver] v25 loading into " + lp.packageName);

                  // Hook 1: Activity.onResume — order data + lazy ViewModel hook
                  hookActivityOnResume(lp);

                  // Hook 2: URLConnection backup for token
                  hookURLConnection(lp);
              }

              private void hookActivityOnResume(XC_LoadPackage.LoadPackageParam lp) {
                  try {
                      XposedHelpers.findAndHookMethod(
                          "android.app.Activity", lp.classLoader, "onResume",
                          new XC_MethodHook() {
                              @Override
                              protected void afterHookedMethod(MethodHookParam param) {
                                  android.app.Activity act = (android.app.Activity) param.thisObject;
                                  String actName = act.getClass().getName();

                                  // Register swipe receiver once
                                  registerSwipeReceiver(act);

                                  // Hook ViewModel — retry on every Saned activity
                                  if (!vmHooked) {
                                      if (actName.startsWith("net.jahez") || actName.startsWith("net.saned")) {
                                          hookViewModel(act);
                                      }
                                  }
                                  if (ORDER_ACTIVITY.equals(actName) && !vmHooked) {
                                      hookViewModel(act);
                                  }

                                  if (!ORDER_ACTIVITY.equals(actName)) return;
                                  long now = System.currentTimeMillis();
                                  if (now - lastBcast < 2000) return;
                                  lastBcast = now;

                                  try {
                                      Bundle extras = act.getIntent() != null ? act.getIntent().getExtras() : null;
                                      if (extras == null) { sendLog(act, "⚠️ extras null"); return; }

                                      String requestId = extractRequestId(extras);
                                      double pickupLat = getDouble(extras, "EXTRA_DISPATCH_PICKUP_LATITUDE");
                                      double pickupLon = getDouble(extras, "EXTRA_DISPATCH_PICKUP_LONGITUDE");
                                      double dropDist  = getDouble(extras, "EXTRA_DISTANCE");
                                      double price     = getDouble(extras, "EXTRA_DELIVERY_PRICE");
                                      double bonus     = getDouble(extras, "EXTRA_BONUS_AMOUNT");

                                      String tkStatus = capturedToken.isEmpty()
                                          ? "❌ NO TOKEN → swipe"
                                          : "✅ #" + tokenCount;

                                      sendLog(act, "📦 id=" + requestId
                                          + " drop=" + String.format("%.2f", dropDist) + "km"
                                          + " ₿" + price + "+" + bonus + " | " + tkStatus);

                                      Intent bc = new Intent("JAHEZ_ORDER_DATA");
                                      bc.setPackage(OUR_PKG);
                                      bc.putExtra("request_id", requestId);
                                      bc.putExtra("pickup_lat", pickupLat);
                                      bc.putExtra("pickup_lon", pickupLon);
                                      bc.putExtra("drop_dist",  dropDist);
                                      bc.putExtra("price",      price);
                                      bc.putExtra("bonus",      bonus);
                                      bc.putExtra("auth_token", capturedToken);
                                      bc.putExtra("has_token",  !capturedToken.isEmpty());
                                      bc.putExtra("is_order",   true);
                                      act.sendBroadcast(bc);
                                  } catch (Throwable e) {
                                      sendLog(act, "❌ order: " + e.getMessage());
                                  }
                              }
                          }
                      );
                      XposedBridge.log("[AutoDriver] ✅ onResume hook OK");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ onResume: " + e.getMessage());
                  }
              }

              private void hookViewModel(android.app.Activity act) {
                  ClassLoader cl = act.getClassLoader();
                  hookViewModelXposed(cl, act);
                  hookTokenClasses(cl, act);
              }

              private void hookViewModelXposed(ClassLoader cl, android.app.Activity act) {
                  try {
                      Class<?> vmClass = cl.loadClass(VIEWMODEL);
                      int hooked = 0;
                      for (String method : new String[]{"acceptAutoDispatch", "acceptManualDispatch"}) {
                          try {
                              XposedHelpers.findAndHookMethod(vmClass, method, new XC_MethodHook() {
                                  @Override protected void beforeHookedMethod(MethodHookParam p) {
                                      XposedBridge.log("[AutoDriver] 🎯 VM." + p.method.getName() + " called!");
                                      sendLog(act, "🎯 accept triggered!");
                                  }
                              });
                              hooked++;
                              XposedBridge.log("[AutoDriver] ✅ VM." + method + " OK");
                          } catch (Throwable e) {
                              XposedBridge.log("[AutoDriver] ⚠️ VM." + method + ": " + e.getMessage());
                          }
                      }
                      if (hooked > 0) {
                          vmHooked = true;
                          sendLog(act, "✅ VM " + hooked + " hooks OK!");
                      } else {
                          vmHooked = false;
                          sendLog(act, "⚠️ VM hook failed, will retry");
                      }
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ VM: " + e.getMessage());
                      vmHooked = false;
                  }
              }

              private void hookTokenClasses(ClassLoader cl, android.app.Activity act) {
                  String[] tokenClasses = {
                      "net.saned.login.remote.model.dto.AuthAccessTokenDto",
                      "net.saned.login.remote.model.dto.Auth",
                      "net.saned.login.remote.model.dto.CompleteLoginData"
                  };
                  int pineCount = 0, xposedCount = 0;

                  ClassLoader ourCL = SanedHook.class.getClassLoader();
                  Class<?> pineClass = null;
                  try {
                      pineClass = ourCL.loadClass("top.canyie.pine.Pine");
                      XposedBridge.log("[AutoDriver] 🌲 Pine ready for token hooks");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ⚠️ Pine load: " + e.getMessage());
                  }

                  for (String className : tokenClasses) {
                      try {
                          Class<?> target = cl.loadClass(className);

                          if (pineClass != null) {
                              hookWithPine(pineClass, target, act);
                              pineCount++;
                              XposedBridge.log("[AutoDriver] 🌲 Pine hook: " + target.getSimpleName());
                          } else {
                              XposedBridge.hookAllMethods(target, "<init>", new XC_MethodHook() {
                                  @Override protected void afterHookedMethod(MethodHookParam p) {
                                      scanObjectForToken(p.thisObject, act, target.getSimpleName());
                                  }
                              });
                              xposedCount++;
                              XposedBridge.log("[AutoDriver] ✅ Xposed hook: " + target.getSimpleName());
                          }
                      } catch (Throwable e) {
                          XposedBridge.log("[AutoDriver] ⚠️ " + className.substring(className.lastIndexOf('.')+1) + ": " + e.getMessage());
                      }
                  }
                  sendLog(act, "✅ Token hooks: Pine=" + pineCount + " Xposed=" + xposedCount
                      + " — login karo token capture hoga!");
              }

              private void hookWithPine(Class<?> pineClass, Class<?> target, android.app.Activity act) {
                  try {
                      ClassLoader ourCL = SanedHook.class.getClassLoader();
                      Class<?> hookCbClass = ourCL.loadClass("top.canyie.pine.callback.MethodHook");

                      Object hookCallback = java.lang.reflect.Proxy.newProxyInstance(
                          ourCL,
                          new Class[]{},
                          (proxy, method, args) -> null
                      );
                      // Use reflection to hook constructors
                      for (java.lang.reflect.Constructor<?> ctor : target.getDeclaredConstructors()) {
                          top.canyie.pine.Pine.hook(ctor, new top.canyie.pine.callback.MethodHook() {
                              @Override
                              public void afterCall(CallFrame frame) throws Throwable {
                                  Object obj = frame.thisObject;
                                  if (obj != null) {
                                      scanObjectForToken(obj, act, target.getSimpleName());
                                  }
                              }
                          });
                      }
                      XposedBridge.log("[AutoDriver] 🌲 Pine constructor hooked: " + target.getSimpleName());
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ⚠️ Pine hookWithPine: " + e.getMessage());
                      // Fallback to Xposed
                      try {
                          XposedHelpers.findAndHookConstructor(target, new XC_MethodHook() {
                              @Override protected void afterHookedMethod(MethodHookParam p) {
                                  scanObjectForToken(p.thisObject, act, target.getSimpleName());
                              }
                          });
                      } catch (Throwable ignored) {}
                  }
              }

              private void scanObjectForToken(Object obj, android.app.Activity act, String label) {
                  try {
                      for (java.lang.reflect.Field f : obj.getClass().getDeclaredFields()) {
                          f.setAccessible(true);
                          try {
                              Object val = f.get(obj);
                              if (val instanceof String) {
                                  String s = (String) val;
                                  if (s.length() > 20 && (s.startsWith("eyJ") || s.length() > 50)) {
                                      captureRawToken(s, act, label + "." + f.getName());
                                  }
                              }
                          } catch (Throwable ignored) {}
                      }
                  } catch (Throwable ignored) {}
              }

              private void captureRawToken(String token, android.app.Activity act, String source) {
                  if (token == null || token.length() < 10) return;
                  String bearer = token.startsWith("Bearer ") ? token : "Bearer " + token;
                  boolean changed = !bearer.equals(capturedToken);
                  capturedToken = bearer;
                  tokenCount++;
                  if (changed) {
                      XposedBridge.log("[AutoDriver] 🔑 Token #" + tokenCount
                          + " [" + source + "]: " + token.substring(0, Math.min(30, token.length())));
                      sendLog(act, "🔑 Token #" + tokenCount + " from " + source);
                  }
              }

              private void registerSwipeReceiver(android.app.Activity act) {
                  if (swipeReceiverRegistered) return;
                  try {
                      BroadcastReceiver r = new BroadcastReceiver() {
                          @Override public void onReceive(Context ctx, Intent intent) {
                              int delay = intent.getIntExtra("scan_delay", 300);
                              android.app.Activity target = currentAct;
                              if (target == null || target.isFinishing()) {
                                  XposedBridge.log("[AutoDriver] ⚠️ No activity for swipe");
                                  return;
                              }
                              XposedBridge.log("[AutoDriver] 🖱️ Swipe broadcast received, delay=" + delay);
                              new android.os.Handler(android.os.Looper.getMainLooper())
                                  .postDelayed(() -> doSwipe(target), delay);
                          }
                      };
                      IntentFilter f = new IntentFilter("JAHEZ_DO_SWIPE");
                      if (android.os.Build.VERSION.SDK_INT >= 33)
                          act.getApplicationContext().registerReceiver(r, f, Context.RECEIVER_EXPORTED);
                      else
                          act.getApplicationContext().registerReceiver(r, f);
                      swipeReceiverRegistered = true;
                      XposedBridge.log("[AutoDriver] ✅ Swipe receiver registered in Saned");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ Swipe receiver: " + e.getMessage());
                  }
              }

              private volatile android.app.Activity currentAct = null;

              private void doSwipe(android.app.Activity act) {
                  currentAct = act;
                  try {
                      android.util.DisplayMetrics dm = new android.util.DisplayMetrics();
                      act.getWindowManager().getDefaultDisplay().getMetrics(dm);
                      int W = dm.widthPixels;
                      int H = dm.heightPixels;
                      int x1 = (int)(W * 0.10f);
                      int x2 = (int)(W * 0.90f);
                      int y  = (int)(H * 0.885f);

                      sendLog(act, "🖱️ Accept attempt: screen=" + W + "x" + H
                          + " swipe=" + x1 + "→" + x2 + " y=" + y);

                      // Method 1: performClick on Accept button
                      android.view.View root = act.getWindow().getDecorView();
                      android.view.View btn = findAcceptView(root);
                      if (btn != null) {
                          sendLog(act, "🖱️ Method1: performClick on "
                              + btn.getClass().getSimpleName());
                          btn.performClick();
                          sendLog(act, "✅ performClick done");
                          return;
                      }

                      // Method 2: su input touchscreen swipe
                      String[] cmds = {
                          "input touchscreen swipe " + x1+" "+y+" "+x2+" "+y+" 250",
                          "input swipe " + x1+" "+y+" "+x2+" "+y+" 250",
                          "/system/bin/input touchscreen swipe "+x1+" "+y+" "+x2+" "+y+" 250"
                      };
                      for (String cmd : cmds) {
                          try {
                              ProcessBuilder pb = new ProcessBuilder("su", "-c", cmd);
                              pb.redirectErrorStream(true);
                              Process p = pb.start();
                              byte[] buf = new byte[128];
                              int n = p.getInputStream().read(buf);
                              boolean done = p.waitFor(3, java.util.concurrent.TimeUnit.SECONDS);
                              int exit = done ? p.exitValue() : -1;
                              String out = n > 0 ? new String(buf, 0, n).trim() : "";
                              sendLog(act, (exit==0?"✅":"⚠️") + " su [" + cmd.substring(0,30) + "]");
                              if (exit == 0) return;
                          } catch (Throwable e) {
                              sendLog(act, "⚠️ cmd err: " + e.getMessage());
                          }
                      }

                      // Method 3: MotionEvent inject
                      sendLog(act, "🖱️ Method3: MotionEvent inject");
                      long down = android.os.SystemClock.uptimeMillis();
                      android.view.MotionEvent ev;
                      ev = android.view.MotionEvent.obtain(down, down,
                          android.view.MotionEvent.ACTION_DOWN, x1, y, 0);
                      root.dispatchTouchEvent(ev); ev.recycle();
                      for (int i = 1; i <= 20; i++) {
                          float x = x1 + (x2-x1)*(float)i/20;
                          ev = android.view.MotionEvent.obtain(down, down+i*12L,
                              android.view.MotionEvent.ACTION_MOVE, x, y, 0);
                          root.dispatchTouchEvent(ev); ev.recycle();
                      }
                      ev = android.view.MotionEvent.obtain(down, down+260L,
                          android.view.MotionEvent.ACTION_UP, x2, y, 0);
                      root.dispatchTouchEvent(ev); ev.recycle();
                      sendLog(act, "✅ MotionEvent done");

                  } catch (Throwable e) {
                      sendLog(act, "❌ doSwipe: " + e.getMessage());
                  }
              }

              private android.view.View findAcceptView(android.view.View root) {
                  if (root == null || root.getVisibility() == android.view.View.GONE) return null;
                  if (root instanceof android.widget.TextView) {
                      String txt = ((android.widget.TextView)root).getText().toString().trim();
                      if (isAcceptText(txt)) return root;
                  }
                  CharSequence cd = root.getContentDescription();
                  if (cd != null && isAcceptText(cd.toString())) return root;
                  String cls = root.getClass().getSimpleName().toLowerCase();
                  if (cls.contains("slide")||cls.contains("swipe")||cls.contains("accept")||cls.contains("drag")) return root;
                  if (root instanceof android.view.ViewGroup) {
                      android.view.ViewGroup vg = (android.view.ViewGroup) root;
                      for (int i = 0; i < vg.getChildCount(); i++) {
                          android.view.View f = findAcceptView(vg.getChildAt(i));
                          if (f != null) return f;
                      }
                  }
                  return null;
              }

              private boolean isAcceptText(String s) {
                  if (s == null || s.isEmpty()) return false;
                  String u = s.toUpperCase().trim();
                  for (String k : new String[]{"ACCEPT","SWIPE","SLIDE","CONFIRM","APPROVE"})
                      if (u.contains(k)) return true;
                  for (String k : new String[]{"قبول","موافق","تأكيد","اقبل"})
                      if (s.contains(k)) return true;
                  return false;
              }

              private void hookURLConnection(XC_MethodHook hook) {
                  try {
                      Class<?> uc = Class.forName("java.net.URLConnection");
                      XposedHelpers.findAndHookMethod(uc, "setRequestProperty", String.class, String.class, hook);
                      XposedHelpers.findAndHookMethod(uc, "addRequestProperty", String.class, String.class, hook);
                      XposedBridge.log("[AutoDriver] ✅ URLConnection hooks OK");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ URLConn: " + e.getMessage());
                  }
              }

              private String extractRequestId(Bundle b) {
                  try {
                      Object v = b.get("EXTRA_DISPATCH_REQUEST_ID");
                      if (v instanceof String && !((String)v).isEmpty()) return (String) v;
                      if (v instanceof Long)    return String.valueOf(v);
                      if (v instanceof Integer) return String.valueOf(v);
                      String s = b.getString("EXTRA_DISPATCH_REQUEST_ID");
                      if (s != null && !s.isEmpty()) return s;
                      long l = b.getLong("EXTRA_DISPATCH_REQUEST_ID", -1L);
                      if (l > 0) return String.valueOf(l);
                  } catch (Throwable ignored) {}
                  return "";
              }

              private void sendLog(android.app.Activity act, String msg) {
                  try {
                      Intent i = new Intent("JAHEZ_HOOK_LOG");
                      i.setPackage(OUR_PKG);
                      i.putExtra("log", msg);
                      act.sendBroadcast(i);
                  } catch (Throwable ignored) {}
              }

              private double getDouble(Bundle b, String key) {
                  try {
                      Object v = b.get(key);
                      if (v instanceof Double)  return (Double) v;
                      if (v instanceof Float)   return (Float) v;
                      if (v instanceof String)  return Double.parseDouble((String) v);
                      if (v instanceof Integer) return (Integer) v;
                      if (v instanceof Long)    return (Long) v;
                  } catch (Throwable ignored) {}
                  return -1;
              }
          }
          HEOF

      - name: Write AutoService.java
        run: |
          cat > app/src/main/java/com/auto/driver/AutoService.java << 'SEOF'
          package com.auto.driver;

          import android.app.Notification; import android.app.NotificationChannel;
          import android.app.NotificationManager; import android.app.PendingIntent;
          import android.app.Service; import android.content.BroadcastReceiver; import android.content.Context; import android.content.Intent; import android.content.IntentFilter; import android.content.SharedPreferences; import android.location.Location; import android.location.LocationListener; import android.location.LocationManager; import android.os.Build; import android.os.Bundle; import android.os.Handler; import android.os.IBinder; import android.os.Looper; import java.io.InputStream; import java.net.HttpURLConnection; import java.net.URL; import java.text.SimpleDateFormat; import java.util.Date; import java.util.Locale;

          public class AutoService extends Service {
              static final String ACCEPT_URL = "https://gateway.saned.io/api/v1/dispatch/accept-dispatch/";
              static final String BASIC_AUTH  = "Basic ZHJpdmVyczpjMjNmM2E4Ny1hYWYzLTRhNDQtYTgyZS1mYjZjYWM4MWJkMjA=";

              SharedPreferences prefs;
              long lastEvent = 0;
              volatile String sanedToken = "";
              private volatile Location lastLocation = null;

              private final BroadcastReceiver hookLogReceiver = new BroadcastReceiver() {
                  @Override public void onReceive(Context ctx, Intent intent) {
                      String msg = intent.getStringExtra("log");
                      if (msg != null) saveLog(msg);
                  }
              };
              private final BroadcastReceiver orderReceiver = new BroadcastReceiver() {
                  @Override public void onReceive(Context ctx, Intent intent) {
                      if (!intent.getBooleanExtra("is_order", false)) return;
                      String requestId = intent.getStringExtra("request_id");
                      String authToken = intent.getStringExtra("auth_token");
                      boolean hasToken = intent.getBooleanExtra("has_token", false);
                      double pickupLat = intent.getDoubleExtra("pickup_lat", -1);
                      double pickupLon = intent.getDoubleExtra("pickup_lon", -1);
                      double dropDist  = intent.getDoubleExtra("drop_dist",  -1);
                      double price     = intent.getDoubleExtra("price",       0);
                      double bonus     = intent.getDoubleExtra("bonus",       0);
                      saveLog("🪝 id=" + requestId + " drop=" + fmt2(dropDist) + "km ₿" + price + "+" + bonus);
                      processOrder(requestId, authToken, hasToken, pickupLat, pickupLon, dropDist);
                  }
              };
              private final BroadcastReceiver toggleReceiver = new BroadcastReceiver() {
                  @Override public void onReceive(Context ctx, Intent intent) {
                      if (prefs == null) prefs = getSharedPreferences("cfg", MODE_PRIVATE);
                      if ("JAHEZ_TOGGLE".equals(intent.getAction())) {
                          boolean cur = prefs.getBoolean("enabled", false);
                          prefs.edit().putBoolean("enabled", !cur).apply();
                          sendBroadcast(new Intent(!cur ? "JAHEZ_AUTO_ON" : "JAHEZ_AUTO_OFF"));
                          saveLog(!cur ? "▶️ Enabled" : "⏸ Disabled");
                      }
                      showNotification();
                  }
              };

              @Override public void onCreate() {
                  super.onCreate();
                  prefs = getSharedPreferences("cfg", MODE_PRIVATE);
                  IntentFilter tf = new IntentFilter("JAHEZ_TOGGLE");
                  tf.addAction("JAHEZ_STATE_CHANGED");
                  reg(toggleReceiver, tf, false);
                  reg(orderReceiver,   new IntentFilter("JAHEZ_ORDER_DATA"), true);
                  reg(hookLogReceiver, new IntentFilter("JAHEZ_HOOK_LOG"),   true);
                  startLocationUpdates();
                  showNotification();
                  initSuAndToken();
                  saveLog("✅ AutoService v30 started");
              }

              void initSuAndToken() {
                  new Thread(() -> {
                      try {
                          Process p = new ProcessBuilder("su", "-c", "echo ok")
                              .redirectErrorStream(true).start();
                          byte[] buf = new byte[32];
                          int n = p.getInputStream().read(buf);
                          boolean done = p.waitFor(5, java.util.concurrent.TimeUnit.SECONDS);
                          int exit = done ? p.exitValue() : -1;
                          if (exit == 0) {
                              saveLog("✅ Su granted!");
                              readSanedToken();
                          } else {
                              saveLog("⚠️ Su exit=" + exit + " — Magisk mein Allow karo");
                          }
                      } catch (Throwable e) {
                          saveLog("❌ Su init: " + e.getMessage());
                      }
                  }, "su-init").start();
              }

              void readSanedToken() {
                  try {
                      String[] files = {
                          "/data/data/net.jahez.fleets/shared_prefs/net.jahez.fleets.SharedPreferences.xml",
                          "/data/data/net.jahez.fleets/shared_prefs/net.jahez.fleets.Settings.xml",
                          "/data/data/net.jahez.fleets/shared_prefs/saned_prefs.xml",
                          "/data/data/net.jahez.fleets/shared_prefs/user_prefs.xml",
                          "/data/data/net.jahez.fleets/shared_prefs/auth_prefs.xml"
                      };
                      for (String file : files) {
                          Process p = new ProcessBuilder("su", "-c", "cat " + file)
                              .redirectErrorStream(true).start();
                          byte[] buf = new byte[8192];
                          int n = p.getInputStream().read(buf);
                          p.waitFor(3, java.util.concurrent.TimeUnit.SECONDS);
                          if (n > 0) {
                              String xml = new String(buf, 0, n);
                              String token = extractTokenFromXml(xml);
                              if (token != null) {
                                  sanedToken = "Bearer " + token;
                                  saveLog("🔑 Token from " + file.substring(file.lastIndexOf('/')+1)
                                      + ": " + token.substring(0, Math.min(30, token.length())) + "...");
                                  return;
                              }
                              saveLog("📄 " + file.substring(file.lastIndexOf('/')+1)
                                  + " (" + n + "b): no token");
                          }
                      }
                  } catch (Throwable e) {
                      saveLog("❌ readToken: " + e.getMessage());
                  }
              }

              String extractTokenFromXml(String xml) {
                  for (String key : new String[]{"token","accessToken","access_token",
                      "bearer_token","bearerToken","auth_token","authToken","jwt","user_token"}) {
                      String pattern = "name=\"" + key + "\">";
                      int idx = xml.indexOf(pattern);
                      if (idx == -1) continue;
                      int start = idx + pattern.length();
                      int end = xml.indexOf("<", start);
                      if (end == -1) continue;
                      String val = xml.substring(start, end).trim();
                      if (val.length() > 20) { saveLog("🔍 Key: " + key); return val; }
                  }
                  int jwtIdx = xml.indexOf("eyJ");
                  if (jwtIdx != -1) {
                      int end = xml.indexOf("<", jwtIdx);
                      if (end == -1) end = Math.min(jwtIdx+500, xml.length());
                      String jwt = xml.substring(jwtIdx, end).trim();
                      if (jwt.length() > 20) { saveLog("🔍 JWT auto"); return jwt; }
                  }
                  return null;
              }

              void startLocationUpdates() {
                  try {
                      LocationManager lm = (LocationManager) getSystemService(LOCATION_SERVICE);
                      LocationListener ll = new LocationListener() {
                          @Override public void onLocationChanged(Location loc) { lastLocation = loc; }
                          @Override public void onStatusChanged(String p, int s, Bundle e) {}
                          @Override public void onProviderEnabled(String p) {}
                          @Override public void onProviderDisabled(String p) {}
                      };
                      try { lm.requestLocationUpdates(LocationManager.GPS_PROVIDER, 30000, 10, ll); } catch (SecurityException ignored) {}
                      try { lm.requestLocationUpdates(LocationManager.NETWORK_PROVIDER, 30000, 10, ll); } catch (SecurityException ignored) {}
                      for (String p : new String[]{LocationManager.GPS_PROVIDER, LocationManager.NETWORK_PROVIDER}) {
                          try { Location l = lm.getLastKnownLocation(p); if (l!=null&&lastLocation==null){lastLocation=l;break;} } catch (SecurityException ignored) {}
                      }
                      saveLog("📍 Location " + (lastLocation != null ? "✅" : "⚠️"));
                  } catch (Exception e) { saveLog("❌ Location: " + e.getMessage()); }
              }

              void reg(BroadcastReceiver r, IntentFilter f, boolean exported) {
                  if (Build.VERSION.SDK_INT >= 33)
                      registerReceiver(r, f, exported ? Context.RECEIVER_EXPORTED : Context.RECEIVER_NOT_EXPORTED);
                  else registerReceiver(r, f);
              }

              @Override public int onStartCommand(Intent i, int flags, int id) { return START_STICKY; }
              @Override public IBinder onBind(Intent i) { return null; }

              void processOrder(String requestId, String authToken, boolean hasToken,
                                double pickupLat, double pickupLon, double dropDist) {
                  if (!prefs.getBoolean("enabled", false)) { saveLog("⏸ Disabled"); return; }
                  long now = System.currentTimeMillis();
                  if (now - lastEvent < 2000) { saveLog("⚡ Debounce"); return; }
                  lastEvent = now;
                  if (requestId == null || requestId.isEmpty()) { saveLog("❌ requestId empty"); return; }

                  float pickupKm = calcPickupDist(pickupLat, pickupLon);
                  float maxPickup = prefs.getFloat("max_pickup", 2.0f);
                  float maxDrop   = prefs.getFloat("max_drop",   5.0f);
                  float dropKm    = dropDist > 0 ? (float) dropDist : -1f;
                  String locInfo  = lastLocation != null ? ((System.currentTimeMillis()-lastLocation.getTime())/1000)+"s" : "N/A";

                  saveLog(String.format("📏 Pickup=%s/%skm Drop=%s/%skm loc:%s",
                      fmt1(pickupKm), fmt1(maxPickup), fmt1(dropKm), fmt1(maxDrop), locInfo));

                  boolean pickupOk = pickupKm < 0 || pickupKm <= maxPickup;
                  boolean dropOk   = dropKm   < 0 || dropKm   <= maxDrop;

                  if (!pickupOk || !dropOk) {
                      StringBuilder r = new StringBuilder();
                      if (!pickupOk) r.append("Pickup ").append(fmt1(pickupKm)).append(">").append(fmt1(maxPickup)).append("km");
                      if (!dropOk) { if(r.length()>0) r.append("  "); r.append("Drop ").append(fmt1(dropKm)).append(">").append(fmt1(maxDrop)).append("km"); }
                      String msg = "❌ SKIP — " + r;
                      toast(msg); saveLog(msg); return;
                  }

                  int delay = prefs.getInt("scan_delay", 300);

                  String bestToken = null;
                  if (hasToken && authToken != null && authToken.length() > 20) {
                      bestToken = authToken;
                      saveLog("🔑 Hook token");
                  } else if (sanedToken != null && sanedToken.length() > 20) {
                      bestToken = sanedToken;
                      saveLog("🔑 SharedPrefs token");
                      readSanedToken(); // refresh in background
                  }

                  if (bestToken != null) {
                      saveLog("✅ Filter pass! API in " + delay + "ms → id=" + requestId);
                      final String fa = bestToken;
                      new Handler(Looper.getMainLooper()).postDelayed(
                          () -> callAcceptApi(requestId, fa, pickupKm, dropKm), delay);
                  } else {
                      saveLog("✅ Filter pass! Su-Swipe in " + delay + "ms → id=" + requestId);
                      final int d = delay;
                      new Handler(Looper.getMainLooper()).postDelayed(
                          () -> doSuSwipe(d), delay);
                  }
              }

              void doSuSwipe(int delayMs) {
                  new Thread(() -> {
                      try {
                          android.util.DisplayMetrics dm = getResources().getDisplayMetrics();
                          int W = dm.widthPixels;
                          int H = dm.heightPixels;
                          int x1 = (int)(W * 0.10f);
                          int x2 = (int)(W * 0.90f);
                          int y  = (int)(H * 0.885f);

                          saveLog("🖱️ Su swipe: " + x1 + "→" + x2 + " y=" + y);
                          String[] cmds = {
                              "input touchscreen swipe " + x1+" "+y+" "+x2+" "+y+" 250",
                              "input swipe " + x1+" "+y+" "+x2+" "+y+" 250"
                          };

                          for (String cmd : cmds) {
                              try {
                                  ProcessBuilder pb = new ProcessBuilder("su", "-c", cmd);
                                  pb.redirectErrorStream(true);
                                  Process p = pb.start();
                                  byte[] buf = new byte[256];
                                  int n = p.getInputStream().read(buf);
                                  boolean done = p.waitFor(4, java.util.concurrent.TimeUnit.SECONDS);
                                  int exit = done ? p.exitValue() : -1;
                                  String out = n > 0 ? new String(buf, 0, n).trim() : "";
                                  if (exit == 0) {
                                      saveLog("✅ Swipe OK! [" + cmd.split(" ")[1] + "]");
                                      return;
                                  }
                                  saveLog("⚠️ [" + cmd.split(" ")[1] + "] exit=" + exit
                                      + (out.isEmpty() ? "" : " " + out.substring(0, Math.min(60,out.length()))));
                              } catch (Throwable e) {
                                  saveLog("⚠️ cmd err: " + e.getMessage());
                              }
                          }
                          saveLog("❌ All swipe methods failed");
                      } catch (Throwable e) {
                          saveLog("❌ doSuSwipe: " + e.getMessage());
                      }
                  }, "su-swipe").start();
              }

              void callAcceptApi(String requestId, String authHeader, float pickupKm, float dropKm) {
                  new Thread(() -> {
                      String urlStr = ACCEPT_URL + requestId;
                      saveLog("🌐 PUT " + urlStr);
                      HttpURLConnection conn = null;
                      try {
                          conn = (HttpURLConnection) new URL(urlStr).openConnection();
                          conn.setRequestMethod("PUT");
                          conn.setRequestProperty("Authorization", authHeader);
                          conn.setRequestProperty("Content-Type", "application/json");
                          conn.setRequestProperty("Accept", "application/json");
                          conn.setConnectTimeout(5000); conn.setReadTimeout(5000);
                          conn.setDoOutput(false);
                          int code = conn.getResponseCode();
                          if (code == 200 || code == 201 || code == 204) {
                              String msg = "🎉 ACCEPTED! HTTP " + code + " P=" + fmt1(pickupKm) + " D=" + fmt1(dropKm) + "km";
                              toast(msg); saveLog(msg);
                          } else {
                              String body = readStream(conn.getErrorStream(), 400);
                              String msg = "❌ HTTP " + code + " — " + body;
                              if (code == 401) { msg += " → Token expire"; sanedToken = ""; readSanedToken(); }
                              if (code == 409) msg += " → Already accepted";
                              if (code == 404) msg += " → Order expire";
                              toast(msg); saveLog(msg);
                          }
                          showNotification();
                      } catch (Exception e) { saveLog("❌ Network: " + e.getMessage()); }
                      finally { if (conn != null) conn.disconnect(); }
                  }, "accept-thread").start();
              }

              float calcPickupDist(double lat, double lon) {
                  if (lat <= 0 || lon <= 0) return -1;
                  if (lastLocation == null) { saveLog("⚠️ GPS N/A"); return -1; }
                  try {
                      float[] res = new float[1];
                      Location.distanceBetween(lastLocation.getLatitude(), lastLocation.getLongitude(), lat, lon, res);
                      return res[0] / 1000f;
                  } catch (Exception e) { return -1; }
              }

              void showNotification() {
                  boolean on = prefs != null && prefs.getBoolean("enabled", false);
                  NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                  if (Build.VERSION.SDK_INT >= 26)
                      nm.createNotificationChannel(new NotificationChannel("auto_svc", "Auto Driver", NotificationManager.IMPORTANCE_LOW));
                  Intent ti = new Intent("JAHEZ_TOGGLE").setPackage(getPackageName());
                  PendingIntent tp = PendingIntent.getBroadcast(this, 0, ti, PendingIntent.FLAG_IMMUTABLE|PendingIntent.FLAG_UPDATE_CURRENT);
                  Notification.Builder b = new Notification.Builder(this, "auto_svc")
                      .setContentTitle("Auto Driver").setContentText(on ? "Auto Accept: ON" : "Auto Accept: OFF")
                      .setSmallIcon(android.R.drawable.ic_media_play).setOngoing(true);
                  if (Build.VERSION.SDK_INT >= 23) b.addAction(new Notification.Action.Builder(
                      on ? android.R.drawable.ic_media_pause : android.R.drawable.ic_media_play,
                      on ? "✅ ON — tap OFF" : "⏸ OFF — tap ON", tp).build());
                  startForeground(1, b.build());
              }

              void saveLog(String msg) {
                  String entry = "[" + new SimpleDateFormat("HH:mm:ss.SSS", Locale.getDefault()).format(new Date()) + "]  " + msg;
                  String existing = prefs.getString("logs", "");
                  String[] lines = existing.isEmpty() ? new String[0] : existing.split("\n");
                  StringBuilder sb = new StringBuilder(entry);
                  for (int i = 0; i < lines.length && i < 150; i++) sb.append("\n").append(lines[i]);
                  prefs.edit().putString("logs", sb.toString()).apply();
              }

              void toast(String msg) {
                  new Handler(Looper.getMainLooper()).post(() ->
                      android.widget.Toast.makeText(getApplicationContext(), msg, android.widget.Toast.LENGTH_LONG).show());
              }

              String fmt1(float v)  { return v < 0 ? "?" : String.format("%.1f", v); }
              String fmt2(double v) { return v < 0 ? "?" : String.format("%.2f", v); }
              String readStream(InputStream is, int max) {
                  if (is == null) return "";
                  try { byte[] b = new byte[max]; int n = is.read(b); return n > 0 ? new String(b,0,n).trim() : ""; }
                  catch (Exception e) { return ""; }
              }

              @Override public void onDestroy() {
                  super.onDestroy();
                  try { unregisterReceiver(toggleReceiver); } catch (Exception ignored) {}
                  try { unregisterReceiver(orderReceiver);  } catch (Exception ignored) {}
                  try { unregisterReceiver(hookLogReceiver); } catch (Exception ignored) {}
              }
          }
