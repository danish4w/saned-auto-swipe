name: Build Saned Order Simulator
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Project
        run: |
          mkdir -p app/src/main/java/com/sanedsimulator
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          echo "include ':app'" > settings.gradle

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.sanedsimulator'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.sanedsimulator'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Saned Simulator"
                  android:theme="@style/Theme.AppCompat">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Saned Simulator</string>
          </resources>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="#F5F5F5"
              android:padding="16dp">

              <!-- Header -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:layout_marginBottom="16dp">

                  <TextView
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="📦 Saned"
                      android:textSize="20sp"
                      android:textColor="#FF5722"
                      android:textStyle="bold"/>

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Driver"
                      android:textSize="14sp"
                      android:textColor="#666666"/>

              </LinearLayout>

              <!-- New Order Badge -->
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="🆕 NEW ORDER"
                  android:textSize="14sp"
                  android:textColor="#FF9800"
                  android:textStyle="bold"
                  android:background="#FFF3E0"
                  android:padding="8dp"
                  android:layout_marginBottom="16dp"/>

              <!-- Order Card -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:background="#FFFFFF"
                  android:elevation="4dp"
                  android:padding="16dp"
                  android:layout_marginBottom="20dp">

                  <!-- Delivery Fee -->
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:layout_marginBottom="16dp">

                      <TextView
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="Delivery Fee"
                          android:textSize="14sp"
                          android:textColor="#666666"/>

                      <TextView
                          android:id="@+id/tv_delivery_fee"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="SAR 12.00"
                          android:textSize="18sp"
                          android:textColor="#4CAF50"
                          android:textStyle="bold"/>

                  </LinearLayout>

                  <!-- Pickup Section -->
                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="📍 PICKUP"
                      android:textSize="12sp"
                      android:textColor="#FF5722"
                      android:textStyle="bold"
                      android:layout_marginBottom="8dp"/>

                  <TextView
                      android:id="@+id/tv_pickup_address"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Al Thumamah Rd., Ar Rabi District"
                      android:textSize="14sp"
                      android:textColor="#333333"
                      android:layout_marginBottom="8dp"/>

                  <TextView
                      android:id="@+id/tv_pickup_distance"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="🚗 1.6 km from you"
                      android:textSize="13sp"
                      android:textColor="#FF9800"
                      android:layout_marginBottom="16dp"/>

                  <!-- Divider -->
                  <View
                      android:layout_width="match_parent"
                      android:layout_height="1dp"
                      android:background="#EEEEEE"
                      android:layout_marginVertical="12dp"/>

                  <!-- Drop Section -->
                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="📍 DROP"
                      android:textSize="12sp"
                      android:textColor="#4CAF50"
                      android:textStyle="bold"
                      android:layout_marginBottom="8dp"/>

                  <TextView
                      android:id="@+id/tv_drop_address"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="QJ7R+Q88, Al Aqiq, Riyadh 13519"
                      android:textSize="14sp"
                      android:textColor="#333333"
                      android:layout_marginBottom="8dp"/>

                  <TextView
                      android:id="@+id/tv_drop_distance"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="🚗 2.9 km from pickup"
                      android:textSize="13sp"
                      android:textColor="#FF9800"
                      android:layout_marginBottom="16dp"/>

                  <!-- Customer Note -->
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:background="#FFF9C4"
                      android:padding="10dp"
                      android:layout_marginTop="8dp">

                      <TextView
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="📝"
                          android:textSize="14sp"
                          android:layout_marginEnd="8dp"/>

                      <TextView
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:text="Please call upon arrival"
                          android:textSize="12sp"
                          android:textColor="#666666"/>

                  </LinearLayout>

              </LinearLayout>

              <!-- Action Buttons -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:layout_marginBottom="20dp">

                  <!-- Reject Button -->
                  <LinearLayout
                      android:id="@+id/btn_reject"
                      android:layout_width="0dp"
                      android:layout_height="50dp"
                      android:layout_weight="1"
                      android:background="#F44336"
                      android:gravity="center"
                      android:layout_marginEnd="8dp">

                      <TextView
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="Reject"
                          android:textSize="16sp"
                          android:textColor="#FFFFFF"
                          android:textStyle="bold"/>

                  </LinearLayout>

                  <!-- Accept Button (Swipe Area) -->
                  <LinearLayout
                      android:id="@+id/swipe_container"
                      android:layout_width="0dp"
                      android:layout_height="50dp"
                      android:layout_weight="1"
                      android:background="#4CAF50"
                      android:orientation="horizontal"
                      android:gravity="center_vertical"
                      android:layout_marginStart="8dp">

                      <TextView
                          android:id="@+id/tv_swipe_status"
                          android:layout_width="0dp"
                          android:layout_height="match_parent"
                          android:layout_weight="1"
                          android:text="     Swipe to Accept →"
                          android:textSize="14sp"
                          android:textColor="#FFFFFF"
                          android:textStyle="bold"
                          android:gravity="center_vertical"/>

                      <TextView
                          android:id="@+id/tv_swipe_arrow"
                          android:layout_width="40dp"
                          android:layout_height="match_parent"
                          android:text="→→"
                          android:textSize="16sp"
                          android:textColor="#FFFFFF"
                          android:gravity="center"
                          android:background="#388E3C"/>

                  </LinearLayout>

              </LinearLayout>

              <!-- Status -->
              <TextView
                  android:id="@+id/tv_status"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="⏳ Waiting for swipe..."
                  android:textSize="14sp"
                  android:textColor="#FF9800"
                  android:gravity="center"
                  android:layout_marginBottom="16dp"/>

              <!-- Control Buttons -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:layout_marginTop="10dp">

                  <Button
                      android:id="@+id/btn_new_order"
                      android:layout_width="0dp"
                      android:layout_height="45dp"
                      android:layout_weight="1"
                      android:text="New Order"
                      android:textSize="13sp"
                      android:layout_marginEnd="8dp"/>

                  <Button
                      android:id="@+id/btn_reset"
                      android:layout_width="0dp"
                      android:layout_height="45dp"
                      android:layout_weight="1"
                      android:text="Reset"
                      android:textSize="13sp"/>

              </LinearLayout>

              <!-- Instructions -->
              <TextView
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="💡 Instructions:\n1. Green 'Swipe to Accept' ko left se right swipe karein\n2. Order accept ho jayega\n3. 'New Order' se next order test karein\n4. 'Reset' se current order reset karein"
                  android:textSize="11sp"
                  android:textColor="#999999"
                  android:layout_marginTop="20dp"
                  android:lineSpacingExtra="3dp"/>

          </LinearLayout>
          EOF

          cat > app/src/main/java/com/sanedsimulator/MainActivity.java << 'EOF'
          package com.sanedsimulator;

          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import android.widget.Button;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import java.util.Random;

          public class MainActivity extends AppCompatActivity {

              private TextView tvPickupAddress, tvPickupDistance, tvDropAddress, tvDropDistance;
              private TextView tvDeliveryFee, tvStatus, tvSwipeStatus;
              private LinearLayout swipeContainer, btnReject;
              private Button btnNewOrder, btnReset;
              private boolean isOrderAccepted = false;
              private float currentPickup = 0;
              private float currentDrop = 0;
              private Random random = new Random();

              private String[] pickupAddresses = {
                  "Al Thumamah Rd., Ar Rabi District",
                  "King Fahd Rd., Al Malaz",
                  "Olaya St., Al Olaya",
                  "Tahlia St., Al Aqiq",
                  "Prince Sultan Rd., Al Rawabi",
                  "Al Madinah Rd., Al Nakheel"
              };

              private String[] dropAddresses = {
                  "QJ7R+Q88, Al Aqiq, Riyadh 13519",
                  "King Abdullah Rd., Al Malaz",
                  "Prince Turki St., Al Yasmin",
                  "Al Tahliya St., Al Olaya",
                  "Northern Ring Rd., Al Rawabi",
                  "Eastern Ring Rd., Al Nakheel"
              };

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  tvPickupAddress = findViewById(R.id.tv_pickup_address);
                  tvPickupDistance = findViewById(R.id.tv_pickup_distance);
                  tvDropAddress = findViewById(R.id.tv_drop_address);
                  tvDropDistance = findViewById(R.id.tv_drop_distance);
                  tvDeliveryFee = findViewById(R.id.tv_delivery_fee);
                  tvStatus = findViewById(R.id.tv_status);
                  tvSwipeStatus = findViewById(R.id.tv_swipe_status);
                  swipeContainer = findViewById(R.id.swipe_container);
                  btnReject = findViewById(R.id.btn_reject);
                  btnNewOrder = findViewById(R.id.btn_new_order);
                  btnReset = findViewById(R.id.btn_reset);

                  generateRandomOrder();

                  // Swipe detection on accept button
                  swipeContainer.setOnTouchListener(new View.OnTouchListener() {
                      private float startX = 0;
                      private boolean isSwiping = false;

                      @Override
                      public boolean onTouch(View v, MotionEvent event) {
                          if (isOrderAccepted) {
                              Toast.makeText(MainActivity.this, "Order already accepted! Press New Order", Toast.LENGTH_SHORT).show();
                              return true;
                          }

                          switch (event.getAction()) {
                              case MotionEvent.ACTION_DOWN:
                                  startX = event.getRawX();
                                  isSwiping = true;
                                  tvSwipeStatus.setText("     →→→ Swipe →→→");
                                  return true;

                              case MotionEvent.ACTION_MOVE:
                                  if (isSwiping) {
                                      float deltaX = event.getRawX() - startX;
                                      if (deltaX > 100) {
                                          acceptOrder();
                                          isSwiping = false;
                                      }
                                  }
                                  return true;

                              case MotionEvent.ACTION_UP:
                                  isSwiping = false;
                                  tvSwipeStatus.setText("     Swipe to Accept →");
                                  return true;
                          }
                          return false;
                      }
                  });

                  // Reject button
                  btnReject.setOnClickListener(v -> {
                      if (!isOrderAccepted) {
                          Toast.makeText(MainActivity.this, "Order Rejected! Press New Order", Toast.LENGTH_SHORT).show();
                          generateRandomOrder();
                      } else {
                          Toast.makeText(MainActivity.this, "Already accepted! Press New Order", Toast.LENGTH_SHORT).show();
                      }
                  });

                  // New Order button
                  btnNewOrder.setOnClickListener(v -> {
                      generateRandomOrder();
                      isOrderAccepted = false;
                      tvStatus.setText("⏳ New Order Available! Swipe to accept");
                      tvStatus.setTextColor(0xFFFF9800);
                      tvSwipeStatus.setText("     Swipe to Accept →");
                      Toast.makeText(this, "New order generated!", Toast.LENGTH_SHORT).show();
                  });

                  // Reset button
                  btnReset.setOnClickListener(v -> {
                      isOrderAccepted = false;
                      tvStatus.setText("⏳ Waiting for swipe...");
                      tvStatus.setTextColor(0xFFFF9800);
                      tvSwipeStatus.setText("     Swipe to Accept →");
                      Toast.makeText(this, "Reset! Swipe to accept", Toast.LENGTH_SHORT).show();
                  });
              }

              private void generateRandomOrder() {
                  // Pickup distance: 0.1 to 2.0 km
                  currentPickup = 0.1f + random.nextFloat() * 1.9f;
                  currentPickup = Math.round(currentPickup * 10) / 10.0f;
                  
                  // Drop distance: 0.1 to 5.0 km
                  currentDrop = 0.1f + random.nextFloat() * 4.9f;
                  currentDrop = Math.round(currentDrop * 10) / 10.0f;
                  
                  // Delivery fee: 8 to 25 SAR
                  float fee = 8 + random.nextFloat() * 17;
                  fee = Math.round(fee * 100) / 100.0f;
                  
                  // Random addresses
                  String pickupAddr = pickupAddresses[random.nextInt(pickupAddresses.length)];
                  String dropAddr = dropAddresses[random.nextInt(dropAddresses.length)];
                  
                  tvPickupAddress.setText(pickupAddr);
                  tvPickupDistance.setText("🚗 " + currentPickup + " km from you");
                  tvDropAddress.setText(dropAddr);
                  tvDropDistance.setText("🚗 " + currentDrop + " km from pickup");
                  tvDeliveryFee.setText("SAR " + String.format("%.2f", fee));
              }

              private void acceptOrder() {
                  isOrderAccepted = true;
                  tvStatus.setText("✅ ORDER ACCEPTED!\nPickup: " + currentPickup + " km | Drop: " + currentDrop + " km");
                  tvStatus.setTextColor(0xFF4CAF50);
                  tvSwipeStatus.setText("     ✓ Accepted ✓");
                  Toast.makeText(this, "🎉 Order Accepted! Press New Order for next", Toast.LENGTH_LONG).show();
              }
          }
          EOF

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Saned-Simulator
          path: app/build/outputs/apk/debug/*.apk
