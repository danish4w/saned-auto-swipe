name: Build DanishAuto LSPosed Module
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build LSPosed Module
        run: |
          mkdir -p app/src/main/java/com/danish/lsposed
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          echo "include ':app'" > settings.gradle

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://maven.xposed.info/repository' }
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.3.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://maven.xposed.info/repository' }
              }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.danish.lsposed'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.danish.lsposed'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildFeatures {
                  aidl true
              }
          }
          dependencies {
              compileOnly 'de.robv.android.xposed:api:82'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="DanishAuto"
                  android:icon="@android:drawable/ic_menu_share"
                  android:theme="@style/Theme.AppCompat">
                  <meta-data
                      android:name="xposedmodule"
                      android:value="true" />
                  <meta-data
                      android:name="xposeddescription"
                      android:value="Auto Accept Orders for Jahez Driver (No Accessibility Needed)" />
                  <meta-data
                      android:name="xposedminversion"
                      android:value="82" />
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">DanishAuto</string>
          </resources>
          EOF

          cat > app/src/main/assets/xposed_init << 'EOF'
          com.danish.lsposed.MainHook
          EOF

          cat > app/src/main/java/com/danish/lsposed/MainHook.java << 'EOF'
          package com.danish.lsposed;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.content.Context;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.os.SystemClock;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.Button;
          import android.widget.TextView;

          import java.lang.reflect.Field;
          import java.lang.reflect.Method;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;

          public class MainHook implements de.robv.android.xposed.IXposedHookLoadPackage {

              private static final String TAG = "DanishAuto-LSP";
              private static final String PACKAGE_NAME = "net.jahez.fleets";
              private static SharedPreferences prefs;
              private static Handler uiHandler = new Handler(Looper.getMainLooper());
              private static boolean isProcessing = false;

              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable {
                  if (!lpparam.packageName.equals(PACKAGE_NAME)) return;

                  XposedBridge.log(TAG + " - Hooked into Jahez Driver app");

                  Class<?> orderActivity = XposedHelpers.findClass("com.jahez.fleets.ui.order.OrderActivity", lpparam.classLoader);

                  XposedHelpers.findAndHookMethod(orderActivity, "onCreate", Bundle.class, new XC_MethodHook() {
                      @Override
                      protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                          Context context = (Context) param.thisObject;
                          prefs = context.getSharedPreferences("danish_prefs", Context.MODE_PRIVATE);

                          if (!prefs.getBoolean("enabled", false)) return;

                          int delay = prefs.getInt("screen_delay", 500);
                          XposedBridge.log(TAG + " - Order screen detected, waiting " + delay + "ms");

                          uiHandler.postDelayed(() -> {
                              try {
                                  checkAndAcceptOrder(context);
                              } catch (Throwable t) {
                                  XposedBridge.log(TAG + " Error: " + t.getMessage());
                              }
                          }, delay);
                      }
                  });
              }

              private void checkAndAcceptOrder(Context context) {
                  if (isProcessing) return;
                  isProcessing = true;

                  try {
                      View decorView = getCurrentActivityDecorView();
                      if (decorView == null) {
                          XposedBridge.log(TAG + " DecorView is null, abort");
                          return;
                      }

                      float[] distances = extractDistancesFromView(decorView);
                      float pickupKm = distances[0];
                      float dropKm = distances[1];

                      float pickupMax = prefs.getFloat("pickup_max", 5.0f);
                      float dropMax = prefs.getFloat("drop_max", 10.0f);

                      XposedBridge.log(TAG + " Limits - Pickup: " + pickupMax + "km, Drop: " + dropMax + "km");
                      XposedBridge.log(TAG + " Distances - Pickup: " + pickupKm + "km, Drop: " + dropKm + "km");

                      if (pickupKm < 0 || dropKm < 0) {
                          XposedBridge.log(TAG + " Could not parse distances");
                          return;
                      }

                      if (pickupKm <= pickupMax && dropKm <= dropMax) {
                          XposedBridge.log(TAG + " Order accepted automatically");
                          acceptOrder(decorView);
                          sendNotification(context, pickupKm, dropKm);
                      } else {
                          XposedBridge.log(TAG + " Order rejected - distance out of range");
                      }
                  } finally {
                      isProcessing = false;
                  }
              }

              private View getCurrentActivityDecorView() {
                  try {
                      Class<?> activityThreadClass = Class.forName("android.app.ActivityThread");
                      Method currentActivityThread = activityThreadClass.getMethod("currentActivityThread");
                      Object activityThread = currentActivityThread.invoke(null);
                      Field activitiesField = activityThreadClass.getDeclaredField("mActivities");
                      activitiesField.setAccessible(true);
                      Object activities = activitiesField.get(activityThread);
                      if (activities instanceof android.util.ArrayMap) {
                          android.util.ArrayMap<?, ?> map = (android.util.ArrayMap<?, ?>) activities;
                          for (Object activityRecord : map.values()) {
                              Field pausedField = activityRecord.getClass().getDeclaredField("paused");
                              pausedField.setAccessible(true);
                              if (!pausedField.getBoolean(activityRecord)) {
                                  Field activityField = activityRecord.getClass().getDeclaredField("activity");
                                  activityField.setAccessible(true);
                                  android.app.Activity activity = (android.app.Activity) activityField.get(activityRecord);
                                  return activity.getWindow().getDecorView();
                              }
                          }
                      }
                  } catch (Exception e) {
                      XposedBridge.log(TAG + " getDecorView error: " + e.getMessage());
                  }
                  return null;
              }

              private float[] extractDistancesFromView(View root) {
                  float[] result = {-1f, -1f};
                  List<Float> distances = new ArrayList<>();
                  traverseViews(root, distances);
                  if (distances.size() >= 1) result[0] = distances.get(0);
                  if (distances.size() >= 2) result[1] = distances.get(1);
                  return result;
              }

              private void traverseViews(View view, List<Float> distances) {
                  if (view == null) return;
                  if (view instanceof TextView) {
                      String text = ((TextView) view).getText().toString();
                      float km = extractNumberFromText(text);
                      if (km > 0 && km < 100 && !distances.contains(km)) {
                          distances.add(km);
                          XposedBridge.log(TAG + " Found distance: " + km + " in text: " + text);
                      }
                  }
                  if (view instanceof ViewGroup) {
                      ViewGroup group = (ViewGroup) view;
                      for (int i = 0; i < group.getChildCount(); i++) {
                          traverseViews(group.getChildAt(i), distances);
                      }
                  }
              }

              private float extractNumberFromText(String text) {
                  if (text == null || text.isEmpty()) return -1f;
                  Pattern p = Pattern.compile("(\\d+(?:\\.\\d+)?)\\s*[Kk][Mm]");
                  Matcher m = p.matcher(text);
                  if (m.find()) {
                      try {
                          return Float.parseFloat(m.group(1).replace(",", "."));
                      } catch (NumberFormatException e) {
                          return -1f;
                      }
                  }
                  return -1f;
              }

              private void acceptOrder(View decorView) {
                  Button acceptBtn = findAcceptButton(decorView);
                  if (acceptBtn != null) {
                      XposedBridge.log(TAG + " Accept button found, performing click");
                      acceptBtn.performClick();
                  } else {
                      XposedBridge.log(TAG + " Accept button not found, trying swipe");
                      simulateSwipeOnBottom(decorView);
                  }
              }

              private Button findAcceptButton(View view) {
                  if (view == null) return null;
                  if (view instanceof Button) {
                      String text = ((Button) view).getText().toString();
                      if (text.equals("Accept") || text.equals("ACCEPT") || text.equals("قبول") || text.equals("موافقة")) {
                          return (Button) view;
                      }
                  }
                  if (view instanceof ViewGroup) {
                      ViewGroup group = (ViewGroup) view;
                      for (int i = 0; i < group.getChildCount(); i++) {
                          Button btn = findAcceptButton(group.getChildAt(i));
                          if (btn != null) return btn;
                      }
                  }
                  return null;
              }

              private void simulateSwipeOnBottom(View decorView) {
                  int screenWidth = decorView.getResources().getDisplayMetrics().widthPixels;
                  int screenHeight = decorView.getResources().getDisplayMetrics().heightPixels;
                  int startX = (int)(screenWidth * 0.2);
                  int endX = (int)(screenWidth * 0.8);
                  int y = (int)(screenHeight * 0.85);
                  XposedBridge.log(TAG + " Simulating swipe from (" + startX + "," + y + ") to (" + endX + "," + y + ")");

                  try {
                      Class<?> inputManagerClass = Class.forName("android.hardware.input.InputManager");
                      Method getInstance = inputManagerClass.getMethod("getInstance");
                      Object inputManager = getInstance.invoke(null);
                      Method injectInputEvent = inputManagerClass.getMethod("injectInputEvent", MotionEvent.class, int.class);

                      long downTime = SystemClock.uptimeMillis();
                      MotionEvent downEvent = MotionEvent.obtain(downTime, downTime, MotionEvent.ACTION_DOWN, startX, y, 0);
                      injectInputEvent.invoke(inputManager, downEvent, 0);
                      downEvent.recycle();

                      long moveTime = downTime + 150;
                      MotionEvent moveEvent = MotionEvent.obtain(downTime, moveTime, MotionEvent.ACTION_MOVE, endX, y, 0);
                      injectInputEvent.invoke(inputManager, moveEvent, 0);
                      moveEvent.recycle();

                      long upTime = downTime + 300;
                      MotionEvent upEvent = MotionEvent.obtain(downTime, upTime, MotionEvent.ACTION_UP, endX, y, 0);
                      injectInputEvent.invoke(inputManager, upEvent, 0);
                      upEvent.recycle();

                      XposedBridge.log(TAG + " Touch events injected");
                  } catch (Exception e) {
                      XposedBridge.log(TAG + " Failed to inject touch: " + e.getMessage());
                  }
              }

              private void sendNotification(Context context, float pickup, float drop) {
                  try {
                      NotificationManager nm = (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          NotificationChannel channel = new NotificationChannel(
                              "danish_channel", "DanishAuto", NotificationManager.IMPORTANCE_HIGH);
                          nm.createNotificationChannel(channel);
                      }
                      Notification.Builder builder;
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          builder = new Notification.Builder(context, "danish_channel");
                      } else {
                          builder = new Notification.Builder(context);
                      }
                      builder.setSmallIcon(android.R.drawable.ic_dialog_info)
                          .setContentTitle("✅ Order Accepted")
                          .setContentText("Pickup: " + pickup + " km | Drop: " + drop + " km")
                          .setAutoCancel(true);
                      nm.notify(1001, builder.build());
                  } catch (Exception e) {
                      XposedBridge.log(TAG + " Notification error: " + e.getMessage());
                  }
              }
          }
          EOF

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DanishAuto-LSPosed
          path: app/build/outputs/apk/debug/*.apk
