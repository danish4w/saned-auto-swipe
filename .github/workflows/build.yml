name: Build JahezDiagnostic

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          cat > gradle/wrapper/gradle-wrapper.properties << 'WEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/zips
          WEOF

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/danish/diag
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/assets

      - name: Write Gradle Files
        run: |
          cat > settings.gradle << 'SEOF'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositories {
              google(); mavenCentral()
              maven { url 'https://api.xposed.info/' }
            }
          }
          rootProject.name = "JahezDiagnostic"
          include ':app'
          SEOF

          cat > build.gradle << 'BEOF'
          plugins { id 'com.android.application' version '8.5.2' apply false }
          BEOF

          cat > gradle.properties << 'GEOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          GEOF

          cat > app/build.gradle << 'ABEOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.danish.diag'
            compileSdk 34
            defaultConfig {
              applicationId 'com.danish.diag'
              minSdk 26
              targetSdk 34
              versionCode 1
              versionName '1.0'
            }
            buildTypes {
              release { minifyEnabled false }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            compileOnly 'de.robv.android.xposed:api:82'
          }
          ABEOF

      - name: Write Icon
        run: |
          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'BGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp"
            android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#1565C0"
              android:pathData="M0,0 L108,0 L108,108 L0,108 Z"/>
          </vector>
          BGEOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'FGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp"
            android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#FFFFFF"
              android:pathData="M30,54 L50,30 L70,54 L58,54 L58,78 L42,78 L42,54 Z"/>
          </vector>
          FGEOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'ICEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          ICEOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'RNDEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          RNDEOF

      - name: Write Xposed Files
        run: |
          echo "com.danish.diag.DiagHook" > app/src/main/assets/xposed_init

      - name: Write Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC"/>
            <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
            <application
              android:label="Jahez Diag"
              android:icon="@mipmap/ic_launcher"
              android:roundIcon="@mipmap/ic_launcher_round"
              android:theme="@style/AppTheme"
              android:allowBackup="false">
              <meta-data android:name="xposedmodule" android:value="true"/>
              <meta-data android:name="xposeddescription" android:value="Jahez diagnostic hook"/>
              <meta-data android:name="xposedminversion" android:value="82"/>
              <activity android:name=".MainActivity" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
              <activity android:name=".LogActivity" android:exported="false"/>
              <service android:name=".DiagService" android:exported="false"
                android:foregroundServiceType="dataSync"/>
              <service android:name=".DiagAccessibility" android:exported="true"
                android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE">
                <intent-filter>
                  <action android:name="android.accessibilityservice.AccessibilityService"/>
                </intent-filter>
                <meta-data android:name="android.accessibilityservice"
                  android:resource="@xml/accessibility_config"/>
              </service>
              <receiver android:name=".BootReceiver" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.BOOT_COMPLETED"/>
                </intent-filter>
              </receiver>
            </application>
          </manifest>
          MEOF

      - name: Write DiagHook
        run: |
          cat > app/src/main/java/com/danish/diag/DiagHook.java << 'HEOF'
          package com.danish.diag;
          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;
          import android.content.Intent;
          import android.os.Bundle;
          public class DiagHook implements IXposedHookLoadPackage {
            static final String TARGET  = "net.jahez.fleets";
            static final String OUR_PKG = "com.danish.diag";
            long lastLog = 0;
            @Override public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lp) {
              if (!TARGET.equals(lp.packageName)) return;
              android.util.Log.d("JahezDiag", "Hook loaded for: " + lp.packageName);

              // ── 1. OkHttp — SARI API calls log karo ──
              try {
                XposedHelpers.findAndHookMethod(
                  "okhttp3.Request$Builder", lp.classLoader, "build",
                  new XC_MethodHook() {
                    @Override protected void afterHookedMethod(MethodHookParam p) {
                      try {
                        Object req = p.getResult();
                        Object url = XposedHelpers.callMethod(req, "url");
                        String urlStr = url.toString();
                        String method = (String) XposedHelpers.callMethod(req, "method");
                        Object hdrs = XposedHelpers.callMethod(req, "headers");
                        // Sari headers log karo
                        StringBuilder hLog = new StringBuilder();
                        try {
                          int count = (int) XposedHelpers.callMethod(hdrs, "size");
                          for (int i = 0; i < count; i++) {
                            String name = (String) XposedHelpers.callMethod(hdrs, "name", i);
                            String val  = (String) XposedHelpers.callMethod(hdrs, "value", i);
                            // Token ko truncate karo privacy ke liye
                            if (name.toLowerCase().contains("auth") || name.toLowerCase().contains("token")) {
                              val = val.length() > 30 ? val.substring(0, 30) + "..." : val;
                            }
                            hLog.append("\n      ").append(name).append(": ").append(val);
                          }
                        } catch (Exception ignored) {}
                        // Body log karo
                        String bodyStr = "";
                        try {
                          Object body = XposedHelpers.callMethod(req, "body");
                          if (body != null) {
                            long contentLen = (long) XposedHelpers.callMethod(body, "contentLength");
                            if (contentLen > 0 && contentLen < 2000) {
                              okio.Buffer buf = new okio.Buffer();
                              XposedHelpers.callMethod(body, "writeTo", buf);
                              bodyStr = "\n      Body: " + buf.readUtf8();
                            }
                          }
                        } catch (Exception ignored) {}
                        String logMsg = "🌐 " + method + " " + urlStr + hLog.toString() + bodyStr;
                        sendLog(lp, logMsg);
                      } catch (Exception e) {
                        android.util.Log.e("JahezDiag", "OkHttp log error: " + e.getMessage());
                      }
                    }
                  }
                );
                android.util.Log.d("JahezDiag", "OkHttp hook OK");
              } catch (Exception e) {
                android.util.Log.e("JahezDiag", "OkHttp hook FAILED: " + e);
              }

              // ── 2. OkHttp Response — server ka response bhi log karo ──
              try {
                XposedHelpers.findAndHookMethod(
                  "okhttp3.RealCall", lp.classLoader, "execute",
                  new XC_MethodHook() {
                    @Override protected void afterHookedMethod(MethodHookParam p) {
                      try {
                        Object response = p.getResult();
                        if (response == null) return;
                        int code = (int) XposedHelpers.callMethod(response, "code");
                        Object reqUrl = XposedHelpers.callMethod(
                          XposedHelpers.callMethod(response, "request"), "url");
                        String urlStr = reqUrl.toString();
                        // Response body (sirf short ones)
                        String bodyStr = "";
                        try {
                          Object body = XposedHelpers.callMethod(response, "peekBody", 1000L);
                          if (body != null)
                            bodyStr = "\n      RespBody: " + XposedHelpers.callMethod(body, "string");
                        } catch (Exception ignored) {}
                        sendLog(lp, "📥 HTTP " + code + " ← " + urlStr + bodyStr);
                      } catch (Exception e) {
                        android.util.Log.e("JahezDiag", "Response log error: " + e.getMessage());
                      }
                    }
                  }
                );
              } catch (Exception e) {
                android.util.Log.e("JahezDiag", "Response hook FAILED: " + e);
              }

              // ── 3. Activity.onResume — SAB activities log karo ──
              XposedHelpers.findAndHookMethod(
                "android.app.Activity", lp.classLoader, "onResume",
                new XC_MethodHook() {
                  @Override protected void afterHookedMethod(MethodHookParam p) {
                    android.app.Activity act = (android.app.Activity) p.thisObject;
                    String className = act.getClass().getName();
                    sendLog(lp, "📱 Activity: " + className);
                    // Intent extras bhi log karo
                    try {
                      Bundle extras = act.getIntent() != null ? act.getIntent().getExtras() : null;
                      if (extras != null && !extras.isEmpty()) {
                        StringBuilder sb = new StringBuilder("📦 Intent Extras (" + className + "):");
                        for (String key : extras.keySet()) {
                          Object val = extras.get(key);
                          sb.append("\n      ").append(key).append(" = ").append(val);
                        }
                        sendLog(lp, sb.toString());
                      }
                    } catch (Exception e) {
                      android.util.Log.e("JahezDiag", "Extras error: " + e.getMessage());
                    }
                  }
                }
              );

              // ── 4. Touch events on order screen ──
              XposedHelpers.findAndHookMethod(
                "android.app.Activity", lp.classLoader, "dispatchTouchEvent",
                android.view.MotionEvent.class,
                new XC_MethodHook() {
                  @Override protected void beforeHookedMethod(MethodHookParam p) {
                    android.view.MotionEvent ev = (android.view.MotionEvent) p.args[0];
                    if (ev == null) return;
                    int action = ev.getAction();
                    // Sirf DOWN aur UP log karo
                    if (action != android.view.MotionEvent.ACTION_DOWN &&
                        action != android.view.MotionEvent.ACTION_UP) return;
                    android.app.Activity act = (android.app.Activity) p.thisObject;
                    android.util.DisplayMetrics dm = new android.util.DisplayMetrics();
                    act.getWindowManager().getDefaultDisplay().getMetrics(dm);
                    int W = dm.widthPixels, H = dm.heightPixels;
                    float rx = ev.getX() / W;
                    float ry = ev.getY() / H;
                    String aName = action == android.view.MotionEvent.ACTION_DOWN ? "DOWN" : "UP";
                    sendLog(lp, "👆 TOUCH " + aName +
                      " px=" + (int)ev.getX() + " py=" + (int)ev.getY() +
                      " | rx=" + String.format("%.3f", rx) +
                      " ry=" + String.format("%.3f", ry) +
                      " | screen=" + W + "x" + H +
                      " | class=" + act.getClass().getSimpleName());
                  }
                }
              );
            }
            void sendLog(XC_LoadPackage.LoadPackageParam lp, String msg) {
              try {
                android.util.Log.d("JahezDiag", msg);
                Intent intent = new Intent("JAHEZ_DIAG_LOG");
                intent.putExtra("msg", msg);
                android.app.AndroidAppHelper.currentApplication().sendBroadcast(intent);
              } catch (Exception e) {
                android.util.Log.e("JahezDiag", "sendLog error: " + e.getMessage());
              }
            }
          }
          HEOF

      - name: Write DiagService
        run: |
          cat > app/src/main/java/com/danish/diag/DiagService.java << 'SEOF'
          package com.danish.diag;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.Service;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.IBinder;
          import android.util.Log;
          public class DiagService extends Service {
            static final String TAG   = "JahezDiag";
            static final String CH_ID = "diag_svc";
            SharedPreferences prefs;
            final BroadcastReceiver diagReceiver = new BroadcastReceiver() {
              @Override public void onReceive(Context ctx, Intent intent) {
                String msg = intent.getStringExtra("msg");
                if (msg != null) saveLog(msg);
              }
            };
            @Override public void onCreate() {
              super.onCreate();
              prefs = getSharedPreferences("diag_cfg", MODE_PRIVATE);
              IntentFilter f = new IntentFilter("JAHEZ_DIAG_LOG");
              if (Build.VERSION.SDK_INT >= 33)
                registerReceiver(diagReceiver, f, Context.RECEIVER_EXPORTED);
              else
                registerReceiver(diagReceiver, f);
              showNotification();
              Log.d(TAG, "DiagService started");
            }
            @Override public int onStartCommand(Intent intent, int flags, int startId) { return START_STICKY; }
            @Override public IBinder onBind(Intent intent) { return null; }
            void showNotification() {
              NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
              nm.createNotificationChannel(new NotificationChannel(
                CH_ID, "Jahez Diagnostic", NotificationManager.IMPORTANCE_LOW));
              Notification notif = new Notification.Builder(this, CH_ID)
                .setContentTitle("Jahez Diagnostic")
                .setContentText("Logging all events...")
                .setSmallIcon(android.R.drawable.ic_menu_info_details)
                .setOngoing(true)
                .build();
              startForeground(1, notif);
            }
            void saveLog(String msg) {
              java.text.SimpleDateFormat sdf = new java.text.SimpleDateFormat("HH:mm:ss.SSS", java.util.Locale.getDefault());
              String entry = "[" + sdf.format(new java.util.Date()) + "] " + msg;
              String existing = prefs.getString("logs", "");
              String[] lines = existing.isEmpty() ? new String[0] : existing.split("\n");
              StringBuilder sb = new StringBuilder(entry);
              for (int i = 0; i < lines.length && i < 199; i++) sb.append("\n").append(lines[i]);
              prefs.edit().putString("logs", sb.toString()).apply();
            }
            @Override public void onDestroy() {
              super.onDestroy();
              try { unregisterReceiver(diagReceiver); } catch (Exception ignored) {}
            }
          }
          SEOF

      - name: Write DiagAccessibility
        run: |
          cat > app/src/main/res/xml/accessibility_config.xml << 'ACEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
            android:accessibilityEventTypes="typeWindowStateChanged|typeWindowContentChanged|typeViewClicked|typeViewScrolled"
            android:accessibilityFeedbackType="feedbackGeneric"
            android:accessibilityFlags="flagDefault|flagReportViewIds|flagRequestEnhancedWebAccessibility"
            android:canPerformGestures="true"
            android:canRetrieveWindowContent="true"
            android:notificationTimeout="100"
            android:packageNames="net.jahez.fleets"
            android:description="@string/app_name"/>
          ACEOF

          cat > app/src/main/java/com/danish/diag/DiagAccessibility.java << 'JAEOF'
          package com.danish.diag;
          import android.accessibilityservice.AccessibilityService;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.view.accessibility.AccessibilityEvent;
          import android.view.accessibility.AccessibilityNodeInfo;
          import android.util.Log;
          import java.util.List;
          public class DiagAccessibility extends AccessibilityService {
            static final String TAG = "JahezDiagA11y";
            SharedPreferences prefs;
            @Override public void onServiceConnected() {
              super.onServiceConnected();
              prefs = getSharedPreferences("diag_cfg", MODE_PRIVATE);
              Log.d(TAG, "Accessibility connected");
              saveLog("♿ Accessibility Service connected");
            }
            @Override public void onAccessibilityEvent(AccessibilityEvent event) {
              try {
                int type = event.getEventType();
                String pkg  = event.getPackageName()  != null ? event.getPackageName().toString()  : "";
                String cls  = event.getClassName()    != null ? event.getClassName().toString()    : "";
                String text = event.getText()         != null ? event.getText().toString()         : "";
                if (!"net.jahez.fleets".equals(pkg)) return;
                String typeName =
                  type == AccessibilityEvent.TYPE_WINDOW_STATE_CHANGED   ? "WINDOW_STATE_CHANGED" :
                  type == AccessibilityEvent.TYPE_WINDOW_CONTENT_CHANGED ? "WINDOW_CONTENT_CHANGED" :
                  type == AccessibilityEvent.TYPE_VIEW_CLICKED            ? "VIEW_CLICKED" :
                  type == AccessibilityEvent.TYPE_VIEW_SCROLLED           ? "VIEW_SCROLLED" : "TYPE_" + type;
                // Screen change events log karo
                if (type == AccessibilityEvent.TYPE_WINDOW_STATE_CHANGED) {
                  saveLog("🖥 SCREEN: " + cls + (text.isEmpty() ? "" : " text=" + text));
                  // Window content dump karo
                  dumpWindowContent();
                }
                // Click events log karo
                if (type == AccessibilityEvent.TYPE_VIEW_CLICKED) {
                  String id = event.getSource() != null ?
                    String.valueOf(event.getSource().getViewIdResourceName()) : "?";
                  saveLog("🖱 CLICK: " + cls + " id=" + id + " text=" + text);
                }
              } catch (Exception e) {
                Log.e(TAG, "Event error: " + e.getMessage());
              }
            }
            void dumpWindowContent() {
              try {
                AccessibilityNodeInfo root = getRootInActiveWindow();
                if (root == null) return;
                StringBuilder sb = new StringBuilder("🌳 Window dump:");
                dumpNode(root, sb, 0);
                saveLog(sb.toString());
                root.recycle();
              } catch (Exception e) {
                Log.e(TAG, "Dump error: " + e.getMessage());
              }
            }
            void dumpNode(AccessibilityNodeInfo node, StringBuilder sb, int depth) {
              if (node == null || depth > 6) return;
              String indent = "  ".repeat(depth);
              String cls   = node.getClassName()         != null ? node.getClassName().toString()         : "";
              String text  = node.getText()              != null ? node.getText().toString()              : "";
              String desc  = node.getContentDescription() != null ? node.getContentDescription().toString() : "";
              String resId = node.getViewIdResourceName() != null ? node.getViewIdResourceName()           : "";
              android.graphics.Rect bounds = new android.graphics.Rect();
              node.getBoundsInScreen(bounds);
              if (!text.isEmpty() || !desc.isEmpty() || !resId.isEmpty()) {
                sb.append("\n").append(indent)
                  .append(cls.contains(".") ? cls.substring(cls.lastIndexOf(".") + 1) : cls)
                  .append(" text='").append(text).append("'")
                  .append(" desc='").append(desc).append("'")
                  .append(" id='").append(resId).append("'")
                  .append(" bounds=").append(bounds.toShortString())
                  .append(" click=").append(node.isClickable());
              }
              for (int i = 0; i < node.getChildCount(); i++) {
                AccessibilityNodeInfo child = node.getChild(i);
                dumpNode(child, sb, depth + 1);
                if (child != null) child.recycle();
              }
            }
            void saveLog(String msg) {
              if (prefs == null) return;
              java.text.SimpleDateFormat sdf = new java.text.SimpleDateFormat("HH:mm:ss.SSS", java.util.Locale.getDefault());
              String entry = "[" + sdf.format(new java.util.Date()) + "] " + msg;
              String existing = prefs.getString("logs", "");
              String[] lines = existing.isEmpty() ? new String[0] : existing.split("\n");
              StringBuilder sb = new StringBuilder(entry);
              for (int i = 0; i < lines.length && i < 199; i++) sb.append("\n").append(lines[i]);
              prefs.edit().putString("logs", sb.toString()).apply();
            }
            @Override public void onInterrupt() {}
          }
          JAEOF

      - name: Write MainActivity
        run: |
          cat > app/src/main/java/com/danish/diag/MainActivity.java << 'JEOF'
          package com.danish.diag;
          import android.app.Activity;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.*;
          public class MainActivity extends Activity {
            @Override protected void onCreate(Bundle saved) {
              super.onCreate(saved);
              setContentView(R.layout.activity_main);
              // Start service
              Intent svc = new Intent(this, DiagService.class);
              if (Build.VERSION.SDK_INT >= 26) startForegroundService(svc);
              else startService(svc);
              // Permissions
              if (Build.VERSION.SDK_INT >= 33)
                requestPermissions(new String[]{"android.permission.POST_NOTIFICATIONS"}, 0);
              requestPermissions(new String[]{
                "android.permission.ACCESS_FINE_LOCATION",
                "android.permission.ACCESS_COARSE_LOCATION"}, 1);
              // Overlay permission
              if (!Settings.canDrawOverlays(this)) {
                startActivity(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                  Uri.parse("package:" + getPackageName())));
              }
              // Accessibility
              if (!isA11yEnabled()) {
                Toast.makeText(this, "Accessibility enable karo — Jahez Diagnostic ON karo", Toast.LENGTH_LONG).show();
                startActivity(new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS));
              }
              findViewById(R.id.btn_logs).setOnClickListener(v ->
                startActivity(new Intent(this, LogActivity.class)));
              findViewById(R.id.btn_clear).setOnClickListener(v -> {
                getSharedPreferences("diag_cfg", MODE_PRIVATE).edit().remove("logs").apply();
                Toast.makeText(this, "Logs cleared", Toast.LENGTH_SHORT).show();
              });
              refreshStatus();
            }
            boolean isA11yEnabled() {
              String svc = getPackageName() + "/" + DiagAccessibility.class.getName();
              String enabled = android.provider.Settings.Secure.getString(
                getContentResolver(),
                android.provider.Settings.Secure.ENABLED_ACCESSIBILITY_SERVICES);
              return enabled != null && enabled.contains(svc);
            }
            void refreshStatus() {
              TextView tvStatus = findViewById(R.id.tv_status);
              boolean a11y = isA11yEnabled();
              tvStatus.setText(
                "LSPosed: scope net.jahez.fleets\n" +
                "Accessibility: " + (a11y ? "✅ ON" : "❌ OFF") + "\n" +
                "Open Saned → accept order manually\n" +
                "Then check logs here");
            }
            @Override protected void onResume() { super.onResume(); refreshStatus(); }
          }
          JEOF

      - name: Write LogActivity
        run: |
          cat > app/src/main/java/com/danish/diag/LogActivity.java << 'LEOF'
          package com.danish.diag;
          import android.app.Activity;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.widget.*;
          public class LogActivity extends Activity {
            @Override protected void onCreate(Bundle saved) {
              super.onCreate(saved);
              setContentView(R.layout.activity_log);
              SharedPreferences prefs = getSharedPreferences("diag_cfg", MODE_PRIVATE);
              TextView tvLog  = findViewById(R.id.tv_log);
              Button btnClear = findViewById(R.id.btn_clear);
              Button btnBack  = findViewById(R.id.btn_back);
              String logs = prefs.getString("logs", "");
              tvLog.setText(logs.isEmpty() ? "Koi log nahi.\nSaned kholo aur order accept karo." : logs);
              btnClear.setOnClickListener(v -> {
                prefs.edit().remove("logs").apply();
                tvLog.setText("Cleared.");
              });
              btnBack.setOnClickListener(v -> finish());
            }
          }
          LEOF

      - name: Write BootReceiver
        run: |
          cat > app/src/main/java/com/danish/diag/BootReceiver.java << 'BEOF'
          package com.danish.diag;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          public class BootReceiver extends BroadcastReceiver {
            @Override public void onReceive(Context ctx, Intent intent) {
              if (Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction())) {
                Intent svc = new Intent(ctx, DiagService.class);
                if (android.os.Build.VERSION.SDK_INT >= 26) ctx.startForegroundService(svc);
                else ctx.startService(svc);
              }
            }
          }
          BEOF

