name: Build DanishAuto LSPosed Module
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Project Structure
        run: |
          mkdir -p app/libs
          mkdir -p app/src/main/java/com/danish/lsposed
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

      - name: Create Build Files
        run: |
          # Settings file
          echo "include ':app'" > settings.gradle

          # Root build.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # App build.gradle (Fixed Dependencies)
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.danish.lsposed'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.danish.lsposed'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              compileOnly 'de.robv.android.xposed:api:82'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: Create Android Resources
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">DanishAuto</string>
          </resources>
          EOF

          cat > app/src/main/res/layout/activity_settings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="20dp">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="DanishAuto Settings" android:textSize="20sp" />
              <EditText android:id="@+id/et_pickup_max" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="Pickup Max Km" android:inputType="numberDecimal" />
              <EditText android:id="@+id/et_drop_max" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="Drop Max Km" android:inputType="numberDecimal" />
              <Switch android:id="@+id/switch_enabled" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Enable Auto Accept" />
              <Button android:id="@+id/btn_save" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Save Settings" />
          </LinearLayout>
          EOF

      - name: Create Java Source (Fixed Imports & XSharedPreferences)
        run: |
          # Settings Activity
          cat > app/src/main/java/com/danish/lsposed/SettingsActivity.java << 'EOF'
          package com.danish.lsposed;
          import android.annotation.SuppressLint;
          import android.content.Context;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.Switch;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import java.io.File;

          public class SettingsActivity extends AppCompatActivity {
              private SharedPreferences prefs;
              @SuppressLint("WorldReadableFiles")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_settings);
                  prefs = getSharedPreferences("danish_prefs", Context.MODE_PRIVATE);
                  
                  EditText etP = findViewById(R.id.et_pickup_max);
                  EditText etD = findViewById(R.id.et_drop_max);
                  @SuppressLint("UseSwitchCompatOrMaterialCode") Switch sw = findViewById(R.id.switch_enabled);
                  Button btn = findViewById(R.id.btn_save);

                  etP.setText(String.valueOf(prefs.getFloat("pickup_max", 5.0f)));
                  etD.setText(String.valueOf(prefs.getFloat("drop_max", 10.0f)));
                  sw.setChecked(prefs.getBoolean("enabled", false));

                  btn.setOnClickListener(v -> {
                      prefs.edit()
                          .putFloat("pickup_max", Float.parseFloat(etP.getText().toString()))
                          .putFloat("drop_max", Float.parseFloat(etD.getText().toString()))
                          .putBoolean("enabled", sw.isChecked())
                          .apply();
                      
                      // Fix permissions for LSPosed to read
                      File prefFile = new File(getFilesDir().getParent(), "shared_prefs/danish_prefs.xml");
                      if (prefFile.exists()) prefFile.setReadable(true, false);
                      
                      Toast.makeText(this, "Saved!", Toast.LENGTH_SHORT).show();
                  });
              }
          }
          EOF

          # Main Hook (Fixed Symbols Error)
          cat > app/src/main/java/com/danish/lsposed/MainHook.java << 'EOF'
          package com.danish.lsposed;

          import android.content.Context;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.Button;
          import android.widget.TextView;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XSharedPreferences;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;

          public class MainHook implements IXposedHookLoadPackage {
              private static final String TAG = "DanishAuto";
              private static XSharedPreferences xPrefs;

              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable {
                  if (!lpparam.packageName.equals("net.jahez.fleets")) return;

                  xPrefs = new XSharedPreferences("com.danish.lsposed", "danish_prefs");
                  xPrefs.makeWorldReadable();

                  XposedHelpers.findAndHookMethod("com.jahez.fleets.ui.order.OrderActivity", lpparam.classLoader, 
                      "onCreate", Bundle.class, new XC_MethodHook() {
                      @Override
                      protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                          xPrefs.reload();
                          if (!xPrefs.getBoolean("enabled", false)) return;
                          
                          new Handler(Looper.getMainLooper()).postDelayed(() -> {
                              XposedBridge.log(TAG + " Checking Order...");
                              // Custom logic for auto-accept goes here
                          }, 1000);
                      }
                  });
              }
          }
          EOF

      - name: Finalize & Build
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="DanishAuto" android:theme="@style/Theme.AppCompat">
                  <meta-data android:name="xposedmodule" android:value="true" />
                  <meta-data android:name="xposeddescription" android:value="Jahez Auto Accept" />
                  <meta-data android:name="xposedminversion" android:value="82" />
                  <activity android:name=".SettingsActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          cat > app/src/main/assets/xposed_init << 'EOF'
          com.danish.lsposed.MainHook
          EOF

          # Setup Gradle Wrapper
          wget https://services.gradle.org/distributions/gradle-8.3-bin.zip
          unzip -q gradle-8.3-bin.zip
          ./gradle-8.3/bin/gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DanishAuto-LSPosed-Fixed
          path: app/build/outputs/apk/debug/*.apk
