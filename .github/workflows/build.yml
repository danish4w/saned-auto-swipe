            <Button android:id="@+id/btn_clear" android:layout_width="match_parent" android:layout_height="48dp"
              android:text="🗑 Clear Logs" android:backgroundTint="#DA3633" android:textColor="#FFF"/>
          </LinearLayout>
          LEOF
          cat > app/src/main/res/layout/activity_log.xml << 'LOGEOF'
