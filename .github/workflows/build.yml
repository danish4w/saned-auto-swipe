name: Build JahezAutoAccept

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      # ── Gradle Wrapper ────────────────────────────────────────────────
      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew \
            -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

          cat > gradle/wrapper/gradle-wrapper.properties << 'WEOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/zips
WEOF

      # ── Project Structure ─────────────────────────────────────────────
      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/danish/jahez
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml

      # ── Gradle Build Files ────────────────────────────────────────────
      - name: Write Gradle Files
        run: |
          cat > settings.gradle << 'SEOF'
pluginManagement {
  repositories { google(); mavenCentral(); gradlePluginPortal() }
}
dependencyResolutionManagement {
  repositories { google(); mavenCentral() }
}
rootProject.name = "JahezAutoAccept"
include ':app'
SEOF

          cat > build.gradle << 'BEOF'
plugins { id 'com.android.application' version '8.5.2' apply false }
BEOF

          cat > gradle.properties << 'GEOF'
android.useAndroidX=true
android.enableJetifier=false
org.gradle.jvmargs=-Xmx2048m
GEOF

          cat > app/build.gradle << 'ABEOF'
plugins { id 'com.android.application' }
android {
  namespace 'com.danish.jahez'
  compileSdk 34
  defaultConfig {
    applicationId 'com.danish.jahez'
    minSdk 26
    targetSdk 34
    versionCode 1
    versionName '1.0'
  }
  buildTypes {
    release { minifyEnabled false }
  }
  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
}
dependencies {
  implementation 'androidx.appcompat:appcompat:1.7.0'
  implementation 'com.google.android.material:material:1.12.0'
}
ABEOF

      # ── AndroidManifest ───────────────────────────────────────────────
      - name: Write Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MEOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">

  <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
  <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>

  <application
    android:label="Jahez Auto"
    android:theme="@style/AppTheme"
    android:allowBackup="false">

    <activity
      android:name=".MainActivity"
      android:exported="true">
      <intent-filter>
        <action android:name="android.intent.action.MAIN"/>
        <category android:name="android.intent.category.LAUNCHER"/>
      </intent-filter>
    </activity>

    <service
      android:name=".AutoService"
      android:label="Jahez Auto Accept"
      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
      android:exported="true">
      <intent-filter>
        <action android:name="android.accessibilityservice.AccessibilityService"/>
      </intent-filter>
      <meta-data
        android:name="android.accessibilityservice"
        android:resource="@xml/acc_config"/>
    </service>

  </application>
</manifest>
MEOF

      # ── Accessibility Config ──────────────────────────────────────────
      - name: Write Accessibility Config
        run: |
          cat > app/src/main/res/xml/acc_config.xml << 'XEOF'
<?xml version="1.0" encoding="utf-8"?>
<accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
  android:accessibilityEventTypes="typeWindowStateChanged|typeWindowContentChanged"
  android:accessibilityFeedbackType="feedbackGeneric"
  android:accessibilityFlags="flagReportViewIds|flagRetrieveInteractiveWindows"
  android:canRetrieveWindowContent="true"
  android:canPerformGestures="true"
  android:description="@string/acc_desc"
  android:notificationTimeout="100"
  android:packageNames="net.jahez.fleets"/>
XEOF

      # ── Java Sources ──────────────────────────────────────────────────
      - name: Write MainActivity
        run: |
          cat > app/src/main/java/com/danish/jahez/MainActivity.java << 'JEOF'
package com.danish.jahez;

import android.app.Activity;
import android.content.BroadcastReceiver;
import android.content.Context;
import android.content.Intent;
import android.content.IntentFilter;
import android.content.SharedPreferences;
import android.os.Bundle;
import android.os.Build;
import android.provider.Settings;
import android.widget.*;

public class MainActivity extends Activity {

    SharedPreferences prefs;
    Switch swEnable;
    TextView tvStatus, tvAcc;

    // Broadcast receiver — service ne OFF kiya toh UI update karo
    final BroadcastReceiver offReceiver = new BroadcastReceiver() {
        @Override
        public void onReceive(Context ctx, Intent intent) {
            if (swEnable != null) swEnable.setChecked(false);
            refreshStatus(tvStatus, tvAcc);
        }
    };

    @Override
    protected void onCreate(Bundle saved) {
        super.onCreate(saved);
        setContentView(R.layout.activity_main);
        prefs = getSharedPreferences("cfg", MODE_PRIVATE);

        EditText etPickup = findViewById(R.id.et_pickup);
        EditText etDrop   = findViewById(R.id.et_drop);
        swEnable  = findViewById(R.id.sw_enable);
        tvStatus  = findViewById(R.id.tv_status);
        tvAcc     = findViewById(R.id.tv_acc);
        Button btnSave = findViewById(R.id.btn_save);
        Button btnAcc  = findViewById(R.id.btn_acc);

        // Load saved settings
        etPickup.setText(String.valueOf(prefs.getFloat("max_pickup", 2.0f)));
        etDrop.setText(String.valueOf(prefs.getFloat("max_drop", 5.0f)));
        swEnable.setChecked(prefs.getBoolean("enabled", false));

        // Broadcast register — service OFF kare toh switch bhi OFF ho
        IntentFilter filter = new IntentFilter("JAHEZ_AUTO_OFF");
        if (Build.VERSION.SDK_INT >= 33)
            registerReceiver(offReceiver, filter, Context.RECEIVER_NOT_EXPORTED);
        else
            registerReceiver(offReceiver, filter);

        swEnable.setOnCheckedChangeListener((btn, checked) -> {
            prefs.edit().putBoolean("enabled", checked).apply();
            refreshStatus(tvStatus, tvAcc);
        });

        btnSave.setOnClickListener(v -> {
            float pk = parseFloat(etPickup.getText().toString(), 2.0f);
            float dk = parseFloat(etDrop.getText().toString(), 5.0f);
            prefs.edit()
                 .putFloat("max_pickup", pk)
                 .putFloat("max_drop", dk)
                 .apply();
            Toast.makeText(this,
                "Saved! Pickup ≤ " + pk + " km | Drop ≤ " + dk + " km",
                Toast.LENGTH_LONG).show();
        });

        btnAcc.setOnClickListener(v ->
            startActivity(new android.content.Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS))
        );
    }

    @Override
    protected void onResume() {
        super.onResume();
        refreshStatus(tvStatus, tvAcc);
    }

    @Override
    protected void onDestroy() {
        super.onDestroy();
        unregisterReceiver(offReceiver);
    }

    void refreshStatus(TextView tvStatus, TextView tvAcc) {
        if (tvStatus == null || tvAcc == null) return;
        boolean acc = isAccEnabled();
        boolean en  = prefs.getBoolean("enabled", false);

        tvAcc.setText(acc
            ? "✅  Accessibility: ON"
            : "❌  Accessibility: OFF — tap button below");
        tvAcc.setTextColor(acc ? 0xFF4CAF50 : 0xFFFF9800);

        tvStatus.setText(acc && en ? "🟢  AUTO ACCEPT: ON" : "🔴  AUTO ACCEPT: OFF");
        tvStatus.setTextColor(acc && en ? 0xFF4CAF50 : 0xFFFF5555);
    }

    boolean isAccEnabled() {
        try {
            String s = Settings.Secure.getString(
                getContentResolver(), Settings.Secure.ENABLED_ACCESSIBILITY_SERVICES);
            return s != null && s.contains(getPackageName());
        } catch (Exception e) { return false; }
    }

    float parseFloat(String s, float def) {
        try { return Float.parseFloat(s.trim()); } catch (Exception e) { return def; }
    }
}
JEOF

      - name: Write AutoService
        run: |
          cat > app/src/main/java/com/danish/jahez/AutoService.java << 'SEOF'
package com.danish.jahez;

import android.accessibilityservice.AccessibilityService;
import android.accessibilityservice.GestureDescription;
import android.content.SharedPreferences;
import android.graphics.Path;
import android.util.Log;
import android.view.accessibility.AccessibilityEvent;
import android.view.accessibility.AccessibilityNodeInfo;
import java.util.LinkedList;
import java.util.Queue;
import java.util.Random;
import java.util.regex.Matcher;
import java.util.regex.Pattern;

public class AutoService extends AccessibilityService {

    static final String TAG  = "JahezAuto";
    static final String PKG  = "net.jahez.fleets";

    SharedPreferences prefs;
    long lastAccept = 0;
    final Random rng = new Random();

    @Override
    public void onServiceConnected() {
        prefs = getSharedPreferences("cfg", MODE_PRIVATE);
        log("Service connected");
    }

    @Override
    public void onAccessibilityEvent(AccessibilityEvent event) {
        if (prefs == null) prefs = getSharedPreferences("cfg", MODE_PRIVATE);
        if (!prefs.getBoolean("enabled", false)) return;

        String pkg = event.getPackageName() != null ? event.getPackageName().toString() : "";
        if (!PKG.equals(pkg)) return;

        // Debounce: wait 3s between attempts
        long now = System.currentTimeMillis();
        if (now - lastAccept < 3000) return;

        AccessibilityNodeInfo root = getRootInActiveWindow();
        if (root == null) return;

        try {
            String screen = flattenTree(root);

            // Only act if this looks like the New Order popup
            if (!isOrderScreen(screen)) return;

            float[] dist = parseDistances(screen);

            float maxPickup = prefs.getFloat("max_pickup", 2.0f);
            float maxDrop   = prefs.getFloat("max_drop",   5.0f);

            log(String.format(
                "Order — pickup=%.1f km  drop=%.1f km",
                dist[0], dist[1]));
            log(String.format(
                "Filter — maxPickup=%.1f  maxDrop=%.1f",
                maxPickup, maxDrop));

            boolean pickupOk = dist[0] < 0 || dist[0] <= maxPickup;
            boolean dropOk   = dist[1] < 0 || dist[1] <= maxDrop;

            if (pickupOk && dropOk) {
                lastAccept = now;
                log("✅ ACCEPTING order — swiping");
                swipeAccept();
                // Auto OFF karo — ek swipe ke baad band
                prefs.edit().putBoolean("enabled", false).apply();
                // MainActivity ko batao UI update kare
                sendBroadcast(new android.content.Intent("JAHEZ_AUTO_OFF"));
                log("🔴 Auto-accept OFF — manually enable karo");
            } else {
                log("❌ REJECTING — out of filter range");
            }
        } finally {
            root.recycle();
        }
    }

    // ── Screen detection ─────────────────────────────────────────────────

    boolean isOrderScreen(String screen) {
        return (screen.contains("New Order") || screen.contains("طلب جديد"))
            && (screen.contains("Accept")    || screen.contains("قبول"));
    }

    // ── Distance parser ──────────────────────────────────────────────────
    // Matches the exact Jahez text:
    //   "0.1 Km From You"      → pickup distance
    //   "1.4 Km From Pickup"   → drop distance
    // Also handles Arabic variants.

    float[] parseDistances(String txt) {
        float[] r = {-1f, -1f};

        // English — pickup: "X.X Km From You"
        Matcher m = Pattern.compile("([\\d.]+)\\s*[Kk][Mm]\\s+[Ff]rom\\s+[Yy]ou").matcher(txt);
        if (m.find()) r[0] = safeFloat(m.group(1));

        // English — drop: "X.X Km From Pickup"
        m = Pattern.compile("([\\d.]+)\\s*[Kk][Mm]\\s+[Ff]rom\\s+[Pp]ickup").matcher(txt);
        if (m.find()) r[1] = safeFloat(m.group(1));

        // Arabic — pickup: "X.X كم منك"
        if (r[0] < 0) {
            m = Pattern.compile("([\\d.]+)\\s*كم\\s+منك").matcher(txt);
            if (m.find()) r[0] = safeFloat(m.group(1));
        }

        // Arabic — drop: "X.X كم من نقطة الاستلام"
        if (r[1] < 0) {
            m = Pattern.compile("([\\d.]+)\\s*كم\\s+من\\s+نقطة").matcher(txt);
            if (m.find()) r[1] = safeFloat(m.group(1));
        }

        // Fallback: first two bare km numbers in order
        if (r[0] < 0 || r[1] < 0) {
            Matcher km = Pattern.compile("([\\d.]+)\\s*[Kk][Mm]").matcher(txt);
            if (km.find() && r[0] < 0) r[0] = safeFloat(km.group(1));
            if (km.find() && r[1] < 0) r[1] = safeFloat(km.group(1));
        }

        return r;
    }

    // ── Gesture swipe ────────────────────────────────────────────────────

    void swipeAccept() {
        try {
            int W = getResources().getDisplayMetrics().widthPixels;
            int H = getResources().getDisplayMetrics().heightPixels;
            // Random duration: 100ms to 250ms
            int duration = 100 + rng.nextInt(151);
            Path path = new Path();
            path.moveTo(W * 0.15f, H * 0.82f);
            path.lineTo(W * 0.85f, H * 0.82f);
            GestureDescription.Builder builder = new GestureDescription.Builder();
            builder.addStroke(new GestureDescription.StrokeDescription(path, 0, duration));
            dispatchGesture(builder.build(), null, null);
            log("Gesture dispatched — duration: " + duration + "ms");
        } catch (Exception e) {
            log("Gesture error: " + e.getMessage());
        }
    }

    // ── Helpers ──────────────────────────────────────────────────────────

    String flattenTree(AccessibilityNodeInfo node) {
        if (node == null) return "";
        StringBuilder sb = new StringBuilder();
        Queue<AccessibilityNodeInfo> q = new LinkedList<>();
        q.add(node);
        while (!q.isEmpty()) {
            AccessibilityNodeInfo n = q.poll();
            if (n == null) continue;
            if (n.getText() != null) sb.append(n.getText()).append(" ");
            if (n.getContentDescription() != null) sb.append(n.getContentDescription()).append(" ");
            for (int i = 0; i < n.getChildCount(); i++) {
                AccessibilityNodeInfo c = n.getChild(i);
                if (c != null) q.add(c);
            }
        }
        return sb.toString();
    }

    float safeFloat(String s) {
        try { return Float.parseFloat(s.trim()); } catch (Exception e) { return -1f; }
    }

    void log(String msg) { Log.d(TAG, msg); }

    @Override public void onInterrupt() {}
}
SEOF

      # ── Layout ───────────────────────────────────────────────────────
      - name: Write Layout
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'LEOF'
<?xml version="1.0" encoding="utf-8"?>
<ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
