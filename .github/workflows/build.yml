name: Build Gufran V7.5.4 FinalFix
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Folders
        run: |
          mkdir -p app/src/main/java/com/danish/lsposed
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets

      - name: Create Properties
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Create Root Build Files
        run: |
          echo "include ':app'" > settings.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { google(); mavenCentral(); maven { url 'https://api.xposed.info/' } }
          }
          EOF

      - name: Create App Build Config
        run: |
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.danish.lsposed'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.danish.lsposed'
                  minSdk 26
                  targetSdk 34
                  versionCode 24
                  versionName '7.5.4-Final'
              }
          }
          dependencies {
              compileOnly 'de.robv.android.xposed:api:82'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: Android Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Gufran V7.5.4" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <meta-data android:name="xposedmodule" android:value="true" />
                  <meta-data android:name="xposeddescription" android:value="V7.5.4 - Default 1.5/3.5 KM" />
                  <meta-data android:name="xposedminversion" android:value="82" />
                  <activity android:name=".SettingsActivity" android:windowSoftInputMode="stateAlwaysHidden" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <activity android:name=".LogActivity" android:label="Live Monitor" />
              </application>
          </manifest>
          EOF
          echo "com.danish.lsposed.MainHook" > app/src/main/assets/xposed_init

      - name: UI Layouts (With Labels)
        run: |
          cat > app/src/main/res/layout/activity_settings.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:padding="20dp" android:background="#121212"
              android:focusable="true" android:focusableInTouchMode="true">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Gufran V7.5.4" android:textColor="#FF4B3A" android:textSize="26sp" android:textStyle="bold" android:layout_gravity="center" android:layout_marginBottom="20dp"/>
              
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Max Pickup KM" android:textColor="#888888" android:textSize="14sp"/>
              <EditText android:id="@+id/et_pickup_max" android:layout_width="match_parent" android:layout_height="55dp" android:textColor="#FFFFFF" android:backgroundTint="#FF4B3A" android:inputType="numberDecimal" android:layout_marginBottom="15dp"/>
              
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Max Drop KM" android:textColor="#888888" android:textSize="14sp"/>
              <EditText android:id="@+id/et_drop_max" android:layout_width="match_parent" android:layout_height="55dp" android:textColor="#FFFFFF" android:backgroundTint="#FF4B3A" android:inputType="numberDecimal" android:layout_marginBottom="15dp"/>
              
              <TextView android:id="@+id/tv_delay_label" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#FF4B3A" android:text="Delay: 800ms"/>
              <SeekBar android:id="@+id/sb_delay" android:layout_width="match_parent" android:layout_height="wrap_content" android:max="1100" android:progress="400" android:layout_marginBottom="20dp"/>
              
              <Button android:id="@+id/btn_save" android:layout_width="match_parent" android:layout_height="55dp" android:text="SAVE SETTINGS" android:backgroundTint="#FF4B3A" android:layout_marginBottom="10dp"/>
              <Button android:id="@+id/btn_logs" android:layout_width="match_parent" android:layout_height="55dp" android:text="VIEW LIVE LOGS" android:backgroundTint="#4CAF50"/>
          </LinearLayout>
          EOF
          cat > app/src/main/res/layout/activity_log.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:padding="10dp" android:background="#000000">
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="LIVE MONITOR" android:textColor="#4CAF50" android:textSize="20sp" android:gravity="center" android:padding="10dp"/>
              <ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1">
                  <TextView android:id="@+id/tv_logs" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#00FF00" android:fontFamily="monospace" android:text="Waiting..."/>
              </ScrollView>
              <Button android:id="@+id/btn_clear" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="CLEAR SCREEN ONLY" android:backgroundTint="#FF0000"/>
          </LinearLayout>
          EOF

      - name: Java Activities (With Default Fix & Cursor Logic)
        run: |
          cat > app/src/main/java/com/danish/lsposed/SettingsActivity.java << 'EOF'
          package com.danish.lsposed;
          import android.content.*;
          import android.os.Bundle;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;

          public class SettingsActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_settings);
                  final SharedPreferences p = getSharedPreferences("danish_prefs", Context.MODE_PRIVATE);
                  final EditText etP = findViewById(R.id.et_pickup_max);
                  final EditText etD = findViewById(R.id.et_drop_max);
                  final SeekBar sb = findViewById(R.id.sb_delay);
                  final TextView tvL = findViewById(R.id.tv_delay_label);

                  // Default set to 1.5 and 3.5 if not saved
                  etP.setText(String.valueOf(p.getFloat("pickup_max", 1.5f)));
                  etD.setText(String.valueOf(p.getFloat("drop_max", 3.5f)));
                  sb.setProgress(p.getInt("system_delay", 800) - 400);

                  sb.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override public void onProgressChanged(SeekBar s, int pr, boolean f) { tvL.setText("Delay: " + (pr + 400) + "ms"); }
                      @Override public void onStartTrackingTouch(SeekBar s) {}
                      @Override public void onStopTrackingTouch(SeekBar s) {}
                  });

                  findViewById(R.id.btn_save).setOnClickListener(v -> {
                      p.edit().putFloat("pickup_max", Float.parseFloat(etP.getText().toString()))
                             .putFloat("drop_max", Float.parseFloat(etD.getText().toString()))
                             .putInt("system_delay", sb.getProgress() + 400).apply();
                      
                      // Hide keyboard and remove focus/cursor
                      etP.clearFocus(); etD.clearFocus();
                      InputMethodManager imm = (InputMethodManager)getSystemService(Context.INPUT_METHOD_SERVICE);
                      imm.hideSoftInputFromWindow(v.getWindowToken(), 0);
                      
                      Toast.makeText(this, "Settings Saved!", Toast.LENGTH_SHORT).show();
                  });
                  findViewById(R.id.btn_logs).setOnClickListener(v -> startActivity(new Intent(this, LogActivity.class)));
              }
          }
          EOF

          cat > app/src/main/java/com/danish/lsposed/LogActivity.java << 'EOF'
          package com.danish.lsposed;
          import android.content.*;
          import android.os.Build;
          import android.os.Bundle;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;
          public class LogActivity extends AppCompatActivity {
              private TextView tvLogs;
              private BroadcastReceiver receiver = new BroadcastReceiver() {
                  @Override public void onReceive(Context context, Intent intent) {
                      String msg = intent.getStringExtra("log_msg");
                      if(tvLogs != null) tvLogs.append("\n" + msg + "\n----------");
                  }
              };
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_log);
                  tvLogs = findViewById(R.id.tv_logs);
                  findViewById(R.id.btn_clear).setOnClickListener(v -> tvLogs.setText("Display Cleared. Module still running..."));
                  IntentFilter filter = new IntentFilter("GUFRAN_LOG_ACTION");
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) registerReceiver(receiver, filter, Context.RECEIVER_EXPORTED);
                  else registerReceiver(receiver, filter);
              }
              @Override protected void onDestroy() { super.onDestroy(); unregisterReceiver(receiver); }
          }
          EOF

      - name: MainHook (Smart Logic)
        run: |
          cat > app/src/main/java/com/danish/lsposed/MainHook.java << 'EOF'
          package com.danish.lsposed;
          import android.app.Activity;
          import android.content.Intent;
          import android.os.*;
          import android.view.*;
          import android.widget.TextView;
          import de.robv.android.xposed.*;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;
          import java.text.SimpleDateFormat;
          import java.util.*;
          import java.util.regex.*;

          public class MainHook implements IXposedHookLoadPackage {
              private XSharedPreferences xP;
              private Handler handler = new Handler(Looper.getMainLooper());

              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpp) throws Throwable {
                  if (!lpp.packageName.equals("net.jahez.fleets")) return;
                  xP = new XSharedPreferences("com.danish.lsposed", "danish_prefs");

                  XposedHelpers.findAndHookMethod(Activity.class, "onResume", new XC_MethodHook() {
                      @Override protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                          final Activity act = (Activity) param.thisObject;
                          xP.reload();
                          handler.postDelayed(() -> startSmartScan(act, true), xP.getInt("system_delay", 800));
                      }
                  });
              }

              private void startSmartScan(final Activity act, boolean isFirstTry) {
                  List<Float> kms = new ArrayList<>();
                  scanView(act.getWindow().getDecorView(), kms);
                  String time = new SimpleDateFormat("HH:mm:ss", Locale.getDefault()).format(new Date());
                  
                  if (kms.size() >= 2) {
                      float p = kms.get(0), d = kms.get(1);
                      float pM = xP.getFloat("pickup_max", 1.5f), dM = xP.getFloat("drop_max", 3.5f);
                      if (p <= pM && d <= dM) {
                          sendLog(act, "[" + time + "] MATCH ✅ ("+p+"/"+d+") Swiping...");
                          findAndSwipe(act.getWindow().getDecorView());
                      } else { 
                          sendLog(act, "[" + time + "] REJECT ❌ ("+p+"/"+d+")");
                      }
                  } else if (isFirstTry) {
                      handler.postDelayed(() -> startSmartScan(act, false), 1500);
                  } else {
                      sendLog(act, "[" + time + "] NO DATA ⚠️");
                  }
              }

              private void sendLog(Activity act, String msg) {
                  Intent i = new Intent("GUFRAN_LOG_ACTION");
                  i.setPackage("com.danish.lsposed");
                  i.putExtra("log_msg", msg);
                  act.sendBroadcast(i);
              }

              private void scanView(View v, List<Float> l) {
                  if (v instanceof ViewGroup) {
                      for (int i = 0; i < ((ViewGroup) v).getChildCount(); i++) scanView(((ViewGroup) v).getChildAt(i), l);
                  }
                  CharSequence txt = (v instanceof TextView) ? ((TextView) v).getText() : v.getContentDescription();
                  if (txt != null) {
                      String s = txt.toString().toLowerCase();
                      if (s.contains("km")) {
                          Matcher m = Pattern.compile("(\\d+[.,]?\\d*)").matcher(s);
                          while (m.find()) { try { l.add(Float.parseFloat(m.group(1).replace(",", "."))); } catch(Exception e){} }
                      }
                  }
              }

              private void findAndSwipe(View v) {
                  if (v instanceof ViewGroup) {
                      for (int i = 0; i < ((ViewGroup) v).getChildCount(); i++) findAndSwipe(((ViewGroup) v).getChildAt(i));
                  }
                  String s = (v instanceof TextView) ? ((TextView) v).getText().toString().toLowerCase() : "";
                  if (s.contains("accept") || s.contains("قبول")) {
                      int[] pos = new int[2]; v.getLocationOnScreen(pos);
                      float x1 = pos[0] + (v.getWidth() * 0.2f), x2 = pos[0] + (v.getWidth() * 0.8f), y = pos[1] + (v.getHeight() / 2f);
                      long t = SystemClock.uptimeMillis();
                      v.dispatchTouchEvent(MotionEvent.obtain(t, t, MotionEvent.ACTION_DOWN, x1, y, 0));
                      v.dispatchTouchEvent(MotionEvent.obtain(t, t+150, MotionEvent.ACTION_MOVE, x2, y, 0));
                      v.dispatchTouchEvent(MotionEvent.obtain(t, t+160, MotionEvent.ACTION_UP, x2, y, 0));
                  }
              }
          }
          EOF

      - name: Build APK
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      - run: gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Gufran-V7.5.4-FinalFix
          path: app/build/outputs/apk/debug/*.apk
