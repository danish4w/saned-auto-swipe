name: Build JahezDiagnostic

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          cat > gradle/wrapper/gradle-wrapper.properties << 'WEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/zips
          WEOF

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/danish/diag
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/assets

      - name: Write Gradle Files
        run: |
          cat > settings.gradle << 'SEOF'
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
              google()
              mavenCentral()
              maven { url 'https://api.xposed.info/' }
            }
          }
          rootProject.name = "JahezDiagnostic"
          include ':app'
          SEOF

          cat > build.gradle << 'BEOF'
          plugins {
            id 'com.android.application' version '8.5.2' apply false
          }
          BEOF

          cat > gradle.properties << 'GEOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          GEOF

          cat > app/build.gradle << 'ABEOF'
          plugins {
            id 'com.android.application'
          }
          
          android {
            namespace 'com.danish.diag'
            compileSdk 34
            
            defaultConfig {
              applicationId 'com.danish.diag'
              minSdk 26
              targetSdk 34
              versionCode 1
              versionName '1.0'
            }
            
            buildTypes {
              release {
                minifyEnabled false
              }
            }
            
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.squareup.okhttp3:okhttp:4.12.0'
            implementation 'com.squareup.okio:okio:3.6.0'
            compileOnly 'de.robv.android.xposed:api:82'
          }
          ABEOF

      - name: Write Icon
        run: |
          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'BGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp"
            android:height="108dp"
            android:viewportWidth="108"
            android:viewportHeight="108">
            <path
              android:fillColor="#1565C0"
              android:pathData="M0,0 L108,0 L108,108 L0,108 Z"/>
          </vector>
          BGEOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'FGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp"
            android:height="108dp"
            android:viewportWidth="108"
            android:viewportHeight="108">
            <path
              android:fillColor="#FFFFFF"
              android:pathData="M30,54 L50,30 L70,54 L58,54 L58,78 L42,78 L42,54 Z"/>
          </vector>
          FGEOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'ICEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          ICEOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'RNDEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          RNDEOF

      - name: Write Xposed Files
        run: |
          echo "com.danish.diag.DiagHook" > app/src/main/assets/xposed_init

      - name: Write Manifest (Fixed)
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.danish.diag">
            
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />
            <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            
            <application
                android:allowBackup="false"
                android:icon="@mipmap/ic_launcher"
                android:label="Jahez Diag"
                android:roundIcon="@mipmap/ic_launcher_round"
                android:supportsRtl="true"
                android:theme="@style/AppTheme">
              
              <meta-data
                  android:name="xposedmodule"
                  android:value="true" />
              <meta-data
                  android:name="xposeddescription"
                  android:value="Jahez diagnostic hook - Logs API calls, touches &amp; screen changes" />
              <meta-data
                  android:name="xposedminversion"
                  android:value="82" />
              
              <activity
                  android:name=".MainActivity"
                  android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
              </activity>
              
              <activity
                  android:name=".LogActivity"
                  android:exported="false" />
              
              <service
                  android:name=".DiagService"
                  android:enabled="true"
                  android:exported="false"
                  android:foregroundServiceType="dataSync" />
              
              <service
                  android:name=".DiagAccessibility"
                  android:exported="true"
                  android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE">
                <intent-filter>
                  <action android:name="android.accessibilityservice.AccessibilityService" />
                </intent-filter>
                <meta-data
                    android:name="android.accessibilityservice"
                    android:resource="@xml/accessibility_config" />
              </service>
              
              <receiver
                  android:name=".BootReceiver"
                  android:enabled="true"
                  android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.BOOT_COMPLETED" />
                </intent-filter>
              </receiver>
              
            </application>
            
          </manifest>
          MEOF

      - name: Write DiagHook
        run: |
          cat > app/src/main/java/com/danish/diag/DiagHook.java << 'HEOF'
          package com.danish.diag;
          
          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;
          import de.robv.android.xposed.AndroidAppHelper;
          import android.content.Intent;
          import android.os.Bundle;
          import android.util.Log;
          
          public class DiagHook implements IXposedHookLoadPackage {
            static final String TARGET  = "net.jahez.fleets";
            static final String TAG = "JahezDiag";
            
            @Override 
            public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lp) {
              if (!TARGET.equals(lp.packageName)) return;
              Log.d(TAG, "Hook loaded for: " + lp.packageName);

              // ── 1. OkHttp Request Hook ──
              try {
                Class<?> requestBuilderClass = XposedHelpers.findClass("okhttp3.Request$Builder", lp.classLoader);
                XposedHelpers.findAndHookMethod(requestBuilderClass, "build",
                  new XC_MethodHook() {
                    @Override
                    protected void afterHookedMethod(MethodHookParam param) {
                      try {
                        Object request = param.getResult();
                        Object url = XposedHelpers.callMethod(request, "url");
                        String urlStr = url.toString();
                        String method = (String) XposedHelpers.callMethod(request, "method");
                        
                        StringBuilder logMsg = new StringBuilder("🌐 " + method + " " + urlStr);
                        
                        // Log headers safely
                        try {
                          Object headers = XposedHelpers.callMethod(request, "headers");
                          int count = (int) XposedHelpers.callMethod(headers, "size");
                          for (int i = 0; i < Math.min(count, 20); i++) {
                            String name = (String) XposedHelpers.callMethod(headers, "name", i);
                            String value = (String) XposedHelpers.callMethod(headers, "value", i);
                            if (name.toLowerCase().contains("authorization") || 
                                name.toLowerCase().contains("token")) {
                              value = value.length() > 30 ? value.substring(0, 30) + "..." : value;
                            }
                            logMsg.append("\n      ").append(name).append(": ").append(value);
                          }
                        } catch (Exception ignored) {}
                        
                        sendLog(lp, logMsg.toString());
                      } catch (Exception e) {
                        Log.e(TAG, "Request hook error: " + e.getMessage());
                      }
                    }
                  }
                );
                Log.d(TAG, "OkHttp request hook installed");
              } catch (Exception e) {
                Log.e(TAG, "OkHttp request hook failed: " + e);
              }

              // ── 2. Activity.onResume Hook ──
              try {
                XposedHelpers.findAndHookMethod("android.app.Activity", lp.classLoader, "onResume",
                  new XC_MethodHook() {
                    @Override
                    protected void afterHookedMethod(MethodHookParam param) {
                      android.app.Activity activity = (android.app.Activity) param.thisObject;
                      String className = activity.getClass().getName();
                      sendLog(lp, "📱 Activity: " + className);
                      
                      // Log intent extras
                      try {
                        Intent intent = activity.getIntent();
                        if (intent != null && intent.getExtras() != null) {
                          Bundle extras = intent.getExtras();
                          if (!extras.isEmpty()) {
                            StringBuilder sb = new StringBuilder("📦 Extras:");
                            for (String key : extras.keySet()) {
                              Object val = extras.get(key);
                              String valStr = (val != null) ? val.toString() : "null";
                              if (valStr.length() > 100) valStr = valStr.substring(0, 100) + "...";
                              sb.append("\n      ").append(key).append(" = ").append(valStr);
                            }
                            sendLog(lp, sb.toString());
                          }
                        }
                      } catch (Exception e) {
                        Log.e(TAG, "Extras error: " + e.getMessage());
                      }
                    }
                  }
                );
              } catch (Exception e) {
                Log.e(TAG, "Activity hook failed: " + e);
              }

              // ── 3. Touch Events Hook ──
              try {
                XposedHelpers.findAndHookMethod("android.app.Activity", lp.classLoader, "dispatchTouchEvent",
                  android.view.MotionEvent.class,
                  new XC_MethodHook() {
                    @Override
                    protected void beforeHookedMethod(MethodHookParam param) {
                      android.view.MotionEvent event = (android.view.MotionEvent) param.args[0];
                      if (event == null) return;
                      
                      int action = event.getActionMasked();
                      if (action != android.view.MotionEvent.ACTION_DOWN && 
                          action != android.view.MotionEvent.ACTION_UP) return;
                      
                      android.app.Activity activity = (android.app.Activity) param.thisObject;
                      String actionName = action == android.view.MotionEvent.ACTION_DOWN ? "DOWN" : "UP";
                      
                      sendLog(lp, String.format("👆 TOUCH %s x=%.1f y=%.1f class=%s",
                        actionName, event.getRawX(), event.getRawY(),
                        activity.getClass().getSimpleName()));
                    }
                  }
                );
              } catch (Exception e) {
                Log.e(TAG, "Touch hook failed: " + e);
              }
            }
            
            private void sendLog(XC_LoadPackage.LoadPackageParam lp, String msg) {
              try {
                Log.d(TAG, msg);
                Intent intent = new Intent("JAHEZ_DIAG_LOG");
                intent.putExtra("msg", msg);
                intent.addFlags(Intent.FLAG_INCLUDE_STOPPED_PACKAGES);
                AndroidAppHelper.currentApplication().sendBroadcast(intent);
              } catch (Exception e) {
                Log.e(TAG, "sendLog error: " + e.getMessage());
              }
            }
          }
          HEOF

      - name: Write DiagService
        run: |
          cat > app/src/main/java/com/danish/diag/DiagService.java << 'SEOF'
          package com.danish.diag;
          
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.Service;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.IBinder;
          import android.util.Log;
          import androidx.core.app.NotificationCompat;
          
          public class DiagService extends Service {
            private static final String TAG = "JahezDiag";
            private static final String CHANNEL_ID = "jahez_diag_channel";
            private static final int NOTIFICATION_ID = 1001;
            private SharedPreferences prefs;
            
            private final BroadcastReceiver logReceiver = new BroadcastReceiver() {
              @Override
              public void onReceive(Context context, Intent intent) {
                String msg = intent.getStringExtra("msg");
                if (msg != null) {
                  saveLog(msg);
                }
              }
            };
            
            @Override
            public void onCreate() {
              super.onCreate();
              prefs = getSharedPreferences("diag_data", MODE_PRIVATE);
              createNotificationChannel();
              startForeground(NOTIFICATION_ID, createNotification());
              
              IntentFilter filter = new IntentFilter("JAHEZ_DIAG_LOG");
              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                registerReceiver(logReceiver, filter, Context.RECEIVER_NOT_EXPORTED);
              } else {
                registerReceiver(logReceiver, filter);
              }
              
              Log.d(TAG, "DiagService started");
            }
            
            private void createNotificationChannel() {
              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                NotificationChannel channel = new NotificationChannel(
                  CHANNEL_ID,
                  "Jahez Diagnostic",
                  NotificationManager.IMPORTANCE_LOW
                );
                channel.setDescription("Logging Jahez app activities");
                NotificationManager manager = getSystemService(NotificationManager.class);
                if (manager != null) {
                  manager.createNotificationChannel(channel);
                }
              }
            }
            
            private Notification createNotification() {
              NotificationCompat.Builder builder = new NotificationCompat.Builder(this, CHANNEL_ID)
                .setContentTitle("Jahez Diagnostic")
                .setContentText("Monitoring Jahez app...")
                .setSmallIcon(android.R.drawable.ic_menu_info_details)
                .setPriority(NotificationCompat.PRIORITY_LOW)
                .setOngoing(true);
              
              return builder.build();
            }
            
            private void saveLog(String msg) {
              try {
                java.text.SimpleDateFormat sdf = new java.text.SimpleDateFormat("HH:mm:ss.SSS", java.util.Locale.US);
                String timestamp = sdf.format(new java.util.Date());
                String entry = "[" + timestamp + "] " + msg;
                
                String existingLogs = prefs.getString("logs", "");
                String[] lines = existingLogs.isEmpty() ? new String[0] : existingLogs.split("\n");
                
                // Keep last 500 lines to avoid excessive storage
                StringBuilder newLogs = new StringBuilder(entry);
                int maxLines = Math.min(lines.length, 499);
                for (int i = 0; i < maxLines; i++) {
                  newLogs.append("\n").append(lines[i]);
                }
                
                prefs.edit().putString("logs", newLogs.toString()).apply();
                Log.d(TAG, "Log saved: " + msg);
              } catch (Exception e) {
                Log.e(TAG, "Save log error: " + e.getMessage());
              }
            }
            
            @Override
            public int onStartCommand(Intent intent, int flags, int startId) {
              return START_STICKY;
            }
            
            @Override
            public IBinder onBind(Intent intent) {
              return null;
            }
            
            @Override
            public void onDestroy() {
              super.onDestroy();
              try {
                unregisterReceiver(logReceiver);
              } catch (Exception e) {
                Log.e(TAG, "Unregister error: " + e.getMessage());
              }
            }
          }
          SEOF

      - name: Write DiagAccessibility
        run: |
          cat > app/src/main/res/xml/accessibility_config.xml << 'ACEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
            android:accessibilityEventTypes="typeWindowStateChanged|typeWindowContentChanged|typeViewClicked"
            android:accessibilityFeedbackType="feedbackGeneric"
            android:accessibilityFlags="flagDefault|flagReportViewIds"
            android:canRetrieveWindowContent="true"
            android:notificationTimeout="100"
            android:packageNames="net.jahez.fleets"/>
          ACEOF

          cat > app/src/main/java/com/danish/diag/DiagAccessibility.java << 'JAEOF'
          package com.danish.diag;
          
          import android.accessibilityservice.AccessibilityService;
          import android.content.SharedPreferences;
          import android.view.accessibility.AccessibilityEvent;
          import android.view.accessibility.AccessibilityNodeInfo;
          import android.util.Log;
          
          public class DiagAccessibility extends AccessibilityService {
            private static final String TAG = "JahezDiagA11y";
            private SharedPreferences prefs;
            
            @Override
            public void onServiceConnected() {
              super.onServiceConnected();
              prefs = getSharedPreferences("diag_data", MODE_PRIVATE);
              Log.d(TAG, "Accessibility service connected");
              saveLog("♿ Accessibility Service enabled");
            }
            
            @Override
            public void onAccessibilityEvent(AccessibilityEvent event) {
              try {
                String packageName = event.getPackageName() != null ? event.getPackageName().toString() : "";
                if (!"net.jahez.fleets".equals(packageName)) return;
                
                int eventType = event.getEventType();
                String className = event.getClassName() != null ? event.getClassName().toString() : "";
                
                if (eventType == AccessibilityEvent.TYPE_WINDOW_STATE_CHANGED) {
                  saveLog("🖥 Screen: " + className);
                  dumpWindowContent();
                } else if (eventType == AccessibilityEvent.TYPE_VIEW_CLICKED) {
                  String text = event.getText() != null && !event.getText().isEmpty() ? 
                    event.getText().get(0).toString() : "";
                  String viewId = event.getSource() != null ? 
                    String.valueOf(event.getSource().getViewIdResourceName()) : "";
                  saveLog("🖱 Click: " + className + " id=" + viewId + " text=" + text);
                }
              } catch (Exception e) {
                Log.e(TAG, "Event error: " + e.getMessage());
              }
            }
            
            private void dumpWindowContent() {
              AccessibilityNodeInfo root = null;
              try {
                root = getRootInActiveWindow();
                if (root == null) return;
                
                StringBuilder dump = new StringBuilder("📱 UI Dump:");
                dumpNode(root, dump, 0);
                
                if (dump.length() > 2000) {
                  dump = new StringBuilder(dump.substring(0, 2000) + "...");
                }
                saveLog(dump.toString());
              } catch (Exception e) {
                Log.e(TAG, "Dump error: " + e.getMessage());
              } finally {
                if (root != null) {
                  root.recycle();
                }
              }
            }
            
            private void dumpNode(AccessibilityNodeInfo node, StringBuilder sb, int depth) {
              if (node == null || depth > 5) return;
              
              try {
                String className = node.getClassName() != null ? node.getClassName().toString() : "";
                String text = node.getText() != null ? node.getText().toString() : "";
                String viewId = node.getViewIdResourceName() != null ? node.getViewIdResourceName() : "";
                
                if (!text.isEmpty() || !viewId.isEmpty()) {
                  String indent = "  ".repeat(depth);
                  sb.append("\n").append(indent);
                  String shortClass = className.contains(".") ? 
                    className.substring(className.lastIndexOf(".") + 1) : className;
                  sb.append(shortClass);
                  if (!text.isEmpty()) sb.append(" \"").append(text.substring(0, Math.min(text.length(), 50))).append("\"");
                  if (!viewId.isEmpty()) sb.append(" [").append(viewId).append("]");
                  if (node.isClickable()) sb.append(" (clickable)");
                }
                
                for (int i = 0; i < node.getChildCount(); i++) {
                  AccessibilityNodeInfo child = node.getChild(i);
                  if (child != null) {
                    dumpNode(child, sb, depth + 1);
                    child.recycle();
                  }
                }
              } catch (Exception e) {
                Log.e(TAG, "Dump node error: " + e.getMessage());
              }
            }
            
            private void saveLog(String msg) {
              if (prefs == null) return;
              java.text.SimpleDateFormat sdf = new java.text.SimpleDateFormat("HH:mm:ss.SSS", java.util.Locale.US);
              String timestamp = sdf.format(new java.util.Date());
              String entry = "[" + timestamp + "] " + msg;
              
              String existing = prefs.getString("logs", "");
              String[] lines = existing.isEmpty() ? new String[0] : existing.split("\n");
              StringBuilder newLogs = new StringBuilder(entry);
              int maxLines = Math.min(lines.length, 499);
              for (int i = 0; i < maxLines; i++) {
                newLogs.append("\n").append(lines[i]);
              }
              prefs.edit().putString("logs", newLogs.toString()).apply();
            }
            
            @Override
            public void onInterrupt() {
              Log.d(TAG, "Accessibility service interrupted");
            }
          }
          JAEOF

      - name: Write MainActivity
        run: |
          cat > app/src/main/java/com/danish/diag/MainActivity.java << 'JEOF'
          package com.danish.diag;
          
          import android.app.Activity;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Button;
          import android.widget.TextView;
          import android.widget.Toast;
          
          public class MainActivity extends Activity {
            @Override 
            protected void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              setContentView(R.layout.activity_main);
              
              // Start foreground service
              Intent serviceIntent = new Intent(this, DiagService.class);
              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                startForegroundService(serviceIntent);
              } else {
                startService(serviceIntent);
              }
              
              // Request permissions
              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                requestPermissions(new String[]{"android.permission.POST_NOTIFICATIONS"}, 100);
              }
              
              requestPermissions(new String[]{
                "android.permission.ACCESS_FINE_LOCATION",
                "android.permission.ACCESS_COARSE_LOCATION"
              }, 101);
              
              // Check overlay permission
              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M && !Settings.canDrawOverlays(this)) {
                Intent intent = new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                  Uri.parse("package:" + getPackageName()));
                startActivity(intent);
              }
              
              // Setup buttons
              Button logsButton = findViewById(R.id.btn_logs);
              Button clearButton = findViewById(R.id.btn_clear);
              
              logsButton.setOnClickListener(v -> 
                startActivity(new Intent(this, LogActivity.class)));
              
              clearButton.setOnClickListener(v -> {
                SharedPreferences prefs = getSharedPreferences("diag_data", MODE_PRIVATE);
                prefs.edit().remove("logs").apply();
                Toast.makeText(this, "Logs cleared", Toast.LENGTH_SHORT).show();
                updateStatus();
              });
              
              updateStatus();
            }
            
            private boolean isAccessibilityEnabled() {
              String service = getPackageName() + "/" + DiagAccessibility.class.getName();
              String enabledServices = Settings.Secure.getString(
                getContentResolver(),
                Settings.Secure.ENABLED_ACCESSIBILITY_SERVICES
              );
              return enabledServices != null && enabledServices.contains(service);
            }
            
            private void updateStatus() {
              TextView statusText = findViewById(R.id.tv_status);
              boolean a11yEnabled = isAccessibilityEnabled();
              
              String status = "📱 Jahez Diagnostic Module\n" +
                "━━━━━━━━━━━━━━━━━━━━\n" +
                "✅ LSPosed: Enabled (scope: net.jahez.fleets)\n" +
                "⚠️ Accessibility: " + (a11yEnabled ? "✅ ON" : "❌ OFF") + "\n" +
                "━━━━━━━━━━━━━━━━━━━━\n" +
                "📌 Instructions:\n" +
                "1. Enable Accessibility service below\n" +
                "2. Open Jahez (Saned) app\n" +
