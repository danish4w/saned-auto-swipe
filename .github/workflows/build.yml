name: Build Gufran Slider V7.3 Final
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Project
        run: |
          mkdir -p app/src/main/java/com/danish/lsposed
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets

      - name: Create Build Files
        run: |
          echo "include ':app'" > settings.gradle
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { google(); mavenCentral(); maven { url 'https://api.xposed.info/' } }
          }
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.danish.lsposed'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.danish.lsposed'
                  minSdk 26
                  targetSdk 34
                  versionCode 17
                  versionName '7.3-Final'
              }
          }
          dependencies {
              compileOnly 'de.robv.android.xposed:api:82'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: Manifest & Assets
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Gufran Slider V7.3" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <meta-data android:name="xposedmodule" android:value="true" />
                  <meta-data android:name="xposeddescription" android:value="V7.3 - Case Insensitive + Seekbar + Permission Fix" />
                  <meta-data android:name="xposedminversion" android:value="82" />
                  <activity android:name=".SettingsActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          echo "com.danish.lsposed.MainHook" > app/src/main/assets/xposed_init

      - name: UI with Seekbar
        run: |
          cat > app/src/main/res/layout/activity_settings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:padding="24dp" android:background="#121212">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" 
                  android:text="Gufran V7.3" android:textColor="#FF4B3A" android:textSize="26sp" android:textStyle="bold" android:layout_gravity="center"/>
              <View android:layout_width="match_parent" android:layout_height="1dp" android:background="#33FFFFFF" android:layout_marginVertical="20dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Pickup Max (KM)" android:textColor="#FFFFFF"/>
              <EditText android:id="@+id/et_pickup_max" android:layout_width="match_parent" android:layout_height="55dp" android:textColor="#FFFFFF" android:backgroundTint="#FF4B3A" android:inputType="numberDecimal" android:text="5.0"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Drop Max (KM)" android:textColor="#FFFFFF" android:layout_marginTop="10dp"/>
              <EditText android:id="@+id/et_drop_max" android:layout_width="match_parent" android:layout_height="55dp" android:textColor="#FFFFFF" android:backgroundTint="#FF4B3A" android:inputType="numberDecimal" android:text="10.0"/>
              <TextView android:id="@+id/tv_delay_label" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#FF4B3A" android:layout_marginTop="20dp" android:textStyle="bold" android:text="Scan Delay: 800ms"/>
              <SeekBar android:id="@+id/sb_delay" android:layout_width="match_parent" android:layout_height="wrap_content" android:max="1100" android:progress="400" android:layout_marginTop="10dp"/>
              <Switch android:id="@+id/switch_enabled" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Module Enable" android:textColor="#FFFFFF" android:layout_marginTop="20dp"/>
              <Button android:id="@+id/btn_save" android:layout_width="match_parent" android:layout_height="60dp" android:text="SAVE SETTINGS" android:backgroundTint="#FF4B3A" android:textColor="#FFFFFF" android:layout_marginTop="30dp" android:textStyle="bold"/>
          </LinearLayout>
          EOF

      - name: Settings Java
        run: |
          cat > app/src/main/java/com/danish/lsposed/SettingsActivity.java << 'EOF'
          package com.danish.lsposed;
          import android.content.Context;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import java.io.File;

          public class SettingsActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_settings);
                  final SharedPreferences p = getSharedPreferences("danish_prefs", Context.MODE_PRIVATE);
                  final EditText etP = findViewById(R.id.et_pickup_max);
                  final EditText etD = findViewById(R.id.et_drop_max);
                  final TextView tvD = findViewById(R.id.tv_delay_label);
                  final SeekBar sb = findViewById(R.id.sb_delay);
                  final Switch sw = findViewById(R.id.switch_enabled);
                  Button btn = findViewById(R.id.btn_save);

                  etP.setText(String.valueOf(p.getFloat("pickup_max", 5.0f)));
                  etD.setText(String.valueOf(p.getFloat("drop_max", 10.0f)));
                  int d = p.getInt("system_delay", 800);
                  sb.setProgress(d - 400);
                  tvD.setText("Scan Delay: " + d + "ms");
                  sw.setChecked(p.getBoolean("enabled", false));

                  sb.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override public void onProgressChanged(SeekBar s, int pr, boolean f) { tvD.setText("Scan Delay: " + (pr + 400) + "ms"); }
                      @Override public void onStartTrackingTouch(SeekBar s) {}
                      @Override public void onStopTrackingTouch(SeekBar s) {}
                  });

                  btn.setOnClickListener(v -> {
                      p.edit().putFloat("pickup_max", Float.parseFloat(etP.getText().toString()))
                             .putFloat("drop_max", Float.parseFloat(etD.getText().toString()))
                             .putInt("system_delay", sb.getProgress() + 400)
                             .putBoolean("enabled", sw.isChecked()).apply();
                      
                      File prefFile = new File(getFilesDir().getParentFile(), "shared_prefs/danish_prefs.xml");
                      if (prefFile.exists()) { prefFile.setReadable(true, false); }
                      Toast.makeText(this, "V7.3 Settings Saved!", Toast.LENGTH_SHORT).show();
                  });
              }
          }
          EOF

      - name: MainHook Java (The Smart Scanner)
        run: |
          cat > app/src/main/java/com/danish/lsposed/MainHook.java << 'EOF'
          package com.danish.lsposed;
          import android.app.Activity;
          import android.os.Handler;
          import android.os.Looper;
          import android.os.SystemClock;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.TextView;
          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XSharedPreferences;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          public class MainHook implements IXposedHookLoadPackage {
              private static XSharedPreferences xPrefs;
              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable {
                  if (!lpparam.packageName.equals("net.jahez.fleets")) return;
                  
                  XposedBridge.log("[Gufran-V7.3] Jahez Hooked Successfully!");
                  xPrefs = new XSharedPreferences("com.danish.lsposed", "danish_prefs");

                  XposedHelpers.findAndHookMethod(Activity.class, "onResume", new XC_MethodHook() {
                      @Override
                      protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                          final Activity act = (Activity) param.thisObject;
                          xPrefs.reload();
                          if (!xPrefs.getBoolean("enabled", false)) return;

                          new Handler(Looper.getMainLooper()).postDelayed(() -> {
                              XposedBridge.log("[Gufran-V7.3] Starting Screen Scan...");
                              runLogic(act);
                          }, xPrefs.getInt("system_delay", 800));
                      }
                  });
              }

              private void runLogic(Activity act) {
                  List<Float> kms = new ArrayList<>();
                  scanRecursive(act.getWindow().getDecorView(), kms);
                  XposedBridge.log("[Gufran-V7.3] KMs Found: " + kms.toString());

                  if (kms.size() >= 2) {
                      float p = kms.get(0), d = kms.get(1);
                      float pMax = xPrefs.getFloat("pickup_max", 5.0f);
                      float dMax = xPrefs.getFloat("drop_max", 10.0f);
                      
                      if (p <= pMax && d <= dMax) {
                          XposedBridge.log("[Gufran-V7.3] Match Found! Swiping Accept Button...");
                          findButton(act.getWindow().getDecorView());
                      } else {
                          XposedBridge.log("[Gufran-V7.3] Limit Mismatch. P:" + p + " D:" + d);
                      }
                  }
              }

              private void scanRecursive(View v, List<Float> list) {
                  if (v instanceof ViewGroup) {
                      for (int i = 0; i < ((ViewGroup) v).getChildCount(); i++) scanRecursive(((ViewGroup) v).getChildAt(i), list);
                  } else if (v instanceof TextView) {
                      String t = ((TextView) v).getText().toString().toLowerCase();
                      if (t.contains("km")) {
                          Matcher m = Pattern.compile("(\\d+[.,]?\\d*)").matcher(t);
                          if (m.find()) {
                              try {
                                  list.add(Float.parseFloat(m.group(1).replace(",", ".")));
                              } catch (Exception e) {}
                          }
                      }
                  }
              }

              private void findButton(View v) {
                  if (v instanceof ViewGroup) {
                      for (int i = 0; i < ((ViewGroup) v).getChildCount(); i++) findButton(((ViewGroup) v).getChildAt(i));
                  } else if (v instanceof TextView) {
                      String txt = ((TextView) v).getText().toString().toLowerCase();
                      if (txt.contains("accept") || txt.contains("قبول")) {
                          XposedBridge.log("[Gufran-V7.3] Executing Swipe on: " + txt);
                          doSwipe(v);
                      }
                  }
              }

              private void doSwipe(View v) {
                  int[] pos = new int[2];
                  v.getLocationOnScreen(pos);
                  float x1 = pos[0] + (v.getWidth() * 0.2f), x2 = pos[0] + (v.getWidth() * 0.8f), y = pos[1] + (v.getHeight() / 2f);
                  long t = SystemClock.uptimeMillis();
                  v.dispatchTouchEvent(MotionEvent.obtain(t, t, MotionEvent.ACTION_DOWN, x1, y, 0));
                  v.dispatchTouchEvent(MotionEvent.obtain(t, t + 150, MotionEvent.ACTION_MOVE, x2, y, 0));
                  v.dispatchTouchEvent(MotionEvent.obtain(t, t + 160, MotionEvent.ACTION_UP, x2, y, 0));
              }
          }
          EOF

      - name: Build & Upload
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      - run: gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Gufran-Slider-V7.3-Final
          path: app/build/outputs/apk/debug/*.apk
