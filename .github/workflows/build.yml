name: Build Gufran Slider V7.1 Logs Only
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Project Structure
        run: |
          mkdir -p app/src/main/java/com/danish/lsposed
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets

      - name: Create Build Files
        run: |
          echo "include ':app'" > settings.gradle
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { google(); mavenCentral(); maven { url 'https://api.xposed.info/' } }
          }
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.danish.lsposed'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.danish.lsposed'
                  minSdk 26
                  targetSdk 34
                  versionCode 13
                  versionName '7.1-Logs'
              }
          }
          dependencies {
              compileOnly 'de.robv.android.xposed:api:82'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: Create Manifest and Assets
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="Gufran Slider V7.1"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <meta-data android:name="xposedmodule" android:value="true" />
                  <meta-data android:name="xposeddescription" android:value="V7.1 - Debug Logs Enabled" />
                  <meta-data android:name="xposedminversion" android:value="82" />
                  <activity android:name=".SettingsActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          echo "com.danish.lsposed.MainHook" > app/src/main/assets/xposed_init

      - name: Create Settings Java
        run: |
          cat > app/src/main/java/com/danish/lsposed/SettingsActivity.java << 'EOF'
          package com.danish.lsposed;
          import android.content.Context;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.Switch;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import java.io.File;

          public class SettingsActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_settings);
                  SharedPreferences p = getSharedPreferences("danish_prefs", Context.MODE_PRIVATE);
                  
                  EditText etP = findViewById(R.id.et_pickup_max);
                  EditText etD = findViewById(R.id.et_drop_max);
                  Switch sw = findViewById(R.id.switch_enabled);
                  Button btn = findViewById(R.id.btn_save);

                  etP.setText(String.valueOf(p.getFloat("pickup_max", 5.0f)));
                  etD.setText(String.valueOf(p.getFloat("drop_max", 10.0f)));
                  sw.setChecked(p.getBoolean("enabled", false));

                  btn.setOnClickListener(v -> {
                      p.edit().putFloat("pickup_max", Float.parseFloat(etP.getText().toString()))
                             .putFloat("drop_max", Float.parseFloat(etD.getText().toString()))
                             .putBoolean("enabled", sw.isChecked()).apply();
                      
                      try {
                          File sharedPrefsDir = new File(getFilesDir().getParentFile(), "shared_prefs");
                          File prefFile = new File(sharedPrefsDir, "danish_prefs.xml");
                          if (prefFile.exists()) { prefFile.setReadable(true, false); }
                      } catch (Exception e) {}
                      
                      Toast.makeText(this, "V7.1 Settings Saved!", Toast.LENGTH_SHORT).show();
                  });
              }
          }
          EOF

      - name: Create UI Layout
        run: |
          cat > app/src/main/res/layout/activity_settings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:padding="20dp" android:background="#121212">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" 
                  android:text="Gufran V7.1 Logs" android:textColor="#FF4B3A" android:textSize="24sp" android:layout_gravity="center"/>
              <EditText android:id="@+id/et_pickup_max" android:layout_width="match_parent" android:layout_height="50dp" android:textColor="#FFFFFF" android:hint="Pickup KM"/>
              <EditText android:id="@+id/et_drop_max" android:layout_width="match_parent" android:layout_height="50dp" android:textColor="#FFFFFF" android:hint="Drop KM"/>
              <Switch android:id="@+id/switch_enabled" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Enable Module" android:textColor="#FFFFFF"/>
              <Button android:id="@+id/btn_save" android:layout_width="match_parent" android:layout_height="60dp" android:text="SAVE" android:backgroundTint="#FF4B3A"/>
          </LinearLayout>
          EOF

      - name: Create MainHook (V7 with Deep Logs)
        run: |
          cat > app/src/main/java/com/danish/lsposed/MainHook.java << 'EOF'
          package com.danish.lsposed;
          import android.app.Activity;
          import android.os.Handler;
          import android.os.Looper;
          import android.os.SystemClock;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.TextView;
          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XSharedPreferences;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          public class MainHook implements IXposedHookLoadPackage {
              private static XSharedPreferences xPrefs;
              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable {
                  if (!lpparam.packageName.equals("net.jahez.fleets")) return;
                  
                  XposedBridge.log("[Gufran-V7.1] Jahez Hooked Successfully!");
                  xPrefs = new XSharedPreferences("com.danish.lsposed", "danish_prefs");

                  XposedHelpers.findAndHookMethod(Activity.class, "onResume", new XC_MethodHook() {
                      @Override
                      protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                          Activity act = (Activity) param.thisObject;
                          xPrefs.reload();
                          if (!xPrefs.getBoolean("enabled", false)) return;

                          new Handler(Looper.getMainLooper()).postDelayed(() -> {
                              XposedBridge.log("[Gufran-V7.1] Starting Screen Scan...");
                              runLogic(act);
                          }, 800);
                      }
                  });
              }

              private void runLogic(Activity act) {
                  List<Float> kms = new ArrayList<>();
                  scanKms(act.getWindow().getDecorView(), kms);
                  XposedBridge.log("[Gufran-V7.1] Found KM values: " + kms.toString());

                  if (kms.size() >= 2) {
                      float p = kms.get(0), d = kms.get(1);
                      float pMax = xPrefs.getFloat("pickup_max", 5.0f);
                      float dMax = xPrefs.getFloat("drop_max", 10.0f);
                      
                      if (p <= pMax && d <= dMax) {
                          XposedBridge.log("[Gufran-V7.1] Limit Match! Pickup: " + p + " Drop: " + d);
                          findButton(act.getWindow().getDecorView());
                      } else {
                          XposedBridge.log("[Gufran-V7.1] Limit Exceeded. P:" + p + " D:" + d);
                      }
                  } else {
                      XposedBridge.log("[Gufran-V7.1] Not enough KM fields found.");
                  }
              }

              private void scanKms(View v, List<Float> list) {
                  if (v instanceof ViewGroup) {
                      for (int i = 0; i < ((ViewGroup) v).getChildCount(); i++) scanKms(((ViewGroup) v).getChildAt(i), list);
                  } else if (v instanceof TextView) {
                      String t = ((TextView) v).getText().toString();
                      if (t.toLowerCase().contains("km")) {
                          Matcher m = Pattern.compile("(\\d+\\.?\\d*)").matcher(t);
                          if (m.find()) list.add(Float.parseFloat(m.group(1)));
                      }
                  }
              }

              private void findButton(View v) {
                  if (v instanceof ViewGroup) {
                      for (int i = 0; i < ((ViewGroup) v).getChildCount(); i++) findButton(((ViewGroup) v).getChildAt(i));
                  } else if (v instanceof TextView) {
                      String txt = ((TextView) v).getText().toString().toLowerCase();
                      if (txt.contains("accept") || txt.contains("قبول")) {
                          XposedBridge.log("[Gufran-V7.1] Button Found: " + txt + ". Swiping...");
                          doSwipe(v);
                      }
                  }
              }

              private void doSwipe(View v) {
                  int[] pos = new int[2];
                  v.getLocationOnScreen(pos);
                  float xStart = pos[0] + (v.getWidth() * 0.2f);
                  float xEnd = pos[0] + (v.getWidth() * 0.8f);
                  float y = pos[1] + (v.getHeight() / 2f);
                  long downTime = SystemClock.uptimeMillis();
                  v.dispatchTouchEvent(MotionEvent.obtain(downTime, downTime, MotionEvent.ACTION_DOWN, xStart, y, 0));
                  v.dispatchTouchEvent(MotionEvent.obtain(downTime, downTime + 150, MotionEvent.ACTION_MOVE, xEnd, y, 0));
                  v.dispatchTouchEvent(MotionEvent.obtain(downTime, downTime + 160, MotionEvent.ACTION_UP, xEnd, y, 0));
              }
          }
          EOF

      - name: Build & Upload
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      - run: gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Gufran-Slider-V7.1-LOGS
          path: app/build/outputs/apk/debug/*.apk
