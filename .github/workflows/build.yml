name: Build Danish Auto Silent
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Xposed API jar
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/api-82.jar https://repo1.maven.org/maven2/de/robv/android/xposed/api/82/api-82.jar

      - name: Build LSPosed Module
        run: |
          mkdir -p app/src/main/java/com/danish/auto
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          echo "include ':app'" > settings.gradle

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.danish.auto'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.danish.auto'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              compileOnly files('libs/api-82.jar')
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # Generate icon (blue circle with white "D")
          convert -size 48x48 xc:none -fill "#1DB954" -draw "circle 24,24 24,14" -fill white -font "Arial" -pointsize 24 -gravity center -annotate 0 "D" app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert -size 72x72 xc:none -fill "#1DB954" -draw "circle 36,36 36,20" -fill white -font "Arial" -pointsize 36 -gravity center -annotate 0 "D" app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert -size 96x96 xc:none -fill "#1DB954" -draw "circle 48,48 48,28" -fill white -font "Arial" -pointsize 48 -gravity center -annotate 0 "D" app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert -size 144x144 xc:none -fill "#1DB954" -draw "circle 72,72 72,40" -fill white -font "Arial" -pointsize 72 -gravity center -annotate 0 "D" app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert -size 192x192 xc:none -fill "#1DB954" -draw "circle 96,96 96,54" -fill white -font "Arial" -pointsize 96 -gravity center -annotate 0 "D" app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Danish Auto"
                  android:icon="@mipmap/ic_launcher"
                  android:theme="@android:style/Theme.DeviceDefault">
                  <meta-data
                      android:name="xposedmodule"
                      android:value="true" />
                  <meta-data
                      android:name="xposeddescription"
                      android:value="Silent Auto Accept (Notification-based)" />
                  <meta-data
                      android:name="xposedminversion"
                      android:value="82" />
                  <activity
                      android:name=".SettingsActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <activity
                      android:name=".PopupActivity"
                      android:theme="@android:style/Theme.DeviceDefault.Dialog"
                      android:excludeFromRecents="true"
                      android:exported="false" />
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Danish Auto</string>
          </resources>
          EOF

          cat > app/src/main/res/layout/activity_settings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="20dp"
              android:background="#121212">
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Danish Auto"
                  android:textSize="26sp"
                  android:textColor="#1DB954"
                  android:textStyle="bold"
                  android:layout_gravity="center"
                  android:layout_marginBottom="20dp"/>
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Pickup Max (km)"
                  android:textColor="#AAAAAA"/>
              <EditText
                  android:id="@+id/et_pickup"
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:inputType="numberDecimal"
                  android:text="1.5"
                  android:textColor="#FFFFFF"
                  android:background="#333333"
                  android:padding="10dp"
                  android:layout_marginBottom="15dp"/>
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Drop Max (km)"
                  android:textColor="#AAAAAA"/>
              <EditText
                  android:id="@+id/et_drop"
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:inputType="numberDecimal"
                  android:text="3.5"
                  android:textColor="#FFFFFF"
                  android:background="#333333"
                  android:padding="10dp"
                  android:layout_marginBottom="15dp"/>
              <Switch
                  android:id="@+id/switch_enabled"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Auto Accept"
                  android:textColor="#FFFFFF"
                  android:layout_marginBottom="20dp"/>
              <Button
                  android:id="@+id/btn_save"
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:text="SAVE"
                  android:backgroundTint="#1DB954"/>
          </LinearLayout>
          EOF

          cat > app/src/main/res/layout/activity_popup.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="wrap_content"
              android:orientation="vertical"
              android:padding="20dp"
              android:background="#1E1E1E">
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="✅ Order Accepted"
                  android:textSize="22sp"
                  android:textColor="#4CAF50"
                  android:textStyle="bold"
                  android:layout_gravity="center"
                  android:layout_marginBottom="15dp"/>
              <TextView
                  android:id="@+id/tv_pickup"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Pickup: -- km"
                  android:textSize="16sp"
                  android:textColor="#FFFFFF"/>
              <TextView
                  android:id="@+id/tv_drop"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Drop: -- km"
                  android:textSize="16sp"
                  android:textColor="#FFFFFF"
                  android:layout_marginBottom="20dp"/>
              <Button
                  android:id="@+id/btn_ok"
                  android:layout_width="match_parent"
                  android:layout_height="45dp"
                  android:text="OK"
                  android:backgroundTint="#4CAF50"/>
          </LinearLayout>
          EOF

          cat > app/src/main/java/com/danish/auto/SettingsActivity.java << 'EOF'
          package com.danish.auto;

          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.Switch;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class SettingsActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_settings);
                  SharedPreferences prefs = getSharedPreferences("danish_prefs", MODE_PRIVATE);

                  EditText etPickup = findViewById(R.id.et_pickup);
                  EditText etDrop = findViewById(R.id.et_drop);
                  Switch sw = findViewById(R.id.switch_enabled);
                  Button btnSave = findViewById(R.id.btn_save);

                  etPickup.setText(String.valueOf(prefs.getFloat("pickup_max", 1.5f)));
                  etDrop.setText(String.valueOf(prefs.getFloat("drop_max", 3.5f)));
                  sw.setChecked(prefs.getBoolean("enabled", false));

                  btnSave.setOnClickListener(v -> {
                      prefs.edit()
                          .putFloat("pickup_max", Float.parseFloat(etPickup.getText().toString()))
                          .putFloat("drop_max", Float.parseFloat(etDrop.getText().toString()))
                          .putBoolean("enabled", sw.isChecked())
                          .apply();
                      Toast.makeText(this, "Saved", Toast.LENGTH_SHORT).show();
                  });
              }
          }
          EOF

          cat > app/src/main/java/com/danish/auto/PopupActivity.java << 'EOF'
          package com.danish.auto;

          import android.os.Bundle;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;

          public class PopupActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_popup);
                  float pickup = getIntent().getFloatExtra("pickup", 0);
                  float drop = getIntent().getFloatExtra("drop", 0);
                  ((TextView) findViewById(R.id.tv_pickup)).setText("Pickup: " + pickup + " km");
                  ((TextView) findViewById(R.id.tv_drop)).setText("Drop: " + drop + " km");
                  findViewById(R.id.btn_ok).setOnClickListener(v -> finish());
              }
          }
          EOF

          cat > app/src/main/assets/xposed_init << 'EOF'
          com.danish.auto.MainHook
          EOF

          cat > app/src/main/java/com/danish/auto/MainHook.java << 'EOF'
          package com.danish.auto;

          import android.app.Activity;
          import android.app.Notification;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.TextView;

          import java.lang.reflect.Method;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;

          public class MainHook implements de.robv.android.xposed.IXposedHookLoadPackage {
              private static final String TAG = "DanishAuto";
              private static SharedPreferences prefs;
              private static float pendingPickup = -1;
              private static float pendingDrop = -1;
              private static ClassLoader classLoader;

              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable {
                  if (!lpparam.packageName.equals("net.jahez.fleets")) return;
                  classLoader = lpparam.classLoader;
                  XposedBridge.log(TAG + " Hooked into Jahez");

                  // 1. Hook notification receiver to capture distances
                  try {
                      Class<?> receiverClass = XposedHelpers.findClass("net.saned.notification.dispatch.DispatchStatusChangesReceiver", classLoader);
                      XposedHelpers.findAndHookMethod(receiverClass, "onReceive", Context.class, Intent.class, new XC_MethodHook() {
                          @Override
                          protected void beforeHookedMethod(MethodHookParam param) throws Throwable {
                              Context ctx = (Context) param.args[0];
                              prefs = ctx.getSharedPreferences("danish_prefs", Context.MODE_PRIVATE);
                              Intent intent = (Intent) param.args[1];
                              if (intent != null && intent.getExtras() != null) {
                                  Bundle extras = intent.getExtras();
                                  float pickup = -1, drop = -1;
                                  if (extras.containsKey("pickup_distance")) {
                                      pickup = (float) extras.getDouble("pickup_distance", -1);
                                  } else if (extras.containsKey("pickup")) {
                                      pickup = extras.getFloat("pickup", -1);
                                  }
                                  if (extras.containsKey("drop_distance")) {
                                      drop = (float) extras.getDouble("drop_distance", -1);
                                  } else if (extras.containsKey("drop")) {
                                      drop = extras.getFloat("drop", -1);
                                  }
                                  if (pickup > 0 && drop > 0) {
                                      pendingPickup = pickup;
                                      pendingDrop = drop;
                                      XposedBridge.log(TAG + " 📡 Captured distances: P=" + pickup + " D=" + drop);
                                  }
                              }
                          }
                      });
                  } catch (Exception e) {
                      XposedBridge.log(TAG + " Failed to hook receiver: " + e.getMessage());
                  }

                  // 2. Hook the order activity's onCreate to call accept method before screen shows
                  try {
                      Class<?> orderActivity = XposedHelpers.findClass("net.jahez.fleets.dispatch.accept.IncomingDispatchActivity", classLoader);
                      XposedHelpers.findAndHookMethod(orderActivity, "onCreate", Bundle.class, new XC_MethodHook() {
                          @Override
                          protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                              Activity act = (Activity) param.thisObject;
                              if (prefs == null) prefs = act.getSharedPreferences("danish_prefs", Context.MODE_PRIVATE);
                              if (!prefs.getBoolean("enabled", false)) return;

                              float pickup = pendingPickup;
                              float drop = pendingDrop;
                              if (pickup < 0 || drop < 0) {
                                  XposedBridge.log(TAG + " No notification data, scanning UI...");
                                  float[] ui = extractDistancesFromUI(act);
                                  pickup = ui[0];
                                  drop = ui[1];
                              } else {
                                  XposedBridge.log(TAG + " Using notification data");
                              }
                              pendingPickup = -1; // reset

                              float pickupMax = prefs.getFloat("pickup_max", 1.5f);
                              float dropMax = prefs.getFloat("drop_max", 3.5f);
                              XposedBridge.log(TAG + " 📊 Distances: P=" + pickup + " D=" + drop + " Limits: " + pickupMax + "/" + dropMax);

                              if (pickup > 0 && drop > 0 && pickup <= pickupMax && drop <= dropMax) {
                                  XposedBridge.log(TAG + " ✅ Accepting order silently...");
                                  // Try to call internal accept method first
                                  boolean accepted = callAcceptMethod(act);
                                  if (!accepted) {
                                      XposedBridge.log(TAG + " Fallback: simulating click on Accept button");
                                      simulateAcceptClick(act);
                                  }
                                  showPopupAndNotification(act, pickup, drop);
                              } else {
                                  XposedBridge.log(TAG + " ❌ Rejected (out of range)");
                              }
                          }
                      });
                  } catch (Exception e) {
                      XposedBridge.log(TAG + " Failed to hook order activity: " + e.getMessage());
                  }
              }

              private boolean callAcceptMethod(Activity act) {
                  // Try to find method named "acceptOrder", "onAcceptClick", "accept", etc.
                  Method[] methods = act.getClass().getDeclaredMethods();
                  for (Method m : methods) {
                      String name = m.getName().toLowerCase();
                      if (name.contains("accept") && !name.contains("reject")) {
                          try {
                              m.setAccessible(true);
                              m.invoke(act);
                              XposedBridge.log(TAG + " Called method: " + m.getName());
                              return true;
                          } catch (Exception e) {
                              XposedBridge.log(TAG + " Failed to call " + m.getName() + ": " + e.getMessage());
                          }
                      }
                  }
                  // Also try to find click listener on accept button
                  return false;
              }

              private void simulateAcceptClick(Activity act) {
                  View root = act.getWindow().getDecorView();
                  View acceptBtn = findAcceptButton(root);
                  if (acceptBtn != null) {
                      acceptBtn.performClick();
                      XposedBridge.log(TAG + " Simulated click on Accept button");
                  } else {
                      XposedBridge.log(TAG + " Accept button not found");
                  }
              }

              private View findAcceptButton(View v) {
                  if (v instanceof TextView) {
                      String text = ((TextView) v).getText().toString();
                      if (text.equalsIgnoreCase("Accept") || text.equals("قبول")) return v;
                  }
                  if (v instanceof ViewGroup) {
                      ViewGroup g = (ViewGroup) v;
                      for (int i = 0; i < g.getChildCount(); i++) {
                          View found = findAcceptButton(g.getChildAt(i));
                          if (found != null) return found;
                      }
                  }
                  return null;
              }

              private float[] extractDistancesFromUI(Activity act) {
                  float[] result = {-1, -1};
                  try {
                      View root = act.getWindow().getDecorView();
                      List<Float> list = new ArrayList<>();
                      collectKmNumbers(root, list);
                      if (list.size() >= 2) {
                          result[0] = list.get(0);
                          result[1] = list.get(1);
                      }
                  } catch (Exception e) {
                      XposedBridge.log(TAG + " UI scan error: " + e.getMessage());
                  }
                  return result;
              }

              private void collectKmNumbers(View v, List<Float> out) {
                  if (v == null) return;
                  if (v instanceof TextView) {
                      String text = ((TextView) v).getText().toString();
                      Pattern p = Pattern.compile("(\\d+\\.?\\d*)\\s*[Kk][Mm]");
                      Matcher m = p.matcher(text);
                      if (m.find()) {
                          try {
                              float val = Float.parseFloat(m.group(1).replace(",", "."));
                              if (val > 0 && val < 100 && !out.contains(val)) out.add(val);
                          } catch (Exception e) {}
                      }
                  } else if (v instanceof ViewGroup) {
                      ViewGroup g = (ViewGroup) v;
                      for (int i = 0; i < g.getChildCount(); i++) {
                          collectKmNumbers(g.getChildAt(i), out);
                      }
                  }
              }

              private void showPopupAndNotification(Context ctx, float pickup, float drop) {
                  // Popup (optional)
                  try {
                      Intent popupIntent = new Intent(ctx, PopupActivity.class);
                      popupIntent.putExtra("pickup", pickup);
                      popupIntent.putExtra("drop", drop);
                      popupIntent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      ctx.startActivity(popupIntent);
                  } catch (Exception e) {
                      XposedBridge.log(TAG + " Popup error: " + e.getMessage());
                  }

                  // Notification
                  try {
                      NotificationManager nm = (NotificationManager) ctx.getSystemService(Context.NOTIFICATION_SERVICE);
                      if (android.os.Build.VERSION.SDK_INT >= 26) {
                          android.app.NotificationChannel channel = new android.app.NotificationChannel("danish_channel", "Danish Auto", NotificationManager.IMPORTANCE_HIGH);
                          nm.createNotificationChannel(channel);
                      }
                      Intent mainIntent = new Intent(ctx, SettingsActivity.class);
                      PendingIntent pi = PendingIntent.getActivity(ctx, 0, mainIntent, PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                      android.app.Notification.Builder builder;
                      if (android.os.Build.VERSION.SDK_INT >= 26) {
                          builder = new android.app.Notification.Builder(ctx, "danish_channel");
                      } else {
                          builder = new android.app.Notification.Builder(ctx);
                      }
                      builder.setContentTitle("✅ Order Accepted")
                             .setContentText("Pickup: " + pickup + "km | Drop: " + drop + "km")
                             .setSmallIcon(android.R.drawable.ic_dialog_info)
                             .setContentIntent(pi)
                             .setAutoCancel(true);
                      nm.notify(1001, builder.build());
                  } catch (Exception e) {
                      XposedBridge.log(TAG + " Notification error: " + e.getMessage());
                  }
              }
          }
          EOF

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Danish-Auto-Silent
          path: app/build/outputs/apk/debug/*.apk
