          cat > app/src/main/java/com/saned/autoswipe/MainActivity.java << 'EOF'
          package com.saned.autoswipe;

          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.provider.Settings;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.SeekBar;
          import android.widget.Switch;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {

              Switch switchService;
              EditText etPickupMax, etDropMax;
              TextView tvStatus, tvInfo, tvScreenDelay, tvSwipeDuration;
              SeekBar seekScreenDelay, seekSwipeDuration;
              Button btnSave, btnAccessibility;
              SharedPreferences prefs;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  prefs = getSharedPreferences("saned_prefs", MODE_PRIVATE);
                  switchService = findViewById(R.id.switch_service);
                  etPickupMax = findViewById(R.id.et_pickup_max);
                  etDropMax = findViewById(R.id.et_drop_max);
                  tvStatus = findViewById(R.id.tv_status);
                  tvInfo = findViewById(R.id.tv_info);
                  tvScreenDelay = findViewById(R.id.tv_screen_delay);
                  tvSwipeDuration = findViewById(R.id.tv_swipe_duration);
                  seekScreenDelay = findViewById(R.id.seek_screen_delay);
                  seekSwipeDuration = findViewById(R.id.seek_swipe_duration);
                  btnSave = findViewById(R.id.btn_save);
                  btnAccessibility = findViewById(R.id.btn_accessibility);

                  // Load saved values
                  etPickupMax.setText(String.valueOf(prefs.getFloat("pickup_max", 5.0f)));
                  etDropMax.setText(String.valueOf(prefs.getFloat("drop_max", 10.0f)));
                  
                  int savedScreenDelay = prefs.getInt("screen_delay", 400);
                  int savedSwipeDuration = prefs.getInt("swipe_duration", 300);
                  
                  seekScreenDelay.setProgress(savedScreenDelay - 100);
                  seekSwipeDuration.setProgress(savedSwipeDuration - 100);
                  tvScreenDelay.setText(savedScreenDelay + " ms");
                  tvSwipeDuration.setText(savedSwipeDuration + " ms");

                  // SeekBar listeners
                  seekScreenDelay.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override
                      public void onProgressChanged(SeekBar seekBar, int progress, boolean fromUser) {
                          int value = progress + 100;
                          tvScreenDelay.setText(value + " ms");
                          if (fromUser) prefs.edit().putInt("screen_delay", value).apply();
                      }
                      @Override public void onStartTrackingTouch(SeekBar seekBar) {}
                      @Override public void onStopTrackingTouch(SeekBar seekBar) {}
                  });
                  
                  seekSwipeDuration.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override
                      public void onProgressChanged(SeekBar seekBar, int progress, boolean fromUser) {
                          int value = progress + 100;
                          tvSwipeDuration.setText(value + " ms");
                          if (fromUser) prefs.edit().putInt("swipe_duration", value).apply();
                      }
                      @Override public void onStartTrackingTouch(SeekBar seekBar) {}
                      @Override public void onStopTrackingTouch(SeekBar seekBar) {}
                  });

                  switchService.setOnCheckedChangeListener((btn, isChecked) ->
                      updateStatus(isChecked)
                  );

                  btnSave.setOnClickListener(v -> {
                      float pMax, dMax;
                      try { pMax = Float.parseFloat(etPickupMax.getText().toString()); } catch (Exception e) { pMax = 5.0f; }
                      try { dMax = Float.parseFloat(etDropMax.getText().toString()); } catch (Exception e) { dMax = 10.0f; }

                      prefs.edit()
                          .putFloat("pickup_max", pMax)
                          .putFloat("drop_max", dMax)
                          .putBoolean("enabled", switchService.isChecked())
                          .apply();

                      etPickupMax.clearFocus();
                      etDropMax.clearFocus();
                      InputMethodManager imm = (InputMethodManager) getSystemService(INPUT_METHOD_SERVICE);
                      if (imm != null) {
                          android.view.View view = getCurrentFocus();
                          if (view == null) view = new android.view.View(this);
                          imm.hideSoftInputFromWindow(view.getWindowToken(), 0);
                      }

                      Toast.makeText(this, "Settings Saved!", Toast.LENGTH_SHORT).show();
                      tvStatus.setText("Settings Saved!");
                      tvStatus.setTextColor(0xFF1DB954);
                      new Handler(Looper.getMainLooper()).postDelayed(() ->
                          updateStatus(switchService.isChecked()), 1500);
                  });

                  btnAccessibility.setOnClickListener(v ->
                      startActivity(new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS))
                  );
              }

              private void updateStatus(boolean enabled) {
                  if (enabled) {
                      tvStatus.setText("Service ON - Waiting for order...");
                      tvStatus.setTextColor(0xFF1DB954);
                  } else {
                      tvStatus.setText("Service OFF");
                      tvStatus.setTextColor(0xFFFF5555);
                  }
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  boolean enabled = prefs.getBoolean("enabled", false);
                  switchService.setChecked(enabled);
                  updateStatus(enabled);
                  if (isAccessibilityEnabled()) {
                      tvInfo.setText("Accessibility Service: Active");
                      tvInfo.setTextColor(0xFF1DB954);
                  } else {
                      tvInfo.setText("Pehle Accessibility Service enable karein!");
                      tvInfo.setTextColor(0xFFFFAA00);
                  }
              }

              private boolean isAccessibilityEnabled() {
                  try {
                      String s = Settings.Secure.getString(getContentResolver(),
                          Settings.Secure.ENABLED_ACCESSIBILITY_SERVICES);
                      return s != null && s.contains(getPackageName());
                  } catch (Exception e) { return false; }
              }
          }
          EOF

          cat > app/src/main/java/com/saned/autoswipe/AutoSwipeService.java << 'EOF'
          package com.saned.autoswipe;

          import android.accessibilityservice.AccessibilityService;
          import android.accessibilityservice.GestureDescription;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.content.SharedPreferences;
          import android.graphics.Path;
          import android.os.Build;
          import android.os.Handler;
          import android.os.Looper;
          import android.util.DisplayMetrics;
          import android.util.Log;
          import android.view.accessibility.AccessibilityEvent;
          import android.view.accessibility.AccessibilityNodeInfo;
          import java.util.List;

          public class AutoSwipeService extends AccessibilityService {

              private static final String TAG = "SanedAuto";
              private static final String CHANNEL_ID = "saned_auto_channel";
              private static final int NOTIF_ID = 1001;
              private SharedPreferences prefs;
              private final Handler handler = new Handler(Looper.getMainLooper());

              @Override
              public void onServiceConnected() {
                  super.onServiceConnected();
                  prefs = getSharedPreferences("saned_prefs", MODE_PRIVATE);
                  createNotificationChannel();
                  Log.d(TAG, "Service Connected");
              }

              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(
                          CHANNEL_ID,
                          "Saned Auto Notifications",
                          NotificationManager.IMPORTANCE_HIGH
                      );
                      channel.setDescription("Order accept notifications");
                      channel.enableVibration(true);
                      NotificationManager nm = getSystemService(NotificationManager.class);
                      if (nm != null) nm.createNotificationChannel(channel);
                  }
              }

              private void sendOrderNotification(float pickupKm, float dropKm) {
                  try {
                      NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                      if (nm == null) return;
                      Notification.Builder builder;
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          builder = new Notification.Builder(this, CHANNEL_ID);
                      } else {
                          builder = new Notification.Builder(this);
                      }
                      builder.setSmallIcon(android.R.drawable.ic_dialog_info)
                          .setContentTitle("Order Accept Ho Gaya!")
                          .setContentText("Pickup: " + pickupKm + " km | Drop: " + dropKm + " km")
                          .setAutoCancel(true)
                          .setPriority(Notification.PRIORITY_HIGH);
                      nm.notify(NOTIF_ID, builder.build());
                  } catch (Exception e) {
                      Log.e(TAG, "Notif error: " + e.getMessage());
                  }
              }

              @Override
              public void onAccessibilityEvent(AccessibilityEvent event) {
                  if (prefs == null) return;
                  if (!prefs.getBoolean("enabled", false)) return;

                  // Package check - exact match for Saned Driver App
                  String pkg = String.valueOf(event.getPackageName());
                  if (!pkg.equals("net.jahez.fleets")) return;

                  int screenDelay = prefs.getInt("screen_delay", 400);
                  handler.postDelayed(this::checkAndAccept, screenDelay);
              }

              private void checkAndAccept() {
                  AccessibilityNodeInfo root = getRootInActiveWindow();
                  if (root == null) return;
                  try {
                      List<AccessibilityNodeInfo> newOrderList =
                          root.findAccessibilityNodeInfosByText("New Order");
                      if (newOrderList == null || newOrderList.isEmpty()) return;

                      float pickupMax = prefs.getFloat("pickup_max", 5.0f);
                      float dropMax   = prefs.getFloat("drop_max", 10.0f);

                      float pickupKm = findDistance(root, "From You");
                      float dropKm   = findDistance(root, "From Pickup");

                      Log.d(TAG, "Pickup: " + pickupKm + " | Drop: " + dropKm);

                      if (pickupKm < 0 || dropKm < 0) return;

                      if (pickupKm <= pickupMax && dropKm <= dropMax) {
                          List<AccessibilityNodeInfo> acceptNodes =
                              root.findAccessibilityNodeInfosByText("Accept");
                          if (acceptNodes == null || acceptNodes.isEmpty())
                              acceptNodes = root.findAccessibilityNodeInfosByText("ACCEPT");
                          if (acceptNodes == null || acceptNodes.isEmpty())
                              acceptNodes = root.findAccessibilityNodeInfosByText("قبول");

                          if (acceptNodes != null && !acceptNodes.isEmpty()) {
                              DisplayMetrics dm = getResources().getDisplayMetrics();
                              int screenWidth = dm.widthPixels;
                              int screenHeight = dm.heightPixels;
                              int startX = (int)(screenWidth * 0.15f);
                              int endX   = (int)(screenWidth * 0.85f);
                              int y      = (int)(screenHeight * 0.80f);

                              int swipeDuration = prefs.getInt("swipe_duration", 300);

                              final float pKm = pickupKm;
                              final float dKm = dropKm;

                              swipeOnScreen(startX, y, endX, y, swipeDuration, () -> {
                                  Log.d(TAG, "ACCEPTED! Pickup:" + pKm + " Drop:" + dKm);
                                  prefs.edit().putBoolean("enabled", false).apply();
                                  sendOrderNotification(pKm, dKm);
                              });
                          }
                      } else {
                          Log.d(TAG, "IGNORED - pickup=" + pickupKm + " drop=" + dropKm);
                      }
                  } finally {
                      if (root != null) root.recycle();
                  }
              }

              private void swipeOnScreen(int x1, int y1, int x2, int y2, int duration, Runnable onDone) {
                  Path path = new Path();
                  path.moveTo(x1, y1);
                  path.lineTo(x2, y2);
                  GestureDescription gesture = new GestureDescription.Builder()
                      .addStroke(new GestureDescription.StrokeDescription(path, 0, duration))
                      .build();
                  dispatchGesture(gesture, new GestureResultCallback() {
                      @Override
                      public void onCompleted(GestureDescription g) {
                          handler.post(onDone);
                      }
                      @Override
                      public void onCancelled(GestureDescription g) {
                          Log.e(TAG, "Swipe cancelled");
                      }
                  }, null);
              }

              private float findDistance(AccessibilityNodeInfo root, String keyword) {
                  List<AccessibilityNodeInfo> nodes =
                      root.findAccessibilityNodeInfosByText(keyword);
                  if (nodes == null || nodes.isEmpty()) return -1f;
                  for (AccessibilityNodeInfo node : nodes) {
                      String text = node.getText() != null ? node.getText().toString() : "";
                      node.recycle();
                      float km = parseKm(text);
                      if (km >= 0) return km;
                  }
                  return -1f;
              }

              private float parseKm(String text) {
                  try {
                      String[] parts = text.trim().split("\\s+");
                      if (parts.length > 0)
                          return Float.parseFloat(parts[0].replace(",", "."));
                  } catch (Exception e) {
                      Log.e(TAG, "Parse: " + e.getMessage());
                  }
                  return -1f;
              }

              @Override
              public void onInterrupt() {}
          }
          EOF

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Saned-Auto-Swipe-v7
          path: app/build/outputs/apk/debug/*.apk
