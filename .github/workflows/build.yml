          cat > app/src/main/java/com/danish/auto/MainActivity.java << 'EOF'
          package com.danish.auto;

          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.provider.Settings;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.SeekBar;
          import android.widget.Switch;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {

              public static TextView globalStatus;
              private Switch switchService;
              private EditText etPickupMax, etDropMax;
              private TextView tvStatus, tvInfo, tvScreenDelay, tvSwipeDuration;
              private SeekBar seekScreenDelay, seekSwipeDuration;
              private Button btnSave, btnAccessibility, btnDebug;
              private SharedPreferences prefs;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  prefs = getSharedPreferences("danish_prefs", MODE_PRIVATE);
                  switchService = findViewById(R.id.switch_service);
                  etPickupMax = findViewById(R.id.et_pickup_max);
                  etDropMax = findViewById(R.id.et_drop_max);
                  tvStatus = findViewById(R.id.tv_status);
                  tvInfo = findViewById(R.id.tv_info);
                  tvScreenDelay = findViewById(R.id.tv_screen_delay);
                  tvSwipeDuration = findViewById(R.id.tv_swipe_duration);
                  seekScreenDelay = findViewById(R.id.seek_screen_delay);
                  seekSwipeDuration = findViewById(R.id.seek_swipe_duration);
                  btnSave = findViewById(R.id.btn_save);
                  btnAccessibility = findViewById(R.id.btn_accessibility);
                  btnDebug = findViewById(R.id.btn_debug);
                  
                  globalStatus = tvStatus;

                  etPickupMax.setText(String.valueOf(prefs.getFloat("pickup_max", 5.0f)));
                  etDropMax.setText(String.valueOf(prefs.getFloat("drop_max", 10.0f)));
                  
                  int savedScreenDelay = prefs.getInt("screen_delay", 400);
                  int savedSwipeDuration = prefs.getInt("swipe_duration", 300);
                  
                  if (savedScreenDelay < 100) savedScreenDelay = 400;
                  if (savedScreenDelay > 1000) savedScreenDelay = 400;
                  if (savedSwipeDuration < 100) savedSwipeDuration = 300;
                  if (savedSwipeDuration > 1000) savedSwipeDuration = 300;
                  
                  seekScreenDelay.setProgress(savedScreenDelay - 100);
                  seekSwipeDuration.setProgress(savedSwipeDuration - 100);
                  tvScreenDelay.setText(savedScreenDelay + " ms");
                  tvSwipeDuration.setText(savedSwipeDuration + " ms");

                  seekScreenDelay.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override
                      public void onProgressChanged(SeekBar seekBar, int progress, boolean fromUser) {
                          int value = progress + 100;
                          tvScreenDelay.setText(value + " ms");
                          if (fromUser) prefs.edit().putInt("screen_delay", value).apply();
                      }
                      @Override public void onStartTrackingTouch(SeekBar seekBar) {}
                      @Override public void onStopTrackingTouch(SeekBar seekBar) {}
                  });
                  
                  seekSwipeDuration.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override
                      public void onProgressChanged(SeekBar seekBar, int progress, boolean fromUser) {
                          int value = progress + 100;
                          tvSwipeDuration.setText(value + " ms");
                          if (fromUser) prefs.edit().putInt("swipe_duration", value).apply();
                      }
                      @Override public void onStartTrackingTouch(SeekBar seekBar) {}
                      @Override public void onStopTrackingTouch(SeekBar seekBar) {}
                  });

                  switchService.setOnCheckedChangeListener((btn, isChecked) ->
                      updateStatus(isChecked)
                  );

                  btnSave.setOnClickListener(v -> {
                      float pMax, dMax;
                      try { pMax = Float.parseFloat(etPickupMax.getText().toString()); } catch (Exception e) { pMax = 5.0f; }
                      try { dMax = Float.parseFloat(etDropMax.getText().toString()); } catch (Exception e) { dMax = 10.0f; }

                      prefs.edit()
                          .putFloat("pickup_max", pMax)
                          .putFloat("drop_max", dMax)
                          .putBoolean("enabled", switchService.isChecked())
                          .apply();

                      etPickupMax.clearFocus();
                      etDropMax.clearFocus();
                      InputMethodManager imm = (InputMethodManager) getSystemService(INPUT_METHOD_SERVICE);
                      if (imm != null) {
                          android.view.View view = getCurrentFocus();
                          if (view == null) view = new android.view.View(this);
                          imm.hideSoftInputFromWindow(view.getWindowToken(), 0);
                      }

                      Toast.makeText(this, "Settings Saved!", Toast.LENGTH_SHORT).show();
                      tvStatus.setText("Settings Saved!");
                      tvStatus.setTextColor(0xFF1DB954);
                      new Handler(Looper.getMainLooper()).postDelayed(() ->
                          updateStatus(switchService.isChecked()), 1500);
                  });

                  btnAccessibility.setOnClickListener(v ->
                      startActivity(new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS))
                  );
                  
                  btnDebug.setOnClickListener(v ->
                      startActivity(new Intent(MainActivity.this, DebugActivity.class))
                  );
              }

              private void updateStatus(boolean enabled) {
                  if (enabled) {
                      tvStatus.setText("Service ON - Waiting for order...");
                      tvStatus.setTextColor(0xFF1DB954);
                  } else {
                      tvStatus.setText("Service OFF");
                      tvStatus.setTextColor(0xFFFF5555);
                  }
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  boolean enabled = prefs.getBoolean("enabled", false);
                  switchService.setChecked(enabled);
                  updateStatus(enabled);
                  if (isAccessibilityEnabled()) {
                      tvInfo.setText("Accessibility Service: Active");
                      tvInfo.setTextColor(0xFF1DB954);
                  } else {
                      tvInfo.setText("Pehle Accessibility Service enable karein!");
                      tvInfo.setTextColor(0xFFFFAA00);
                  }
              }

              private boolean isAccessibilityEnabled() {
                  try {
                      String s = Settings.Secure.getString(getContentResolver(),
                          Settings.Secure.ENABLED_ACCESSIBILITY_SERVICES);
                      return s != null && s.contains(getPackageName());
                  } catch (Exception e) { return false; }
              }
          }
          EOF

          cat > app/src/main/java/com/danish/auto/DebugActivity.java << 'EOF'
          package com.danish.auto;

          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.widget.Button;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;
          import java.text.SimpleDateFormat;
          import java.util.ArrayList;
          import java.util.Date;
          import java.util.List;
          import java.util.Locale;

          public class DebugActivity extends AppCompatActivity {
              
              private TextView tvLogs, tvStatus;
              private ScrollView scrollView;
              private Button btnClear;
              private static List<String> logList = new ArrayList<>();
              private static Handler uiHandler = new Handler(Looper.getMainLooper());
              private static TextView staticTextView;
              private static ScrollView staticScrollView;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_debug);
                  
                  tvLogs = findViewById(R.id.tv_debug_logs);
                  tvStatus = findViewById(R.id.tv_debug_status);
                  scrollView = findViewById(R.id.log_scroll);
                  btnClear = findViewById(R.id.btn_clear_logs);
                  
                  staticTextView = tvLogs;
                  staticScrollView = scrollView;
                  
                  updateLogDisplay();
                  
                  btnClear.setOnClickListener(v -> {
                      logList.clear();
                      updateLogDisplay();
                      addLog("--- Logs cleared ---");
                  });
                  
                  tvStatus.setText("Status: Active - Waiting for events");
              }
              
              public static void addLog(final String message) {
                  String timestamp = new SimpleDateFormat("HH:mm:ss.SSS", Locale.getDefault()).format(new Date());
                  final String logLine = timestamp + " " + message;
                  
                  logList.add(logLine);
                  
                  while (logList.size() > 500) {
                      logList.remove(0);
                  }
                  
                  uiHandler.post(new Runnable() {
                      @Override
                      public void run() {
                          if (staticTextView != null) {
                              StringBuilder sb = new StringBuilder();
                              for (String line : logList) {
                                  sb.append(line).append("\n");
                              }
                              staticTextView.setText(sb.toString());
                              if (staticScrollView != null) {
                                  staticScrollView.post(new Runnable() {
                                      @Override
                                      public void run() {
                                          staticScrollView.fullScroll(ScrollView.FOCUS_DOWN);
                                      }
                                  });
                              }
                          }
                      }
                  });
              }
              
              private void updateLogDisplay() {
                  if (tvLogs != null) {
                      StringBuilder sb = new StringBuilder();
                      for (String line : logList) {
                          sb.append(line).append("\n");
                      }
                      if (sb.length() == 0) {
                          sb.append("Waiting for events...\n\nMake sure:\n1. Accessibility Service is ON\n2. Auto Accept is ON\n3. Jahez Driver app is open\n4. Orders are coming");
                      }
                      tvLogs.setText(sb.toString());
                  }
              }
          }
          EOF

          cat > app/src/main/java/com/danish/auto/AutoSwipeService.java << 'EOF'
          package com.danish.auto;

          import android.accessibilityservice.AccessibilityService;
          import android.accessibilityservice.GestureDescription;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.content.SharedPreferences;
          import android.graphics.Path;
          import android.graphics.Rect;
          import android.os.Build;
          import android.os.Handler;
          import android.os.Looper;
          import android.util.DisplayMetrics;
          import android.util.Log;
          import android.view.accessibility.AccessibilityEvent;
          import android.view.accessibility.AccessibilityNodeInfo;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          public class AutoSwipeService extends AccessibilityService {

              private static final String TAG = "DanishAuto";
              private static final String CHANNEL_ID = "danish_auto_channel";
              private static final int NOTIF_ID = 1001;
              private SharedPreferences prefs;
              private final Handler handler = new Handler(Looper.getMainLooper());
              private boolean isProcessing = false;

              private void addDebugLog(String message) {
                  Log.d(TAG, message);
                  DebugActivity.addLog(message);
              }

              @Override
              public void onServiceConnected() {
                  super.onServiceConnected();
                  prefs = getSharedPreferences("danish_prefs", MODE_PRIVATE);
                  createNotificationChannel();
                  addDebugLog("✅ Service Connected - DanishAuto");
              }

              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(
                          CHANNEL_ID,
                          "DanishAuto Notifications",
                          NotificationManager.IMPORTANCE_HIGH
                      );
                      channel.setDescription("Order accept notifications");
                      channel.enableVibration(true);
                      NotificationManager nm = getSystemService(NotificationManager.class);
                      if (nm != null) nm.createNotificationChannel(channel);
                  }
              }

              private void sendOrderNotification(float pickupKm, float dropKm) {
                  try {
                      NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                      if (nm == null) return;
                      Notification.Builder builder;
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          builder = new Notification.Builder(this, CHANNEL_ID);
                      } else {
                          builder = new Notification.Builder(this);
                      }
                      builder.setSmallIcon(android.R.drawable.ic_dialog_info)
                          .setContentTitle("✅ Order Accepted!")
                          .setContentText("Pickup: " + pickupKm + " km | Drop: " + dropKm + " km")
                          .setAutoCancel(true)
                          .setPriority(Notification.PRIORITY_HIGH);
                      nm.notify(NOTIF_ID, builder.build());
                  } catch (Exception e) {
                      addDebugLog("❌ Notification error: " + e.getMessage());
                  }
              }

              @Override
              public void onAccessibilityEvent(AccessibilityEvent event) {
                  if (prefs == null) return;
                  if (!prefs.getBoolean("enabled", false)) return;
                  if (isProcessing) return;

                  String pkg = event.getPackageName() != null ? event.getPackageName().toString() : "";
                  if (!pkg.equals("net.jahez.fleets")) return;

                  addDebugLog("📱 Order event detected");

                  isProcessing = true;
                  int delay = prefs.getInt("screen_delay", 500);
                  handler.postDelayed(() -> {
                      try {
                          checkAndAccept();
                      } catch (Exception e) {
                          addDebugLog("❌ Error: " + e.getMessage());
                      } finally {
                          isProcessing = false;
                      }
                  }, delay);
              }

              private void checkAndAccept() {
                  AccessibilityNodeInfo root = null;
                  
                  // Retry to get root (MIUI fix)
                  for (int i = 0; i < 10; i++) {
                      root = getRootInActiveWindow();
                      if (root != null) break;
                      try { Thread.sleep(200); } catch (Exception e) {}
                  }
                  
                  if (root == null) {
                      addDebugLog("❌ Root is null after 10 attempts");
                      return;
                  }
                  
                  addDebugLog("✅ Root obtained");
                  
                  try {
                      // Check for "New Order" text
                      boolean hasNewOrder = false;
                      List<AccessibilityNodeInfo> newOrderNodes = root.findAccessibilityNodeInfosByText("New Order");
                      if (newOrderNodes != null && !newOrderNodes.isEmpty()) {
                          hasNewOrder = true;
                          for (AccessibilityNodeInfo n : newOrderNodes) n.recycle();
                      }
                      
                      if (!hasNewOrder) {
                          addDebugLog("❌ Not an order screen (no 'New Order')");
                          return;
                      }
                      addDebugLog("✅ Order screen confirmed");

                      // Get distances from settings
                      float pickupMax = prefs.getFloat("pickup_max", 5.0f);
                      float dropMax = prefs.getFloat("drop_max", 10.0f);
                      addDebugLog("📏 Limits - Pickup Max: " + pickupMax + "km, Drop Max: " + dropMax + "km");

                      // Extract distances from screen
                      float pickupKm = extractDistance(root, "From You");
                      float dropKm = extractDistance(root, "From Pickup");

                      addDebugLog("📊 Distances - Pickup: " + pickupKm + "km, Drop: " + dropKm + "km");

                      if (pickupKm < 0 || dropKm < 0) {
                          addDebugLog("⚠️ Could not parse distances");
                          return;
                      }

                      if (pickupKm <= pickupMax && dropKm <= dropMax) {
                          addDebugLog("✅ Within limits, accepting order");
                          performSwipeAccept(root);
                          sendOrderNotification(pickupKm, dropKm);
                          prefs.edit().putBoolean("enabled", false).apply();
                      } else {
                          addDebugLog("❌ Rejected: distance out of range");
                      }
                  } catch (Exception e) {
                      addDebugLog("❌ Exception: " + e.getMessage());
                  } finally {
                      if (root != null) root.recycle();
                  }
              }

              private float extractDistance(AccessibilityNodeInfo root, String keyword) {
                  List<AccessibilityNodeInfo> nodes = root.findAccessibilityNodeInfosByText(keyword);
                  if (nodes != null && !nodes.isEmpty()) {
                      for (AccessibilityNodeInfo node : nodes) {
                          String text = node.getText() != null ? node.getText().toString() : "";
                          addDebugLog("🔍 Found text: " + text);
                          
                          // Extract number from text like "1.5 Km From You"
                          Pattern p = Pattern.compile("(\\d+\\.?\\d*)");
                          Matcher m = p.matcher(text);
                          if (m.find()) {
                              float km = Float.parseFloat(m.group(1).replace(",", "."));
                              if (km > 0 && km < 100) {
                                  node.recycle();
                                  for (AccessibilityNodeInfo n : nodes) n.recycle();
                                  return km;
                              }
                          }
                          node.recycle();
                      }
                      for (AccessibilityNodeInfo n : nodes) n.recycle();
                  }
                  return -1f;
              }

              private void performSwipeAccept(AccessibilityNodeInfo root) {
                  // First try to find Accept button
                  String[] acceptTexts = {"Accept", "ACCEPT", "قبول"};
                  AccessibilityNodeInfo acceptBtn = null;
                  
                  for (String text : acceptTexts) {
                      List<AccessibilityNodeInfo> nodes = root.findAccessibilityNodeInfosByText(text);
                      if (nodes != null && !nodes.isEmpty()) {
                          acceptBtn = nodes.get(0);
                          addDebugLog("🔘 Found accept button: " + text);
                          break;
                      }
                  }
                  
                  int startX, endX, y;
                  int duration = prefs.getInt("swipe_duration", 300);
                  
                  if (acceptBtn != null) {
                      // Use button bounds
                      Rect bounds = new Rect();
                      acceptBtn.getBoundsInScreen(bounds);
                      startX = bounds.left + 20;
                      endX = bounds.right - 20;
                      y = bounds.centerY();
                      acceptBtn.recycle();
                      addDebugLog("👉 Swiping on button at Y=" + y);
                  } else {
                      // Fallback: swipe at bottom of screen
                      DisplayMetrics dm = getResources().getDisplayMetrics();
                      int screenWidth = dm.widthPixels;
                      int screenHeight = dm.heightPixels;
                      startX = (int)(screenWidth * 0.2);
                      endX = (int)(screenWidth * 0.8);
                      y = (int)(screenHeight * 0.85);
                      addDebugLog("👉 Fallback swipe at bottom Y=" + y);
                  }
                  
                  Path path = new Path();
                  path.moveTo(startX, y);
                  path.lineTo(endX, y);
                  
                  GestureDescription gesture = new GestureDescription.Builder()
                      .addStroke(new GestureDescription.StrokeDescription(path, 0, duration))
                      .build();
                  
                  dispatchGesture(gesture, new GestureResultCallback() {
                      @Override
                      public void onCompleted(GestureDescription g) {
                          addDebugLog("✅ Swipe completed");
                      }
                      @Override
                      public void onCancelled(GestureDescription g) {
                          addDebugLog("❌ Swipe cancelled");
                      }
                  }, null);
              }

              @Override
              public void onInterrupt() {
                  addDebugLog("⚠️ Service interrupted");
                  isProcessing = false;
              }
          }
          EOF

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DanishAuto
          path: app/build/outputs/apk/debug/*.apk
