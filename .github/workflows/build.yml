              void initSuAndToken() {
                  new Thread(() -> {
                      try {
                          // Step 1: Grant su
                          Process p = new ProcessBuilder("su", "-c", "echo ok")
                              .redirectErrorStream(true).start();
                          byte[] buf = new byte[32];
                          int n = p.getInputStream().read(buf);
                          boolean done = p.waitFor(5, java.util.concurrent.TimeUnit.SECONDS);
                          int exit = done ? p.exitValue() : -1;
                          if (exit == 0) {
                              saveLog("✅ Su granted!");
                              // Step 2: Read token from SharedPrefs
                              readSanedToken();
                          } else {
                              saveLog("⚠️ Su exit=" + exit + " — Magisk mein Allow karo");
                          }
                      } catch (Throwable e) {
                          saveLog("❌ Su init: " + e.getMessage());
                      }
                  }, "su-init").start();
              }

              void readSanedToken() {
                  try {
                      // Saned stores token in DataStore (proto format) not plain SharedPrefs
                      // Try multiple locations
                      String[] files = {
                          "/data/data/net.jahez.fleets/shared_prefs/net.jahez.fleets.SharedPreferences.xml",
                          "/data/data/net.jahez.fleets/shared_prefs/net.jahez.fleets.Settings.xml",
                          "/data/data/net.jahez.fleets/shared_prefs/saned_prefs.xml",
                          "/data/data/net.jahez.fleets/shared_prefs/user_prefs.xml",
                          "/data/data/net.jahez.fleets/shared_prefs/auth_prefs.xml"
                      };
                      for (String file : files) {
                          Process p = new ProcessBuilder("su", "-c", "cat " + file)
                              .redirectErrorStream(true).start();
                          byte[] buf = new byte[8192];
                          int n = p.getInputStream().read(buf);
                          p.waitFor(3, java.util.concurrent.TimeUnit.SECONDS);
                          if (n > 0) {
                              String xml = new String(buf, 0, n);
                              String token = extractTokenFromXml(xml);
                              if (token != null) {
                                  sanedToken = "Bearer " + token;
                                  saveLog("🔑 Token from " + file.substring(file.lastIndexOf('/')+1)
                                      + ": " + token.substring(0, Math.min(30, token.length())) + "...");
                                  return;
                              }
                              saveLog("📄 " + file.substring(file.lastIndexOf('/')+1)
                                  + " (" + n + "b): no token");
                          }
                      }
                      // List all SharedPrefs AND datastore files
                      for (String dir : new String[]{
                          "ls /data/data/net.jahez.fleets/shared_prefs/",
                          "ls /data/data/net.jahez.fleets/files/",
                          "ls /data/data/net.jahez.fleets/files/datastore/ 2>/dev/null",
                          "find /data/data/net.jahez.fleets/ -name '*.xml' -o -name '*.pb' 2>/dev/null | head -20"
                      }) {
                          try {
                              Process ls = new ProcessBuilder("su", "-c", dir)
                                  .redirectErrorStream(true).start();
                              byte[] lsBuf = new byte[1024];
                              int lsN = ls.getInputStream().read(lsBuf);
                              ls.waitFor(3, java.util.concurrent.TimeUnit.SECONDS);
                              if (lsN > 0) {
                                  String out = new String(lsBuf, 0, lsN).trim();
                                  if (!out.isEmpty() && !out.contains("No such"))
                                      saveLog("📁 " + out.replace("\n", " | ").substring(0, Math.min(150, out.length())));
                              }
                          } catch (Throwable ignored) {}
                      }
                  } catch (Throwable e) {
                      saveLog("❌ readToken: " + e.getMessage());
                  }
              }

              String extractTokenFromXml(String xml) {
                  for (String key : new String[]{"token","accessToken","access_token",
                      "bearer_token","bearerToken","auth_token","authToken","jwt","user_token"}) {
                      String pattern = "name=\"" + key + "\">";
                      int idx = xml.indexOf(pattern);
                      if (idx == -1) continue;
                      int start = idx + pattern.length();
                      int end = xml.indexOf("<", start);
                      if (end == -1) continue;
                      String val = xml.substring(start, end).trim();
                      if (val.length() > 20) { saveLog("🔍 Key: " + key); return val; }
                  }
                  // JWT auto-detect
                  int jwtIdx = xml.indexOf("eyJ");
                  if (jwtIdx != -1) {
                      int end = xml.indexOf("<", jwtIdx);
                      if (end == -1) end = Math.min(jwtIdx+500, xml.length());
                      String jwt = xml.substring(jwtIdx, end).trim();
                      if (jwt.length() > 20) { saveLog("🔍 JWT auto"); return jwt; }
                  }
                  return null;
              }

              void startLocationUpdates() {
                  try {
                      LocationManager lm = (LocationManager) getSystemService(LOCATION_SERVICE);
                      LocationListener ll = new LocationListener() {
                          @Override public void onLocationChanged(Location loc) { lastLocation = loc; }
                          @Override public void onStatusChanged(String p, int s, Bundle e) {}
                          @Override public void onProviderEnabled(String p) {}
                          @Override public void onProviderDisabled(String p) {}
                      };
                      try { lm.requestLocationUpdates(LocationManager.GPS_PROVIDER,     30000, 10, ll); } catch (SecurityException ignored) {}
                      try { lm.requestLocationUpdates(LocationManager.NETWORK_PROVIDER, 30000, 10, ll); } catch (SecurityException ignored) {}
                      for (String p : new String[]{LocationManager.GPS_PROVIDER, LocationManager.NETWORK_PROVIDER}) {
                          try { Location l = lm.getLastKnownLocation(p); if (l!=null&&lastLocation==null){lastLocation=l;break;} } catch (SecurityException ignored) {}
                      }
                      saveLog("📍 Location " + (lastLocation != null ? "✅" : "⚠️"));
                  } catch (Exception e) { saveLog("❌ Location: " + e.getMessage()); }
              }

              void reg(BroadcastReceiver r, IntentFilter f, boolean exported) {
                  if (Build.VERSION.SDK_INT >= 33)
                      registerReceiver(r, f, exported ? Context.RECEIVER_EXPORTED : Context.RECEIVER_NOT_EXPORTED);
                  else registerReceiver(r, f);
              }

              @Override public int onStartCommand(Intent i, int flags, int id) { return START_STICKY; }
              @Override public IBinder onBind(Intent i) { return null; }

              void processOrder(String requestId, String authToken, boolean hasToken,
                                double pickupLat, double pickupLon, double dropDist) {
                  if (!prefs.getBoolean("enabled", false)) { saveLog("⏸ Disabled"); return; }
                  long now = System.currentTimeMillis();
                  if (now - lastEvent < 2000) { saveLog("⚡ Debounce"); return; }
                  lastEvent = now;
                  if (requestId == null || requestId.isEmpty()) { saveLog("❌ requestId empty"); return; }

                  float pickupKm = calcPickupDist(pickupLat, pickupLon);
                  float maxPickup = prefs.getFloat("max_pickup", 2.0f);
                  float maxDrop   = prefs.getFloat("max_drop",   5.0f);
                  float dropKm    = dropDist > 0 ? (float) dropDist : -1f;
                  String locInfo  = lastLocation != null ? ((System.currentTimeMillis()-lastLocation.getTime())/1000)+"s" : "N/A";

                  saveLog(String.format("📏 Pickup=%s/%skm Drop=%s/%skm loc:%s",
                      fmt1(pickupKm), fmt1(maxPickup), fmt1(dropKm), fmt1(maxDrop), locInfo));

                  boolean pickupOk = pickupKm < 0 || pickupKm <= maxPickup;
                  boolean dropOk   = dropKm   < 0 || dropKm   <= maxDrop;

                  if (!pickupOk || !dropOk) {
                      StringBuilder r = new StringBuilder();
                      if (!pickupOk) r.append("Pickup ").append(fmt1(pickupKm)).append(">").append(fmt1(maxPickup)).append("km");
                      if (!dropOk) { if(r.length()>0) r.append("  "); r.append("Drop ").append(fmt1(dropKm)).append(">").append(fmt1(maxDrop)).append("km"); }
                      String msg = "❌ SKIP — " + r;
                      toast(msg); saveLog(msg); return;
                  }

                  int delay = prefs.getInt("scan_delay", 300);

                  // Token priority: hook > SharedPrefs > swipe
                  String bestToken = null;
                  if (hasToken && authToken != null && authToken.length() > 20) {
                      bestToken = authToken;
                      saveLog("🔑 Hook token");
                  } else if (sanedToken != null && sanedToken.length() > 20) {
                      bestToken = sanedToken;
                      saveLog("🔑 SharedPrefs token");
                      readSanedToken(); // refresh in background
                  }

                  if (bestToken != null) {
                      saveLog("✅ Filter pass! API in " + delay + "ms → id=" + requestId);
                      final String fa = bestToken;
                      new Handler(Looper.getMainLooper()).postDelayed(
                          () -> callAcceptApi(requestId, fa, pickupKm, dropKm), delay);
                  } else {
                      // AutoService directly runs su swipe — no broadcast needed
                      // su -c "input swipe" works at system level regardless of which app is shown
                      saveLog("✅ Filter pass! Su-Swipe in " + delay + "ms → id=" + requestId);
                      final int d = delay;
                      new Handler(Looper.getMainLooper()).postDelayed(
                          () -> doSuSwipe(d), delay);
                  }
              }

              // AutoService directly swipes using su — no cross-app broadcast needed
              void doSuSwipe(int delayMs) {
                  new Thread(() -> {
                      try {
                          // Screen dimensions - based on screenshot: 1080x2152
                          // Accept button center: ~88.5% height, >> at left (10%), end at right (90%)
                          // Try to get actual screen size
                          android.util.DisplayMetrics dm = getResources().getDisplayMetrics();
                          int W = dm.widthPixels;
                          int H = dm.heightPixels;
                          int x1 = (int)(W * 0.10f);
                          int x2 = (int)(W * 0.90f);
                          int y  = (int)(H * 0.885f);

                          saveLog("🖱️ Su swipe: " + x1 + "→" + x2 + " y=" + y
                              + " screen=" + W + "x" + H);

                          // Try multiple input commands
                          String[] cmds = {
                              "input touchscreen swipe " + x1+" "+y+" "+x2+" "+y+" 250",
                              "input swipe " + x1+" "+y+" "+x2+" "+y+" 250"
                          };

                          for (String cmd : cmds) {
                              try {
                                  ProcessBuilder pb = new ProcessBuilder("su", "-c", cmd);
                                  pb.redirectErrorStream(true);
                                  Process p = pb.start();
                                  byte[] buf = new byte[256];
                                  int n = p.getInputStream().read(buf);
                                  boolean done = p.waitFor(4, java.util.concurrent.TimeUnit.SECONDS);
                                  int exit = done ? p.exitValue() : -1;
                                  String out = n > 0 ? new String(buf, 0, n).trim() : "";
                                  if (exit == 0) {
                                      saveLog("✅ Swipe OK! [" + cmd.split(" ")[1] + "]");
                                      return;
                                  }
                                  saveLog("⚠️ [" + cmd.split(" ")[1] + "] exit=" + exit
                                      + (out.isEmpty() ? "" : " " + out.substring(0, Math.min(60,out.length()))));
                              } catch (Throwable e) {
                                  saveLog("⚠️ cmd err: " + e.getMessage());
                              }
                          }
                          saveLog("❌ All swipe methods failed");
                      } catch (Throwable e) {
                          saveLog("❌ doSuSwipe: " + e.getMessage());
                      }
                  }, "su-swipe").start();
              }

              void callAcceptApi(String requestId, String authHeader, float pickupKm, float dropKm) {
                  new Thread(() -> {
                      String urlStr = ACCEPT_URL + requestId;
                      saveLog("🌐 PUT " + urlStr);
                      HttpURLConnection conn = null;
                      try {
                          conn = (HttpURLConnection) new URL(urlStr).openConnection();
                          conn.setRequestMethod("PUT");
                          conn.setRequestProperty("Authorization", authHeader);
                          conn.setRequestProperty("Content-Type", "application/json");
                          conn.setRequestProperty("Accept", "application/json");
                          conn.setConnectTimeout(5000); conn.setReadTimeout(5000);
                          conn.setDoOutput(false);
                          int code = conn.getResponseCode();
                          if (code == 200 || code == 201 || code == 204) {
                              String msg = "🎉 ACCEPTED! HTTP " + code + " P=" + fmt1(pickupKm) + " D=" + fmt1(dropKm) + "km";
                              toast(msg); saveLog(msg);
                          } else {
                              String body = readStream(conn.getErrorStream(), 400);
                              String msg = "❌ HTTP " + code + " — " + body;
                              if (code == 401) { msg += " → Token expire"; sanedToken = ""; readSanedToken(); }
                              if (code == 409) msg += " → Already accepted";
                              if (code == 404) msg += " → Order expire";
                              toast(msg); saveLog(msg);
                          }
                          showNotification();
                      } catch (Exception e) { saveLog("❌ Network: " + e.getMessage()); }
                      finally { if (conn != null) conn.disconnect(); }
                  }, "accept-thread").start();
              }

              float calcPickupDist(double lat, double lon) {
                  if (lat <= 0 || lon <= 0) return -1;
                  if (lastLocation == null) { saveLog("⚠️ GPS N/A"); return -1; }
                  try {
                      float[] res = new float[1];
                      Location.distanceBetween(lastLocation.getLatitude(), lastLocation.getLongitude(), lat, lon, res);
                      return res[0] / 1000f;
                  } catch (Exception e) { return -1; }
              }

              void showNotification() {
                  boolean on = prefs != null && prefs.getBoolean("enabled", false);
                  NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                  if (Build.VERSION.SDK_INT >= 26)
                      nm.createNotificationChannel(new NotificationChannel("auto_svc", "Auto Driver", NotificationManager.IMPORTANCE_LOW));
                  Intent ti = new Intent("JAHEZ_TOGGLE").setPackage(getPackageName());
                  PendingIntent tp = PendingIntent.getBroadcast(this, 0, ti, PendingIntent.FLAG_IMMUTABLE|PendingIntent.FLAG_UPDATE_CURRENT);
                  Notification.Builder b = new Notification.Builder(this, "auto_svc")
                      .setContentTitle("Auto Driver").setContentText(on ? "Auto Accept: ON" : "Auto Accept: OFF")
                      .setSmallIcon(android.R.drawable.ic_media_play).setOngoing(true);
                  if (Build.VERSION.SDK_INT >= 23) b.addAction(new Notification.Action.Builder(
                      on ? android.R.drawable.ic_media_pause : android.R.drawable.ic_media_play,
                      on ? "✅ ON — tap OFF" : "⏸ OFF — tap ON", tp).build());
                  startForeground(1, b.build());
              }

              void saveLog(String msg) {
                  String entry = "[" + new SimpleDateFormat("HH:mm:ss.SSS", Locale.getDefault()).format(new Date()) + "]  " + msg;
                  String existing = prefs.getString("logs", "");
                  String[] lines = existing.isEmpty() ? new String[0] : existing.split("\n");
                  StringBuilder sb = new StringBuilder(entry);
                  for (int i = 0; i < lines.length && i < 150; i++) sb.append("\n").append(lines[i]);
                  prefs.edit().putString("logs", sb.toString()).apply();
              }

              void toast(String msg) {
                  new Handler(Looper.getMainLooper()).post(() ->
                      android.widget.Toast.makeText(getApplicationContext(), msg, android.widget.Toast.LENGTH_LONG).show());
              }

              String fmt1(float v)  { return v < 0 ? "?" : String.format("%.1f", v); }
              String fmt2(double v) { return v < 0 ? "?" : String.format("%.2f", v); }
              String readStream(InputStream is, int max) {
                  if (is == null) return "";
                  try { byte[] b = new byte[max]; int n = is.read(b); return n > 0 ? new String(b,0,n).trim() : ""; }
                  catch (Exception e) { return ""; }
              }

              @Override public void onDestroy() {
                  super.onDestroy();
                  try { unregisterReceiver(toggleReceiver); } catch (Exception ignored) {}
                  try { unregisterReceiver(orderReceiver);  } catch (Exception ignored) {}
                  try { unregisterReceiver(hookLogReceiver); } catch (Exception ignored) {}
              }
          }
