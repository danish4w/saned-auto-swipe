name: Build Saned Auto Swipe
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/saned/autoswipe
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/xml

      - name: Create Gradle Wrapper manually
        run: |
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > gradlew << 'EOF'
          #!/bin/sh
          exec gradle "$@"
          EOF
          chmod +x gradlew

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Create settings.gradle
        run: echo "include ':app'" > settings.gradle

      - name: Create root build.gradle
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.3.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Create app/build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.saned.autoswipe'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.saned.autoswipe'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <application
                  android:label="Saned Auto"
                  android:theme="@style/Theme.AppCompat">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".AutoSwipeService"
                      android:exported="true"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService"/>
                      </intent-filter>
                      <meta-data
                          android:name="android.accessibilityservice"
                          android:resource="@xml/acc_config"/>
                  </service>
              </application>
          </manifest>
          EOF

      - name: Create XML and Layout files
        run: |
          cat > app/src/main/res/xml/acc_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:canPerformGestures="true" />
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:gravity="center">
              <Button
                  android:id="@+id/btn"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Start"/>
          </LinearLayout>
          EOF

      - name: Create Java Files
        run: |
          cat > app/src/main/java/com/saned/autoswipe/MainActivity.java << 'EOF'
          package com.saned.autoswipe;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
              }
          }
          EOF

          cat > app/src/main/java/com/saned/autoswipe/AutoSwipeService.java << 'EOF'
          package com.saned.autoswipe;
          import android.accessibilityservice.AccessibilityService;
          import android.view.accessibility.AccessibilityEvent;
          public class AutoSwipeService extends AccessibilityService {
              @Override
              public void onAccessibilityEvent(AccessibilityEvent event) {}
              @Override
              public void onInterrupt() {}
          }
          EOF

      - name: Build APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Saned-Auto-Final
          path: app/build/outputs/apk/debug/*.apk
