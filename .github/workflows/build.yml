      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore /tmp/debug.keystore -alias jahezdiag \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=JahezDiag, O=Diagnostic, C=SA" \
            -storepass android -keypass android 2>/dev/null || true
          
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$UNSIGNED_APK" ]; then
            echo "No APK found to sign!"
            exit 1
          fi
          
          echo "Signing: $UNSIGNED_APK"
          
          # Find apksigner
          if [ -n "$ANDROID_HOME" ] && [ -d "$ANDROID_HOME/build-tools" ]; then
            APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" -type f | sort -V | tail -1)
          elif [ -d "/usr/local/lib/android/sdk/build-tools" ]; then
            APKSIGNER=$(find "/usr/local/lib/android/sdk/build-tools" -name "apksigner" -type f | sort -V | tail -1)
          else
            APKSIGNER="apksigner"
          fi
          
          $APKSIGNER sign --ks /tmp/debug.keystore --ks-key-alias jahezdiag \
            --ks-pass pass:android --key-pass pass:android \
            --out app/build/JahezDiagnostic.apk "$UNSIGNED_APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JahezDiagnostic
          path: |
            app/build/JahezDiagnostic.apk
            app/build/outputs/apk/release/*.apk
