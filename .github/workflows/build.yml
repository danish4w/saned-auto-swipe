      - name: Write LogActivity
        run: |
          cat > app/src/main/java/com/danish/diag/LogActivity.java << 'LEOF'
          package com.danish.diag;
          
          import android.app.Activity;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.TextView;
          
          public class LogActivity extends Activity {
            @Override 
            protected void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              setContentView(R.layout.activity_log);
              
              SharedPreferences prefs = getSharedPreferences("diag_data", MODE_PRIVATE);
              TextView logText = findViewById(R.id.tv_log);
              Button clearButton = findViewById(R.id.btn_clear);
              Button backButton = findViewById(R.id.btn_back);
              
              String logs = prefs.getString("logs", "");
              if (logs.isEmpty()) {
                logText.setText("No logs yet.\n\nOpen Jahez (Saned) app and accept an order to start logging.");
              } else {
                logText.setText(logs);
              }
              
              clearButton.setOnClickListener(v -> {
                prefs.edit().remove("logs").apply();
                logText.setText("Logs cleared.");
              });
              
              backButton.setOnClickListener(v -> finish());
            }
          }
          LEOF

      - name: Write BootReceiver
        run: |
          cat > app/src/main/java/com/danish/diag/BootReceiver.java << 'BEOF'
          package com.danish.diag;
          
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Build;
          
          public class BootReceiver extends BroadcastReceiver {
            @Override 
            public void onReceive(Context context, Intent intent) {
              if (Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction())) {
                Intent serviceIntent = new Intent(context, DiagService.class);
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                  context.startForegroundService(serviceIntent);
                } else {
                  context.startService(serviceIntent);
                }
              }
            }
          }
          BEOF

