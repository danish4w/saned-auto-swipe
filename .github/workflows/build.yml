name: Build JahezAutoAccept

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          cat > gradle/wrapper/gradle-wrapper.properties << 'WEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/zips
          WEOF

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/danish/jahez
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

      - name: Write Gradle Files
        run: |
          cat > settings.gradle << 'SEOF'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositories { google(); mavenCentral() }
          }
          rootProject.name = "JahezAutoAccept"
          include ':app'
          SEOF

          cat > build.gradle << 'BEOF'
          plugins { id 'com.android.application' version '8.5.2' apply false }
          BEOF

          cat > gradle.properties << 'GEOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          GEOF

          cat > app/build.gradle << 'ABEOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.danish.jahez'
            compileSdk 34
            defaultConfig {
              applicationId 'com.danish.jahez'
              minSdk 26
              targetSdk 34
              versionCode 1
              versionName '1.0'
            }
            buildTypes {
              release { minifyEnabled false }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.google.android.material:material:1.12.0'
          }
          ABEOF

      - name: Write Icon
        run: |
          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'BGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp"
            android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#1B5E20"
              android:pathData="M0,0 L108,0 L108,108 L0,108 Z"/>
          </vector>
          BGEOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'FGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp"
            android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#FFFFFF"
              android:pathData="M25,54 L35,44 L47,60 L73,30 L83,40 L47,82 Z"/>
          </vector>
          FGEOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'ICEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          ICEOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'RNDEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          RNDEOF

      - name: Write Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
            <application
              android:label="Jahez Auto"
              android:icon="@mipmap/ic_launcher"
              android:roundIcon="@mipmap/ic_launcher_round"
              android:theme="@style/AppTheme"
              android:allowBackup="false">
              <activity android:name=".MainActivity" android:exported="true"
                android:windowSoftInputMode="stateHidden|adjustPan">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
              <activity android:name=".LogActivity" android:exported="false"/>
              <service
                android:name=".AutoService"
                android:label="Jahez Auto Accept"
                android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                android:exported="true">
                <intent-filter>
                  <action android:name="android.accessibilityservice.AccessibilityService"/>
                </intent-filter>
                <meta-data
                  android:name="android.accessibilityservice"
                  android:resource="@xml/acc_config"/>
              </service>
            </application>
          </manifest>
          MEOF

      - name: Write Accessibility Config
        run: |
          cat > app/src/main/res/xml/acc_config.xml << 'XEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
            android:accessibilityEventTypes="typeWindowStateChanged|typeWindowContentChanged"
            android:accessibilityFeedbackType="feedbackGeneric"
            android:accessibilityFlags="flagReportViewIds|flagRetrieveInteractiveWindows"
            android:canRetrieveWindowContent="true"
            android:canPerformGestures="true"
            android:description="@string/acc_desc"
            android:notificationTimeout="50"
            android:packageNames="net.jahez.fleets"/>
          XEOF

      - name: Write MainActivity
        run: |
          cat > app/src/main/java/com/danish/jahez/MainActivity.java << 'JEOF'
          package com.danish.jahez;
          import android.app.Activity;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.*;
          public class MainActivity extends Activity {
            SharedPreferences prefs;
            Switch swEnable;
            TextView tvStatus, tvAcc;
            final BroadcastReceiver offReceiver = new BroadcastReceiver() {
              @Override public void onReceive(Context ctx, Intent intent) {
                if (swEnable != null) swEnable.setChecked(false);
                refreshStatus(tvStatus, tvAcc);
              }
            };
            @Override protected void onCreate(Bundle saved) {
              super.onCreate(saved);
              setContentView(R.layout.activity_main);
              prefs = getSharedPreferences("cfg", MODE_PRIVATE);
              EditText etPickup = findViewById(R.id.et_pickup);
              EditText etDrop   = findViewById(R.id.et_drop);
              swEnable = findViewById(R.id.sw_enable);
              tvStatus = findViewById(R.id.tv_status);
              tvAcc    = findViewById(R.id.tv_acc);
              Button btnSave = findViewById(R.id.btn_save);
              Button btnAcc  = findViewById(R.id.btn_acc);
              etPickup.setText(String.valueOf(prefs.getFloat("max_pickup", 2.0f)));
              etDrop.setText(String.valueOf(prefs.getFloat("max_drop", 5.0f)));
              swEnable.setChecked(prefs.getBoolean("enabled", false));
              // Android 13+ notification permission
              if (Build.VERSION.SDK_INT >= 33)
                requestPermissions(new String[]{"android.permission.POST_NOTIFICATIONS"}, 0);
              IntentFilter filter = new IntentFilter("JAHEZ_AUTO_OFF");
              if (Build.VERSION.SDK_INT >= 33)
                registerReceiver(offReceiver, filter, Context.RECEIVER_NOT_EXPORTED);
              else
                registerReceiver(offReceiver, filter);
              swEnable.setOnCheckedChangeListener((btn, checked) -> {
                prefs.edit().putBoolean("enabled", checked).apply();
                refreshStatus(tvStatus, tvAcc);
              });
              btnSave.setOnClickListener(v -> {
                float pk = parseFloat(etPickup.getText().toString(), 2.0f);
                float dk = parseFloat(etDrop.getText().toString(), 5.0f);
                prefs.edit().putFloat("max_pickup", pk).putFloat("max_drop", dk).apply();
                Toast.makeText(this, "Saved! Pickup<=" + pk + "km Drop<=" + dk + "km", Toast.LENGTH_LONG).show();
                InputMethodManager imm = (InputMethodManager) getSystemService(INPUT_METHOD_SERVICE);
                if (imm != null)
                  imm.hideSoftInputFromWindow(getWindow().getDecorView().getWindowToken(), 0);
                etPickup.clearFocus();
                etDrop.clearFocus();
              });
              btnAcc.setOnClickListener(v ->
                startActivity(new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS))
              );
              findViewById(R.id.btn_logs).setOnClickListener(v ->
                startActivity(new Intent(this, LogActivity.class))
              );
            }
            @Override protected void onResume() {
              super.onResume();
              refreshStatus(tvStatus, tvAcc);
            }
            @Override protected void onDestroy() {
              super.onDestroy();
              unregisterReceiver(offReceiver);
            }
            void refreshStatus(TextView tvs, TextView tva) {
              if (tvs == null || tva == null) return;
              boolean acc = isAccEnabled();
              boolean en  = prefs.getBoolean("enabled", false);
              tva.setText(acc ? "Accessibility: ON" : "Accessibility: OFF - tap below");
              tva.setTextColor(acc ? 0xFF4CAF50 : 0xFFFF9800);
              tvs.setText(acc && en ? "AUTO ACCEPT: ON" : "AUTO ACCEPT: OFF");
              tvs.setTextColor(acc && en ? 0xFF4CAF50 : 0xFFFF5555);
            }
            boolean isAccEnabled() {
              try {
                String s = Settings.Secure.getString(getContentResolver(), Settings.Secure.ENABLED_ACCESSIBILITY_SERVICES);
                return s != null && s.contains(getPackageName());
              } catch (Exception e) { return false; }
            }
            float parseFloat(String s, float def) {
              try { return Float.parseFloat(s.trim()); } catch (Exception e) { return def; }
            }
          }
          JEOF

      - name: Write AutoService
        run: |
          cat > app/src/main/java/com/danish/jahez/AutoService.java << 'SEOF'
          package com.danish.jahez;
          import android.accessibilityservice.AccessibilityService;
          import android.accessibilityservice.GestureDescription;
          import android.content.SharedPreferences;
          import android.graphics.Path;
          import android.util.Log;
          import android.view.accessibility.AccessibilityEvent;
          import android.view.accessibility.AccessibilityNodeInfo;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.os.Handler;
          import android.os.Looper;
          import java.util.LinkedList;
          import java.util.Queue;
          import java.util.Random;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;
          public class AutoService extends AccessibilityService {
            static final String TAG = "JahezAuto";
            static final String PKG = "net.jahez.fleets";
            SharedPreferences prefs;
            long lastEvent = 0;
            final Random rng = new Random();
            @Override public void onServiceConnected() {
              prefs = getSharedPreferences("cfg", MODE_PRIVATE);
              log("Service connected");
              showServiceNotification();
            }
            void showServiceNotification() {
              NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
              NotificationChannel ch = new NotificationChannel("jahez_svc", "Jahez Auto Service", NotificationManager.IMPORTANCE_LOW);
              ch.setDescription("Service chalu hai");
              nm.createNotificationChannel(ch);
              Notification notif = new Notification.Builder(this, "jahez_svc")
                .setContentTitle("Jahez Auto — Service Running")
                .setContentText("Accessibility service active hai")
                .setSmallIcon(android.R.drawable.ic_media_play)
                .setOngoing(true)
                .build();
              nm.notify(1, notif);
            }
            @Override public void onAccessibilityEvent(AccessibilityEvent event) {
              if (prefs == null) prefs = getSharedPreferences("cfg", MODE_PRIVATE);
              if (!prefs.getBoolean("enabled", false)) return;
              String pkg = event.getPackageName() != null ? event.getPackageName().toString() : "";
              if (!PKG.equals(pkg)) return;
              long now = System.currentTimeMillis();
              if (now - lastEvent < 1500) return;
              AccessibilityNodeInfo root = getRootInActiveWindow();
              if (root == null) return;
              try {
                String screen = flattenTree(root);
                saveLog("📡 Event: " + screen.substring(0, Math.min(60, screen.length())));
                if (!isOrderScreen(screen)) return;
                lastEvent = now;
                toast("🔍 Order detected!");
                float[] dist = parseDistances(screen);
                float maxPickup = prefs.getFloat("max_pickup", 2.0f);
                float maxDrop   = prefs.getFloat("max_drop",   5.0f);
                log(String.format("Order: pickup=%.1f drop=%.1f | limit: pickup<=%.1f drop<=%.1f", dist[0], dist[1], maxPickup, maxDrop));
                boolean pickupOk = dist[0] < 0 || dist[0] <= maxPickup;
                boolean dropOk   = dist[1] < 0 || dist[1] <= maxDrop;
                if (pickupOk && dropOk) {
                  log("ACCEPTING - swiping");
                  swipeAccept();
                  prefs.edit().putBoolean("enabled", false).apply();
                  sendBroadcast(new android.content.Intent("JAHEZ_AUTO_OFF"));
                  log("Auto-accept OFF");
                  String msg = "✅ ACCEPTED — Pickup " + fmt(dist[0]) + "km | Drop " + fmt(dist[1]) + "km";
                  toast(msg);
                  saveLog(msg);
                } else {
                  String reason = "";
                  if (!pickupOk) reason += "Pickup " + fmt(dist[0]) + "km > max " + fmt(maxPickup) + "km";
                  if (!dropOk)   reason += (!reason.isEmpty() ? " | " : "") + "Drop " + fmt(dist[1]) + "km > max " + fmt(maxDrop) + "km";
                  log("REJECTED - " + reason);
                  String msg = "❌ SKIP — " + reason;
                  toast(msg);
                  saveLog(msg);
                }
              } finally {
                root.recycle();
              }
            }
            boolean isOrderScreen(String screen) {
              String s = screen.toLowerCase();
              boolean hasOrder = s.contains("new order") || s.contains("طلب جديد") || s.contains("reject") || s.contains("رفض");
              boolean hasAccept = s.contains("accept") || s.contains("قبول");
              return hasOrder && hasAccept;
            }
            float[] parseDistances(String txt) {
              float[] r = {-1f, -1f};
              Matcher m = Pattern.compile("([\\d.]+)\\s*[Kk][Mm]\\s+[Ff]rom\\s+[Yy]ou").matcher(txt);
              if (m.find()) r[0] = safeFloat(m.group(1));
              m = Pattern.compile("([\\d.]+)\\s*[Kk][Mm]\\s+[Ff]rom\\s+[Pp]ickup").matcher(txt);
              if (m.find()) r[1] = safeFloat(m.group(1));
              if (r[0] < 0) {
                m = Pattern.compile("([\\d.]+)\\s*\u0643\u0645\\s+\u0645\u0646\u0643").matcher(txt);
                if (m.find()) r[0] = safeFloat(m.group(1));
              }
              if (r[1] < 0) {
                m = Pattern.compile("([\\d.]+)\\s*\u0643\u0645\\s+\u0645\u0646\\s+\u0646\u0642\u0637\u0629").matcher(txt);
                if (m.find()) r[1] = safeFloat(m.group(1));
              }
              if (r[0] < 0 || r[1] < 0) {
                Matcher km = Pattern.compile("([\\d.]+)\\s*[Kk][Mm]").matcher(txt);
                if (km.find() && r[0] < 0) r[0] = safeFloat(km.group(1));
                if (km.find() && r[1] < 0) r[1] = safeFloat(km.group(1));
              }
              return r;
            }
            void swipeAccept() {
              try {
                int W = getResources().getDisplayMetrics().widthPixels;
                int H = getResources().getDisplayMetrics().heightPixels;
                int duration = 100 + rng.nextInt(151);
                Path path = new Path();
                path.moveTo(W * 0.15f, H * 0.87f);
                path.lineTo(W * 0.85f, H * 0.87f);
                GestureDescription.Builder b = new GestureDescription.Builder();
                b.addStroke(new GestureDescription.StrokeDescription(path, 0, duration));
                dispatchGesture(b.build(), null, null);
                log("Swipe done - duration: " + duration + "ms");
              } catch (Exception e) { log("Swipe error: " + e.getMessage()); }
            }
            String flattenTree(AccessibilityNodeInfo node) {
              if (node == null) return "";
              StringBuilder sb = new StringBuilder();
              Queue<AccessibilityNodeInfo> q = new LinkedList<>();
              q.add(node);
              while (!q.isEmpty()) {
                AccessibilityNodeInfo n = q.poll();
                if (n == null) continue;
                if (n.getText() != null) sb.append(n.getText()).append(" ");
                if (n.getContentDescription() != null) sb.append(n.getContentDescription()).append(" ");
                for (int i = 0; i < n.getChildCount(); i++) {
                  AccessibilityNodeInfo c = n.getChild(i);
                  if (c != null) q.add(c);
                }
              }
              return sb.toString();
            }
            float safeFloat(String s) {
              try { return Float.parseFloat(s.trim()); } catch (Exception e) { return -1f; }
            }
            void saveLog(String msg) {
              java.text.SimpleDateFormat sdf = new java.text.SimpleDateFormat("HH:mm:ss", java.util.Locale.getDefault());
              String entry = "[" + sdf.format(new java.util.Date()) + "]  " + msg;
              String existing = prefs.getString("logs", "");
              String[] lines = existing.isEmpty() ? new String[0] : existing.split("\n");
              StringBuilder sb = new StringBuilder(entry);
              int max = 100; // max 100 entries
              for (int i = 0; i < lines.length && i < max - 1; i++)
                sb.append("\n").append(lines[i]);
              prefs.edit().putString("logs", sb.toString()).apply();
            }
            void toast(final String msg) {
              new Handler(Looper.getMainLooper()).post(() ->
                android.widget.Toast.makeText(getApplicationContext(), msg, android.widget.Toast.LENGTH_LONG).show()
              );
            }
            String fmt(float v) {
              return v < 0 ? "?" : String.format("%.1f", v);
            }
            void log(String msg) { Log.d(TAG, msg); }
            @Override public void onInterrupt() {}
          }
          SEOF

      - name: Write LogActivity
        run: |
          cat > app/src/main/java/com/danish/jahez/LogActivity.java << 'LEOF'
          package com.danish.jahez;
          import android.app.Activity;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.widget.*;
          public class LogActivity extends Activity {
            @Override protected void onCreate(Bundle saved) {
              super.onCreate(saved);
              setContentView(R.layout.activity_log);
              SharedPreferences prefs = getSharedPreferences("cfg", MODE_PRIVATE);
              TextView tvLog = findViewById(R.id.tv_log);
              Button btnClear = findViewById(R.id.btn_clear);
              Button btnBack = findViewById(R.id.btn_back);
              loadLogs(tvLog, prefs);
              btnClear.setOnClickListener(v -> {
                prefs.edit().remove("logs").apply();
                tvLog.setText("Log saaf ho gaya.");
              });
              btnBack.setOnClickListener(v -> finish());
            }
            void loadLogs(TextView tv, SharedPreferences prefs) {
              String logs = prefs.getString("logs", "");
              tv.setText(logs.isEmpty() ? "Abhi koi log nahi hai.\nJahez Fleets mein order aane do." : logs);
            }
          }
          LEOF

      - name: Write Layout
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'LEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:background="#0A0A0A">
            <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
              android:orientation="vertical" android:padding="20dp">
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                android:text="Jahez Auto" android:textSize="30sp" android:textColor="#4CAF50"
                android:textStyle="bold" android:gravity="center" android:layout_marginBottom="4dp"/>
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                android:text="Auto Accept Orders" android:textSize="12sp"
                android:textColor="#666" android:gravity="center" android:layout_marginBottom="20dp"/>
              <TextView android:id="@+id/tv_acc" android:layout_width="match_parent"
                android:layout_height="wrap_content" android:text="Accessibility: OFF"
                android:textSize="14sp" android:textColor="#FF9800"
                android:gravity="center" android:layout_marginBottom="6dp"/>
              <TextView android:id="@+id/tv_status" android:layout_width="match_parent"
                android:layout_height="wrap_content" android:text="AUTO ACCEPT: OFF"
                android:textSize="20sp" android:textColor="#FF5555"
                android:textStyle="bold" android:gravity="center" android:layout_marginBottom="28dp"/>
              <View android:layout_width="match_parent" android:layout_height="1dp"
                android:background="#222" android:layout_marginBottom="20dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                android:text="Max Pickup Distance (Km From You)"
                android:textColor="#AAA" android:textSize="13sp" android:layout_marginBottom="4dp"/>
              <EditText android:id="@+id/et_pickup" android:layout_width="match_parent"
                android:layout_height="56dp" android:inputType="numberDecimal" android:text="2.0"
                android:textColor="#FFF" android:textSize="22sp" android:background="#1A1A1A"
                android:padding="12dp" android:layout_marginBottom="16dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                android:text="Max Drop Distance (Km From Pickup)"
                android:textColor="#AAA" android:textSize="13sp" android:layout_marginBottom="4dp"/>
              <EditText android:id="@+id/et_drop" android:layout_width="match_parent"
                android:layout_height="56dp" android:inputType="numberDecimal" android:text="5.0"
                android:textColor="#FFF" android:textSize="22sp" android:background="#1A1A1A"
                android:padding="12dp" android:layout_marginBottom="20dp"/>
              <Button android:id="@+id/btn_save" android:layout_width="match_parent"
                android:layout_height="54dp" android:text="Save Settings"
                android:backgroundTint="#2196F3" android:textColor="#FFF"
                android:textStyle="bold" android:layout_marginBottom="12dp"/>
              <Switch android:id="@+id/sw_enable" android:layout_width="wrap_content"
                android:layout_height="wrap_content" android:text="  Enable Auto Accept"
                android:textColor="#FFF" android:textSize="16sp"
                android:layout_gravity="center_horizontal" android:layout_marginBottom="20dp"/>
              <Button android:id="@+id/btn_acc" android:layout_width="match_parent"
                android:layout_height="58dp" android:text="Open Accessibility Settings"
                android:backgroundTint="#FF9800" android:textColor="#000"
                android:textStyle="bold" android:layout_marginBottom="12dp"/>
              <Button android:id="@+id/btn_logs" android:layout_width="match_parent"
                android:layout_height="54dp" android:text="📋  View Logs"
                android:backgroundTint="#333" android:textColor="#FFF"
                android:textStyle="bold" android:layout_marginBottom="20dp"/>
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                android:text="1. Open Accessibility Settings\n2. Find Jahez Auto and enable\n3. Set distances, Save, toggle ON\n4. Open Jahez Fleets - orders auto accept!"
                android:textColor="#555" android:textSize="12sp"
                android:gravity="center" android:lineSpacingExtra="4dp"/>
            </LinearLayout>
          </ScrollView>
          LEOF

          cat > app/src/main/res/layout/activity_log.xml << 'LOGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:orientation="vertical" android:background="#0A0A0A" android:padding="16dp">
            <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
              android:text="Activity Log" android:textSize="22sp" android:textColor="#4CAF50"
              android:textStyle="bold" android:layout_marginBottom="12dp"/>
            <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
              android:orientation="horizontal" android:layout_marginBottom="12dp">
              <Button android:id="@+id/btn_back" android:layout_width="0dp"
                android:layout_height="46dp" android:layout_weight="1"
                android:text="Back" android:backgroundTint="#333"
                android:textColor="#FFF" android:layout_marginEnd="8dp"/>
              <Button android:id="@+id/btn_clear" android:layout_width="0dp"
                android:layout_height="46dp" android:layout_weight="1"
                android:text="Clear" android:backgroundTint="#B71C1C"
                android:textColor="#FFF"/>
            </LinearLayout>
            <ScrollView android:layout_width="match_parent" android:layout_height="match_parent">
              <TextView android:id="@+id/tv_log" android:layout_width="match_parent"
                android:layout_height="wrap_content" android:text="Loading..."
                android:textColor="#CCC" android:textSize="13sp"
                android:fontFamily="monospace" android:lineSpacingExtra="6dp"
                android:padding="8dp" android:background="#111"/>
            </ScrollView>
          </LinearLayout>
          LOGEOF

      - name: Write Resources
        run: |
          cat > app/src/main/res/values/strings.xml << 'REOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">Jahez Auto</string>
            <string name="acc_desc">Auto accepts Jahez Fleets orders by distance filters</string>
          </resources>
          REOF

          cat > app/src/main/res/values/themes.xml << 'TEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.DayNight.NoActionBar">
              <item name="colorPrimary">#4CAF50</item>
              <item name="colorPrimaryDark">#388E3C</item>
              <item name="colorAccent">#FF9800</item>
            </style>
          </resources>
          TEOF

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon 2>&1

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore /tmp/key.keystore -alias jahez \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Danish,O=JahezAuto,C=SA" \
            -storepass danish123 -keypass danish123 2>/dev/null
          APK=$(find app/build -name "*release-unsigned*.apk" | head -1)
          if [ -z "$APK" ]; then APK=$(find app/build -name "*release*.apk" | head -1); fi
          echo "Signing: $APK"
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" -type f | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then echo "apksigner not found!"; exit 1; fi
          echo "Using: $APKSIGNER"
          $APKSIGNER sign --ks /tmp/key.keystore --ks-key-alias jahez \
            --ks-pass pass:danish123 --key-pass pass:danish123 \
            --out app/build/JahezAutoAccept.apk "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JahezAutoAccept
          path: |
            app/build/JahezAutoAccept.apk
            app/build/outputs/apk/**/*.apk
