name: Build Jahez Order Simulator
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Project
        run: |
          mkdir -p app/src/main/java/com/ordersimulator
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          echo "include ':app'" > settings.gradle

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.ordersimulator'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.ordersimulator'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Order Simulator"
                  android:theme="@style/Theme.AppCompat">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="purple_200">#FFBB86FC</color>
              <color name="purple_500">#FF6200EE</color>
              <color name="purple_700">#FF3700B3</color>
              <color name="teal_200">#FF03DAC5</color>
              <color name="teal_700">#FF018786</color>
              <color name="black">#FF000000</color>
              <color name="white">#FFFFFFFF</color>
          </resources>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Order Simulator</string>
          </resources>
          EOF

          cat > app/src/main/res/drawable/green_button.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#4CAF50"/>
              <corners android:radius="30dp"/>
              <stroke android:width="2dp" android:color="#388E3C"/>
          </shape>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="#121212"
              android:padding="20dp">

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="📦 Jahez Order Simulator"
                  android:textSize="22sp"
                  android:textColor="#FFFFFF"
                  android:textStyle="bold"
                  android:layout_gravity="center"
                  android:layout_marginTop="20dp"
                  android:layout_marginBottom="10dp"/>

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Training Mode"
                  android:textSize="14sp"
                  android:textColor="#AAAAAA"
                  android:layout_gravity="center"
                  android:layout_marginBottom="30dp"/>

              <!-- Order Card -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:background="#1E1E1E"
                  android:padding="20dp"
                  android:layout_marginBottom="20dp">

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="🆕 NEW ORDER"
                      android:textSize="16sp"
                      android:textColor="#FF9800"
                      android:textStyle="bold"
                      android:layout_marginBottom="15dp"/>

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="JAHEZ"
                      android:textSize="18sp"
                      android:textColor="#4CAF50"
                      android:textStyle="bold"
                      android:layout_marginBottom="10dp"/>

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="₪ 10.0"
                      android:textSize="16sp"
                      android:textColor="#FFFFFF"
                      android:layout_marginBottom="15dp"/>

                  <TextView
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Pick-up from Al Thumamah Rd."
                      android:textSize="14sp"
                      android:textColor="#DDDDDD"
                      android:layout_marginBottom="5dp"/>

                  <TextView
                      android:id="@+id/tv_pickup_distance"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="1.6 Km From You"
                      android:textSize="14sp"
                      android:textColor="#FF9800"
                      android:layout_marginBottom="10dp"/>

                  <TextView
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Drop off at Al Aqiq, Riyadh"
                      android:textSize="14sp"
                      android:textColor="#DDDDDD"
                      android:layout_marginBottom="5dp"/>

                  <TextView
                      android:id="@+id/tv_drop_distance"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="2.9 Km From Pickup"
                      android:textSize="14sp"
                      android:textColor="#FF9800"
                      android:layout_marginBottom="20dp"/>

                  <!-- Swipe Button -->
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="60dp"
                      android:background="@drawable/green_button"
                      android:orientation="horizontal"
                      android:gravity="center_vertical">

                      <TextView
                          android:id="@+id/tv_swipe_status"
                          android:layout_width="0dp"
                          android:layout_height="match_parent"
                          android:layout_weight="1"
                          android:text="     Swipe to Accept →"
                          android:textSize="16sp"
                          android:textColor="#FFFFFF"
                          android:textStyle="bold"
                          android:gravity="center_vertical"/>

                      <TextView
                          android:id="@+id/tv_swipe_arrow"
                          android:layout_width="50dp"
                          android:layout_height="match_parent"
                          android:text="→→"
                          android:textSize="20sp"
                          android:textColor="#FFFFFF"
                          android:gravity="center"
                          android:background="#388E3C"/>

                  </LinearLayout>

              </LinearLayout>

              <!-- Status -->
              <TextView
                  android:id="@+id/tv_order_status"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="⏳ Waiting for swipe..."
                  android:textSize="16sp"
                  android:textColor="#FF9800"
                  android:gravity="center"
                  android:layout_marginBottom="20dp"/>

              <!-- Buttons -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal">

                  <Button
                      android:id="@+id/btn_new_order"
                      android:layout_width="0dp"
                      android:layout_height="50dp"
                      android:layout_weight="1"
                      android:text="🔄 New Order"
                      android:textSize="14sp"
                      android:backgroundTint="#2196F3"
                      android:layout_marginEnd="10dp"/>

                  <Button
                      android:id="@+id/btn_reset"
                      android:layout_width="0dp"
                      android:layout_height="50dp"
                      android:layout_weight="1"
                      android:text="🔁 Reset"
                      android:textSize="14sp"
                      android:backgroundTint="#F44336"/>

              </LinearLayout>

              <TextView
                  android:id="@+id/tv_instruction"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="💡 Instruction:\n1. Order accept karne ke liye green button ko LEFT se RIGHT swipe karein\n2. Accept ho jayega\n3. New Order ke liye 'New Order' button dabayein"
                  android:textSize="12sp"
                  android:textColor="#666666"
                  android:layout_marginTop="20dp"
                  android:lineSpacingExtra="4dp"/>

          </LinearLayout>
          EOF

          cat > app/src/main/java/com/ordersimulator/MainActivity.java << 'EOF'
          package com.ordersimulator;

          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.MotionEvent;
          import android.view.View;
          import android.widget.Button;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import java.util.Random;

          public class MainActivity extends AppCompatActivity {

              private TextView tvPickupDistance, tvDropDistance, tvOrderStatus, tvSwipeStatus;
              private LinearLayout swipeButton;
              private Button btnNewOrder, btnReset;
              private Handler handler = new Handler(Looper.getMainLooper());
              private boolean isOrderAccepted = false;
              private float startX = 0;
              private Random random = new Random();

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  tvPickupDistance = findViewById(R.id.tv_pickup_distance);
                  tvDropDistance = findViewById(R.id.tv_drop_distance);
                  tvOrderStatus = findViewById(R.id.tv_order_status);
                  tvSwipeStatus = findViewById(R.id.tv_swipe_status);
                  swipeButton = findViewById(R.id.tv_swipe_arrow);
                  btnNewOrder = findViewById(R.id.btn_new_order);
                  btnReset = findViewById(R.id.btn_reset);

                  generateRandomOrder();

                  // Swipe detection on green button area
                  findViewById(R.id.tv_swipe_arrow).setOnTouchListener(new View.OnTouchListener() {
                      private float startX = 0;
                      private boolean isSwiping = false;

                      @Override
                      public boolean onTouch(View v, MotionEvent event) {
                          if (isOrderAccepted) {
                              Toast.makeText(MainActivity.this, "Order already accepted! Press New Order", Toast.LENGTH_SHORT).show();
                              return true;
                          }

                          switch (event.getAction()) {
                              case MotionEvent.ACTION_DOWN:
                                  startX = event.getRawX();
                                  isSwiping = true;
                                  tvSwipeStatus.setText("     →→→ Swipe →→→");
                                  return true;

                              case MotionEvent.ACTION_MOVE:
                                  if (isSwiping) {
                                      float deltaX = event.getRawX() - startX;
                                      if (deltaX > 100) {
                                          acceptOrder();
                                          isSwiping = false;
                                      }
                                  }
                                  return true;

                              case MotionEvent.ACTION_UP:
                                  isSwiping = false;
                                  tvSwipeStatus.setText("     Swipe to Accept →");
                                  return true;
                          }
                          return false;
                      }
                  });

                  btnNewOrder.setOnClickListener(v -> {
                      if (isOrderAccepted) {
                          generateRandomOrder();
                          isOrderAccepted = false;
                          tvOrderStatus.setText("⏳ Waiting for swipe...");
                          tvOrderStatus.setTextColor(0xFFFF9800);
                          tvSwipeStatus.setText("     Swipe to Accept →");
                          Toast.makeText(this, "New order generated!", Toast.LENGTH_SHORT).show();
                      } else {
                          generateRandomOrder();
                          Toast.makeText(this, "New random order generated!", Toast.LENGTH_SHORT).show();
                      }
                  });

                  btnReset.setOnClickListener(v -> {
                      isOrderAccepted = false;
                      tvOrderStatus.setText("⏳ Waiting for swipe...");
                      tvOrderStatus.setTextColor(0xFFFF9800);
                      tvSwipeStatus.setText("     Swipe to Accept →");
                      Toast.makeText(this, "Reset! Swipe to accept", Toast.LENGTH_SHORT).show();
                  });
              }

              private void generateRandomOrder() {
                  // Pickup distance: 0.1 to 2.0 km
                  float pickupKm = 0.1f + random.nextFloat() * 1.9f;
                  pickupKm = Math.round(pickupKm * 10) / 10.0f;
                  
                  // Drop distance: 0.1 to 5.0 km
                  float dropKm = 0.1f + random.nextFloat() * 4.9f;
                  dropKm = Math.round(dropKm * 10) / 10.0f;
                  
                  String[] pickupLocations = {"Al Thumamah Rd.", "King Fahd Rd.", "Olaya St.", "Tahlia St.", "Al Aqiq"};
                  String[] dropLocations = {"Al Aqiq", "Al Malaz", "Al Rawabi", "Al Nakheel", "Al Yasmin"};
                  
                  String pickupLocation = pickupLocations[random.nextInt(pickupLocations.length)];
                  String dropLocation = dropLocations[random.nextInt(dropLocations.length)];
                  
                  tvPickupDistance.setText(pickupKm + " Km From You");
                  tvDropDistance.setText(dropKm + " Km From Pickup");
                  
                  // Update the address text in the layout
                  TextView pickupAddr = findViewById(android.R.id.text1);
                  TextView dropAddr = findViewById(android.R.id.text2);
                  
                  // Store distances for acceptance check
                  getIntent().putExtra("pickup", pickupKm);
                  getIntent().putExtra("drop", dropKm);
              }

              private void acceptOrder() {
                  isOrderAccepted = true;
                  float pickup = getIntent().getFloatExtra("pickup", 0);
                  float drop = getIntent().getFloatExtra("drop", 0);
                  
                  tvOrderStatus.setText("✅ ORDER ACCEPTED! ✅\nPickup: " + pickup + " km | Drop: " + drop + " km");
                  tvOrderStatus.setTextColor(0xFF4CAF50);
                  tvSwipeStatus.setText("     ✓ Accepted ✓");
                  
                  Toast.makeText(this, "🎉 Order Accepted! Press New Order for next", Toast.LENGTH_LONG).show();
              }
          }
          EOF

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Order-Simulator
          path: app/build/outputs/apk/debug/*.apk
