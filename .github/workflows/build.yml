name: Build Danish Auto Module
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build LSPosed Module
        run: |
          mkdir -p app/src/main/java/com/danish/auto
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          mkdir -p app/libs
          mkdir -p gradle/wrapper

          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          echo "include ':app'" > settings.gradle

          # ---- FIX: Download Xposed API jar directly (no base64) ----
          curl -L -o app/libs/api-82.jar "https://repo1.maven.org/maven2/de/robv/android/xposed/api/82/api-82.jar"
          # Verify JAR
          jar tf app/libs/api-82.jar > /dev/null || { echo "JAR corrupt"; exit 1; }

          # ---- Your original base64 for MainHook (keep as is, assuming it's correct) ----
          echo "" | base64 -d > app/src/main/java/com/danish/auto/MainHook.java

          # ---- Your remaining original code continues ----
          cat > gradle.properties << 'GEOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          GEOF

          cat > build.gradle << 'GEOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          GEOF

          cat > app/build.gradle << 'GEOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.danish.auto'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.danish.auto'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              compileOnly files('libs/api-82.jar')
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          GEOF

          cat > app/src/main/AndroidManifest.xml << 'GEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <application android:label="Danish Auto" android:theme="@android:style/Theme.DeviceDefault">
                  <meta-data android:name="xposedmodule" android:value="true" />
                  <meta-data android:name="xposeddescription" android:value="Auto Accept Orders" />
                  <meta-data android:name="xposedminversion" android:value="82" />
                  <activity android:name=".SettingsActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <activity android:name=".PopupActivity"
                      android:theme="@android:style/Theme.DeviceDefault.Dialog"
                      android:excludeFromRecents="true"
                      android:exported="false" />
              </application>
          </manifest>
          GEOF

          cat > app/src/main/res/values/strings.xml << 'GEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">Danish Auto</string></resources>
          GEOF

          cat > app/src/main/res/layout/activity_settings.xml << 'GEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent">
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:orientation="vertical" android:padding="20dp" android:background="#121212">
                  <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:text="Danish Auto" android:textSize="26sp" android:textColor="#1DB954"
                      android:textStyle="bold" android:gravity="center" android:layout_marginBottom="8dp"/>
                  <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:text="LSPosed Hook Mode" android:textSize="12sp"
                      android:textColor="#888888" android:gravity="center" android:layout_marginBottom="24dp"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Pickup Max (km)" android:textColor="#AAAAAA"/>
                  <EditText android:id="@+id/et_pickup" android:layout_width="match_parent"
                      android:layout_height="55dp" android:inputType="numberDecimal"
                      android:text="1.5" android:textColor="#FFFFFF" android:background="#333333"
                      android:padding="10dp" android:layout_marginBottom="15dp"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Drop Max (km)" android:textColor="#AAAAAA"/>
                  <EditText android:id="@+id/et_drop" android:layout_width="match_parent"
                      android:layout_height="55dp" android:inputType="numberDecimal"
                      android:text="3.5" android:textColor="#FFFFFF" android:background="#333333"
                      android:padding="10dp" android:layout_marginBottom="20dp"/>
                  <Switch android:id="@+id/switch_enabled" android:layout_width="wrap_content"
                      android:layout_height="wrap_content" android:text="Auto Accept ON/OFF"
                      android:textColor="#FFFFFF" android:layout_marginBottom="20dp"/>
                  <Button android:id="@+id/btn_save" android:layout_width="match_parent"
                      android:layout_height="55dp" android:text="SAVE" android:backgroundTint="#1DB954"/>
                  <TextView android:id="@+id/tv_status" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:text="Status: Check LSPosed logs"
                      android:textColor="#888888" android:gravity="center" android:layout_marginTop="20dp"/>
              </LinearLayout>
          </ScrollView>
          GEOF

          cat > app/src/main/res/layout/activity_popup.xml << 'GEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="wrap_content"
              android:orientation="vertical" android:padding="24dp" android:background="#1E1E1E">
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:text="Order Accepted!" android:textSize="22sp" android:textColor="#4CAF50"
                  android:textStyle="bold" android:gravity="center" android:layout_marginBottom="16dp"/>
              <TextView android:id="@+id/tv_pickup" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="Pickup: -- km"
                  android:textSize="16sp" android:textColor="#FFFFFF"/>
              <TextView android:id="@+id/tv_drop" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="Drop: -- km"
                  android:textSize="16sp" android:textColor="#FFFFFF" android:layout_marginBottom="20dp"/>
              <Button android:id="@+id/btn_ok" android:layout_width="match_parent"
                  android:layout_height="45dp" android:text="OK" android:backgroundTint="#4CAF50"/>
          </LinearLayout>
          GEOF

          cat > app/src/main/assets/xposed_init << 'GEOF'
          com.danish.auto.MainHook
          GEOF

          cat > app/src/main/java/com/danish/auto/SettingsActivity.java << 'GEOF'
          package com.danish.auto;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          public class SettingsActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  setContentView(R.layout.activity_settings);
                  SharedPreferences pr = getSharedPreferences("danish_prefs", MODE_PRIVATE);
                  EditText etP = findViewById(R.id.et_pickup);
                  EditText etD = findViewById(R.id.et_drop);
                  Switch sw    = findViewById(R.id.switch_enabled);
                  TextView tvS = findViewById(R.id.tv_status);
                  etP.setText(String.valueOf(pr.getFloat("pickup_max", 1.5f)));
                  etD.setText(String.valueOf(pr.getFloat("drop_max", 3.5f)));
                  sw.setChecked(pr.getBoolean("enabled", false));
                  tvS.setText(sw.isChecked() ? "Status: Active" : "Status: Disabled");
                  findViewById(R.id.btn_save).setOnClickListener(v -> {
                      try {
                          pr.edit()
                              .putFloat("pickup_max", Float.parseFloat(etP.getText().toString()))
                              .putFloat("drop_max",   Float.parseFloat(etD.getText().toString()))
                              .putBoolean("enabled",  sw.isChecked())
                              .apply();
                          tvS.setText(sw.isChecked() ? "Status: Active" : "Status: Disabled");
                          Toast.makeText(this, "Saved! Restart Jahez.", Toast.LENGTH_LONG).show();
                      } catch (Exception e) {
                          Toast.makeText(this, "Invalid values!", Toast.LENGTH_SHORT).show();
                      }
                  });
              }
          }
          GEOF

          cat > app/src/main/java/com/danish/auto/PopupActivity.java << 'GEOF'
          package com.danish.auto;
          import android.os.Bundle;
          import android.os.Handler;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;
          public class PopupActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  setContentView(R.layout.activity_popup);
                  float pk = getIntent().getFloatExtra("pickup", 0);
                  float dr = getIntent().getFloatExtra("drop", 0);
                  ((TextView) findViewById(R.id.tv_pickup)).setText("Pickup: " + pk + " km");
                  ((TextView) findViewById(R.id.tv_drop)).setText("Drop:   " + dr + " km");
                  findViewById(R.id.btn_ok).setOnClickListener(v -> finish());
                  new Handler().postDelayed(this::finish, 5000);
              }
          }
          GEOF

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Danish-Auto-Module
          path: app/build/outputs/apk/debug/*.apk
