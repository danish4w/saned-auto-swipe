name: Build Saned Auto Swipe
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: |
          # Folder structure setup
          mkdir -p app/src/main/java/com/saned/autoswipe
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          
          # Gradle files generation
          gradle wrapper --gradle-version 8.2

          # Build Scripts
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath "com.android.tools.build:gradle:8.1.0"; classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.20" }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          echo 'include ":app"' > settings.gradle

          cat <<EOF > app/build.gradle
          plugins { id "com.android.application"; id "org.jetbrains.kotlin.android" }
          android {
              namespace "com.saned.autoswipe"
              compileSdk 34
              defaultConfig { applicationId "com.saned.autoswipe"; minSdk 26; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          dependencies {
              implementation "androidx.appcompat:appcompat:1.6.1"
              implementation "com.google.android.material:material:1.9.0"
          }
          EOF

          # Android Resources
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/><application android:label="Saned Auto" android:theme="@style/Theme.AppCompat.Light.NoActionBar"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity><service android:name=".AutoSwipeService" android:exported="true" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"><intent-filter><action android:name="android.accessibilityservice.AccessibilityService"/></intent-filter><meta-data android:name="android.accessibilityservice" android:resource="@xml/acc_config"/></service></application></manifest>' > app/src/main/AndroidManifest.xml
          echo '<?xml version="1.0" encoding="utf-8"?><accessibility-service xmlns:android="http://schemas.android.com/apk/res/android" android:accessibilityEventTypes="typeWindowStateChanged" android:accessibilityFeedbackType="feedbackGeneric" android:canPerformGestures="true" />' > app/src/main/res/xml/acc_config.xml
          echo '<?xml version="1.0" encoding="utf-8"?><LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:gravity="center"><Button android:id="@+id/btn" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Start"/></LinearLayout>' > app/src/main/res/layout/activity_main.xml

          # Code Files
          cat <<EOF > app/src/main/java/com/saned/autoswipe/MainActivity.kt
          package com.saned.autoswipe
          import android.content.Intent
          import android.os.Bundle
          import android.provider.Settings
          import android.widget.Button
          import androidx.appcompat.app.AppCompatActivity
          class MainActivity : AppCompatActivity() {
              override fun onCreate(s: Bundle?) {
                  super.onCreate(s)
                  setContentView(R.layout.activity_main)
                  findViewById<Button>(R.id.btn).setOnClickListener {
                      startActivity(Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS))
                  }
              }
          }
          EOF

          cat <<EOF > app/src/main/java/com/saned/autoswipe/AutoSwipeService.kt
          package com.saned.autoswipe
          import android.accessibilityservice.AccessibilityService
          import android.view.accessibility.AccessibilityEvent
          class AutoSwipeService : AccessibilityService() {
              override fun onAccessibilityEvent(e: AccessibilityEvent?) {}
              override fun onInterrupt() {}
          }
          EOF

          chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Saned-AutoSwipe-Stable
          path: app/build/outputs/apk/debug/*.apk
