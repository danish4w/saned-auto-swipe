TEOF

      # ── Build ─────────────────────────────────────────────────────────
      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon 2>&1

      # ── Sign ──────────────────────────────────────────────────────────
      - name: Sign APK
        run: |
          keytool -genkey -v \
            -keystore /tmp/key.keystore \
            -alias jahez \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Danish,O=JahezAuto,C=SA" \
            -storepass danish123 -keypass danish123 2>/dev/null

          APK=$(find app/build -name "*release-unsigned*.apk" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find app/build -name "*release*.apk" | head -1)
          fi
          echo "Signing: $APK"

          apksigner sign \
            --ks /tmp/key.keystore \
            --ks-key-alias jahez \
            --ks-pass pass:danish123 \
            --key-pass pass:danish123 \
            --out app/build/JahezAutoAccept.apk \
            "$APK"

          echo "✅ Signed APK: app/build/JahezAutoAccept.apk"

      # ── Upload ────────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JahezAutoAccept
          path: |
            app/build/JahezAutoAccept.apk
            app/build/outputs/apk/**/*.apk
