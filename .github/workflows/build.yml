          package com.rootautoswipe;

          import android.content.*;
          import android.os.Build;
          import android.os.Bundle;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;

          public class LogActivity extends AppCompatActivity {
              private TextView tvLogs;
              private ScrollView scrollView;
              private final BroadcastReceiver receiver = new BroadcastReceiver() {
                  @Override public void onReceive(Context ctx, Intent intent) {
                      String msg = intent.getStringExtra("log_msg");
                      if (msg==null||tvLogs==null) return;
                      tvLogs.append("\n"+msg);
                      if (scrollView!=null) scrollView.post(()->scrollView.fullScroll(ScrollView.FOCUS_DOWN));
                  }
              };
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_log);
                  tvLogs=findViewById(R.id.tv_logs); scrollView=findViewById(R.id.log_scroll);
                  ((Button)findViewById(R.id.btn_clear)).setOnClickListener(v->tvLogs.setText("--- Cleared ---"));
                  IntentFilter f = new IntentFilter("RAS_LOG_ACTION");
                  if (Build.VERSION.SDK_INT>=Build.VERSION_CODES.TIRAMISU) registerReceiver(receiver,f,Context.RECEIVER_NOT_EXPORTED);
                  else if (Build.VERSION.SDK_INT>=Build.VERSION_CODES.O) registerReceiver(receiver,f,Context.RECEIVER_EXPORTED);
                  else registerReceiver(receiver,f);
              }
              @Override protected void onDestroy() { super.onDestroy(); unregisterReceiver(receiver); }
          }
