name: Build Danish Auto Module
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build LSPosed Module
        run: |
          mkdir -p app/src/main/java/com/danish/auto
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          mkdir -p app/libs
          mkdir -p gradle/wrapper

          # Download Gradle Wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          echo "include ':app'" > settings.gradle

          # ----- FIXED: Stable Maven Link for Xposed API -----
          curl -L "https://repo1.maven.org/maven2/de/robv/android/xposed/api/82/api-82.jar" -o app/libs/api-82.jar
          
          # Verify jar
          jar tf app/libs/api-82.jar > /dev/null || { echo "Download Failed or Corrupt"; exit 1; }

          # ----- Gradle Configuration -----
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.danish.auto'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.danish.auto'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              compileOnly files('libs/api-82.jar')
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # ----- AndroidManifest -----
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Danish Auto" android:theme="@android:style/Theme.DeviceDefault">
                  <meta-data android:name="xposedmodule" android:value="true" />
                  <meta-data android:name="xposeddescription" android:value="Auto Accept Orders" />
                  <meta-data android:name="xposedminversion" android:value="82" />
                  <activity android:name=".SettingsActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <activity android:name=".PopupActivity" android:theme="@android:style/Theme.DeviceDefault.Dialog"
                      android:excludeFromRecents="true" android:exported="false" />
              </application>
          </manifest>
          EOF

          # ----- Java Source Code -----
          # SettingsActivity
          cat > app/src/main/java/com/danish/auto/SettingsActivity.java << 'EOF'
          package com.danish.auto;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          public class SettingsActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  setContentView(R.layout.activity_settings);
                  SharedPreferences pr = getSharedPreferences("danish_prefs", MODE_PRIVATE);
                  EditText etP = findViewById(R.id.et_pickup);
                  EditText etD = findViewById(R.id.et_drop);
                  Switch sw = findViewById(R.id.switch_enabled);
                  etP.setText(String.valueOf(pr.getFloat("pickup_max", 1.5f)));
                  etD.setText(String.valueOf(pr.getFloat("drop_max", 3.5f)));
                  sw.setChecked(pr.getBoolean("enabled", false));
                  findViewById(R.id.btn_save).setOnClickListener(v -> {
                      pr.edit().putFloat("pickup_max", Float.parseFloat(etP.getText().toString()))
                               .putFloat("drop_max", Float.parseFloat(etD.getText().toString()))
                               .putBoolean("enabled", sw.isChecked()).apply();
                      Toast.makeText(this, "Saved", Toast.LENGTH_SHORT).show();
                  });
              }
          }
          EOF

          # PopupActivity
          cat > app/src/main/java/com/danish/auto/PopupActivity.java << 'EOF'
          package com.danish.auto;
          import android.os.Bundle;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;
          public class PopupActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  setContentView(R.layout.activity_popup);
                  float pk = getIntent().getFloatExtra("pickup", 0);
                  float dr = getIntent().getFloatExtra("drop", 0);
                  ((TextView) findViewById(R.id.tv_pickup)).setText("Pickup: " + pk + " km");
                  ((TextView) findViewById(R.id.tv_drop)).setText("Drop: " + dr + " km");
                  findViewById(R.id.btn_ok).setOnClickListener(v -> finish());
              }
          }
          EOF

          # MainHook
          cat > app/src/main/java/com/danish/auto/MainHook.java << 'EOF'
          package com.danish.auto;

          import android.app.Activity;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.TextView;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;

          public class MainHook implements de.robv.android.xposed.IXposedHookLoadPackage {
              private static SharedPreferences prefs;

              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable {
                  if (!lpparam.packageName.equals("net.jahez.fleets")) return;

                  Class<?> orderActivity = XposedHelpers.findClass("net.jahez.fleets.dispatch.accept.IncomingDispatchActivity", lpparam.classLoader);
                  XposedHelpers.findAndHookMethod(orderActivity, "onResume", new XC_MethodHook() {
                      @Override
                      protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                          Activity act = (Activity) param.thisObject;
                          if (prefs == null) prefs = act.getSharedPreferences("danish_prefs", Context.MODE_PRIVATE);
                          if (!prefs.getBoolean("enabled", false)) return;

                          float[] distances = extractDistances(act);
                          float pickup = distances[0], drop = distances[1];
                          float pMax = prefs.getFloat("pickup_max", 1.5f), dMax = prefs.getFloat("drop_max", 3.5f);

                          if (pickup > 0 && drop > 0 && pickup <= pMax && drop <= dMax) {
                              clickAccept(act);
                              showPopupAndNotification(act, pickup, drop);
                          }
                      }
                  });
              }

              private float[] extractDistances(Activity act) {
                  List<Float> list = new ArrayList<>();
                  scanView(act.getWindow().getDecorView(), list);
                  if (list.size() >= 2) return new float[]{list.get(0), list.get(1)};
                  return new float[]{-1, -1};
              }

              private void scanView(View v, List<Float> out) {
                  if (v instanceof TextView) {
                      Matcher m = Pattern.compile("(\\d+\\.?\\d*)\\s*[Kk][Mm]").matcher(((TextView) v).getText().toString());
                      if (m.find()) {
                          try { float val = Float.parseFloat(m.group(1)); if (!out.contains(val)) out.add(val); } catch (Exception e) {}
                      }
                  } else if (v instanceof ViewGroup) {
                      for (int i = 0; i < ((ViewGroup) v).getChildCount(); i++) scanView(((ViewGroup) v).getChildAt(i), out);
                  }
              }

              private void clickAccept(Activity act) {
                  View btn = findBtn(act.getWindow().getDecorView());
                  if (btn != null) btn.performClick();
              }

              private View findBtn(View v) {
                  if (v instanceof TextView) {
                      String t = ((TextView) v).getText().toString();
                      if (t.equalsIgnoreCase("Accept") || t.equals("قبول")) return v;
                  }
                  if (v instanceof ViewGroup) {
                      for (int i = 0; i < ((ViewGroup) v).getChildCount(); i++) {
                          View f = findBtn(((ViewGroup) v).getChildAt(i));
                          if (f != null) return f;
                      }
                  }
                  return null;
              }

              private void showPopupAndNotification(Context ctx, float p, float d) {
                  try {
                      Intent popup = new Intent(ctx, PopupActivity.class);
                      popup.putExtra("pickup", p).putExtra("drop", d).addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      ctx.startActivity(popup);
                      
                      NotificationManager nm = (NotificationManager) ctx.getSystemService(Context.NOTIFICATION_SERVICE);
                      if (android.os.Build.VERSION.SDK_INT >= 26) {
                          nm.createNotificationChannel(new NotificationChannel("d_ch", "Danish", NotificationManager.IMPORTANCE_HIGH));
                      }
                      nm.notify(1, new Notification.Builder(ctx, "d_ch")
                          .setContentTitle("Order Accepted").setContentText("P:"+p+" D:"+d)
                          .setSmallIcon(android.R.drawable.ic_dialog_info).setAutoCancel(true).build());
                  } catch (Exception e) {}
              }
          }
          EOF

          # ----- Resources & Assets -----
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">Danish Auto</string></resources>
          EOF

          cat > app/src/main/res/layout/activity_settings.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:padding="20dp" android:background="#121212">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="Danish Auto" android:textSize="26sp" android:textColor="#1DB954"
                  android:layout_gravity="center" android:layout_marginBottom="20dp"/>
              <EditText android:id="@+id/et_pickup" android:layout_width="match_parent"
                  android:layout_height="55dp" android:hint="Max Pickup" android:textColor="#FFFFFF" android:background="#333333" android:layout_marginBottom="10dp"/>
              <EditText android:id="@+id/et_drop" android:layout_width="match_parent"
                  android:layout_height="55dp" android:hint="Max Drop" android:textColor="#FFFFFF" android:background="#333333" android:layout_marginBottom="10dp"/>
              <Switch android:id="@+id/switch_enabled" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="Auto Accept" android:textColor="#FFFFFF" android:layout_marginBottom="20dp"/>
              <Button android:id="@+id/btn_save" android:layout_width="match_parent" android:layout_height="55dp" android:text="SAVE"/>
          </LinearLayout>
          EOF

          cat > app/src/main/res/layout/activity_popup.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="wrap_content"
              android:orientation="vertical" android:padding="20dp" android:background="#1E1E1E">
              <TextView android:id="@+id/tv_pickup" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#FFFFFF"/>
              <TextView android:id="@+id/tv_drop" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#FFFFFF"/>
              <Button android:id="@+id/btn_ok" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="OK"/>
          </LinearLayout>
          EOF

          cat > app/src/main/assets/xposed_init << 'EOF'
          com.danish.auto.MainHook
          EOF

          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Danish-Auto-Module
          path: app/build/outputs/apk/debug/*.apk
