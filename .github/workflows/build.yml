name: Build Jahez Simulator Final
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Project
        run: |
          mkdir -p app/src/main/java/com/jahezsimulator
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          echo "include ':app'" > settings.gradle

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.jahezsimulator'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.jahezsimulator'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Jahez Simulator"
                  android:theme="@style/Theme.AppCompat">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Jahez Simulator</string>
          </resources>
          EOF

          cat > app/src/main/res/layout/popup_layout.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="wrap_content"
              android:orientation="vertical"
              android:background="#1E1E1E"
              android:padding="20dp"
              android:elevation="10dp">

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="🆕 NEW ORDER"
                  android:textSize="18sp"
                  android:textColor="#FF9800"
                  android:textStyle="bold"
                  android:layout_gravity="center"
                  android:layout_marginBottom="15dp"/>

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="JAHEZ"
                  android:textSize="22sp"
                  android:textColor="#4CAF50"
                  android:textStyle="bold"
                  android:layout_gravity="center"
                  android:layout_marginBottom="10dp"/>

              <TextView
                  android:id="@+id/popup_pickup"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Pickup: -- km"
                  android:textSize="14sp"
                  android:textColor="#FFFFFF"
                  android:layout_marginBottom="8dp"/>

              <TextView
                  android:id="@+id/popup_drop"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Drop: -- km"
                  android:textSize="14sp"
                  android:textColor="#FFFFFF"
                  android:layout_marginBottom="15dp"/>

              <TextView
                  android:id="@+id/popup_timer"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Next order in: 5"
                  android:textSize="16sp"
                  android:textColor="#FF9800"
                  android:textStyle="bold"
                  android:layout_gravity="center"
                  android:layout_marginBottom="15dp"/>

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal">

                  <Button
                      android:id="@+id/popup_accept"
                      android:layout_width="0dp"
                      android:layout_height="45dp"
                      android:layout_weight="1"
                      android:text="Accept Order"
                      android:textSize="14sp"
                      android:layout_marginEnd="8dp"/>

                  <Button
                      android:id="@+id/popup_reject"
                      android:layout_width="0dp"
                      android:layout_height="45dp"
                      android:layout_weight="1"
                      android:text="Skip"
                      android:textSize="14sp"/>

              </LinearLayout>

          </LinearLayout>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="#121212"
              android:padding="20dp">

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="📦 Jahez Order Simulator"
                  android:textSize="22sp"
                  android:textColor="#FFFFFF"
                  android:textStyle="bold"
                  android:layout_gravity="center"
                  android:layout_marginTop="20dp"
                  android:layout_marginBottom="10dp"/>

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Testing Mode"
                  android:textSize="14sp"
                  android:textColor="#AAAAAA"
                  android:layout_gravity="center"
                  android:layout_marginBottom="30dp"/>

              <!-- Main Order Card -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:background="#1E1E1E"
                  android:padding="20dp"
                  android:layout_marginBottom="20dp">

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="🆕 CURRENT ORDER"
                      android:textSize="16sp"
                      android:textColor="#FF9800"
                      android:textStyle="bold"
                      android:layout_marginBottom="15dp"/>

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="JAHEZ"
                      android:textSize="18sp"
                      android:textColor="#4CAF50"
                      android:textStyle="bold"
                      android:layout_marginBottom="10dp"/>

                  <TextView
                      android:id="@+id/tv_price"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="₪ 10.0"
                      android:textSize="16sp"
                      android:textColor="#FFFFFF"
                      android:layout_marginBottom="15dp"/>

                  <TextView
                      android:id="@+id/tv_pickup"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Pick-up from Al Thumamah Rd."
                      android:textSize="13sp"
                      android:textColor="#DDDDDD"
                      android:layout_marginBottom="5dp"/>

                  <TextView
                      android:id="@+id/tv_pickup_dist"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="1.6 Km From You"
                      android:textSize="13sp"
                      android:textColor="#FF9800"
                      android:layout_marginBottom="15dp"/>

                  <TextView
                      android:id="@+id/tv_drop"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Drop off at Al Aqiq"
                      android:textSize="13sp"
                      android:textColor="#DDDDDD"
                      android:layout_marginBottom="5dp"/>

                  <TextView
                      android:id="@+id/tv_drop_dist"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="2.9 Km From Pickup"
                      android:textSize="13sp"
                      android:textColor="#FF9800"
                      android:layout_marginBottom="20dp"/>

              </LinearLayout>

              <!-- Status -->
              <TextView
                  android:id="@+id/tv_status"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="⏳ No active order"
                  android:textSize="14sp"
                  android:textColor="#FF9800"
                  android:gravity="center"
                  android:layout_marginBottom="20dp"/>

              <!-- Buttons -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:layout_marginBottom="20dp">

                  <Button
                      android:id="@+id/btn_start_test"
                      android:layout_width="0dp"
                      android:layout_height="50dp"
                      android:layout_weight="1"
                      android:text="Start Test"
                      android:textSize="14sp"
                      android:layout_marginEnd="10dp"/>

                  <Button
                      android:id="@+id/btn_reset"
                      android:layout_width="0dp"
                      android:layout_height="50dp"
                      android:layout_weight="1"
                      android:text="Reset"
                      android:textSize="14sp"/>

              </LinearLayout>

              <TextView
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="💡 Rules:\n• Order aate hi popup khulega\n• 5 second countdown chalega\n• 5 second mein accept nahi kiya to NEXT ORDER aayega\n• Accept karne se order confirm hoga aur ruk jayega\n• Tumhara auto swipe app accept karega to bhi kaam karega"
                  android:textSize="11sp"
                  android:textColor="#666666"
                  android:lineSpacingExtra="3dp"/>

          </LinearLayout>
          EOF

          cat > app/src/main/java/com/jahezsimulator/MainActivity.java << 'EOF'
          package com.jahezsimulator;

          import android.app.Dialog;
          import android.os.Bundle;
          import android.os.CountDownTimer;
          import android.os.Handler;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;
          import android.widget.Button;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import java.util.Random;

          public class MainActivity extends AppCompatActivity {

              private TextView tvPickup, tvPickupDist, tvDrop, tvDropDist, tvPrice, tvStatus;
              private Button btnStartTest, btnReset;
              private Dialog popupDialog;
              private CountDownTimer nextOrderTimer;
              private boolean isOrderActive = false;
              private boolean isTestRunning = false;
              private float currentPickup = 0;
              private float currentDrop = 0;
              private Random random = new Random();

              private String[] pickupAddresses = {
                  "Pick-up from Al Thumamah Rd., Ar Rabi District",
                  "Pick-up from QJJP+64P, Ibrahim bin neghaimish",
                  "Pick-up from RRAA7381, RRAA7381, 7381 Al",
                  "Pick-up from 6655 Al Bahr Al Moutaousset, Al",
                  "Pick-up from RRAC6717, 6717, 3800 Al Bahr Al",
                  "Pick-up from King Fahd Rd., Al Malaz"
              };

              private String[] dropAddresses = {
                  "Drop off at QJ7R+Q88, Al Aqiq, Riyadh 13519",
                  "Drop off at RRMA6837, 4034, 459 رقم",
                  "Drop off at RASB7966, 7966 Al Nafl, 3960",
                  "Drop off at 7131 Al Ulaya, 2763, Al Ghadir",
                  "Drop off at RALA7654, 7654 Al Hasna, 3627",
                  "Drop off at King Abdullah Rd., Al Malaz"
              };

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  tvPickup = findViewById(R.id.tv_pickup);
                  tvPickupDist = findViewById(R.id.tv_pickup_dist);
                  tvDrop = findViewById(R.id.tv_drop);
                  tvDropDist = findViewById(R.id.tv_drop_dist);
                  tvPrice = findViewById(R.id.tv_price);
                  tvStatus = findViewById(R.id.tv_status);
                  btnStartTest = findViewById(R.id.btn_start_test);
                  btnReset = findViewById(R.id.btn_reset);

                  btnStartTest.setOnClickListener(v -> {
                      if (!isTestRunning) {
                          isTestRunning = true;
                          generateAndShowOrder();
                          Toast.makeText(this, "Test started! Orders will come automatically", Toast.LENGTH_SHORT).show();
                      } else {
                          Toast.makeText(this, "Test already running!", Toast.LENGTH_SHORT).show();
                      }
                  });

                  btnReset.setOnClickListener(v -> {
                      stopAllTimers();
                      if (popupDialog != null && popupDialog.isShowing()) {
                          popupDialog.dismiss();
                      }
                      isOrderActive = false;
                      isTestRunning = false;
                      tvStatus.setText("⏳ Test stopped");
                      tvStatus.setTextColor(0xFFFF9800);
                      Toast.makeText(this, "Test reset! Press Start Test to begin", Toast.LENGTH_SHORT).show();
                  });
              }

              private void generateAndShowOrder() {
                  if (!isTestRunning) return;
                  
                  // Generate random distances
                  currentPickup = 0.1f + random.nextFloat() * 1.9f;
                  currentPickup = Math.round(currentPickup * 10) / 10.0f;
                  
                  currentDrop = 0.1f + random.nextFloat() * 4.9f;
                  currentDrop = Math.round(currentDrop * 10) / 10.0f;
                  
                  float price = 7 + random.nextFloat() * 8;
                  price = Math.round(price * 10) / 10.0f;
                  
                  int pickupIndex = random.nextInt(pickupAddresses.length);
                  int dropIndex = random.nextInt(dropAddresses.length);
                  
                  // Update main screen
                  tvPickup.setText(pickupAddresses[pickupIndex]);
                  tvPickupDist.setText(currentPickup + " Km From You");
                  tvDrop.setText(dropAddresses[dropIndex]);
                  tvDropDist.setText(currentDrop + " Km From Pickup");
                  tvPrice.setText("₪ " + price);
                  
                  isOrderActive = true;
                  tvStatus.setText("🆕 ORDER ARRIVED! Check popup");
                  tvStatus.setTextColor(0xFF4CAF50);
                  
                  // Show popup
                  showOrderPopup(currentPickup, currentDrop);
              }

              private void showOrderPopup(float pickup, float drop) {
                  popupDialog = new Dialog(MainActivity.this);
                  popupDialog.requestWindowFeature(Window.FEATURE_NO_TITLE);
                  popupDialog.setContentView(R.layout.popup_layout);
                  popupDialog.setCancelable(false);
                  
                  Window window = popupDialog.getWindow();
                  if (window != null) {
                      window.setLayout(WindowManager.LayoutParams.MATCH_PARENT, WindowManager.LayoutParams.WRAP_CONTENT);
                      window.setBackgroundDrawableResource(android.R.color.transparent);
                  }
                  
                  TextView popupPickup = popupDialog.findViewById(R.id.popup_pickup);
                  TextView popupDrop = popupDialog.findViewById(R.id.popup_drop);
                  TextView popupTimer = popupDialog.findViewById(R.id.popup_timer);
                  Button btnAccept = popupDialog.findViewById(R.id.popup_accept);
                  Button btnReject = popupDialog.findViewById(R.id.popup_reject);
                  
                  popupPickup.setText("🚗 Pickup: " + pickup + " km from you");
                  popupDrop.setText("📍 Drop: " + drop + " km from pickup");
                  
                  // Start 5 second countdown for NEXT ORDER (not auto accept)
                  nextOrderTimer = new CountDownTimer(5000, 1000) {
                      @Override
                      public void onTick(long millisUntilFinished) {
                          int secondsLeft = (int) (millisUntilFinished / 1000);
                          popupTimer.setText("Next order in: " + secondsLeft);
                          popupTimer.setTextColor(0xFFFF9800);
                      }
                      
                      @Override
                      public void onFinish() {
                          popupTimer.setText("Getting next order...");
                          popupTimer.setTextColor(0xFF4CAF50);
                          // Dismiss current popup and generate next order
                          if (popupDialog != null && popupDialog.isShowing()) {
                              popupDialog.dismiss();
                          }
                          isOrderActive = false;
                          // Generate next order automatically
                          new Handler().postDelayed(() -> {
                              if (isTestRunning && !isOrderActive) {
                                  generateAndShowOrder();
                              }
                          }, 500);
                      }
                  }.start();
                  
                  // Accept button - this is what your auto swipe app will click
                  btnAccept.setOnClickListener(v -> {
                      if (nextOrderTimer != null) {
                          nextOrderTimer.cancel();
                      }
                      if (popupDialog != null && popupDialog.isShowing()) {
                          popupDialog.dismiss();
                      }
                      acceptOrder(pickup, drop);
                  });
                  
                  // Skip button - next order aayega
                  btnReject.setOnClickListener(v -> {
                      if (nextOrderTimer != null) {
                          nextOrderTimer.cancel();
                      }
                      if (popupDialog != null && popupDialog.isShowing()) {
                          popupDialog.dismiss();
                      }
                      Toast.makeText(MainActivity.this, "Order skipped! Next order coming...", Toast.LENGTH_SHORT).show();
                      isOrderActive = false;
                      // Generate next order
                      new Handler().postDelayed(() -> {
                          if (isTestRunning && !isOrderActive) {
                              generateAndShowOrder();
                          }
                      }, 500);
                  });
                  
                  popupDialog.setOnDismissListener(dialog -> {
                      if (nextOrderTimer != null) {
                          nextOrderTimer.cancel();
                      }
                  });
                  
                  popupDialog.show();
              }

              private void acceptOrder(float pickup, float drop) {
                  isOrderActive = false;
                  isTestRunning = false; // Stop test after accept
                  stopAllTimers();
                  
                  tvStatus.setText("✅ ORDER ACCEPTED!\nPickup: " + pickup + " km | Drop: " + drop + " km");
                  tvStatus.setTextColor(0xFF4CAF50);
                  Toast.makeText(this, "🎉 Order Accepted! Test stopped. Press Start Test for new", Toast.LENGTH_LONG).show();
              }
              
              private void stopAllTimers() {
                  if (nextOrderTimer != null) {
                      nextOrderTimer.cancel();
                      nextOrderTimer = null;
                  }
              }
              
              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  stopAllTimers();
              }
          }
          EOF

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jahez-Simulator-Final
          path: app/build/outputs/apk/debug/*.apk
