name: Build RootAutoSwipe
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Project
        run: |
          mkdir -p app/src/main/java/com/rootautoswipe
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          echo "include ':app'" > settings.gradle

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rootautoswipe'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.rootautoswipe'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_LOGS"/>
              <application
                  android:label="RootAutoSwipe"
                  android:theme="@style/Theme.AppCompat">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".LogActivity" android:label="Logs" />
                  <service android:name=".AutoSwipeService" />
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">RootAutoSwipe</string>
          </resources>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:padding="20dp"
                  android:background="#121212">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="RootAutoSwipe" android:textSize="24sp" android:textColor="#FFFFFF" android:textStyle="bold"/>
                  <TextView android:id="@+id/tv_status" android:layout_width="wrap_content"
                      android:layout_height="wrap_content" android:text="Service Stopped" android:textSize="14sp"
                      android:textColor="#FF5555" android:layout_marginTop="20dp"/>
                  
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Target App Package" android:textColor="#AAAAAA" android:layout_marginTop="20dp"/>
                  <EditText android:id="@+id/et_package" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:text="net.jahez.fleets"
                      android:textColor="#FFFFFF" android:background="#333333" android:padding="10dp"/>
                  
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Max Pickup (km)" android:textColor="#AAAAAA" android:layout_marginTop="10dp"/>
                  <EditText android:id="@+id/et_pickup_max" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:inputType="numberDecimal"
                      android:text="1.5" android:textColor="#FFFFFF" android:background="#333333" android:padding="10dp"/>
                  
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Max Drop (km)" android:textColor="#AAAAAA" android:layout_marginTop="10dp"/>
                  <EditText android:id="@+id/et_drop_max" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:inputType="numberDecimal"
                      android:text="3.5" android:textColor="#FFFFFF" android:background="#333333" android:padding="10dp"/>
                  
                  <TextView android:id="@+id/tv_detect_delay_label" android:layout_width="wrap_content"
                      android:layout_height="wrap_content" android:text="Screen Detection Delay: 800ms" android:textColor="#FF9800"
                      android:layout_marginTop="20dp"/>
                  <SeekBar android:id="@+id/sb_detect_delay" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:max="1100" android:progress="400"
                      android:thumbTint="#FF9800" android:progressTint="#FF9800"/>
                  
                  <TextView android:id="@+id/tv_swipe_duration_label" android:layout_width="wrap_content"
                      android:layout_height="wrap_content" android:text="Swipe Duration: 300ms" android:textColor="#FF9800"
                      android:layout_marginTop="10dp"/>
                  <SeekBar android:id="@+id/sb_swipe_duration" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:max="900" android:progress="200"
                      android:thumbTint="#FF9800" android:progressTint="#FF9800"/>
                  
                  <Button android:id="@+id/btn_start" android:layout_width="match_parent"
                      android:layout_height="50dp" android:text="START SERVICE" android:backgroundTint="#4CAF50"
                      android:layout_marginTop="20dp"/>
                  <Button android:id="@+id/btn_stop" android:layout_width="match_parent"
                      android:layout_height="50dp" android:text="STOP SERVICE" android:backgroundTint="#F44336"
                      android:layout_marginTop="10dp"/>
                  <Button android:id="@+id/btn_logs" android:layout_width="match_parent"
                      android:layout_height="50dp" android:text="VIEW LOGS" android:backgroundTint="#2196F3"
                      android:layout_marginTop="10dp"/>
              </LinearLayout>
          </ScrollView>
          EOF

          cat > app/src/main/res/layout/activity_log.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#000000" android:padding="10dp">
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:text="Logs" android:textSize="20sp" android:textColor="#4CAF50" android:gravity="center"/>
              <ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1">
                  <TextView android:id="@+id/tv_logs" android:layout_width="match_parent"
                      android:layout_height="wrap_content" android:textColor="#00FF00" android:fontFamily="monospace"
                      android:textSize="10sp" android:text="Waiting..."/>
              </ScrollView>
              <Button android:id="@+id/btn_clear" android:layout_width="match_parent"
                  android:layout_height="wrap_content" android:text="CLEAR" android:backgroundTint="#F44336"/>
          </LinearLayout>
          EOF

          cat > app/src/main/java/com/rootautoswipe/MainActivity.java << 'EOF'
          package com.rootautoswipe;

          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.SeekBar;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private EditText etPackage, etPickupMax, etDropMax;
              private SeekBar sbDetectDelay, sbSwipeDuration;
              private TextView tvDetectDelay, tvSwipeDuration, tvStatus;
              private Button btnStart, btnStop, btnLogs;
              private SharedPreferences prefs;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  prefs = getSharedPreferences("ras_prefs", MODE_PRIVATE);
                  etPackage = findViewById(R.id.et_package);
                  etPickupMax = findViewById(R.id.et_pickup_max);
                  etDropMax = findViewById(R.id.et_drop_max);
                  sbDetectDelay = findViewById(R.id.sb_detect_delay);
                  sbSwipeDuration = findViewById(R.id.sb_swipe_duration);
                  tvDetectDelay = findViewById(R.id.tv_detect_delay_label);
                  tvSwipeDuration = findViewById(R.id.tv_swipe_duration_label);
                  tvStatus = findViewById(R.id.tv_status);
                  btnStart = findViewById(R.id.btn_start);
                  btnStop = findViewById(R.id.btn_stop);
                  btnLogs = findViewById(R.id.btn_logs);

                  etPackage.setText(prefs.getString("target_pkg", "net.jahez.fleets"));
                  etPickupMax.setText(String.valueOf(prefs.getFloat("pickup_max", 1.5f)));
                  etDropMax.setText(String.valueOf(prefs.getFloat("drop_max", 3.5f)));
                  int detectDelay = prefs.getInt("detect_delay", 800);
                  int swipeDuration = prefs.getInt("swipe_duration", 300);
                  sbDetectDelay.setProgress(detectDelay - 400);
                  sbSwipeDuration.setProgress(swipeDuration - 100);
                  tvDetectDelay.setText("Screen Detection Delay: " + detectDelay + "ms");
                  tvSwipeDuration.setText("Swipe Duration: " + swipeDuration + "ms");

                  sbDetectDelay.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override public void onProgressChanged(SeekBar s, int p, boolean u) {
                          int val = p + 400;
                          tvDetectDelay.setText("Screen Detection Delay: " + val + "ms");
                      }
                      @Override public void onStartTrackingTouch(SeekBar s) {}
                      @Override public void onStopTrackingTouch(SeekBar s) {}
                  });
                  sbSwipeDuration.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override public void onProgressChanged(SeekBar s, int p, boolean u) {
                          int val = p + 100;
                          tvSwipeDuration.setText("Swipe Duration: " + val + "ms");
                      }
                      @Override public void onStartTrackingTouch(SeekBar s) {}
                      @Override public void onStopTrackingTouch(SeekBar s) {}
                  });

                  btnStart.setOnClickListener(v -> {
                      String pkg = etPackage.getText().toString().trim();
                      float pickup = Float.parseFloat(etPickupMax.getText().toString());
                      float drop = Float.parseFloat(etDropMax.getText().toString());
                      int detectDelayMs = sbDetectDelay.getProgress() + 400;
                      int swipeDurationMs = sbSwipeDuration.getProgress() + 100;
                      prefs.edit().putString("target_pkg", pkg)
                           .putFloat("pickup_max", pickup).putFloat("drop_max", drop)
                           .putInt("detect_delay", detectDelayMs)
                           .putInt("swipe_duration", swipeDurationMs).apply();
                      startService(new Intent(this, AutoSwipeService.class));
                      tvStatus.setText("Service Running");
                      tvStatus.setTextColor(0xFF4CAF50);
                      Toast.makeText(this, "Service started", Toast.LENGTH_SHORT).show();
                  });

                  btnStop.setOnClickListener(v -> {
                      stopService(new Intent(this, AutoSwipeService.class));
                      tvStatus.setText("Service Stopped");
                      tvStatus.setTextColor(0xFFFF5555);
                      Toast.makeText(this, "Service stopped", Toast.LENGTH_SHORT).show();
                  });

                  btnLogs.setOnClickListener(v -> startActivity(new Intent(this, LogActivity.class)));
              }
          }
          EOF

          cat > app/src/main/java/com/rootautoswipe/AutoSwipeService.java << 'EOF'
          package com.rootautoswipe;

          import android.app.Service;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Handler;
          import android.os.IBinder;
          import android.os.Looper;
          import android.util.Log;
          import java.io.BufferedReader;
          import java.io.InputStreamReader;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          public class AutoSwipeService extends Service {
              private Thread monitorThread;
              private boolean running = false;
              private SharedPreferences prefs;
              private Handler mainHandler = new Handler(Looper.getMainLooper());
              private String targetPackage = "net.jahez.fleets";
              private float pickupMax = 1.5f, dropMax = 3.5f;
              private int detectDelay = 800;
              private int swipeDuration = 300;

              private void log(String msg) {
                  Log.d("RootAutoSwipe", msg);
                  Intent i = new Intent("RAS_LOG_ACTION");
                  i.setPackage("com.rootautoswipe");
                  i.putExtra("log_msg", msg);
                  sendBroadcast(i);
              }

              private String exec(String cmd) {
                  try {
                      Process p = Runtime.getRuntime().exec(new String[]{"su", "-c", cmd});
                      BufferedReader br = new BufferedReader(new InputStreamReader(p.getInputStream()));
                      StringBuilder sb = new StringBuilder();
                      String line;
                      while ((line = br.readLine()) != null) sb.append(line).append("\n");
                      p.waitFor();
                      return sb.toString();
                  } catch (Exception e) {
                      return "";
                  }
              }

              @Override
              public void onCreate() {
                  super.onCreate();
                  prefs = getSharedPreferences("ras_prefs", MODE_PRIVATE);
                  targetPackage = prefs.getString("target_pkg", "net.jahez.fleets");
                  pickupMax = prefs.getFloat("pickup_max", 1.5f);
                  dropMax = prefs.getFloat("drop_max", 3.5f);
                  detectDelay = prefs.getInt("detect_delay", 800);
                  swipeDuration = prefs.getInt("swipe_duration", 300);
                  log("Service created. Target: " + targetPackage);
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (monitorThread != null && monitorThread.isAlive()) return START_STICKY;
                  running = true;
                  monitorThread = new Thread(() -> {
                      log("Monitor started");
                      while (running) {
                          try {
                              // Check if target app is in foreground
                              String topActivity = exec("dumpsys activity top | grep ACTIVITY | head -1");
                              if (!topActivity.contains(targetPackage)) {
                                  Thread.sleep(1000);
                                  continue;
                              }
                              // Take UI dump
                              exec("uiautomator dump /sdcard/window_dump.xml");
                              String dump = exec("cat /sdcard/window_dump.xml");
                              if (dump.contains("New Order")) {
                                  log("New Order detected! Waiting " + detectDelay + "ms...");
                                  Thread.sleep(detectDelay);
                                  // Get distances
                                  float[] dist = extractDistances(dump);
                                  if (dist[0] > 0 && dist[1] > 0) {
                                      log("Distances: P=" + dist[0] + "km, D=" + dist[1] + "km");
                                      if (dist[0] <= pickupMax && dist[1] <= dropMax) {
                                          log("✅ ACCEPT – swiping...");
                                          int[] coord = findAcceptButtonCoords(dump);
                                          if (coord != null) {
                                              int startX = coord[0] + (coord[2] / 5);
                                              int endX = coord[0] + (coord[2] * 4 / 5);
                                              int y = coord[1] + (coord[3] / 2);
                                              exec("input swipe " + startX + " " + y + " " + endX + " " + y + " " + swipeDuration);
                                              log("Swipe executed: (" + startX + "," + y + ") to (" + endX + "," + y + ") duration " + swipeDuration);
                                          } else {
                                              exec("input swipe 200 1800 900 1800 " + swipeDuration);
                                              log("Fallback bottom swipe");
                                          }
                                      } else {
                                          log("❌ REJECT (out of range)");
                                      }
                                  } else {
                                      log("Could not parse distances");
                                  }
                              }
                              Thread.sleep(1500);
                          } catch (Exception e) {
                              log("Error: " + e.getMessage());
                          }
                      }
                  });
                  monitorThread.start();
                  return START_STICKY;
              }

              private float[] extractDistances(String xml) {
                  float[] result = {-1, -1};
                  Pattern pPickup = Pattern.compile("(\\d+\\.?\\d*)\\s*[Kk][Mm]\\s*From\\s*You", Pattern.CASE_INSENSITIVE);
                  Matcher m = pPickup.matcher(xml);
                  if (m.find()) result[0] = Float.parseFloat(m.group(1));
                  Pattern pDrop = Pattern.compile("(\\d+\\.?\\d*)\\s*[Kk][Mm]\\s*From\\s*Pickup", Pattern.CASE_INSENSITIVE);
                  m = pDrop.matcher(xml);
                  if (m.find()) result[1] = Float.parseFloat(m.group(1));
                  return result;
              }

              private int[] findAcceptButtonCoords(String xml) {
                  Pattern p = Pattern.compile("bounds=\"\\[(\\d+),(\\d+)\\]\\[(\\d+),(\\d+)\\]\".*?text=\"Accept\"", Pattern.CASE_INSENSITIVE);
                  Matcher m = p.matcher(xml);
                  if (m.find()) {
                      int left = Integer.parseInt(m.group(1));
                      int top = Integer.parseInt(m.group(2));
                      int right = Integer.parseInt(m.group(3));
                      int bottom = Integer.parseInt(m.group(4));
                      return new int[]{left, top, right - left, bottom - top};
                  }
                  return null;
              }

              @Override
              public void onDestroy() {
                  running = false;
                  if (monitorThread != null) monitorThread.interrupt();
                  log("Service stopped");
                  super.onDestroy();
              }

              @Override
              public IBinder onBind(Intent intent) { return null; }
          }
          EOF

          cat > app/src/main/java/com/rootautoswipe/LogActivity.java << 'EOF'
          package com.rootautoswipe;

          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.os.Build;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;

          public class LogActivity extends AppCompatActivity {
              private TextView tvLogs;
              private BroadcastReceiver receiver = new BroadcastReceiver() {
                  @Override
                  public void onReceive(Context context, Intent intent) {
                      String msg = intent.getStringExtra("log_msg");
                      if (tvLogs != null) tvLogs.append("\n" + msg);
                  }
              };

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_log);
                  tvLogs = findViewById(R.id.tv_logs);
                  Button btnClear = findViewById(R.id.btn_clear);
                  btnClear.setOnClickListener(v -> tvLogs.setText(""));
                  IntentFilter filter = new IntentFilter("RAS_LOG_ACTION");
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      registerReceiver(receiver, filter, Context.RECEIVER_EXPORTED);
                  } else {
                      registerReceiver(receiver, filter);
                  }
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  unregisterReceiver(receiver);
              }
          }
          EOF

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RootAutoSwipe
          path: app/build/outputs/apk/debug/*.apk
