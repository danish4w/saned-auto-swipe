name: Build AutoDriver

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          cat > gradle/wrapper/gradle-wrapper.properties << 'WEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/zips
          WEOF

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/auto/driver
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/assets

      - name: Write Gradle Files
        run: |
          cat > settings.gradle << 'SEOF'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositories {
              google(); mavenCentral()
              maven { url 'https://api.xposed.info/' }
            }
          }
          rootProject.name = "AutoDriver"
          include ':app'
          SEOF

          cat > build.gradle << 'BEOF'
          plugins { id 'com.android.application' version '8.5.2' apply false }
          BEOF

          cat > gradle.properties << 'GEOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          GEOF

          cat > app/build.gradle << 'ABEOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.auto.driver'
            compileSdk 34
            defaultConfig {
              applicationId 'com.auto.driver'
              minSdk 26
              targetSdk 34
              versionCode 5
              versionName '5.0'
            }
            buildTypes {
              release { minifyEnabled false }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.google.android.material:material:1.12.0'
            compileOnly 'de.robv.android.xposed:api:82'
          }
          ABEOF

      - name: Write Icons
        run: |
          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'BGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp"
            android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#1B5E20" android:pathData="M0,0 L108,0 L108,108 L0,108 Z"/>
          </vector>
          BGEOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'FGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp"
            android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#FFFFFF" android:pathData="M25,54 L35,44 L47,60 L73,30 L83,40 L47,82 Z"/>
          </vector>
          FGEOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'ICEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          ICEOF

          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Write Network Security Config
        run: |
          cat > app/src/main/res/xml/network_security_config.xml << 'NSEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="false">
              <trust-anchors><certificates src="system"/></trust-anchors>
            </base-config>
          </network-security-config>
          NSEOF

      - name: Write Xposed Init
        run: echo "com.auto.driver.SanedHook" > app/src/main/assets/xposed_init

      - name: Write Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC"/>
            <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
            <application
              android:label="Auto Driver"
              android:icon="@mipmap/ic_launcher"
              android:roundIcon="@mipmap/ic_launcher_round"
              android:theme="@style/AppTheme"
              android:allowBackup="false"
              android:networkSecurityConfig="@xml/network_security_config">
              <meta-data android:name="xposedmodule" android:value="true"/>
              <meta-data android:name="xposeddescription" android:value="Auto Driver v5 - Direct API accept"/>
              <meta-data android:name="xposedminversion" android:value="82"/>
              <activity android:name=".MainActivity" android:exported="true"
                android:windowSoftInputMode="stateHidden|adjustPan">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
              <activity android:name=".LogActivity" android:exported="false"/>
              <service android:name=".AutoService" android:exported="false"
                android:foregroundServiceType="dataSync"/>
              <receiver android:name=".BootReceiver" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.BOOT_COMPLETED"/>
                </intent-filter>
              </receiver>
            </application>
          </manifest>
          MEOF

      - name: Write SanedHook.java
        run: |
          cat > app/src/main/java/com/auto/driver/SanedHook.java << 'HEOF'
          package com.auto.driver;

          import android.content.Context;
          import android.content.Intent;
          import android.location.Location;
          import android.location.LocationManager;
          import android.os.Bundle;

          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;

          public class SanedHook implements IXposedHookLoadPackage {

              static final String TARGET          = "net.jahez.fleets";
              static final String OUR_PKG         = "com.auto.driver";
              static final String ORDER_ACTIVITY  = "net.jahez.fleets.dispatch.accept.IncomingDispatchActivity";

              // Captured Bearer token — updated by OkHttp hook
              private volatile String capturedToken = "";
              private long lastBcast = 0;

              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lp) {
                  if (!TARGET.equals(lp.packageName)) return;

                  // ── Hook 1: OkHttp → capture Authorization: Bearer <token> ──
                  // Fires on every API call made by Saned, so token stays fresh
                  try {
                      XposedHelpers.findAndHookMethod(
                          "okhttp3.Request$Builder", lp.classLoader, "build",
                          new XC_MethodHook() {
                              @Override
                              protected void afterHookedMethod(MethodHookParam param) {
                                  try {
                                      Object request = param.getResult();
                                      Object headers = XposedHelpers.callMethod(request, "headers");
                                      String auth = (String) XposedHelpers.callMethod(headers, "get", "Authorization");
                                      if (auth != null && auth.startsWith("Bearer ") && auth.length() > 20) {
                                          capturedToken = auth;
                                      }
                                  } catch (Throwable ignored) {}
                              }
                          }
                      );
                  } catch (Throwable e) {
                      sendLog(null, "⚠️ OkHttp hook failed: " + e.getMessage());
                  }

                  // ── Hook 2: IncomingDispatchActivity.onResume() → extract + broadcast order data ──
                  XposedHelpers.findAndHookMethod(
                      "android.app.Activity", lp.classLoader, "onResume",
                      new XC_MethodHook() {
                          @Override
                          protected void afterHookedMethod(MethodHookParam param) {
                              android.app.Activity act = (android.app.Activity) param.thisObject;
                              if (!ORDER_ACTIVITY.equals(act.getClass().getName())) return;

                              // Debounce: same order screen can fire multiple times
                              long now = System.currentTimeMillis();
                              if (now - lastBcast < 2000) return;
                              lastBcast = now;

                              try {
                                  Intent actIntent = act.getIntent();
                                  Bundle extras = (actIntent != null) ? actIntent.getExtras() : null;
                                  if (extras == null) {
                                      sendLog(act, "⚠️ Intent extras null — cannot read order");
                                      return;
                                  }

                                  // requestId: try String first, then Long, then Integer
                                  String requestId = extractRequestId(extras);

                                  double pickupLat = getDouble(extras, "EXTRA_DISPATCH_PICKUP_LATITUDE");
                                  double pickupLon = getDouble(extras, "EXTRA_DISPATCH_PICKUP_LONGITUDE");
                                  double dropDist  = getDouble(extras, "EXTRA_DISTANCE");
                                  double price     = getDouble(extras, "EXTRA_DELIVERY_PRICE");
                                  double bonus     = getDouble(extras, "EXTRA_BONUS_AMOUNT");

                                  sendLog(act,
                                      "📦 id=" + requestId
                                      + " drop=" + String.format("%.2f", dropDist) + "km"
                                      + " price=" + price
                                      + " bonus=" + bonus
                                      + " token=" + (capturedToken.length() > 20 ? "✅" : "❌"));

                                  Intent broadcast = new Intent("JAHEZ_ORDER_DATA");
                                  broadcast.setPackage(OUR_PKG);
                                  broadcast.putExtra("request_id",  requestId);
                                  broadcast.putExtra("pickup_lat",  pickupLat);
                                  broadcast.putExtra("pickup_lon",  pickupLon);
                                  broadcast.putExtra("drop_dist",   dropDist);
                                  broadcast.putExtra("price",       price);
                                  broadcast.putExtra("bonus",       bonus);
                                  broadcast.putExtra("auth_token",  capturedToken);
                                  broadcast.putExtra("is_order",    true);
                                  act.sendBroadcast(broadcast);

                              } catch (Throwable e) {
                                  sendLog(act, "❌ Hook error: " + e.getMessage());
                              }
                          }
                      }
                  );
              }

              // requestId could be String, Long, or Integer depending on Saned version
              private String extractRequestId(Bundle b) {
                  try {
                      // Try String
                      Object v = b.get("EXTRA_DISPATCH_REQUEST_ID");
                      if (v instanceof String && !((String) v).isEmpty()) return (String) v;
                      if (v instanceof Long)    return String.valueOf(v);
                      if (v instanceof Integer) return String.valueOf(v);
                      // Fallback: getString with null default
                      String s = b.getString("EXTRA_DISPATCH_REQUEST_ID");
                      if (s != null && !s.isEmpty()) return s;
                      // Last resort: getLong
                      long l = b.getLong("EXTRA_DISPATCH_REQUEST_ID", -1L);
                      if (l > 0) return String.valueOf(l);
                  } catch (Throwable ignored) {}
                  return "";
              }

              private void sendLog(android.app.Activity act, String msg) {
                  try {
                      Intent i = new Intent("JAHEZ_HOOK_LOG");
                      i.setPackage(OUR_PKG);
                      i.putExtra("log", msg);
                      if (act != null) act.sendBroadcast(i);
                  } catch (Throwable ignored) {}
              }

              private double getDouble(Bundle b, String key) {
                  try {
                      Object v = b.get(key);
                      if (v instanceof Double)  return (Double) v;
                      if (v instanceof Float)   return (Float) v;
                      if (v instanceof String)  return Double.parseDouble((String) v);
                      if (v instanceof Integer) return (Integer) v;
                      if (v instanceof Long)    return (Long) v;
                  } catch (Throwable ignored) {}
                  return -1;
              }
          }
          HEOF

      - name: Write AutoService.java
        run: |
          cat > app/src/main/java/com/auto/driver/AutoService.java << 'SEOF'
          package com.auto.driver;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.SharedPreferences;
          import android.location.Location;
          import android.location.LocationManager;
          import android.os.Build;
          import android.os.Handler;
          import android.os.IBinder;
          import android.os.Looper;

          import java.io.InputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;

          public class AutoService extends Service {

              // ── API endpoint from APK decompile ──
              static final String ACCEPT_URL = "https://gateway.saned.io/api/v1/dispatch/accept-dispatch/";

              SharedPreferences prefs;
              long lastEvent = 0;

              // ── Receive logs from SanedHook (runs inside Saned process) ──
              private final BroadcastReceiver hookLogReceiver = new BroadcastReceiver() {
                  @Override public void onReceive(Context ctx, Intent intent) {
                      String msg = intent.getStringExtra("log");
                      if (msg != null) saveLog(msg);
                  }
              };

              // ── Receive order data from SanedHook ──
              private final BroadcastReceiver orderReceiver = new BroadcastReceiver() {
                  @Override public void onReceive(Context ctx, Intent intent) {
                      if (!intent.getBooleanExtra("is_order", false)) return;

                      // Verify sender is from Saned package (security: check calling package if possible)
                      String requestId = intent.getStringExtra("request_id");
                      String authToken = intent.getStringExtra("auth_token");
                      double pickupLat = intent.getDoubleExtra("pickup_lat", -1);
                      double pickupLon = intent.getDoubleExtra("pickup_lon", -1);
                      double dropDist  = intent.getDoubleExtra("drop_dist",  -1);
                      double price     = intent.getDoubleExtra("price",       0);
                      double bonus     = intent.getDoubleExtra("bonus",       0);

                      saveLog("🪝 Order: id=" + requestId
                          + " drop=" + fmt2(dropDist) + "km"
                          + " ₿" + price + "+" + bonus);

                      processOrder(requestId, authToken, pickupLat, pickupLon, dropDist);
                  }
              };

              // ── Toggle from notification button ──
              private final BroadcastReceiver toggleReceiver = new BroadcastReceiver() {
                  @Override public void onReceive(Context ctx, Intent intent) {
                      if (prefs == null) prefs = getSharedPreferences("cfg", MODE_PRIVATE);
                      if ("JAHEZ_TOGGLE".equals(intent.getAction())) {
                          boolean cur = prefs.getBoolean("enabled", false);
                          prefs.edit().putBoolean("enabled", !cur).apply();
                          sendBroadcast(new Intent(!cur ? "JAHEZ_AUTO_ON" : "JAHEZ_AUTO_OFF"));
                          saveLog(!cur ? "▶️ Enabled via notification" : "⏸ Disabled via notification");
                      }
                      showNotification();
                  }
              };

              @Override public void onCreate() {
                  super.onCreate();
                  prefs = getSharedPreferences("cfg", MODE_PRIVATE);

                  // Toggle + state change
                  IntentFilter tf = new IntentFilter("JAHEZ_TOGGLE");
                  tf.addAction("JAHEZ_STATE_CHANGED");
                  registerReceiverCompat(toggleReceiver, tf, false);

                  // Order data — EXPORTED so SanedHook (different process) can send
                  registerReceiverCompat(orderReceiver, new IntentFilter("JAHEZ_ORDER_DATA"), true);

                  // Hook logs — EXPORTED so SanedHook can send
                  registerReceiverCompat(hookLogReceiver, new IntentFilter("JAHEZ_HOOK_LOG"), true);

                  showNotification();
                  saveLog("✅ AutoService started v5");
              }

              private void registerReceiverCompat(BroadcastReceiver r, IntentFilter f, boolean exported) {
                  if (Build.VERSION.SDK_INT >= 33) {
                      registerReceiver(r, f, exported ? Context.RECEIVER_EXPORTED : Context.RECEIVER_NOT_EXPORTED);
                  } else {
                      registerReceiver(r, f);
                  }
              }

              @Override public int onStartCommand(Intent i, int flags, int id) { return START_STICKY; }
              @Override public IBinder onBind(Intent i) { return null; }

              // ════════════════════════════════════════════════════════
              // Core logic: distance filter → API call
              // ════════════════════════════════════════════════════════
              void processOrder(String requestId, String authToken,
                                double pickupLat, double pickupLon, double dropDist) {

                  if (!prefs.getBoolean("enabled", false)) {
                      saveLog("⏸ Disabled");
                      return;
                  }

                  // Debounce — prevent duplicate from rapid onResume calls
                  long now = System.currentTimeMillis();
                  if (now - lastEvent < 2000) {
                      saveLog("⚡ Debounce skip");
                      return;
                  }
                  lastEvent = now;

                  // Validate inputs before GPS calculation
                  if (requestId == null || requestId.isEmpty()) {
                      saveLog("❌ SKIP — requestId empty");
                      return;
                  }
                  if (authToken == null || authToken.length() < 20) {
                      saveLog("❌ SKIP — token missing. Saned mein koi action karo to token capture ho");
                      toast("Token nahi mila! Saned scroll karo phir retry");
                      return;
                  }

                  // ── GPS: calculate pickup distance ──
                  float pickupDistKm = calcPickupDist(pickupLat, pickupLon);

                  float maxPickup = prefs.getFloat("max_pickup", 2.0f);
                  float maxDrop   = prefs.getFloat("max_drop",   5.0f);
                  float dropKm    = (dropDist > 0) ? (float) dropDist : -1f;

                  saveLog(String.format("📏 Pickup=%s/%skm  Drop=%s/%skm",
                      fmt1(pickupDistKm), fmt1(maxPickup),
                      fmt1(dropKm),       fmt1(maxDrop)));

                  boolean pickupOk = (pickupDistKm < 0) || (pickupDistKm <= maxPickup);
                  boolean dropOk   = (dropKm < 0)       || (dropKm <= maxDrop);

                  if (!pickupOk || !dropOk) {
                      StringBuilder reason = new StringBuilder();
                      if (!pickupOk) reason.append("Pickup ").append(fmt1(pickupDistKm))
                                           .append(">").append(fmt1(maxPickup)).append("km");
                      if (!dropOk) {
                          if (reason.length() > 0) reason.append("  ");
                          reason.append("Drop ").append(fmt1(dropKm))
                                .append(">").append(fmt1(maxDrop)).append("km");
                      }
                      String msg = "❌ SKIP — " + reason;
                      toast(msg); saveLog(msg);
                      return;
                  }

                  // ── All filters passed → call API after configured delay ──
                  int delay = prefs.getInt("scan_delay", 500);
                  saveLog("✅ Filter pass! API call in " + delay + "ms → id=" + requestId);

                  new Handler(Looper.getMainLooper()).postDelayed(
                      () -> callAcceptApi(requestId, authToken, pickupDistKm, dropKm),
                      delay
                  );
              }

              // ════════════════════════════════════════════════════════
              // HTTP PUT to accept order
              // ════════════════════════════════════════════════════════
              void callAcceptApi(String requestId, String authToken, float pickupKm, float dropKm) {
                  new Thread(() -> {
                      String urlStr = ACCEPT_URL + requestId;
                      saveLog("🌐 PUT " + urlStr);
                      HttpURLConnection conn = null;
                      try {
                          conn = (HttpURLConnection) new URL(urlStr).openConnection();
                          conn.setRequestMethod("PUT");
                          conn.setRequestProperty("Authorization", authToken);
                          conn.setRequestProperty("Content-Type", "application/json");
                          conn.setRequestProperty("Accept", "application/json");
                          conn.setConnectTimeout(5000);  // 5s — order expires fast
                          conn.setReadTimeout(5000);
                          conn.setDoOutput(false);

                          int code = conn.getResponseCode();

                          if (code == 200 || code == 201 || code == 204) {
                              String msg = "🎉 ACCEPTED! HTTP " + code
                                  + "  Pickup=" + fmt1(pickupKm) + "km"
                                  + "  Drop=" + fmt1(dropKm) + "km";
                              toast(msg); saveLog(msg);
                          } else {
                              // Read error body for debugging
                              String body = readStream(conn.getErrorStream(), 300);
                              String msg = "❌ API HTTP " + code + " — " + body;

                              // Token expired?
                              if (code == 401) {
                                  msg += " (Token expired — Saned mein login refresh karo)";
                              }
                              toast(msg); saveLog(msg);
                          }
                          showNotification();

                      } catch (Exception e) {
                          String msg = "❌ Network: " + e.getMessage();
                          toast(msg); saveLog(msg);
                      } finally {
                          if (conn != null) conn.disconnect();
                      }
                  }, "accept-api-thread").start();
              }

              // ════════════════════════════════════════════════════════
              // GPS helper — returns -1 if location unavailable
              // ════════════════════════════════════════════════════════
              float calcPickupDist(double pickupLat, double pickupLon) {
                  if (pickupLat <= 0 || pickupLon <= 0) return -1;
                  try {
                      LocationManager lm = (LocationManager) getSystemService(LOCATION_SERVICE);
                      Location loc = null;
                      // Try GPS first, then network
                      for (String p : new String[]{LocationManager.GPS_PROVIDER, LocationManager.NETWORK_PROVIDER}) {
                          try {
                              Location l = lm.getLastKnownLocation(p);
                              if (l != null) {
                                  // Reject stale location (older than 5 minutes)
                                  if ((System.currentTimeMillis() - l.getTime()) < 5 * 60 * 1000) {
                                      loc = l; break;
                                  } else if (loc == null) {
                                      loc = l; // Use stale if nothing else
                                  }
                              }
                          } catch (SecurityException ignored) {}
                      }
                      if (loc == null) {
                          saveLog("⚠️ GPS: no location available, pickup filter skip");
                          return -1;
                      }
                      float[] res = new float[1];
                      Location.distanceBetween(loc.getLatitude(), loc.getLongitude(), pickupLat, pickupLon, res);
                      return res[0] / 1000f;
                  } catch (Exception e) {
                      saveLog("⚠️ GPS error: " + e.getMessage());
                      return -1;
                  }
              }

              // ════════════════════════════════════════════════════════
              // Notification
              // ════════════════════════════════════════════════════════
              void showNotification() {
                  boolean on = prefs != null && prefs.getBoolean("enabled", false);
                  NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                  if (Build.VERSION.SDK_INT >= 26) {
                      nm.createNotificationChannel(new NotificationChannel(
                          "auto_svc", "Auto Driver", NotificationManager.IMPORTANCE_LOW));
                  }
                  Intent ti = new Intent("JAHEZ_TOGGLE").setPackage(getPackageName());
                  PendingIntent tp = PendingIntent.getBroadcast(this, 0, ti,
                      PendingIntent.FLAG_IMMUTABLE | PendingIntent.FLAG_UPDATE_CURRENT);
                  Notification.Action action = new Notification.Action.Builder(
                      on ? android.R.drawable.ic_media_pause : android.R.drawable.ic_media_play,
                      on ? "✅ ON — tap OFF" : "⏸ OFF — tap ON", tp).build();
                  Notification.Builder b = new Notification.Builder(this, "auto_svc")
                      .setContentTitle("Auto Driver")
                      .setContentText(on ? "Auto Accept: ON" : "Auto Accept: OFF")
                      .setSmallIcon(android.R.drawable.ic_media_play)
                      .setOngoing(true);
                  if (Build.VERSION.SDK_INT >= 23) b.addAction(action);
                  startForeground(1, b.build());
              }

              // ════════════════════════════════════════════════════════
              // Helpers
              // ════════════════════════════════════════════════════════
              void saveLog(String msg) {
                  String entry = "[" + new SimpleDateFormat("HH:mm:ss.SSS", Locale.getDefault())
                      .format(new Date()) + "]  " + msg;
                  String existing = prefs.getString("logs", "");
                  String[] lines = existing.isEmpty() ? new String[0] : existing.split("\n");
                  StringBuilder sb = new StringBuilder(entry);
                  for (int i = 0; i < lines.length && i < 99; i++) sb.append("\n").append(lines[i]);
                  prefs.edit().putString("logs", sb.toString()).apply();
              }

              void toast(String msg) {
                  new Handler(Looper.getMainLooper()).post(() ->
                      android.widget.Toast.makeText(getApplicationContext(), msg, android.widget.Toast.LENGTH_LONG).show());
              }

              String fmt1(float v)  { return v < 0 ? "?" : String.format("%.1f", v); }
              String fmt2(double v) { return v < 0 ? "?" : String.format("%.2f", v); }

              String readStream(InputStream is, int maxBytes) {
                  if (is == null) return "";
                  try {
                      byte[] buf = new byte[maxBytes];
                      int n = is.read(buf);
                      return n > 0 ? new String(buf, 0, n).trim() : "";
                  } catch (Exception e) { return ""; }
              }

              @Override public void onDestroy() {
                  super.onDestroy();
                  try { unregisterReceiver(toggleReceiver); } catch (Exception ignored) {}
                  try { unregisterReceiver(orderReceiver);  } catch (Exception ignored) {}
                  try { unregisterReceiver(hookLogReceiver); } catch (Exception ignored) {}
              }
          }
          SEOF

      - name: Write BootReceiver.java
        run: |
          cat > app/src/main/java/com/auto/driver/BootReceiver.java << 'BEOF'
          package com.auto.driver;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          public class BootReceiver extends BroadcastReceiver {
            @Override public void onReceive(Context ctx, Intent intent) {
              if (!Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction())) return;
              Intent svc = new Intent(ctx, AutoService.class);
              if (android.os.Build.VERSION.SDK_INT >= 26) ctx.startForegroundService(svc);
              else ctx.startService(svc);
            }
          }
          BEOF

      - name: Write MainActivity.java
        run: |
          cat > app/src/main/java/com/auto/driver/MainActivity.java << 'JEOF'
          package com.auto.driver;
          import android.app.Activity;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.Bundle;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.*;
          public class MainActivity extends Activity {
            SharedPreferences prefs;
            Switch swEnable;
            TextView tvStatus;
            final BroadcastReceiver statusReceiver = new BroadcastReceiver() {
              @Override public void onReceive(Context ctx, Intent intent) {
                if (swEnable != null) swEnable.setChecked("JAHEZ_AUTO_ON".equals(intent.getAction()));
                refreshStatus();
              }
            };
            @Override protected void onCreate(Bundle saved) {
              super.onCreate(saved);
              setContentView(R.layout.activity_main);
              prefs = getSharedPreferences("cfg", MODE_PRIVATE);
              EditText etPickup = findViewById(R.id.et_pickup);
              EditText etDrop   = findViewById(R.id.et_drop);
              SeekBar sbDelay   = findViewById(R.id.sb_delay);
              TextView tvDelay  = findViewById(R.id.tv_delay);
              swEnable = findViewById(R.id.sw_enable);
              tvStatus = findViewById(R.id.tv_status);
              Button btnSave = findViewById(R.id.btn_save);
              etPickup.setText(String.valueOf(prefs.getFloat("max_pickup", 2.0f)));
              etDrop.setText(String.valueOf(prefs.getFloat("max_drop", 5.0f)));
              int savedDelay = prefs.getInt("scan_delay", 500);
              sbDelay.setProgress(savedDelay - 50);
              tvDelay.setText(savedDelay + "ms");
              sbDelay.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                public void onProgressChanged(SeekBar sb, int p, boolean u) { tvDelay.setText((p+50)+"ms"); }
                public void onStartTrackingTouch(SeekBar sb) {}
                public void onStopTrackingTouch(SeekBar sb) { prefs.edit().putInt("scan_delay", sb.getProgress()+50).apply(); }
              });
              swEnable.setChecked(prefs.getBoolean("enabled", false));
              if (Build.VERSION.SDK_INT >= 33) requestPermissions(new String[]{"android.permission.POST_NOTIFICATIONS"}, 0);
              requestPermissions(new String[]{"android.permission.ACCESS_FINE_LOCATION","android.permission.ACCESS_COARSE_LOCATION"}, 1);
              IntentFilter f = new IntentFilter("JAHEZ_AUTO_OFF"); f.addAction("JAHEZ_AUTO_ON");
              if (Build.VERSION.SDK_INT >= 33) registerReceiver(statusReceiver, f, Context.RECEIVER_NOT_EXPORTED);
              else registerReceiver(statusReceiver, f);
              swEnable.setOnCheckedChangeListener((btn, checked) -> {
                prefs.edit().putBoolean("enabled", checked).apply();
                sendBroadcast(new Intent("JAHEZ_STATE_CHANGED"));
                refreshStatus();
              });
              btnSave.setOnClickListener(v -> {
                float pk = parseF(etPickup.getText().toString(), 2f);
                float dk = parseF(etDrop.getText().toString(), 5f);
                prefs.edit().putFloat("max_pickup", pk).putFloat("max_drop", dk).apply();
                Toast.makeText(this, "Saved ✅  Pickup≤"+pk+"km  Drop≤"+dk+"km", Toast.LENGTH_LONG).show();
                InputMethodManager imm = (InputMethodManager) getSystemService(INPUT_METHOD_SERVICE);
                if (imm != null) imm.hideSoftInputFromWindow(getWindow().getDecorView().getWindowToken(), 0);
              });
              findViewById(R.id.btn_logs).setOnClickListener(v -> startActivity(new Intent(this, LogActivity.class)));
              Intent svc = new Intent(this, AutoService.class);
              if (Build.VERSION.SDK_INT >= 26) startForegroundService(svc); else startService(svc);
            }
            @Override protected void onResume()  { super.onResume();  refreshStatus(); }
            @Override protected void onDestroy() { super.onDestroy(); try { unregisterReceiver(statusReceiver); } catch (Exception ignored) {} }
            void refreshStatus() {
              if (tvStatus == null) return;
              boolean en = prefs.getBoolean("enabled", false);
              tvStatus.setText(en ? "AUTO ACCEPT: ON" : "AUTO ACCEPT: OFF");
              tvStatus.setTextColor(en ? 0xFF4CAF50 : 0xFFFF5555);
            }
            float parseF(String s, float def) { try { return Float.parseFloat(s.trim()); } catch (Exception e) { return def; } }
          }
          JEOF

      - name: Write LogActivity.java
