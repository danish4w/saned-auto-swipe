name: Build Danish Auto QBZ
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Modified QBZ
        run: |
          if [ ! -f qbz.apk ]; then
            echo "ERROR: qbz.apk not found in repo!"
            exit 1
          fi

          mkdir -p /tmp/qbz_work
          mkdir -p /tmp/act_src/net/jahez/lsposed
          mkdir -p /tmp/act_out
          mkdir -p /tmp/dex_out

          cd /tmp/qbz_work && unzip -q $GITHUB_WORKSPACE/qbz.apk && cd -
          echo "QBZ extracted OK"

          echo "" | base64 -d > /tmp/act_src/net/jahez/lsposed/DanishSettingsActivity.java

          ANDROID_JAR=$(find $ANDROID_SDK_ROOT -name "android.jar" | grep "platforms/android-" | sort | tail -1)
          echo "Android JAR: $ANDROID_JAR"

          javac -source 8 -target 8 \
            -cp "$ANDROID_JAR" \
            /tmp/act_src/net/jahez/lsposed/DanishSettingsActivity.java \
            -d /tmp/act_out 2>&1
          echo "Compiled: $?"

          D8=$(find $ANDROID_SDK_ROOT -name "d8" | head -1)
          echo "d8: $D8"

          $D8 --output /tmp/dex_out \
            --min-api 26 \
            $(find /tmp/act_out -name "*.class" | tr '\n' ' ') 2>&1

          if [ -f /tmp/dex_out/classes.dex ]; then
            cp /tmp/dex_out/classes.dex /tmp/qbz_work/classes2.dex
            echo "classes2.dex added!"
          fi

          echo "" | base64 -d > /tmp/patch.py
          python3 /tmp/patch.py

          rm -rf /tmp/qbz_work/META-INF/

          # Pack APK - resources.arsc and .so MUST be uncompressed + aligned
          cd /tmp/qbz_work

          # Step 1: Create APK with resources.arsc and .so uncompressed
          zip -q -Z store danish_qbz_temp.apk resources.arsc
          
          # Step 2: Add .so files uncompressed
          find lib -name "*.so" | while read f; do
            zip -q -Z store danish_qbz_temp.apk "$f"
          done

          # Step 3: Add everything else compressed
          find . -not -name "danish_qbz_temp.apk" \
            -not -name "resources.arsc" \
            -not -path "./lib/*.so" \
            -not -path "./META-INF/*" \
            -type f | zip -q danish_qbz_temp.apk -@

          mv danish_qbz_temp.apk /tmp/danish_qbz_unaligned.apk
          cd -

          # Step 4: zipalign 4 bytes
          ZIPALIGN=$(find $ANDROID_SDK_ROOT -name "zipalign" | head -1)
          echo "zipalign: $ZIPALIGN"
          $ZIPALIGN -p -f 4 /tmp/danish_qbz_unaligned.apk /tmp/danish_qbz_aligned.apk
          echo "Aligned!"

          # Step 5: Sign with apksigner (v1+v2)
          APKSIGNER=$(find $ANDROID_SDK_ROOT -name "apksigner" | head -1)
          echo "apksigner: $APKSIGNER"

          keytool -genkey -v -keystore /tmp/ks.jks -alias danish \
            -keyalg RSA -keysize 2048 -validity 3650 \
            -storepass danish123 -keypass danish123 \
            -dname "CN=Danish,OU=Auto,O=Danish,L=SA,S=SA,C=SA" 2>/dev/null

          $APKSIGNER sign \
            --ks /tmp/ks.jks \
            --ks-pass pass:danish123 \
            --key-pass pass:danish123 \
            --out /tmp/danish_qbz_final.apk \
            /tmp/danish_qbz_aligned.apk 2>&1

          ls -lh /tmp/danish_qbz_final.apk
          echo "BUILD COMPLETE!"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Danish-Auto-QBZ
          path: /tmp/danish_qbz_final.apk
