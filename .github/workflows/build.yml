name: Build DanishAuto LSPosed Module
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build LSPosed Module
        run: |
          mkdir -p app/src/main/java/com/danish/lsposed
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          echo "include ':app'" > settings.gradle

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.3.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.danish.lsposed'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.danish.lsposed'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              compileOnly 'de.robv.android.xposed:api:82'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="DanishAuto"
                  android:icon="@android:drawable/ic_menu_share"
                  android:theme="@style/Theme.AppCompat">
                  <meta-data
                      android:name="xposedmodule"
                      android:value="true" />
                  <meta-data
                      android:name="xposeddescription"
                      android:value="Auto Accept Orders for Jahez Driver (Swipe Support)" />
                  <meta-data
                      android:name="xposedminversion"
                      android:value="82" />
                  <activity
                      android:name=".SettingsActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat" parent="android:Theme.DeviceDefault" />
          </resources>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">DanishAuto</string>
          </resources>
          EOF

          cat > app/src/main/res/layout/activity_settings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="20dp"
              android:background="#121212">
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="DanishAuto Settings"
                  android:textSize="22sp"
                  android:textColor="#FFFFFF"
                  android:layout_marginBottom="20dp"/>
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Pickup Max (km)"
                  android:textColor="#AAAAAA"/>
              <EditText
                  android:id="@+id/et_pickup_max"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:inputType="numberDecimal"
                  android:text="5.0"
                  android:textColor="#FFFFFF"
                  android:background="#333333"
                  android:padding="10dp"
                  android:layout_marginBottom="16dp"/>
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Drop Max (km)"
                  android:textColor="#AAAAAA"/>
              <EditText
                  android:id="@+id/et_drop_max"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:inputType="numberDecimal"
                  android:text="10.0"
                  android:textColor="#FFFFFF"
                  android:background="#333333"
                  android:padding="10dp"
                  android:layout_marginBottom="16dp"/>
              <Switch
                  android:id="@+id/switch_enabled"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Auto Accept"
                  android:textColor="#FFFFFF"
                  android:layout_marginBottom="20dp"/>
              <Button
                  android:id="@+id/btn_save"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Save"
                  android:backgroundTint="#4CAF50"/>
          </LinearLayout>
          EOF

          cat > app/src/main/java/com/danish/lsposed/SettingsActivity.java << 'EOF'
          package com.danish.lsposed;

          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.Switch;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class SettingsActivity extends AppCompatActivity {
              private SharedPreferences prefs;
              private EditText etPickupMax, etDropMax;
              private Switch switchEnabled;
              private Button btnSave;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_settings);
                  prefs = getSharedPreferences("danish_prefs", MODE_PRIVATE);
                  etPickupMax = findViewById(R.id.et_pickup_max);
                  etDropMax = findViewById(R.id.et_drop_max);
                  switchEnabled = findViewById(R.id.switch_enabled);
                  btnSave = findViewById(R.id.btn_save);

                  etPickupMax.setText(String.valueOf(prefs.getFloat("pickup_max", 5.0f)));
                  etDropMax.setText(String.valueOf(prefs.getFloat("drop_max", 10.0f)));
                  switchEnabled.setChecked(prefs.getBoolean("enabled", false));

                  btnSave.setOnClickListener(v -> {
                      float pickup, drop;
                      try { pickup = Float.parseFloat(etPickupMax.getText().toString()); } catch(Exception e) { pickup = 5.0f; }
                      try { drop = Float.parseFloat(etDropMax.getText().toString()); } catch(Exception e) { drop = 10.0f; }
                      prefs.edit()
                          .putFloat("pickup_max", pickup)
                          .putFloat("drop_max", drop)
                          .putBoolean("enabled", switchEnabled.isChecked())
                          .apply();
                      Toast.makeText(this, "Settings Saved", Toast.LENGTH_SHORT).show();
                  });
              }
          }
          EOF

          cat > app/src/main/assets/xposed_init << 'EOF'
          com.danish.lsposed.MainHook
          EOF

          cat > app/src/main/java/com/danish/lsposed/MainHook.java << 'EOF'
          package com.danish.lsposed;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.content.Context;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.os.SystemClock;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.Button;
          import android.widget.TextView;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;

          public class MainHook implements de.robv.android.xposed.IXposedHookLoadPackage {
              private static final String TAG = "DanishAuto";
              private static final String PACKAGE_NAME = "net.jahez.fleets";
              private static SharedPreferences prefs;
              private static Handler uiHandler = new Handler(Looper.getMainLooper());
              private static boolean isProcessing = false;

              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable {
                  if (!lpparam.packageName.equals(PACKAGE_NAME)) return;
                  XposedBridge.log(TAG + " Hooked into Jahez Driver");
                  Class<?> orderActivity = XposedHelpers.findClass("com.jahez.fleets.ui.order.OrderActivity", lpparam.classLoader);
                  XposedHelpers.findAndHookMethod(orderActivity, "onCreate", Bundle.class, new XC_MethodHook() {
                      @Override
                      protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                          Context context = (Context) param.thisObject;
                          prefs = context.getSharedPreferences("danish_prefs", Context.MODE_PRIVATE);
                          if (!prefs.getBoolean("enabled", false)) return;
                          uiHandler.postDelayed(() -> {
                              try { processOrder(context); }
                              catch (Throwable t) { XposedBridge.log(TAG + " Error: " + t.getMessage()); }
                          }, 800);
                      }
                  });
              }

              private void processOrder(Context context) {
                  if (isProcessing) return;
                  isProcessing = true;
                  try {
                      View decorView = getDecorView();
                      if (decorView == null) return;
                      List<Float> distances = new ArrayList<>();
                      scanForKm(distances, decorView);
                      if (distances.size() < 2) return;
                      float pickupKm = distances.get(0);
                      float dropKm = distances.get(1);
                      float pickupMax = prefs.getFloat("pickup_max", 5.0f);
                      float dropMax = prefs.getFloat("drop_max", 10.0f);
                      XposedBridge.log(TAG + " Distances: P " + pickupKm + " D " + dropKm + " | Limits: P " + pickupMax + " D " + dropMax);
                      if (pickupKm <= pickupMax && dropKm <= dropMax) {
                          XposedBridge.log(TAG + " Accepting order - performing swipe");
                          performSwipeOnAcceptButton(decorView);
                          sendNotification(context, pickupKm, dropKm);
                      }
                  } catch (Exception e) {
                      XposedBridge.log(TAG + " Error: " + e.getMessage());
                  } finally { isProcessing = false; }
              }

              private View getDecorView() {
                  try {
                      Class<?> activityThreadClass = Class.forName("android.app.ActivityThread");
                      Object activityThread = activityThreadClass.getMethod("currentActivityThread").invoke(null);
                      Object activities = activityThreadClass.getDeclaredField("mActivities").get(activityThread);
                      if (activities instanceof android.util.ArrayMap) {
                          android.util.ArrayMap<?,?> map = (android.util.ArrayMap<?,?>) activities;
                          for (Object record : map.values()) {
                              Object activity = record.getClass().getDeclaredField("activity").get(record);
                              if (activity instanceof android.app.Activity) {
                                  return ((android.app.Activity) activity).getWindow().getDecorView();
                              }
                          }
                      }
                  } catch (Exception e) {
                      XposedBridge.log(TAG + " getDecorView error: " + e.getMessage());
                  }
                  return null;
              }

              private void scanForKm(List<Float> out, View view) {
                  if (view == null) return;
                  if (view instanceof TextView) {
                      String text = ((TextView) view).getText().toString();
                      Pattern p = Pattern.compile("(\\d+\\.?\\d*)\\s*[Kk][Mm]");
                      Matcher m = p.matcher(text);
                      if (m.find()) {
                          try {
                              float val = Float.parseFloat(m.group(1).replace(",", "."));
                              if (val > 0 && val < 100 && !out.contains(val)) out.add(val);
                          } catch(Exception e) {}
                      }
                  } else if (view instanceof ViewGroup) {
                      ViewGroup group = (ViewGroup) view;
                      for (int i = 0; i < group.getChildCount(); i++) {
                          scanForKm(out, group.getChildAt(i));
                      }
                  }
              }

              private void performSwipeOnAcceptButton(View root) {
                  // Try to find Accept button first
                  Button acceptBtn = findAcceptButton(root);
                  int startX, endX, y;
                  int screenWidth = root.getResources().getDisplayMetrics().widthPixels;
                  int screenHeight = root.getResources().getDisplayMetrics().heightPixels;

                  if (acceptBtn != null) {
                      int[] location = new int[2];
                      acceptBtn.getLocationOnScreen(location);
                      startX = location[0] + 20;
                      endX = location[0] + acceptBtn.getWidth() - 20;
                      y = location[1] + acceptBtn.getHeight() / 2;
                      XposedBridge.log(TAG + " Swiping on button at: " + startX + " to " + endX + ", Y=" + y);
                  } else {
                      // Fallback: swipe at bottom of screen
                      startX = (int)(screenWidth * 0.2);
                      endX = (int)(screenWidth * 0.8);
                      y = (int)(screenHeight * 0.85);
                      XposedBridge.log(TAG + " Fallback swipe at bottom");
                  }

                  try {
                      // Inject touch events for swipe
                      Class<?> inputManagerClass = Class.forName("android.hardware.input.InputManager");
                      Method getInstance = inputManagerClass.getMethod("getInstance");
                      Object inputManager = getInstance.invoke(null);
                      Method injectInputEvent = inputManagerClass.getMethod("injectInputEvent", MotionEvent.class, int.class);

                      long downTime = SystemClock.uptimeMillis();
                      // DOWN event
                      MotionEvent downEvent = MotionEvent.obtain(downTime, downTime, MotionEvent.ACTION_DOWN, startX, y, 0);
                      injectInputEvent.invoke(inputManager, downEvent, 0);
                      downEvent.recycle();

                      // MOVE event (after 50ms)
                      Thread.sleep(50);
                      long moveTime = SystemClock.uptimeMillis();
                      MotionEvent moveEvent = MotionEvent.obtain(downTime, moveTime, MotionEvent.ACTION_MOVE, endX, y, 0);
                      injectInputEvent.invoke(inputManager, moveEvent, 0);
                      moveEvent.recycle();

                      // UP event (after 100ms total)
                      Thread.sleep(50);
                      long upTime = SystemClock.uptimeMillis();
                      MotionEvent upEvent = MotionEvent.obtain(downTime, upTime, MotionEvent.ACTION_UP, endX, y, 0);
                      injectInputEvent.invoke(inputManager, upEvent, 0);
                      upEvent.recycle();

                      XposedBridge.log(TAG + " Swipe injected successfully");
                  } catch (Exception e) {
                      XposedBridge.log(TAG + " Swipe failed: " + e.getMessage());
                  }
              }

              private Button findAcceptButton(View view) {
                  if (view instanceof Button) {
                      String text = ((Button) view).getText().toString();
                      if (text.equals("Accept") || text.equals("ACCEPT") || text.equals("قبول")) return (Button) view;
                  }
                  if (view instanceof ViewGroup) {
                      ViewGroup group = (ViewGroup) view;
                      for (int i = 0; i < group.getChildCount(); i++) {
                          Button b = findAcceptButton(group.getChildAt(i));
                          if (b != null) return b;
                      }
                  }
                  return null;
              }

              private void sendNotification(Context ctx, float p, float d) {
                  try {
                      NotificationManager nm = (NotificationManager) ctx.getSystemService(Context.NOTIFICATION_SERVICE);
                      if (Build.VERSION.SDK_INT >= 26) {
                          NotificationChannel ch = new NotificationChannel("danish_ch", "DanishAuto", NotificationManager.IMPORTANCE_HIGH);
                          nm.createNotificationChannel(ch);
                      }
                      Notification.Builder builder = Build.VERSION.SDK_INT >= 26 ? new Notification.Builder(ctx, "danish_ch") : new Notification.Builder(ctx);
                      builder.setSmallIcon(android.R.drawable.ic_dialog_info)
                             .setContentTitle("✅ Order Accepted")
                             .setContentText("Pickup: " + p + "km, Drop: " + d + "km")
                             .setAutoCancel(true);
                      nm.notify(1001, builder.build());
                  } catch (Exception e) {
                      XposedBridge.log(TAG + " Notification error: " + e.getMessage());
                  }
              }
          }
          EOF

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DanishAuto-LSPosed
          path: app/build/outputs/apk/debug/*.apk
