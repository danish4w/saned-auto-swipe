name: Build JahezDiagnostic

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          cat > gradle/wrapper/gradle-wrapper.properties << 'WEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/zips
          WEOF

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/danish/diag
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/assets

      - name: Write Gradle Files
        run: |
          cat > settings.gradle << 'SEOF'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositories {
              google(); mavenCentral()
              maven { url 'https://api.xposed.info/' }
            }
          }
          rootProject.name = "JahezDiagnostic"
          include ':app'
          SEOF
          cat > build.gradle << 'BEOF'
          plugins { id 'com.android.application' version '8.5.2' apply false }
          BEOF
          cat > gradle.properties << 'GEOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          GEOF
          cat > app/build.gradle << 'ABEOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.danish.diag'
            compileSdk 34
            defaultConfig {
              applicationId 'com.danish.diag'
              minSdk 26
              targetSdk 34
              versionCode 1
              versionName '1.0'
            }
            buildTypes { release { minifyEnabled false } }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            compileOnly 'de.robv.android.xposed:api:82'
          }
          ABEOF

      - name: Write Icon
        run: |
          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'BGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108" xmlns:android="http://schemas.android.com/apk/res/android">
            <path android:fillColor="#1565C0" android:pathData="M0,0 L108,0 L108,108 L0,108 Z"/>
          </vector>
          BGEOF
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'FGEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108" xmlns:android="http://schemas.android.com/apk/res/android">
            <path android:fillColor="#FFFFFF" android:pathData="M30,54 L50,30 L70,54 L58,54 L58,78 L42,78 L42,54 Z"/>
          </vector>
          FGEOF
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'ICEOF'
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          ICEOF
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'RNDEOF'
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          RNDEOF

      - name: Write Xposed Files
        run: echo "com.danish.diag.DiagHook" > app/src/main/assets/xposed_init

      - name: Write Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MEOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.danish.diag">
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC"/>
            <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
            <application android:allowBackup="false" android:icon="@mipmap/ic_launcher" android:label="Jahez Diag" android:roundIcon="@mipmap/ic_launcher_round" android:theme="@style/AppTheme">
              <meta-data android:name="xposedmodule" android:value="true"/>
              <meta-data android:name="xposeddescription" android:value="Jahez diagnostic - Broadcast, Touch, UI"/>
              <meta-data android:name="xposedminversion" android:value="82"/>
              <activity android:name=".MainActivity" android:exported="true">
                <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
              </activity>
              <activity android:name=".LogActivity" android:exported="false"/>
              <service android:name=".DiagService" android:exported="false" android:foregroundServiceType="dataSync"/>
              <service android:name=".DiagAccessibility" android:exported="true" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE">
                <intent-filter><action android:name="android.accessibilityservice.AccessibilityService"/></intent-filter>
                <meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_config"/>
              </service>
              <receiver android:name=".BootReceiver" android:exported="true">
                <intent-filter><action android:name="android.intent.action.BOOT_COMPLETED"/></intent-filter>
              </receiver>
            </application>
          </manifest>
          MEOF

      - name: Write DiagHook (Fixed - No OkHttp dependency crash)
        run: |
          cat > app/src/main/java/com/danish/diag/DiagHook.java << 'HEOF'
          package com.danish.diag;
          
          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Bundle;
          import android.util.Log;
          import android.view.View;
          import android.view.MotionEvent;
          import java.net.HttpURLConnection;
          import java.net.URL;
          
          public class DiagHook implements IXposedHookLoadPackage {
              static final String TARGET = "net.jahez.fleets";
              static final String TAG = "JahezDiag";
              
              @Override 
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lp) {
                  if (!TARGET.equals(lp.packageName)) return;
                  log("Hook loaded for: " + lp.packageName);
          
                  // 1. BroadcastReceiver Hook - Most important for order data
                  try {
                      XposedHelpers.findAndHookMethod(BroadcastReceiver.class, "onReceive", Context.class, Intent.class, new XC_MethodHook() {
                          @Override
                          protected void beforeHookedMethod(MethodHookParam param) {
                              Intent intent = (Intent) param.args[1];
                              if (intent == null) return;
                              Bundle extras = intent.getExtras();
                              if (extras != null && extras.containsKey("EXTRA_DISPATCH_TYPE")) {
                                  StringBuilder sb = new StringBuilder("📡 Broadcast:");
                                  for (String key : extras.keySet()) {
                                      Object val = extras.get(key);
                                      String valStr = (val != null) ? val.toString() : "null";
                                      if (valStr.length() > 150) valStr = valStr.substring(0, 150);
                                      sb.append("\n      ").append(key).append(" = ").append(valStr);
                                  }
                                  log(sb.toString());
                              }
                          }
                      });
                      log("✅ BroadcastReceiver hook installed");
                  } catch (Exception e) {
                      log("❌ BroadcastReceiver hook failed: " + e);
                  }
          
                  // 2. HttpURLConnection Hook (works even if OkHttp is obfuscated)
                  try {
                      XposedHelpers.findAndHookMethod(HttpURLConnection.class, "connect", new XC_MethodHook() {
                          @Override
                          protected void beforeHookedMethod(MethodHookParam param) {
                              HttpURLConnection conn = (HttpURLConnection) param.thisObject;
                              try {
                                  String url = conn.getURL().toString();
                                  String method = conn.getRequestMethod();
                                  log("🌐 " + method + " " + url);
                              } catch (Exception e) { /* ignore */ }
                          }
                      });
                      log("✅ HttpURLConnection hook installed");
                  } catch (Exception e) {
                      log("⚠️ HttpURLConnection hook failed (non-critical): " + e);
                  }
          
                  // 3. View Touch Hook
                  try {
                      XposedHelpers.findAndHookMethod(View.class, "dispatchTouchEvent", MotionEvent.class, new XC_MethodHook() {
                          @Override
                          protected void beforeHookedMethod(MethodHookParam param) {
                              MotionEvent event = (MotionEvent) param.args[0];
                              if (event == null) return;
                              int action = event.getActionMasked();
                              if (action != MotionEvent.ACTION_DOWN && action != MotionEvent.ACTION_UP) return;
                              View view = (View) param.thisObject;
                              String viewInfo = view.getClass().getSimpleName();
                              if (view.getId() != View.NO_ID) {
                                  try {
                                      String idName = view.getResources().getResourceEntryName(view.getId());
                                      viewInfo += " [id=" + idName + "]";
                                  } catch (Exception ignored) {}
                              }
                              String actionName = (action == MotionEvent.ACTION_DOWN) ? "DOWN" : "UP";
                              log(String.format("👆 TOUCH %s x=%.1f y=%.1f view=%s",
                                  actionName, event.getRawX(), event.getRawY(), viewInfo));
                          }
                      });
                      log("✅ View touch hook installed");
                  } catch (Exception e) {
                      log("❌ View touch hook failed: " + e);
                  }
          
                  // 4. Activity onResume (Order screen detection)
                  try {
                      XposedHelpers.findAndHookMethod("android.app.Activity", lp.classLoader, "onResume", new XC_MethodHook() {
                          @Override
                          protected void afterHookedMethod(MethodHookParam param) {
                              android.app.Activity activity = (android.app.Activity) param.thisObject;
                              String className = activity.getClass().getName();
                              if (className.contains("IncomingDispatch")) {
                                  log("📱 Order Screen: " + className);
                                  // Log intent extras if any (usually none, but just in case)
                                  Intent intent = activity.getIntent();
                                  if (intent != null && intent.getExtras() != null && !intent.getExtras().isEmpty()) {
                                      Bundle extras = intent.getExtras();
                                      StringBuilder sb = new StringBuilder("📦 Activity Extras:");
                                      for (String key : extras.keySet()) {
                                          sb.append("\n      ").append(key).append(" = ").append(extras.get(key));
                                      }
                                      log(sb.toString());
                                  }
                              }
                          }
                      });
                      log("✅ Activity hook installed");
                  } catch (Exception e) {
                      log("❌ Activity hook failed: " + e);
                  }
              }
              
              private void log(String msg) {
                  Log.d(TAG, msg);
                  XposedBridge.log("[JahezDiag] " + msg);
              }
          }
          HEOF

      - name: Write DiagService (same as before)
        run: |
          cat > app/src/main/java/com/danish/diag/DiagService.java << 'SEOF'
          package com.danish.diag;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.Service;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.IBinder;
          import android.util.Log;
          import androidx.core.app.NotificationCompat;
          public class DiagService extends Service {
              private static final String TAG = "JahezDiag";
              private SharedPreferences prefs;
              private final BroadcastReceiver logReceiver = new BroadcastReceiver() {
                  @Override public void onReceive(Context ctx, Intent intent) {
                      String msg = intent.getStringExtra("msg");
                      if (msg != null) saveLog(msg);
                  }
              };
              @Override public void onCreate() {
                  super.onCreate();
                  prefs = getSharedPreferences("diag_data", MODE_PRIVATE);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel ch = new NotificationChannel("jahez_diag", "Jahez Diag", NotificationManager.IMPORTANCE_LOW);
                      getSystemService(NotificationManager.class).createNotificationChannel(ch);
                  }
                  startForeground(1001, new NotificationCompat.Builder(this, "jahez_diag")
                      .setContentTitle("Jahez Diag")
                      .setContentText("Monitoring...")
                      .setSmallIcon(android.R.drawable.ic_menu_info_details)
                      .build());
                  registerReceiver(logReceiver, new IntentFilter("JAHEZ_DIAG_LOG"), Context.RECEIVER_NOT_EXPORTED);
                  Log.d(TAG, "Service started");
              }
              private void saveLog(String msg) {
                  java.text.SimpleDateFormat sdf = new java.text.SimpleDateFormat("HH:mm:ss.SSS", java.util.Locale.US);
                  String entry = "[" + sdf.format(new java.util.Date()) + "] " + msg;
                  String existing = prefs.getString("logs", "");
                  String[] lines = existing.isEmpty() ? new String[0] : existing.split("\n");
                  StringBuilder sb = new StringBuilder(entry);
                  for (int i = 0; i < Math.min(lines.length, 499); i++) sb.append("\n").append(lines[i]);
                  prefs.edit().putString("logs", sb.toString()).apply();
              }
              @Override public int onStartCommand(Intent i, int f, int id) { return START_STICKY; }
              @Override public IBinder onBind(Intent i) { return null; }
              @Override public void onDestroy() { try { unregisterReceiver(logReceiver); } catch (Exception e) {} }
          }
          SEOF

      - name: Write DiagAccessibility
        run: |
          cat > app/src/main/res/xml/accessibility_config.xml << 'ACEOF'
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
            android:accessibilityEventTypes="typeWindowStateChanged|typeWindowContentChanged|typeViewClicked"
            android:accessibilityFeedbackType="feedbackGeneric"
            android:accessibilityFlags="flagDefault|flagReportViewIds"
            android:canRetrieveWindowContent="true"
            android:notificationTimeout="100"
            android:packageNames="net.jahez.fleets"/>
          ACEOF
          cat > app/src/main/java/com/danish/diag/DiagAccessibility.java << 'JAEOF'
          package com.danish.diag;
          import android.accessibilityservice.AccessibilityService;
          import android.content.SharedPreferences;
          import android.view.accessibility.AccessibilityEvent;
          import android.view.accessibility.AccessibilityNodeInfo;
          import android.util.Log;
          public class DiagAccessibility extends AccessibilityService {
              private SharedPreferences prefs;
              @Override public void onServiceConnected() {
                  super.onServiceConnected();
                  prefs = getSharedPreferences("diag_data", MODE_PRIVATE);
                  saveLog("♿ Accessibility ON");
              }
              @Override public void onAccessibilityEvent(AccessibilityEvent event) {
                  if (!"net.jahez.fleets".equals(event.getPackageName())) return;
                  if (event.getEventType() == AccessibilityEvent.TYPE_WINDOW_STATE_CHANGED) {
                      saveLog("🖥 Screen: " + event.getClassName());
                      dumpUI();
                  } else if (event.getEventType() == AccessibilityEvent.TYPE_VIEW_CLICKED) {
                      String text = !event.getText().isEmpty() ? event.getText().get(0).toString() : "";
                      saveLog("🖱 Click: " + text);
                  }
              }
              private void dumpUI() {
                  AccessibilityNodeInfo root = getRootInActiveWindow();
                  if (root == null) return;
                  StringBuilder dump = new StringBuilder("📱 UI Dump:");
                  dumpNode(root, dump, 0);
                  if (dump.length() > 2000) dump.setLength(2000);
                  saveLog(dump.toString());
                  root.recycle();
              }
              private void dumpNode(AccessibilityNodeInfo node, StringBuilder sb, int depth) {
                  if (node == null || depth > 4) return;
                  String text = node.getText() != null ? node.getText().toString() : "";
                  String id = node.getViewIdResourceName() != null ? node.getViewIdResourceName() : "";
                  if (!text.isEmpty() || !id.isEmpty()) {
                      for (int i = 0; i < depth; i++) sb.append("  ");
                      sb.append("• ");
                      if (!id.isEmpty()) sb.append("[").append(id).append("] ");
                      if (!text.isEmpty()) sb.append("\"").append(text.substring(0, Math.min(text.length(), 60))).append("\"");
                      if (node.isClickable()) sb.append(" (clickable)");
                      sb.append("\n");
                  }
                  for (int i = 0; i < node.getChildCount(); i++) {
                      AccessibilityNodeInfo child = node.getChild(i);
                      if (child != null) { dumpNode(child, sb, depth + 1); child.recycle(); }
                  }
              }
              private void saveLog(String msg) {
                  if (prefs == null) return;
                  java.text.SimpleDateFormat sdf = new java.text.SimpleDateFormat("HH:mm:ss.SSS", java.util.Locale.US);
                  String entry = "[" + sdf.format(new java.util.Date()) + "] " + msg;
                  String existing = prefs.getString("logs", "");
                  String[] lines = existing.isEmpty() ? new String[0] : existing.split("\n");
                  StringBuilder sb = new StringBuilder(entry);
                  for (int i = 0; i < Math.min(lines.length, 499); i++) sb.append("\n").append(lines[i]);
                  prefs.edit().putString("logs", sb.toString()).apply();
              }
              @Override public void onInterrupt() {}
          }
          JAEOF

      - name: Write MainActivity
        run: |
          cat > app/src/main/java/com/danish/diag/MainActivity.java << 'JEOF'
          package com.danish.diag;
          import android.app.Activity;
          import android.content.Intent;
          android.content.SharedPreferences;
          android.net.Uri;
          android.os.Build;
          android.os.Bundle;
          android.provider.Settings;
          android.widget.Button;
          android.widget.TextView;
          android.widget.Toast;
          public class MainActivity extends Activity {
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  startService(new Intent(this, DiagService.class));
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU)
                      requestPermissions(new String[]{"android.permission.POST_NOTIFICATIONS"}, 100);
                  requestPermissions(new String[]{"android.permission.ACCESS_FINE_LOCATION","android.permission.ACCESS_COARSE_LOCATION"}, 101);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M && !Settings.canDrawOverlays(this))
                      startActivity(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:" + getPackageName())));
                  findViewById(R.id.btn_logs).setOnClickListener(v -> startActivity(new Intent(this, LogActivity.class)));
                  findViewById(R.id.btn_clear).setOnClickListener(v -> {
                      getSharedPreferences("diag_data", MODE_PRIVATE).edit().remove("logs").apply();
                      Toast.makeText(this, "Cleared", Toast.LENGTH_SHORT).show();
                      updateStatus();
                  });
                  updateStatus();
              }
              private boolean isAccessibilityEnabled() {
                  String svc = getPackageName() + "/" + DiagAccessibility.class.getName();
                  String enabled = Settings.Secure.getString(getContentResolver(), Settings.Secure.ENABLED_ACCESSIBILITY_SERVICES);
                  return enabled != null && enabled.contains(svc);
              }
              private void updateStatus() {
                  TextView tv = findViewById(R.id.tv_status);
                  tv.setText("Jahez Diagnostic\n━━━━━━━━━━━━━━\n✅ LSPosed: Enabled\n" +
                      (isAccessibilityEnabled() ? "✅ Accessibility: ON" : "❌ Accessibility: OFF") +
                      "\n━━━━━━━━━━━━━━\n📌 Order aane par:\n• Broadcast extras\n• Network calls\n• Touch events\n• UI dump\n━━━━━━━━━━━━━━\n👉 Logs dekhne ke liye 'View Logs' dabayein");
              }
              @Override protected void onResume() { super.onResume(); updateStatus(); }
          }
          JEOF

      - name: Write LogActivity
        run: |
          cat > app/src/main/java/com/danish/diag/LogActivity.java << 'LEOF'
          package com.danish.diag;
          import android.app.Activity;
          import android.content.SharedPreferences;
          android.os.Bundle;
          android.widget.Button;
          android.widget.TextView;
          public class LogActivity extends Activity {
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_log);
                  SharedPreferences prefs = getSharedPreferences("diag_data", MODE_PRIVATE);
                  TextView tv = findViewById(R.id.tv_log);
                  String logs = prefs.getString("logs", "");
                  tv.setText(logs.isEmpty() ? "No logs yet.\nOpen Saned and accept an order." : logs);
                  findViewById(R.id.btn_clear).setOnClickListener(v -> {
                      prefs.edit().remove("logs").apply();
                      tv.setText("Logs cleared.");
                  });
                  findViewById(R.id.btn_back).setOnClickListener(v -> finish());
              }
          }
          LEOF

      - name: Write BootReceiver
        run: |
          cat > app/src/main/java/com/danish/diag/BootReceiver.java << 'BEOF'
          package com.danish.diag;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          android.content.Intent;
          public class BootReceiver extends BroadcastReceiver {
              @Override public void onReceive(Context ctx, Intent intent) {
                  if (Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction()))
                      ctx.startService(new Intent(ctx, DiagService.class));
              }
          }
          BEOF

      - name: Write Layouts
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'LEOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:orientation="vertical" android:padding="20dp" android:background="#0D1117">
