name: Build AutoDriver

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          cat > gradle/wrapper/gradle-wrapper.properties << 'WEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/zips
          WEOF

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/auto/driver
          mkdir -p app/src/main/res/{layout,values,xml,drawable,mipmap-anydpi-v26}
          mkdir -p app/src/main/assets

      - name: Write Gradle Files
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
            repositories {
              google(); mavenCentral()
              maven { url 'https://api.xposed.info/' }
              maven { url 'https://jitpack.io' }
            }
          }
          rootProject.name = "AutoDriver"
          include ':app'
          EOF
          cat > build.gradle << 'EOF'
          plugins { id 'com.android.application' version '8.5.2' apply false }
          EOF
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.auto.driver'
            compileSdk 34
            defaultConfig {
              applicationId 'com.auto.driver'
              minSdk 26; targetSdk 34
              versionCode 27; versionName '27.0'
            }
            buildTypes { release { minifyEnabled false } }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.google.android.material:material:1.12.0'
            compileOnly 'de.robv.android.xposed:api:82'
            implementation 'top.canyie.pine:core:0.2.9'
          }
          EOF

      - name: Write Icons and Config
        run: |
          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#1B5E20" android:pathData="M0,0 L108,0 L108,108 L0,108 Z"/>
          </vector>
          EOF
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#FFFFFF" android:pathData="M25,54 L35,44 L47,60 L73,30 L83,40 L47,82 Z"/>
          </vector>
          EOF
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          cat > app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="false">
              <trust-anchors><certificates src="system"/></trust-anchors>
            </base-config>
          </network-security-config>
          EOF
          echo "com.auto.driver.SanedHook" > app/src/main/assets/xposed_init

      - name: Write Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC"/>
            <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
            <application android:label="Auto Driver" android:icon="@mipmap/ic_launcher"
              android:roundIcon="@mipmap/ic_launcher_round" android:theme="@style/AppTheme"
              android:allowBackup="false" android:networkSecurityConfig="@xml/network_security_config">
              <meta-data android:name="xposedmodule" android:value="true"/>
              <meta-data android:name="xposeddescription" android:value="Auto Driver v30"/>
              <meta-data android:name="xposedminversion" android:value="82"/>
              <activity android:name=".MainActivity" android:exported="true"
                android:windowSoftInputMode="stateHidden|adjustPan">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
              <activity android:name=".LogActivity" android:exported="false"/>
              <service android:name=".AutoService" android:exported="false"
                android:foregroundServiceType="dataSync"/>
              <receiver android:name=".BootReceiver" android:exported="true">
                <intent-filter><action android:name="android.intent.action.BOOT_COMPLETED"/></intent-filter>
              </receiver>
            </application>
          </manifest>
          EOF

      - name: Write SanedHook.java
        run: |
          cat > app/src/main/java/com/auto/driver/SanedHook.java << 'HEOF'
          package com.auto.driver;

          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.os.Bundle;

          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;

          public class SanedHook implements IXposedHookLoadPackage {

              static final String TARGET         = "net.jahez.fleets";
              static final String OUR_PKG        = "com.auto.driver";
              static final String ORDER_ACTIVITY = "net.jahez.fleets.dispatch.accept.IncomingDispatchActivity";

              // AWS APK jaisa: IncomingDispatchViewModel.acceptAutoDispatch hook karo
              static final String VIEWMODEL      = "net.saned.incoming.presentation.IncomingDispatchViewModel";

              private volatile String capturedToken = "";
              private volatile int tokenCount = 0;
              private volatile boolean vmHooked = false;
              private volatile boolean swipeReceiverRegistered = false;
              private long lastBcast = 0;

              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lp) {
                  if (!TARGET.equals(lp.packageName)) return;
                  XposedBridge.log("[AutoDriver] v25 loading into " + lp.packageName);

                  // Hook 1: Activity.onResume — order data + lazy ViewModel hook
                  hookActivityOnResume(lp);

                  // Hook 2: URLConnection backup for token
                  hookURLConnection(lp);
              }

              private void hookActivityOnResume(XC_LoadPackage.LoadPackageParam lp) {
                  try {
                      XposedHelpers.findAndHookMethod(
                          "android.app.Activity", lp.classLoader, "onResume",
                          new XC_MethodHook() {
                              @Override
                              protected void afterHookedMethod(MethodHookParam param) {
                                  android.app.Activity act = (android.app.Activity) param.thisObject;
                                  String actName = act.getClass().getName();

                                  // Register swipe receiver once
                                  registerSwipeReceiver(act);

                                  // Hook ViewModel — retry on every Saned activity
                                  // IncomingDispatchActivity pe classes7 definitely loaded hoti hai
                                  if (!vmHooked) {
                                      if (actName.startsWith("net.jahez") || actName.startsWith("net.saned")) {
                                          hookViewModel(act);
                                      }
                                  }
                                  // Extra retry on order screen specifically
                                  if (ORDER_ACTIVITY.equals(actName) && !vmHooked) {
                                      hookViewModel(act);
                                  }

                                  if (!ORDER_ACTIVITY.equals(actName)) return;
                                  long now = System.currentTimeMillis();
                                  if (now - lastBcast < 2000) return;
                                  lastBcast = now;

                                  try {
                                      Bundle extras = act.getIntent() != null ? act.getIntent().getExtras() : null;
                                      if (extras == null) { sendLog(act, "⚠️ extras null"); return; }

                                      String requestId = extractRequestId(extras);
                                      double pickupLat = getDouble(extras, "EXTRA_DISPATCH_PICKUP_LATITUDE");
                                      double pickupLon = getDouble(extras, "EXTRA_DISPATCH_PICKUP_LONGITUDE");
                                      double dropDist  = getDouble(extras, "EXTRA_DISTANCE");
                                      double price     = getDouble(extras, "EXTRA_DELIVERY_PRICE");
                                      double bonus     = getDouble(extras, "EXTRA_BONUS_AMOUNT");

                                      String tkStatus = capturedToken.isEmpty()
                                          ? "❌ NO TOKEN → swipe"
                                          : "✅ #" + tokenCount;

                                      sendLog(act, "📦 id=" + requestId
                                          + " drop=" + String.format("%.2f", dropDist) + "km"
                                          + " ₿" + price + "+" + bonus + " | " + tkStatus);

                                      Intent bc = new Intent("JAHEZ_ORDER_DATA");
                                      bc.setPackage(OUR_PKG);
                                      bc.putExtra("request_id", requestId);
                                      bc.putExtra("pickup_lat", pickupLat);
                                      bc.putExtra("pickup_lon", pickupLon);
                                      bc.putExtra("drop_dist",  dropDist);
                                      bc.putExtra("price",      price);
                                      bc.putExtra("bonus",      bonus);
                                      bc.putExtra("auth_token", capturedToken);
                                      bc.putExtra("has_token",  !capturedToken.isEmpty());
                                      bc.putExtra("is_order",   true);
                                      act.sendBroadcast(bc);
                                  } catch (Throwable e) {
                                      sendLog(act, "❌ order: " + e.getMessage());
                                  }
                              }
                          }
                      );
                      XposedBridge.log("[AutoDriver] ✅ onResume hook OK");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ onResume: " + e.getMessage());
                  }
              }

              // IncomingDispatchViewModel hook — XposedBridge with Activity CL
              private void hookViewModel(android.app.Activity act) {
                  ClassLoader cl = act.getClassLoader();
                  hookViewModelXposed(cl, act);
                  hookTokenClasses(cl, act);
              }
              private void hookViewModelXposed(ClassLoader cl, android.app.Activity act) {
                  try {
                      Class<?> vmClass = cl.loadClass(VIEWMODEL);
                      int hooked = 0;
                      for (String method : new String[]{"acceptAutoDispatch", "acceptManualDispatch"}) {
                          try {
                              XposedBridge.hookAllMethods(vmClass, method, new XC_MethodHook() {
                                  @Override protected void beforeHookedMethod(MethodHookParam p) {
                                      XposedBridge.log("[AutoDriver] 🎯 VM." + p.method.getName() + " called!");
                                      sendLog(act, "🎯 accept triggered!");
                                  }
                              });
                              hooked++;
                              XposedBridge.log("[AutoDriver] ✅ VM." + method + " OK");
                          } catch (Throwable e) {
                              XposedBridge.log("[AutoDriver] ⚠️ VM." + method + ": " + e.getMessage());
                          }
                      }
                      if (hooked > 0) {
                          vmHooked = true; // only set when at least one hook succeeded
                          sendLog(act, "✅ VM " + hooked + " hooks OK!");
                      } else {
                          vmHooked = false; // allow retry
                          sendLog(act, "⚠️ VM hook failed, will retry");
                      }
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ VM: " + e.getMessage());
                      vmHooked = false; // allow retry
                  }
              }

              private void hookTokenClasses(ClassLoader cl, android.app.Activity act) {
                  String[] tokenClasses = {
                      "net.saned.login.remote.model.dto.AuthAccessTokenDto",
                      "net.saned.login.remote.model.dto.Auth",
                      "net.saned.login.remote.model.dto.CompleteLoginData"
                  };
                  int pineCount = 0, xposedCount = 0;

                  // Load Pine from OUR classLoader (not Saned's)
                  // Pine bypasses lsplant - works on MIUI even when lsplant fails
                  ClassLoader ourCL = SanedHook.class.getClassLoader();
                  Class<?> pineClass = null;
                  try {
                      pineClass = ourCL.loadClass("top.canyie.pine.Pine");
                      XposedBridge.log("[AutoDriver] 🌲 Pine ready for token hooks");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ⚠️ Pine load: " + e.getMessage());
                  }

                  for (String className : tokenClasses) {
                      try {
                          Class<?> target = cl.loadClass(className);

                          if (pineClass != null) {
                              // Pine hook - bypasses lsplant!
                              hookWithPine(pineClass, target, act);
                              pineCount++;
                              XposedBridge.log("[AutoDriver] 🌲 Pine hook: " + target.getSimpleName());
                          } else {
                              // Fallback: XposedBridge
                              XposedBridge.hookAllMethods(target, "<init>", new XC_MethodHook() {
                                  @Override protected void afterHookedMethod(MethodHookParam p) {
                                      scanObjectForToken(p.thisObject, act, target.getSimpleName());
                                  }
                              });
                              xposedCount++;
                              XposedBridge.log("[AutoDriver] ✅ Xposed hook: " + target.getSimpleName());
                          }
                      } catch (Throwable e) {
                          XposedBridge.log("[AutoDriver] ⚠️ " + className.substring(className.lastIndexOf('.')+1) + ": " + e.getMessage());
                      }
                  }
                  sendLog(act, "✅ Token hooks: Pine=" + pineCount + " Xposed=" + xposedCount
                      + " — login karo token capture hoga!");
              }

              private void hookWithPine(Class<?> pineClass, Class<?> target, android.app.Activity act) {
                  // Pine is in our APK classpath
                  // XposedBridge automatically uses Pine as hook engine when Pine is present
                  // So XposedBridge.hookAllMethods = Pine hook under the hood
                  try {
                      // Try Pine.hookAllMethods via reflection (Pine 0.2.9 API)
                      java.lang.reflect.Method hookAll = pineClass.getMethod(
                          "hookAll", Class.class, String.class,
                          Class.forName("de.robv.android.xposed.XC_MethodHook"));
                      hookAll.invoke(null, target, "<init>", new XC_MethodHook() {
                          @Override protected void afterHookedMethod(MethodHookParam p) {
                              scanObjectForToken(p.thisObject, act, "[Pine]" + target.getSimpleName());
                          }
                      });
                      XposedBridge.log("[AutoDriver] 🌲 Pine.hookAll OK: " + target.getSimpleName());
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ⚠️ Pine.hookAll: " + e.getMessage()
                          + " → XposedBridge fallback");
                      // Fallback: XposedBridge (which may use Pine internally)
                      try {
                          XposedBridge.hookAllMethods(target, "<init>", new XC_MethodHook() {
                              @Override protected void afterHookedMethod(MethodHookParam p) {
                                  scanObjectForToken(p.thisObject, act, "[Xposed]" + target.getSimpleName());
                              }
                          });
                      } catch (Throwable ignored) {}
                  }
              }

              private void hookWithPineReflection(Class<?> pineClass, Class<?> target,
                                                   android.app.Activity act) throws Throwable {
                  XposedBridge.hookAllMethods(target, "<init>", new XC_MethodHook() {
                      @Override
                      protected void afterHookedMethod(MethodHookParam p) {
                          if (p.thisObject != null)
                              scanObjectForToken(p.thisObject, act, target.getSimpleName());
                      }
                  });
                  XposedBridge.log("[AutoDriver] 🌲 Xposed hook: " + target.getSimpleName());
              }

              private void scanObjectForToken(Object obj, android.app.Activity act, String label) {
                  try {
                      for (java.lang.reflect.Field f : obj.getClass().getDeclaredFields()) {
                          f.setAccessible(true);
                          try {
                              Object val = f.get(obj);
                              if (val instanceof String) {
                                  String s = (String) val;
                                  if (s.length() > 20 && (s.startsWith("eyJ") || s.length() > 50)) {
                                      captureRawToken(s, act, label + "." + f.getName());
                                  }
                              }
                          } catch (Throwable ignored) {}
                      }
                  } catch (Throwable ignored) {}
              }

              private void captureRawToken(String token, android.app.Activity act, String source) {
                  if (token == null || token.length() < 10) return;
                  String bearer = token.startsWith("Bearer ") ? token : "Bearer " + token;
                  boolean changed = !bearer.equals(capturedToken);
                  capturedToken = bearer;
                  tokenCount++;
                  if (changed) {
                      XposedBridge.log("[AutoDriver] 🔑 Token #" + tokenCount
                          + " [" + source + "]: " + token.substring(0, Math.min(30, token.length())));
                      sendLog(act, "🔑 Token #" + tokenCount + " from " + source);
                  }
              }

              // Swipe receiver inside Saned process (AWS APK jaisa)
              private void registerSwipeReceiver(android.app.Activity act) {
                  if (swipeReceiverRegistered) return;
                  try {
                      BroadcastReceiver r = new BroadcastReceiver() {
                          @Override public void onReceive(Context ctx, Intent intent) {
                              int delay = intent.getIntExtra("scan_delay", 300);
                              android.app.Activity target = currentAct;
                              if (target == null || target.isFinishing()) {
                                  XposedBridge.log("[AutoDriver] ⚠️ No activity for swipe");
                                  return;
                              }
                              XposedBridge.log("[AutoDriver] 🖱️ Swipe broadcast received, delay=" + delay);
                              new android.os.Handler(android.os.Looper.getMainLooper())
                                  .postDelayed(() -> doSwipe(target), delay);
                          }
                      };
                      IntentFilter f = new IntentFilter("JAHEZ_DO_SWIPE");
                      if (android.os.Build.VERSION.SDK_INT >= 33)
                          act.getApplicationContext().registerReceiver(r, f, Context.RECEIVER_EXPORTED);
                      else
                          act.getApplicationContext().registerReceiver(r, f);
                      swipeReceiverRegistered = true;
                      XposedBridge.log("[AutoDriver] ✅ Swipe receiver registered in Saned");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ Swipe receiver: " + e.getMessage());
                  }
              }

              private volatile android.app.Activity currentAct = null;

              // Accept karne ke 3 methods - jo pehle kaam kare
              private void doSwipe(android.app.Activity act) {
                  currentAct = act;
                  try {
                      android.util.DisplayMetrics dm = new android.util.DisplayMetrics();
                      act.getWindowManager().getDefaultDisplay().getMetrics(dm);
                      int W = dm.widthPixels;
                      int H = dm.heightPixels;
                      int x1 = (int)(W * 0.10f);
                      int x2 = (int)(W * 0.90f);
                      int y  = (int)(H * 0.885f);

                      sendLog(act, "🖱️ Accept attempt: screen=" + W + "x" + H
                          + " swipe=" + x1 + "→" + x2 + " y=" + y);

                      // Method 1: performClick on Accept button (most reliable)
                      android.view.View root = act.getWindow().getDecorView();
                      android.view.View btn = findAcceptView(root);
                      if (btn != null) {
                          sendLog(act, "🖱️ Method1: performClick on "
                              + btn.getClass().getSimpleName());
                          btn.performClick();
                          sendLog(act, "✅ performClick done");
                          return;
                      }

                      // Method 2: su input touchscreen swipe (MIUI compatible)
                      String[] cmds = {
                          "input touchscreen swipe " + x1+" "+y+" "+x2+" "+y+" 250",
                          "input swipe " + x1+" "+y+" "+x2+" "+y+" 250",
                          "/system/bin/input touchscreen swipe "+x1+" "+y+" "+x2+" "+y+" 250"
                      };
                      for (String cmd : cmds) {
                          try {
                              ProcessBuilder pb = new ProcessBuilder("su", "-c", cmd);
                              pb.redirectErrorStream(true);
                              Process p = pb.start();
                              byte[] buf = new byte[128];
                              int n = p.getInputStream().read(buf);
                              boolean ok = p.waitFor(3, java.util.concurrent.TimeUnit.SECONDS);
                              int exit = ok ? p.exitValue() : -1;
                              String out = n > 0 ? new String(buf, 0, n).trim() : "";
                              sendLog(act, (exit==0?"✅":"⚠️") + " su [" + cmd.substring(0,Math.min(30,cmd.length()))
                                  + "] exit=" + exit + (out.isEmpty()?"":" "+out));
                              if (exit == 0) return;
                          } catch (Throwable e) {
                              sendLog(act, "⚠️ su cmd: " + e.getMessage());
                          }
                      }

                      // Method 3: MotionEvent inject
                      sendLog(act, "🖱️ Method3: MotionEvent inject");
                      long down = android.os.SystemClock.uptimeMillis();
                      android.view.MotionEvent ev;
                      ev = android.view.MotionEvent.obtain(down, down,
                          android.view.MotionEvent.ACTION_DOWN, x1, y, 0);
                      root.dispatchTouchEvent(ev); ev.recycle();
                      for (int i = 1; i <= 20; i++) {
                          float x = x1 + (x2-x1)*(float)i/20;
                          ev = android.view.MotionEvent.obtain(down, down+i*12L,
                              android.view.MotionEvent.ACTION_MOVE, x, y, 0);
                          root.dispatchTouchEvent(ev); ev.recycle();
                      }
                      ev = android.view.MotionEvent.obtain(down, down+260L,
                          android.view.MotionEvent.ACTION_UP, x2, y, 0);
                      root.dispatchTouchEvent(ev); ev.recycle();
                      sendLog(act, "✅ MotionEvent done");

                  } catch (Throwable e) {
                      sendLog(act, "❌ doSwipe: " + e.getMessage());
                  }
              }

              // Find Accept button in view tree
              private android.view.View findAcceptView(android.view.View root) {
                  if (root == null || root.getVisibility() == android.view.View.GONE) return null;
                  if (root instanceof android.widget.TextView) {
                      String txt = ((android.widget.TextView)root).getText().toString().trim();
                      if (isAcceptText(txt)) return root;
                  }
                  CharSequence cd = root.getContentDescription();
                  if (cd != null && isAcceptText(cd.toString())) return root;
                  String cls = root.getClass().getSimpleName().toLowerCase();
                  if (cls.contains("slide")||cls.contains("swipe")||cls.contains("accept")||cls.contains("drag")) return root;
                  if (root instanceof android.view.ViewGroup) {
                      android.view.ViewGroup vg = (android.view.ViewGroup) root;
                      for (int i = 0; i < vg.getChildCount(); i++) {
                          android.view.View f = findAcceptView(vg.getChildAt(i));
                          if (f != null) return f;
                      }
                  }
                  return null;
              }

              private boolean isAcceptText(String s) {
                  if (s == null || s.isEmpty()) return false;
                  String u = s.toUpperCase().trim();
                  for (String k : new String[]{"ACCEPT","SWIPE","SLIDE","CONFIRM","APPROVE"})
                      if (u.contains(k)) return true;
                  for (String k : new String[]{"قبول","موافق","تأكيد","اقبل"})
                      if (s.contains(k)) return true;
                  return false;
              }

              private void hookURLConnection(XC_LoadPackage.LoadPackageParam lp) {
                  XC_MethodHook hook = new XC_MethodHook() {
                      @Override protected void beforeHookedMethod(MethodHookParam param) {
                          try {
                              String key   = (String) param.args[0];
                              String value = (String) param.args[1];
                              if (!"Authorization".equals(key) || value == null || value.length() < 10) return;
                              String url = "";
                              try { url = XposedHelpers.callMethod(param.thisObject, "getURL").toString(); }
                              catch (Throwable ignored) {}
                              if (!url.isEmpty() && !url.contains("saned.io") && !url.contains("jahez")) return;
                              boolean changed = !value.equals(capturedToken);
                              capturedToken = value;
                              tokenCount++;
                              if (changed) XposedBridge.log("[AutoDriver] 🔑 Token #" + tokenCount
                                  + " [URLConn] " + value.substring(0, Math.min(40, value.length())));
                          } catch (Throwable ignored) {}
                      }
                  };
                  try {
                      Class<?> uc = lp.classLoader.loadClass("java.net.URLConnection");
                      XposedBridge.hookAllMethods(uc, "setRequestProperty", hook);
                      XposedBridge.hookAllMethods(uc, "addRequestProperty", hook);
                      XposedBridge.log("[AutoDriver] ✅ URLConnection hooks OK");
                  } catch (Throwable e) {
                      XposedBridge.log("[AutoDriver] ❌ URLConn: " + e.getMessage());
                  }
              }

              private String extractRequestId(Bundle b) {
                  try {
                      Object v = b.get("EXTRA_DISPATCH_REQUEST_ID");
                      if (v instanceof String && !((String)v).isEmpty()) return (String) v;
                      if (v instanceof Long)    return String.valueOf(v);
                      if (v instanceof Integer) return String.valueOf(v);
                      String s = b.getString("EXTRA_DISPATCH_REQUEST_ID");
                      if (s != null && !s.isEmpty()) return s;
                      long l = b.getLong("EXTRA_DISPATCH_REQUEST_ID", -1L);
                      if (l > 0) return String.valueOf(l);
                  } catch (Throwable ignored) {}
                  return "";
              }

              private void sendLog(android.app.Activity act, String msg) {
                  try {
                      Intent i = new Intent("JAHEZ_HOOK_LOG");
                      i.setPackage(OUR_PKG);
                      i.putExtra("log", msg);
                      act.sendBroadcast(i);
                  } catch (Throwable ignored) {}
              }

              private double getDouble(Bundle b, String key) {
                  try {
                      Object v = b.get(key);
                      if (v instanceof Double)  return (Double) v;
                      if (v instanceof Float)   return (Float) v;
                      if (v instanceof String)  return Double.parseDouble((String) v);
                      if (v instanceof Integer) return (Integer) v;
                      if (v instanceof Long)    return (Long) v;
                  } catch (Throwable ignored) {}
                  return -1;
              }
          }
