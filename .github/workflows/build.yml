                android:text="Loading..." android:textSize="11sp" android:textColor="#E6EDF3"
                android:fontFamily="monospace" android:padding="12dp" android:background="#161B22"/>
            </ScrollView>
          </LinearLayout>
          LOGEOF

      - name: Write Resources
        run: |
          cat > app/src/main/res/values/strings.xml << 'REOF'
          <resources><string name="app_name">Jahez Diagnostic</string></resources>
          REOF
          cat > app/src/main/res/values/themes.xml << 'TEOF'
          <resources><style name="AppTheme" parent="Theme.AppCompat.DayNight.NoActionBar">
            <item name="colorPrimary">#58A6FF</item><item name="colorPrimaryDark">#1F6FEB</item>
            <item name="colorAccent">#238636</item><item name="android:windowBackground">#0D1117</item>
          </style></resources>
          TEOF

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore /tmp/debug.keystore -alias jahezdiag -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=JahezDiag, O=Diag, C=SA" -storepass android -keypass android 2>/dev/null || true
          UNSIGNED=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$UNSIGNED" ]; then UNSIGNED=$(find app/build -name "*.apk" | head -1); fi
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" 2>/dev/null | sort -V | tail -1)
          $APKSIGNER sign --ks /tmp/debug.keystore --ks-key-alias jahezdiag --ks-pass pass:android --key-pass pass:android --out app/build/JahezDiagnostic.apk "$UNSIGNED"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JahezDiagnostic
          path: app/build/JahezDiagnostic.apk
