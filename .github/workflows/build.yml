name: Build Gufran Slider V9 Final
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Project Structure
        run: |
          mkdir -p app/src/main/java/com/danish/lsposed
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets

      - name: Create Build Files
        run: |
          echo "include ':app'" > settings.gradle
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { 
                  google(); mavenCentral()
                  maven { url 'https://api.xposed.info/' }
              }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.danish.lsposed'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.danish.lsposed'
                  minSdk 26
                  targetSdk 34
                  versionCode 10
                  versionName '9.0'
              }
          }
          dependencies {
              compileOnly 'de.robv.android.xposed:api:82'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: Create Manifest and Assets
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="Gufran Slider V9"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <meta-data android:name="xposedmodule" android:value="true" />
                  <meta-data android:name="xposeddescription" android:value="Gufran Auto V9 - Fix Crash & Deep Logs" />
                  <meta-data android:name="xposedminversion" android:value="82" />
                  <activity android:name=".SettingsActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          echo "com.danish.lsposed.MainHook" > app/src/main/assets/xposed_init

      - name: Create UI Resources
        run: |
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="jahez_red">#FF4B3A</color>
              <color name="dark_bg">#121212</color>
              <color name="text_white">#FFFFFF</color>
          </resources>
          EOF

          cat > app/src/main/res/layout/activity_settings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:padding="24dp" android:background="@color/dark_bg">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" 
                  android:text="Gufran Click V9" android:textColor="@color/jahez_red" 
                  android:textSize="26sp" android:textStyle="bold" android:layout_gravity="center"/>
              <View android:layout_width="match_parent" android:layout_height="1dp" 
                  android:background="#22FFFFFF" android:layout_marginVertical="20dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" 
                  android:text="Pickup Max (KM)" android:textColor="@color/text_white"/>
              <EditText android:id="@+id/et_pickup_max" android:layout_width="match_parent" 
                  android:layout_height="50dp" android:backgroundTint="@color/jahez_red" 
                  android:textColor="@color/text_white" android:inputType="numberDecimal" android:text="5.0"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" 
                  android:text="Drop Max (KM)" android:textColor="@color/text_white" android:layout_marginTop="10dp"/>
              <EditText android:id="@+id/et_drop_max" android:layout_width="match_parent" 
                  android:layout_height="50dp" android:backgroundTint="@color/jahez_red" 
                  android:textColor="@color/text_white" android:inputType="numberDecimal" android:text="10.0"/>
              <TextView android:id="@+id/tv_delay_label" android:layout_width="wrap_content" 
                  android:layout_height="wrap_content" android:text="Delay: 800ms" 
                  android:textColor="@color/jahez_red" android:layout_marginTop="20dp" android:textStyle="bold"/>
              <SeekBar android:id="@+id/sb_delay" android:layout_width="match_parent" 
                  android:layout_height="wrap_content" android:layout_marginTop="10dp"
                  android:max="1100" android:progress="400"/>
              <Switch android:id="@+id/switch_enabled" android:layout_width="match_parent" 
                  android:layout_height="wrap_content" android:text="Module Enable" 
                  android:textColor="@color/text_white" android:layout_marginTop="20dp"/>
              <Button android:id="@+id/btn_save" android:layout_width="match_parent" 
                  android:layout_height="60dp" android:text="SAVE AND APPLY" 
                  android:backgroundTint="@color/jahez_red" android:textColor="@color/text_white"
                  android:layout_marginTop="30dp" android:textStyle="bold"/>
          </LinearLayout>
          EOF

      - name: Create Settings Java (FIXED CRASH)
        run: |
          cat > app/src/main/java/com/danish/lsposed/SettingsActivity.java << 'EOF'
          package com.danish.lsposed;
          import android.content.Context;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.SeekBar;
          import android.widget.Switch;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import java.io.File;

          public class SettingsActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_settings);
                  
                  // Fix: MODE_PRIVATE to prevent crash on Android 13/14
                  final SharedPreferences p = getSharedPreferences("danish_prefs", Context.MODE_PRIVATE);
                  
                  EditText etP = findViewById(R.id.et_pickup_max);
                  EditText etD = findViewById(R.id.et_drop_max);
                  TextView tvD = findViewById(R.id.tv_delay_label);
                  SeekBar sb = findViewById(R.id.sb_delay);
                  Switch sw = findViewById(R.id.switch_enabled);
                  Button btn = findViewById(R.id.btn_save);

                  etP.setText(String.valueOf(p.getFloat("pickup_max", 5.0f)));
                  etD.setText(String.valueOf(p.getFloat("drop_max", 10.0f)));
                  int d = p.getInt("system_delay", 800);
                  sb.setProgress(d - 400);
                  tvD.setText("Delay: " + d + "ms");
                  sw.setChecked(p.getBoolean("enabled", false));

                  sb.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override public void onProgressChanged(SeekBar seekBar, int progress, boolean fromUser) {
                          tvD.setText("Delay: " + (progress + 400) + "ms");
                      }
                      @Override public void onStartTrackingTouch(SeekBar seekBar) {}
                      @Override public void onStopTrackingTouch(SeekBar seekBar) {}
                  });

                  btn.setOnClickListener(v -> {
                      p.edit().putFloat("pickup_max", Float.parseFloat(etP.getText().toString()))
                             .putFloat("drop_max", Float.parseFloat(etD.getText().toString()))
                             .putInt("system_delay", sb.getProgress() + 400)
                             .putBoolean("enabled", sw.isChecked()).apply();
                      
                      // Fix permissions so LSPosed can read it
                      try {
                          File sharedPrefsDir = new File(getFilesDir().getParentFile(), "shared_prefs");
                          File prefFile = new File(sharedPrefsDir, "danish_prefs.xml");
                          if (prefFile.exists()) {
                              prefFile.setReadable(true, false);
                          }
                      } catch (Exception e) {}
                      
                      Toast.makeText(this, "Settings Saved!", Toast.LENGTH_SHORT).show();
                  });
              }
          }
          EOF

      - name: Create MainHook (Fixed Reload & Scanning)
        run: |
          cat > app/src/main/java/com/danish/lsposed/MainHook.java << 'EOF'
          package com.danish.lsposed;
          import android.app.Activity;
          import android.os.Handler;
          import android.os.Looper;
          import android.os.SystemClock;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.TextView;
          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XSharedPreferences;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          public class MainHook implements IXposedHookLoadPackage {
              private static XSharedPreferences xPrefs;
              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable {
                  if (!lpparam.packageName.equals("net.jahez.fleets")) return;
                  
                  XposedBridge.log("[Gufran-V9] Jahez Hooked!");
                  xPrefs = new XSharedPreferences("com.danish.lsposed", "danish_prefs");
                  xPrefs.makeWorldReadable();

                  XposedHelpers.findAndHookMethod(Activity.class, "onResume", new XC_MethodHook() {
                      @Override
                      protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                          Activity act = (Activity) param.thisObject;
                          if (xPrefs.hasFileChanged()) xPrefs.reload();
                          if (!xPrefs.getBoolean("enabled", false)) return;

                          new Handler(Looper.getMainLooper()).postDelayed(() -> {
                              XposedBridge.log("[Gufran-V9] Triggering Screen Scan...");
                              checkScreen(act);
                          }, xPrefs.getInt("system_delay", 800));
                      }
                  });
              }

              private void checkScreen(Activity act) {
                  List<Float> kms = new ArrayList<>();
                  scanKm(act.getWindow().getDecorView(), kms);
                  XposedBridge.log("[Gufran-V9] KMs on screen: " + kms.toString());

                  if (kms.size() >= 2) {
                      float p = kms.get(0);
                      float d = kms.get(1);
                      float pMax = xPrefs.getFloat("pickup_max", 5.0f);
                      float dMax = xPrefs.getFloat("drop_max", 10.0f);

                      if (p <= pMax && d <= dMax) {
                          XposedBridge.log("[Gufran-V9] Match! Finding Button...");
                          findAndSwipe(act.getWindow().getDecorView());
                      }
                  }
              }

              private void scanKm(View v, List<Float> found) {
                  if (v instanceof ViewGroup) {
                      for (int i = 0; i < ((ViewGroup) v).getChildCount(); i++) scanKm(((ViewGroup) v).getChildAt(i), found);
                  } else if (v instanceof TextView) {
                      String t = ((TextView) v).getText().toString();
                      if (t.toLowerCase().contains("km")) {
                          Matcher m = Pattern.compile("(\\d+\\.?\\d*)").matcher(t);
                          if (m.find()) found.add(Float.parseFloat(m.group(1)));
                      }
                  }
              }

              private void findAndSwipe(View v) {
                  if (v instanceof ViewGroup) {
                      for (int i = 0; i < ((ViewGroup) v).getChildCount(); i++) findAndSwipe(((ViewGroup) v).getChildAt(i));
                  } else if (v instanceof TextView) {
                      String txt = ((TextView) v).getText().toString().toLowerCase();
                      if (txt.contains("accept") || txt.contains("قبول") || txt.contains("order")) {
                          XposedBridge.log("[Gufran-V9] Swiping on: " + txt);
                          doSwipe(v);
                      }
                  }
              }

              private void doSwipe(View v) {
                  int[] pos = new int[2];
                  v.getLocationOnScreen(pos);
                  float startX = pos[0] + (v.getWidth() * 0.2f);
                  float endX = pos[0] + (v.getWidth() * 0.8f);
                  float y = pos[1] + (v.getHeight() / 2f);
                  long t = SystemClock.uptimeMillis();
                  v.dispatchTouchEvent(MotionEvent.obtain(t, t, MotionEvent.ACTION_DOWN, startX, y, 0));
                  v.dispatchTouchEvent(MotionEvent.obtain(t, t + 150, MotionEvent.ACTION_MOVE, endX, y, 0));
                  v.dispatchTouchEvent(MotionEvent.obtain(t, t + 160, MotionEvent.ACTION_UP, endX, y, 0));
              }
          }
          EOF

      - name: Build & Upload
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      - run: gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Gufran-Slider-V9-FIXED
          path: app/build/outputs/apk/debug/*.apk
