name: Build Saned Auto Swipe
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Project
        run: |
          mkdir -p app/src/main/java/com/saned/autoswipe
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          echo "include ':app'" > settings.gradle

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.saned.autoswipe'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.saned.autoswipe'
                  minSdk 26
                  targetSdk 34
                  versionCode 6
                  versionName '6.0'
              }
              packagingOptions {
                  exclude 'META-INF/LICENSE.md'
                  exclude 'META-INF/LICENSE-notice.md'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <application
                  android:label="Saned Auto"
                  android:theme="@style/Theme.AppCompat">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".AutoSwipeService"
                      android:exported="true"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService"/>
                      </intent-filter>
                      <meta-data
                          android:name="android.accessibilityservice"
                          android:resource="@xml/acc_config"/>
                  </service>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/xml/acc_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:accessibilityEventTypes="typeWindowStateChanged|typeWindowContentChanged"
              android:accessibilityFeedbackType="feedbackGeneric"
              android:accessibilityFlags="flagDefault|flagReportViewIds|flagRetrieveInteractiveWindows"
              android:canPerformGestures="true"
              android:canRetrieveWindowContent="true"
              android:notificationTimeout="100"
              android:packageNames="com.saned.delivery"/>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Saned Auto</string>
          </resources>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#121212">
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:gravity="center_horizontal"
                  android:padding="24dp">

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Saned Auto Swipe"
                      android:textSize="24sp"
                      android:textColor="#FFFFFF"
                      android:textStyle="bold"
                      android:layout_marginBottom="6dp"/>

                  <TextView
                      android:id="@+id/tv_status"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Service OFF"
                      android:textSize="15sp"
                      android:textColor="#FF5555"
                      android:layout_marginBottom="28dp"/>

                  <TextView
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Pickup Distance (From You)"
                      android:textColor="#1DB954"
                      android:textSize="15sp"
                      android:textStyle="bold"
                      android:layout_marginBottom="8dp"/>

                  <TextView
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Max (Km)"
                      android:textColor="#AAAAAA"
                      android:textSize="13sp"
                      android:gravity="center"/>
                  <EditText
                      android:id="@+id/et_pickup_max"
                      android:layout_width="200dp"
                      android:layout_height="wrap_content"
                      android:inputType="numberDecimal"
                      android:text="5.0"
                      android:textColor="#FFFFFF"
                      android:backgroundTint="#333333"
                      android:gravity="center"
                      android:padding="10dp"
                      android:layout_marginBottom="4dp"/>
                  <TextView
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="(0 se is tak ke orders accept honge)"
                      android:textColor="#777777"
                      android:textSize="11sp"
                      android:gravity="center"
                      android:layout_marginBottom="16dp"/>

                  <View
                      android:layout_width="match_parent"
                      android:layout_height="1dp"
                      android:background="#333333"
                      android:layout_marginVertical="8dp"/>

                  <TextView
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Drop Distance (From Pickup)"
                      android:textColor="#FF9500"
                      android:textSize="15sp"
                      android:textStyle="bold"
                      android:layout_marginBottom="8dp"
                      android:layout_marginTop="8dp"/>

                  <TextView
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Max (Km)"
                      android:textColor="#AAAAAA"
                      android:textSize="13sp"
                      android:gravity="center"/>
                  <EditText
                      android:id="@+id/et_drop_max"
                      android:layout_width="200dp"
                      android:layout_height="wrap_content"
                      android:inputType="numberDecimal"
                      android:text="10.0"
                      android:textColor="#FFFFFF"
                      android:backgroundTint="#333333"
                      android:gravity="center"
                      android:padding="10dp"
                      android:layout_marginBottom="4dp"/>
                  <TextView
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="(0 se is tak ke orders accept honge)"
                      android:textColor="#777777"
                      android:textSize="11sp"
                      android:gravity="center"
                      android:layout_marginBottom="16dp"/>

                  <View
                      android:layout_width="match_parent"
                      android:layout_height="1dp"
                      android:background="#333333"
                      android:layout_marginVertical="8dp"/>

                  <Switch
                      android:id="@+id/switch_service"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Auto Accept"
                      android:textColor="#FFFFFF"
                      android:textSize="18sp"
                      android:layout_marginTop="12dp"
                      android:layout_marginBottom="16dp"/>

                  <Button
                      android:id="@+id/btn_save"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="OK - Save Settings"
                      android:textSize="16sp"
                      android:textStyle="bold"
                      android:backgroundTint="#1DB954"
                      android:layout_marginBottom="16dp"/>

                  <TextView
                      android:id="@+id/tv_info"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Pehle Accessibility Service enable karein"
                      android:textColor="#FFAA00"
                      android:textSize="13sp"
                      android:gravity="center"
                      android:layout_marginBottom="12dp"/>

                  <Button
                      android:id="@+id/btn_accessibility"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Open Accessibility Settings"
                      android:backgroundTint="#444444"/>

              </LinearLayout>
          </ScrollView>
          EOF

          cat > app/src/main/java/com/saned/autoswipe/MainActivity.java << 'EOF'
          package com.saned.autoswipe;

          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.provider.Settings;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.Switch;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {

              Switch switchService;
              EditText etPickupMax, etDropMax;
              TextView tvStatus, tvInfo;
              Button btnSave, btnAccessibility;
              SharedPreferences prefs;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  prefs            = getSharedPreferences("saned_prefs", MODE_PRIVATE);
                  switchService    = findViewById(R.id.switch_service);
                  etPickupMax      = findViewById(R.id.et_pickup_max);
                  etDropMax        = findViewById(R.id.et_drop_max);
                  tvStatus         = findViewById(R.id.tv_status);
                  tvInfo           = findViewById(R.id.tv_info);
                  btnSave          = findViewById(R.id.btn_save);
                  btnAccessibility = findViewById(R.id.btn_accessibility);

                  etPickupMax.setText(String.valueOf(prefs.getFloat("pickup_max", 5.0f)));
                  etDropMax.setText(String.valueOf(prefs.getFloat("drop_max", 10.0f)));

                  switchService.setOnCheckedChangeListener((btn, isChecked) ->
                      updateStatus(isChecked)
                  );

                  btnSave.setOnClickListener(v -> {
                      float pMax, dMax;
                      try { pMax = Float.parseFloat(etPickupMax.getText().toString()); } catch (Exception e) { pMax = 5.0f; }
                      try { dMax = Float.parseFloat(etDropMax.getText().toString());   } catch (Exception e) { dMax = 10.0f; }

                      prefs.edit()
                          .putFloat("pickup_max", pMax)
                          .putFloat("drop_max", dMax)
                          .putBoolean("enabled", switchService.isChecked())
                          .apply();

                      etPickupMax.clearFocus();
                      etDropMax.clearFocus();
                      InputMethodManager imm = (InputMethodManager) getSystemService(INPUT_METHOD_SERVICE);
                      if (imm != null) {
                          android.view.View view = getCurrentFocus();
                          if (view == null) view = new android.view.View(this);
                          imm.hideSoftInputFromWindow(view.getWindowToken(), 0);
                      }

                      Toast.makeText(this, "Settings Saved!", Toast.LENGTH_SHORT).show();
                      tvStatus.setText("Settings Saved!");
                      tvStatus.setTextColor(0xFF1DB954);
                      new Handler(Looper.getMainLooper()).postDelayed(() ->
                          updateStatus(switchService.isChecked()), 1500);
                  });

                  btnAccessibility.setOnClickListener(v ->
                      startActivity(new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS))
                  );
              }

              private void updateStatus(boolean enabled) {
                  if (enabled) {
                      tvStatus.setText("Service ON - Waiting for order...");
                      tvStatus.setTextColor(0xFF1DB954);
                  } else {
                      tvStatus.setText("Service OFF");
                      tvStatus.setTextColor(0xFFFF5555);
                  }
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  boolean enabled = prefs.getBoolean("enabled", false);
                  switchService.setChecked(enabled);
                  updateStatus(enabled);
                  if (isAccessibilityEnabled()) {
                      tvInfo.setText("Accessibility Service: Active");
                      tvInfo.setTextColor(0xFF1DB954);
                  } else {
                      tvInfo.setText("Pehle Accessibility Service enable karein!");
                      tvInfo.setTextColor(0xFFFFAA00);
                  }
              }

              private boolean isAccessibilityEnabled() {
                  try {
                      String s = Settings.Secure.getString(getContentResolver(),
                          Settings.Secure.ENABLED_ACCESSIBILITY_SERVICES);
                      return s != null && s.contains(getPackageName());
                  } catch (Exception e) { return false; }
              }
          }
          EOF

          cat > app/src/main/java/com/saned/autoswipe/AutoSwipeService.java << 'EOF'
          package com.saned.autoswipe;

          import android.accessibilityservice.AccessibilityService;
          import android.accessibilityservice.GestureDescription;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.content.SharedPreferences;
          import android.graphics.Path;
          import android.graphics.Rect;
          import android.os.Build;
          import android.os.Handler;
          import android.os.Looper;
          import android.util.Log;
          import android.view.accessibility.AccessibilityEvent;
          import android.view.accessibility.AccessibilityNodeInfo;
          import java.util.List;

          public class AutoSwipeService extends AccessibilityService {

              private static final String TAG = "SanedAuto";
              private SharedPreferences prefs;
              private final Handler handler = new Handler(Looper.getMainLooper());
              private boolean isProcessing = false;

              @Override
              public void onServiceConnected() {
                  super.onServiceConnected();
                  prefs = getSharedPreferences("saned_prefs", MODE_PRIVATE);
              }

              @Override
              public void onAccessibilityEvent(AccessibilityEvent event) {
                  if (prefs == null || !prefs.getBoolean("enabled", false) || isProcessing) return;
                  
                  String pkg = event.getPackageName() != null ? event.getPackageName().toString() : "";
                  if (!pkg.contains("saned") && !pkg.contains("jahez")) return;
                  
                  isProcessing = true;
                  handler.postDelayed(() -> {
                      checkAndAccept();
                      isProcessing = false;
                  }, 1000);
              }

              private void checkAndAccept() {
                  AccessibilityNodeInfo root = getRootInActiveWindow();
                  if (root == null) return;
                  
                  try {
                      // Check if new order screen
                      List<AccessibilityNodeInfo> newOrder = root.findAccessibilityNodeInfosByText("New Order");
                      if (newOrder == null || newOrder.isEmpty()) {
                          newOrder = root.findAccessibilityNodeInfosByText("طلب جديد");
                          if (newOrder == null || newOrder.isEmpty()) return;
                      }
                      if (newOrder != null) { for (AccessibilityNodeInfo n : newOrder) { if (n != null) n.recycle(); } }
                      
                      float pickupMax = prefs.getFloat("pickup_max", 5.0f);
                      float dropMax = prefs.getFloat("drop_max", 10.0f);
                      
                      float pickupKm = getDistance(root, "From You");
                      if (pickupKm < 0) pickupKm = getDistance(root, "منك");
                      float dropKm = getDistance(root, "From Pickup");
                      if (dropKm < 0) dropKm = getDistance(root, "من نقطة الاستلام");
                      
                      if (pickupKm < 0 || dropKm < 0) return;
                      
                      Log.d(TAG, "Pickup: " + pickupKm + "km, Drop: " + dropKm + "km");
                      
                      if (pickupKm <= pickupMax && dropKm <= dropMax) {
                          swipeAcceptButton(root, pickupKm, dropKm);
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "Error: " + e.getMessage());
                  } finally {
                      if (root != null) root.recycle();
                  }
              }
              
              private float getDistance(AccessibilityNodeInfo root, String keyword) {
                  List<AccessibilityNodeInfo> nodes = root.findAccessibilityNodeInfosByText(keyword);
                  if (nodes != null && !nodes.isEmpty()) {
                      String text = nodes.get(0).getText() != null ? nodes.get(0).getText().toString() : "";
                      for (AccessibilityNodeInfo n : nodes) { if (n != null) n.recycle(); }
                      try {
                          String[] parts = text.trim().split("\\s+");
                          if (parts.length > 0) {
                              return Float.parseFloat(parts[0].replace(",", "."));
                          }
                      } catch (Exception e) {}
                  }
                  return -1f;
              }
              
              private void swipeAcceptButton(AccessibilityNodeInfo root, float pickupKm, float dropKm) {
                  String[] texts = {"Accept", "ACCEPT", "قبول"};
                  
                  for (String text : texts) {
                      List<AccessibilityNodeInfo> btns = root.findAccessibilityNodeInfosByText(text);
                      if (btns != null && !btns.isEmpty()) {
                          for (AccessibilityNodeInfo btn : btns) {
                              if (btn != null) {
                                  Rect bounds = new Rect();
                                  btn.getBoundsInScreen(bounds);
                                  btn.recycle();
                                  
                                  if (bounds.width() > 0) {
                                      int startX = bounds.left + (bounds.width() / 6);
                                      int endX = bounds.right - (bounds.width() / 6);
                                      int y = bounds.centerY();
                                      
                                      performSwipe(startX, y, endX, y, () -> {
                                          Log.d(TAG, "Order Accepted! Pickup: " + pickupKm + " Drop: " + dropKm);
                                          showNotification(pickupKm, dropKm);
                                      });
                                      return;
                                  }
                              }
                          }
                          for (AccessibilityNodeInfo btn : btns) { if (btn != null) btn.recycle(); }
                      }
                  }
              }
              
              private void performSwipe(int x1, int y1, int x2, int y2, Runnable onDone) {
                  Path path = new Path();
                  path.moveTo(x1, y1);
                  path.lineTo(x2, y2);
                  
                  GestureDescription gesture = new GestureDescription.Builder()
                      .addStroke(new GestureDescription.StrokeDescription(path, 0, 300))
                      .build();
                  
                  dispatchGesture(gesture, new GestureResultCallback() {
                      @Override
                      public void onCompleted(GestureDescription g) {
                          handler.postDelayed(onDone, 500);
                      }
                      @Override
                      public void onCancelled(GestureDescription g) {
                          Log.e(TAG, "Swipe cancelled");
                      }
                  }, null);
              }
              
              private void showNotification(float pickup, float drop) {
                  try {
                      NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                      if (nm == null) return;
                      
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          NotificationChannel channel = new NotificationChannel(
                              "saned_channel", "Saned Auto", NotificationManager.IMPORTANCE_HIGH);
                          nm.createNotificationChannel(channel);
                      }
                      
                      Notification.Builder builder;
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          builder = new Notification.Builder(this, "saned_channel");
                      } else {
                          builder = new Notification.Builder(this);
                      }
                      
                      builder.setSmallIcon(android.R.drawable.ic_dialog_info)
                          .setContentTitle("Order Accepted!")
                          .setContentText("Pickup: " + pickup + "km | Drop: " + drop + "km")
                          .setAutoCancel(true);
                      
                      nm.notify(1001, builder.build());
                  } catch (Exception e) {}
              }
              
              @Override
              public void onInterrupt() {
                  isProcessing = false;
              }
          }
          EOF

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Saned-Auto-Swipe-v6
          path: app/build/outputs/apk/debug/*.apk
