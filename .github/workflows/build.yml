name: Build Saned Auto Swipe
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/saned/autoswipe
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          
          # Root build.gradle
          echo 'buildscript {
              repositories { google() mavenCentral() }
              dependencies {
                  classpath "com.android.tools.build:gradle:8.1.0"
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0"
              }
          }
          allprojects {
              repositories { google() mavenCentral() }
          }' > build.gradle
          
          echo 'rootProject.name = "SanedAutoSwipe"
          include ":app"' > settings.gradle
          
          # App build.gradle
          echo 'plugins {
              id "com.android.application"
              id "org.jetbrains.kotlin.android"
          }
          android {
              namespace "com.saned.autoswipe"
              compileSdk 34
              defaultConfig {
                  applicationId "com.saned.autoswipe"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildFeatures { viewBinding true }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = "17" }
          }
          dependencies {
              implementation "androidx.core:core-ktx:1.12.0"
              implementation "androidx.appcompat:appcompat:1.6.1"
              implementation "com.google.android.material:material:1.11.0"
              implementation "androidx.constraintlayout:constraintlayout:2.1.4"
          }' > app/build.gradle
          
          # AndroidManifest.xml
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <application android:allowBackup="true" android:label="Saned Auto Swipe" android:theme="@style/Theme.SanedAutoSwipe">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name=".AutoSwipeService" android:exported="true" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService"/>
                      </intent-filter>
                      <meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config"/>
                  </service>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          # Resources (Strings, Colors, Themes)
          echo '<resources><string name="app_name">Saned Auto Swipe</string></resources>' > app/src/main/res/values/strings.xml
          echo '<resources><color name="white">#FFFFFF</color><color name="purple_500">#6200EE</color></resources>' > app/src/main/res/values/colors.xml
          echo '<resources><style name="Theme.SanedAutoSwipe" parent="Theme.MaterialComponents.DayNight.NoActionBar"><item name="colorPrimary">#6200EE</item><item name="android:statusBarColor">#6200EE</item></style></resources>' > app/src/main/res/values/themes.xml
          echo '<?xml version="1.0" encoding="utf-8"?><accessibility-service xmlns:android="http://schemas.android.com/apk/res/android" android:accessibilityEventTypes="typeWindowStateChanged|typeWindowContentChanged" android:accessibilityFeedbackType="feedbackGeneric" android:accessibilityFlags="flagRetrieveInteractiveWindows" android:canPerformGestures="true" android:canRetrieveWindowContent="true" android:notificationTimeout="500" />' > app/src/main/res/xml/accessibility_service_config.xml

          # Layout - Using Full Material Paths to prevent crash
          echo '<?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto" android:layout_width="match_parent" android:layout_height="match_parent" android:padding="16dp" android:background="#1a1a2e">
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical">
                  <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="🚗 Saned Auto Swipe" android:textSize="28sp" android:textColor="#FFFFFF" android:gravity="center" android:layout_marginBottom="24dp" />
                  <TextView android:id="@+id/serviceStatus" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="⚫ INACTIVE" android:textColor="#FFFFFF" android:gravity="center" android:padding="12dp" android:background="#16213e" android:layout_marginBottom="20dp" />
                  <Button android:id="@+id/btnAccessibility" android:layout_width="match_parent" android:layout_height="60dp" android:text="Enable Accessibility" />
                  <TextView android:id="@+id/pickupText" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Max Pickup: 3.0 km" android:textColor="#aaaaff" android:layout_marginTop="20dp"/>
                  <com.google.android.material.slider.Slider android:id="@+id/pickupSlider" android:layout_width="match_parent" android:layout_height="wrap_content" android:valueFrom="0.1" android:valueTo="10.0" android:stepSize="0.1" android:value="3.0" />
                  <TextView android:id="@+id/dropText" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Max Drop: 5.0 km" android:textColor="#aaaaff" />
                  <com.google.android.material.slider.Slider android:id="@+id/dropSlider" android:layout_width="match_parent" android:layout_height="wrap_content" android:valueFrom="0.1" android:valueTo="10.0" android:stepSize="0.1" android:value="5.0" />
                  <Button android:id="@+id/btnStartStop" android:layout_width="match_parent" android:layout_height="65dp" android:text="START" android:layout_marginTop="20dp" android:backgroundTint="#4CAF50" />
              </LinearLayout>
          </ScrollView>' > app/src/main/res/layout/activity_main.xml

          # MainActivity.kt
          echo 'package com.saned.autoswipe
          import android.content.Intent
          import android.os.Bundle
          import android.provider.Settings
          import android.widget.Button
          import android.widget.TextView
          import androidx.appcompat.app.AppCompatActivity
          import com.google.android.material.slider.Slider

          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  val btnAcc = findViewById<Button>(R.id.btnAccessibility)
                  val btnStart = findViewById<Button>(R.id.btnStartStop)
                  val pSlider = findViewById<Slider>(R.id.pickupSlider)
                  val dSlider = findViewById<Slider>(R.id.dropSlider)
                  
                  btnAcc.setOnClickListener { startActivity(Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS)) }
                  btnStart.setOnClickListener {
                      val intent = Intent(this, AutoSwipeService::class.java).apply {
                          putExtra("max_pickup", pSlider.value)
                          putExtra("max_drop", dSlider.value)
                      }
                      startForegroundService(intent)
                  }
              }
          }' > app/src/main/java/com/saned/autoswipe/MainActivity.kt

          # AutoSwipeService.kt
          echo 'package com.saned.autoswipe
          import android.accessibilityservice.AccessibilityService
          import android.accessibilityservice.GestureDescription
          import android.graphics.Path
          import android.view.accessibility.AccessibilityEvent
          import android.view.accessibility.AccessibilityNodeInfo

          class AutoSwipeService : AccessibilityService() {
              override fun onAccessibilityEvent(event: AccessibilityEvent?) {
                  val root = rootInActiveWindow ?: return
                  if (findText(root, "New Order") || findText(root, "Accept")) {
                      performAction()
                  }
              }
              private fun findText(node: AccessibilityNodeInfo, text: String): Boolean {
                  if (node.text?.toString()?.contains(text, true) == true) return true
                  for (i in 0 until node.childCount) {
                      if (findText(node.getChild(i) ?: continue, text)) return true
                  }
                  return false
              }
              private fun performAction() {
                  val path = Path().apply { moveTo(500f, 1500f); lineTo(900f, 1500f) }
                  val gesture = GestureDescription.Builder()
                      .addStroke(GestureDescription.StrokeDescription(path, 0, 200))
                      .build()
                  dispatchGesture(gesture, null, null)
              }
              override fun onInterrupt() {}
          }' > app/src/main/java/com/saned/autoswipe/AutoSwipeService.kt

      - name: Build APK with Fixes
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle wrapper --gradle-version 8.1
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Saned-AutoSwipe-Fixed
          path: app/build/outputs/apk/debug/*.apk
