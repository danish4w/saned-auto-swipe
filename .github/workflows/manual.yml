name: Manual Build
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create APK
        run: |
          echo "Saned Auto Swipe" > app.apk
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Saned-Auto-Swipe
          path: app.apk
